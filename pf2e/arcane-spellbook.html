cess or perceive these extradimensional spaces. You can Interact to place an object into the extradimensional space or to draw an object from the extradimensional storage. When you draw an object from the extradimensional storage, the object appears in one of your empty hands. If you don't have an empty hand, you can't draw an object from the extradimensional storage. For the duration, whenever you Palm an Object, you can choose to place the palmed object directly into one of the two extradimensional spaces if that space has sufficient capacity to hold the object. When the spell ends or you die, the contents of both extradimensional spaces are ejected and land without harm on the ground in your space. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2159","name":"Perceive the Threads of Fate","rank":3,"url":"https://2e.aonprd.com/MythicSpells.aspx?ID=2159","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Reflex","traits":["Concentrate","Fortune","Mythic","Prediction","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You open your mind to the grand design of existence, enabling you to view the threads of fate in all their complex, tangled glory.","effect":"You open your mind to the grand design of existence, enabling you to view the threads of fate in all their complex, tangled glory. You attempt Perception checks and Reflex saving throws at mythic proficiency for the duration. You can Sustain the spell once per round to untangle these threads. When you do, if your next action requires you to attempt an attack roll or skill check, you roll this check twice and use the higher result. You can untangle the threads of fate up to three times. After the third time, the spell ends. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":true},{"id":"834","name":"Perseis's Precautions","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=834","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Fortune","Prediction","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Leaving nothing to chance, you weave divinatory precautions against an ambush, alerting the target to danger.","effect":"Leaving nothing to chance, you weave divinatory precautions against an ambush, alerting the target to danger. Once during the duration of this spell, the target can roll one Perception, Arcana, Crafting, Lore, Occultism, or Society initiative roll twice and take the better result, after which the spell ends. The strain of staying so prepared is too much for a mind to handle for long; the target is temporarily immune to this spell for 24 hours once the spell ends, whether they used the initiative benefit or not. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"969","name":"Phantom Prison","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=969","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"50 feet","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Incapacitation","Mental","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Trap a creature in illusory walls until it disbelieves.","effect":"You completely surround a Large or smaller creature in immobile illusory walls, trapping it inside a false prison it can't escape. No other creatures see or feel these walls, and the target can't see anything outside of the illusory walls. The target can attempt a Will save when the spell is cast, each time it attempts to interact with or escape the walls, and each time something from outside the walls affects the target. On a success, it disbelieves the illusion and the spell ends.","conditions":[],"tags":["illusion","incapacitation","mental"],"heightened":[{"label":"8th","text":"You can target up to 5 creatures."}],"sustained":false},{"id":"646","name":"Pillar of Water","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=646","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Evocation","Uncommon","Water"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1161","name":"Rally Point","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1161","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Teleportation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":["teleportation"],"heightened":[],"sustained":false},{"id":"712","name":"Safe Passage","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=712","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Primal, Elemental","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Make an area safe to move through.","effect":"You repel dangers from all around you, making passage through the chosen area safe for a brief amount of time. Anyone passing through the area gains the following benefits against harmful effects of the terrain and environment, including environmental damage, hazardous terrain, and hazards in the area. The spell grants a +2 status bonus to AC and saves against such effects, and resistance 5 to all damage from such effects. Furthermore, the spell prevents anything in the area that's prone to collapse, such as a rickety bridge or an unstable ceiling, from collapsing, except under extreme strain that would collapse a normal structure of its type. Safe passage protects only against harm, not inconvenience, and it doesn't reduce difficult terrain, remove the concealed condition caused by precipitation, or the like, nor does it protect against creatures within the spell's area.","conditions":["concealed","prone"],"tags":["buff","control","defense"],"heightened":[{"label":"5th","text":"The granted resistance increases to 10, and the area can be 120 feet long."},{"label":"8th","text":"The granted resistance increases to 15, and the area can be 500 feet long."}],"sustained":true},{"id":"270","name":"Secret Page","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=270","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 page up to 3 square feet in size","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Alter the appearance of a page.","effect":"You change the target's text to different text entirely. If the text is a spellbook or a scroll, you can change it to show a spell you know of secret page 's level or lower. The replacement spell cannot be cast or used to prepare a spell. You can also transform the text into some other text you have written or have access to. You can specify a password that allows a creature touching the page to change the text back and forth. You must choose the replacement text and the password, if any, when you Cast the Spell. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"586","name":"Shifting Sand","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=586","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"You cause the surface to heave.","effect":"You cause the surface to heave. The area becomes difficult terrain and any tracks in the area are destroyed by the churning ground. Creatures standing in the area take a –1 status penalty to Acrobatics checks to Balance and Tumble Through and Athletics checks to High Jump and Long Jump. The first time each round you Sustain the Spell, you can move the churning area up to 10 feet in any direction. Creatures immobilized by the spell are carried along with the shifting sand in the same direction, if possible; this movement is forced movement. Creatures that enter or begin their turn standing in the shifting sand must attempt a Reflex save. Critical Success The creature is unaffected and ignores the area’s difficult terrain and penalty to skill checks until the end of its turn. Success The creature ignores the area’s penalty to skill checks until the end of its turn. Failure The creature is affected normally by the spell this turn. Critical Failure The creature becomes immobilized within the spell’s area until it Escapes. If the creature was already immobilized by shifting sands, it also falls prone.","conditions":["immobilized","prone"],"tags":["control","debuff"],"heightened":[{"label":"5th","text":"The status penalty increases to –2 and the spell’s range increases to 60 feet."},{"label":"7th","text":"The status penalty increases to –3, the spell’s range increases to 60 feet, and the spell’s area increases to a 30-foot burst."},{"label":"9th","text":"The status penalty increases to –4, the spell’s range increases to 60 feet, and the spell’s area increases to a 40-foot burst."}],"sustained":true},{"id":"1323","name":"Tempest Cloak","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1323","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Protect a creature with swirling winds.","effect":"You shroud one creature in a cloak of fierce, howling winds, shielding it from attacks and making it difficult to approach. The twisting shield of wind creates difficult terrain in a 5-foot burst surrounding the target. The target also gains a +2 circumstance bonus to its AC against physical ranged attacks, such as attacks made with bow, javelin, or sling. In addition, the sound of the swirling storms makes it easier for the target to ignore anything it doesn't want to hear, granting the target a +2 circumstance bonus to all defenses against auditory effects. ---","conditions":[],"tags":["buff","concentrate","control"],"heightened":[],"sustained":false},{"id":"2330","name":"Thief of Fortune","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2330","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"one beneficial spell effect currently affecting a creature, with a duration of 10 minutes or less","duration":"","school":"","traditions":"Arcane, Divine","save":"","traits":["Concentrate","Manipulate","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Seeing another creature improve themself with magic, you reach out and seize its benefits for yourself.","effect":"Seeing another creature improve themself with magic, you reach out and seize its benefits for yourself. Attempt a counteract check against the target spell effect. If you successfully counteract the effect, the effect does not end. Instead, you gain the effect of the target spell as well. If you would not be a valid target for the spell, you do not gain any of its benefits. The spell’s duration is halved as you siphon off its magical energy for yourself. Each round that both you and the original creature are affected by the spell counts for two rounds when determining the spell’s duration. You can Dismiss the spell. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1192","name":"Time Pocket","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1192","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"one item of 1 Bulk or less that a willing creature is holding","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1231","name":"Transcribe Conflict","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1231","rarity":"Rare","actions":"T","actionsRaw":"1 minute","range":"touch","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You cause a sheet of paper to appear in your hand, and a moment later a detailed description of a combat you experienced within the last hour is recorded on that sheet of paper in a language that you know of your choice.","effect":"You cause a sheet of paper to appear in your hand, and a moment later a detailed description of a combat you experienced within the last hour is recorded on that sheet of paper in a language that you know of your choice. The description is detailed enough that anyone who spends 1 minute reading the page can attempt to Recall Knowledge about the event as if they had been there, but the primary purpose of the transcribed conflict is to give you additional insight into the fight by allowing you to study the conflict and learn from errors or tactical blunders participants in the battle may have committed. When you cast this spell, choose a type of foe in the fight you transcribed and attempt to Recall Knowledge about that foe using your spell DC–10 instead of your skill modifier in an appropriate skill to do so. For this action, you can't use any special abilities, reactions, or free actions that trigger when you Recall Knowledge. If you are successful, you not only learn information about that foe as determined by the GM, but for the remainder of transcribe conflict's duration, you gain a +1 status bonus to Initiative checks in combats where you face that exact kind of foe. For example, if you made the check against a wrath demon, the bonus would apply only to wrath demons, not to other demons. The GM decides if a foe who is disguised grants you this bonus.","conditions":[],"tags":["buff","defense","utility"],"heightened":[{"label":"5th","text":"The bonus to initiative increases to +2 and the duration increases to 8 hours."},{"label":"8th","text":"The bonus to initiative increases to +3 and the duration increases until the next time you do your daily preparations, and the status bonus to Initiative checks applies to any allies who took part in the fight you transcribed as long as they are within 30 feet of you when you cast the spell."}],"sustained":false},{"id":"2164","name":"Travel by Turtle","rank":3,"url":"https://2e.aonprd.com/MythicSpells.aspx?ID=2164","rarity":"Rare","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Mythic","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You conjure an intelligent sea turtle, who agrees to carry you upon its shell on a water journey.","effect":"You conjure an intelligent sea turtle, who agrees to carry you upon its shell on a water journey. This turtle must be conjured into a large body of water within range, such as a lake or broad river. The turtle conjured is Large, is capable of carrying one Medium creature or up to four Small creatures, and has a swim Speed of 30 feet. The turtle doesn't engage in combat and doesn't put itself intentionally into harm's way, but it does convey you to a destination of your choice and follows your suggestions. The turtle otherwise functions as a boat, save that it controls itself and doesn't need to be piloted.","conditions":[],"tags":["concentrate","summon"],"heightened":[{"label":"5th","text":"The turtle’s size increases to Huge, making it capable of carrying one Large creature, up to four Medium creatures, or up to 16 Small creatures. Its swim Speed increases to 40 feet, and the duration increases to 1 day."},{"label":"7th","text":"The turtle’s size increases to Gargantuan, making it capable of carrying one Huge creature, up to four Large creatures, up to 16 Medium creatures, or up to 32 Small creatures. Its swim Speed increases to 50 feet, and the duration increases to 1 week."},{"label":"9th","text":"The turtle’s size increases to Gargantuan, making it capable of carrying two Huge creatures, up to eight Large creatures, up to 32 Medium creatures, or up to 64 Small creatures. Its swim Speed increases to 60 feet, and the duration increases to 1 month."}],"sustained":false},{"id":"1739","name":"Veil of Privacy","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1739","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 creature or object","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Concentrate","Manipulate","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Protect a creature or object from magical detection.","effect":"You erect protective wards that make the target difficult to detect via magic. Veil of privacy attempts to counteract all detection, revelation, and scrying effects used against the target or the target's gear throughout the duration, counting cantrips as 1st-rank spells for this purpose. Successfully counteracting a spell that targets an area or multiple targets negates the effects for only veil of privacy's target. ---","conditions":[],"tags":["concentrate","utility"],"heightened":[],"sustained":false},{"id":"1086","name":"Wall of Shadow","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1086","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Darkness","Evocation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You form a wall of pure darkness in a straight line up to 60 feet long and 10 feet high.","effect":"You form a wall of pure darkness in a straight line up to 60 feet long and 10 feet high. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall stands vertically and, if you wish, can be of a shorter length or height. The wall prevents light from passing through and appears as a sheet of pure darkness to creatures observing it. Creatures without darkvision or those unable to see through darkness can't see creatures on the other side of the wall. The wall is too thin for creatures to Hide in the darkness itself, but creatures can Hide from creatures on the other side of the wall as normal.","conditions":["concealed"],"tags":["control","utility"],"heightened":[{"label":"5th","text":"Creatures with darkvision (but not greater darkvision) can barely see through the wall. They treat targets seen through the wall as concealed."},{"label":"7th","text":"Creatures with greater darkvision can barely see through the darkness. They treat targets seen through the wall as concealed. All other creatures are unable to see through the darkness at all."}],"sustained":false},{"id":"1127","name":"Wall of Virtue","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1127","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Divine","save":"","traits":["Evocation","Light","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You create a translucent wall of light, which draws power from the celestial realms.","effect":"You create a translucent wall of light, which draws power from the celestial realms. You create either a 5-foot-thick wall in a straight line up to 60 feet long and 10 feet high or a 5-foot-thick, 10-foot-radius ring with the same height. The wall sheds bright light for 20 feet on each side and dim light for the next 20 feet. If the light passes through an area of magical darkness or targets a creature affected by magical darkness, wall of virtue attempts to counteract the darkness. Any creature that crosses the wall or is occupying the wall's area at the start of its turn takes 1d8 good damage and 1d8 positive damage.","conditions":[],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The good damage increases by 1d8, and the positive damage increases by 1d8."}],"sustained":false},{"id":"1029","name":"Warding Aggression","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1029","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Primal","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Strike an enemy to improve your defense against it, and extend the spell with further attacks.","effect":"You channel a magical ward through your attack and attempt to plant it on a foe. This ward increases your defenses against that foe, as long as you keep attacking that foe to maintain it. Make a melee Strike with a weapon or unarmed attack against a foe. In addition to the normal effects of the Strike, it has the effects below. Warding aggression ends if the foe you attacked dies or at the end of any turn in which you didn't hit that foe with a melee Strike. Critical Success You gain a +3 status bonus to AC against the foe for 1 round and a +2 status bonus to AC against the foe for the remaining duration. Success You gain a +2 status bonus to AC against the foe. Failure You gain a +1 status bonus to AC against the foe. Critical Failure You gain no additional effect. ---","conditions":[],"tags":["buff","defense"],"heightened":[],"sustained":false},{"id":"1032","name":"Web of Eyes","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1032","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"up to 5 willing creatures","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination","Scrying"],"rating":null,"rval":0,"gortle":"","desc":"Put scrying sensors on creatures, allowing them to share their vision with others.","effect":"You place an invisible scrying sensor on each target just above their eyes. Each sensor looks where that target looks, and all the targets can link their vision briefly to help notice things one target sees but the others might not. Each target can use an action, which has the concentrate trait, to share what it sees with any number of other targets until the start of its next turn. Only one creature can share its vision at a time, so if another target takes this action, the effect ends for any target that was previously sharing its vision. This improves how well the recipients can perceive anything the sharing creature is looking at. For instance, if a creature is undetected to a recipient but observed by the sharing creature, the creature becomes observed by the recipient as well. Typically, the creature is seen as a glowing outline superimposed on its position. This might allow the recipient to target a creature it couldn't otherwise; however, cover and line of effect still might prevent or impede targeting and attacks. This can only improve the recipient's vision, not reduce it; for example, if an enemy was undetected by the sharing creature and observed by a recipient, the recipient would still clearly observe the enemy. Once the vision sharing stops, the benefit ends. Whether a creature is hidden or undetected is still based on the last information a target had before the vision sharing ended. For example, that means if a creature is behind a wall but hasn't moved, it's still hidden rather than undetected by a recipient that witnessed its current position. ---","conditions":["invisible"],"tags":["utility"],"heightened":[],"sustained":false},{"id":"1224","name":"Procyal Philosophy","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1224","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"","traits":["Auditory","Enchantment","Good","Uncommon"],"rating":"🟣🟣🟣🟣🟣","rval":5,"gortle":"P183 summon a sage to aid anyone doing anything. A useful option. One of very few ways to add a numerical bonus on the arcane list.","desc":"The racoon-like visage of a sagacious  procyal  appears, dispensing helpful advice.","effect":"The racoon-like visage of a sagacious procyal appears, dispensing helpful advice. The image appears floating next to the target. The image is just a floating magical manifestation and doesn't occupy any space. The procyal offers helpful suggestions, preparing to Aid the target as though the procyal had its own reaction. The procyal uses a bonus equal to your spell DC – 10 for its rolls to Aid. On each of your turns, the procyal prepares to Aid its target again. You can use a free action, which has the concentrate trait, to redirect the procyal image to a different creature, changing the target of the spell. Otherwise, the procyal keeps aiding the same creature for the duration of the spell. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1377","name":"Rust Cloud","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1377","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Concentrate","Manipulate","Metal"],"rating":"🟣🟣🟣🟣🟣","rval":5,"gortle":"ROE good damage in a burst but conceals your targets. Really strong if you set up for it by having forced movement options to shove enemies back into the area.","desc":"Make a cloud of rusty flecks that cuts creatures and rusts metal.","effect":"Red-blown flecks of rust jitter in the air, forming a cloud of agitated particles. All creatures within the cloud become concealed, and all creatures outside the cloud become concealed to creatures within it. The cloud deals 5d10 slashing damage to any creature that starts its turn in the area, with a basic Fortitude save. Metal that rusts off of a creature adds to the cloud. When a metal creature takes damage from the cloud, the cloud's area increases by 5 feet (to a maximum of a 40-foot burst), and the creature starts to rust, taking 1d4 persistent slashing damage. You can Dismiss the cloud.","conditions":["concealed","persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The cloud's slashing damage increases by 1d10 and the persistent damage increases by 1d4."}],"sustained":false},{"id":"1303","name":"Airlift","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1303","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Air","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE party fly once for 60 ft. Cute if nobody else can fly as you can get everyone. But it is a one off move. It can be used offensively against enemies.","desc":"Fly creatures, and items to a new location.","effect":"A massive rush of wind lifts, briefly carrying you and everything around you to a nearby destination. You, each creature in the area, and each item of 10 Bulk or lighter are lifted by this powerful gale. You and all affected creatures and objects Fly up to 60 feet and land on a solid surface, arriving in the same relative position to each other. If there wouldn't be enough room at the destination for everything you're bringing, the spell fails, though the GM might allow you to rearrange the group slightly to accommodate the spell. Any unwilling participant can attempt a Reflex save to avoid being carried along. The airlift doesn't carry items that are secured in place (such as a hinged door or a person manacled to a wall).","conditions":[],"tags":["concentrate"],"heightened":[{"label":"6th","text":"The distance you Fly increases to 120 feet, and the Bulk limit of an item you can airlift increases to 20."}],"sustained":false},{"id":"27","name":"Blink","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=27","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Teleportation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"resistance to almost everything, optional sustain to random 10ft teleport. Very different from previous editions. Flicker is the remastered name","desc":"Flit between the planes, vanishing and reappearing.","effect":"You blink quickly between the Material Plane and the Ethereal Plane. You gain resistance 5 to all damage (except force). You can Sustain the Spell to vanish and reappear 10 feet away in a random direction determined by the GM; the movement doesn't trigger reactions. At the end of your turn, you vanish and reappear as above.","conditions":[],"tags":["defense","teleportation"],"heightened":[{"label":"+2","text":"The resistance increases by 3."}],"sustained":true},{"id":"1350","name":"Cinder Swarm","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1350","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Concentrate","Fire","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE sustainable damage that is centred on one creature, but is a small area. Like Flaming Sphere but they can't run away from it.","desc":"Create insects made of fire.","effect":"You breathe life into a mass of fiery critters. They swarm the target and create an aura around it in a 5-foot emanation. The target and enemies in the aura are subject to an effect depending on the insects you choose. On subsequent rounds, the first time you Sustain this spell each round, you repeat the effect on the target and all your enemies in the insect aura. Pick a type of insect to determine the effects. - Fire Ants You create fiery flying ants that deal 3d6 piercing damage plus 2d6 persistent fire damage with a basic Reflex save. A creature that fails its save must move 5 feet in a direction of your choice as it tries to escape the biting ants; this happens after all the creatures attempt their saves and can't add new creatures to the aura if the main target moves. - Fireflies (incapacitation) You create a flurry of fireflies that deal 3d6 fire damage and can dazzle or blind, depending on the target's Fortitude save. Critical Success The creature takes no damage. Success The creature takes half damage and is dazzled for 1 round. Failure The creature takes full damage and is blinded for 1 round. It's then temporarily immune to being blinded by cinder swarm for 24 hours. Critical Failure As failure, but double damage and blinded for 1 minute.","conditions":["blinded","dazzled"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"Increase the ants' piercing damage and fireflies' fire damage by 2d6."}],"sustained":true},{"id":"48","name":"Confusion","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=48","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"single target confusion, level 8 before it is multitarget. Effective on a boss or a caster who wants to do something other than strike or use a cantrip.","desc":"Befuddle a creature, making it act randomly.","effect":"You befuddle your target with strange impulses, causing it to act randomly. The effects are determined by the target's Will save. You can Dismiss the spell. Critical Success The target is unaffected. Success The target babbles incoherently and is stunned 1. Failure The target is confused for 1 minute. It can attempt a new save at the end of each of its turns to end the confusion. Critical Failure The target is confused for 1 minute, with no save to end early.","conditions":["confused","stunned"],"tags":["emotion","mental"],"heightened":[{"label":"8th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1981","name":"Containment","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1981","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Reflex","traits":["Concentrate","Force","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"lock one creature away for a short while. Still useful if they make their save.","desc":"Seal a creature in a sphere to contain or protect it.","effect":"You wrap a creature in an immobile force field, whether to protect it or those around it. The field blocks attacks, effects, and creatures that would pass through it, including the target. The field has Hardness 10, 40 Hit Points, and immunity to critical hits and precision damage. If the target of containment is unwilling, the effects depend on the target's Reflex save. Critical Success The target escapes from the field as it's forming, causing it to collapse. Success The field partially forms with 10 Hit Points instead of 40. Failure The field has its normal effect.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"+1","text":"The field's Hit Points are 5 higher on a success or 15 higher on a failure."}],"sustained":false},{"id":"1910","name":"Deathless March","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1910","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Enchantment","traditions":"Arcane, Occult, Primal","save":"Will","traits":["Auditory","Enchantment","Rare"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"WTD4 an emanation that quickens undead and frightens living creatures. Obviously for team undead only, but like all emanations the caster can exclude themselves.","desc":"You chant a marching song of Yled to empower the undead and terrify the living.","effect":"You chant a marching song of Yled to empower the undead and terrify the living. Undead creatures within the area gain the quickened condition for 1 minute, which they can use only to Stride. Living creatures in the area must attempt a Will save. This gains the emotion, fear , and mental traits for living creatures. Critical Success The creature is unaffected. Success The creature is frightened 1. Failure The creature is frightened 2. Critical Failure The creature is frightened 3 and paralyzed for 1 round. ---","conditions":["frightened","paralyzed","quickened"],"tags":[],"heightened":[],"sustained":false},{"id":"69","name":"Dimension Door","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=69","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Teleportation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"short range teleport. Very handy. In the remaster this is renamed to Translocate","desc":"Teleport yourself up to 120 feet.","effect":"Opening a door that bypasses normal space, you instantly transport yourself and any items you're wearing and holding from your current space to a clear space within range you can see. If this would bring another creature with you—even if you're carrying it in an extradimensional container—the spell is lost.","conditions":[],"tags":["teleportation"],"heightened":[{"label":"5th","text":"The range increases to 1 mile. You don't need to be able to see your destination, as long as you have been there in the past and know its relative location and distance from you. You are temporarily immune for 1 hour."}],"sustained":false},{"id":"898","name":"Draw the Lightning","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=898","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature that is either taller than you or higher In the air than you","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Electricity","Evocation","Metal"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SOM, a very cinematic spell. Strike a foe and charge your weapon. Better on a Stormy sky.","desc":"Call down lightning into you or a weapon.","effect":"Calling out to the skies, you summon a bolt of lightning to strike through a foe above you and down into your weapon or your body, charging it with electrical power. You must hold your weapon or an empty hand aloft as part of this spell's somatic component. When you do, a bolt of lightning descends from a storm cloud in the air above your and through the target, dealing 3d12 electricity damage with a basic Reflex save. For the rest of the spell's duration, your first Strike each round with the weapon you held aloft (or with your unarmed attacks if you held an empty hand aloft) deals an additional 1d12 electricity damage. The spell creates its own storm cloud if necessary, so you can cast draw the lightning anywhere, even underground. If draw the lightning is cast outside under a cloudy or stormy sky, increase the bolt's damage by 2d12.","conditions":[],"tags":["damage","summon"],"heightened":[{"label":"8th","text":"The damage dealt to the initial target increases by 4d12, and the additional damage dealt on the first Strike each turn increases by 1d12."}],"sustained":false},{"id":"687","name":"Enervation","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=687","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Necromancy","Negative"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"APG persistent negative damage in a line.","desc":"Drain a creature's vigor.","effect":"Extending a finger, you fire a beam of negative energy that weakens the life force of any creature it touches. Each living creature in the line must attempt a Fortitude save. Critical Success The creature is unaffected. Success The creature takes 2d8 persistent negative damage. Failure The creature takes 4d8 persistent negative damage and becomes drained 1. Critical Failure The creature takes 4d8 persistent negative damage and becomes drained 2 and doomed 1.","conditions":["doomed","drained"],"tags":["damage"],"heightened":[{"label":"+2","text":"The persistent negative damage increases by 1d8 on a success, or by 2d8 on a failure or critical failure."}],"sustained":false},{"id":"1532","name":"Flicker","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1532","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Teleportation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"resistance to almost everything, optional sustain to random 10ft teleport. Very different from previous editions. Blink is the original name","desc":"Protect yourself from most damage as you teleport erratically.","effect":"You flicker quickly between your current plane and another. You gain resistance 5 to all damage, except force. At the end of each of your turns, you automatically teleport 10 feet in a random direction, as determined by the GM. You can Sustain the spell to teleport in this way.","conditions":[],"tags":["concentrate","defense","teleportation","utility"],"heightened":[{"label":"+2","text":"The resistance increases by 3."}],"sustained":true},{"id":"125","name":"Fly","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=125","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal, Elemental","save":"","traits":["Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"too flexible to ignore better when heightened for an hour duration.","desc":"Cause the target creature to gain a fly Speed.","effect":"The target can soar through the air, gaining a fly Speed equal to its Speed or 20 feet, whichever is greater.","conditions":[],"tags":["utility"],"heightened":[{"label":"7th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"1390","name":"Grasp of the Deep","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1390","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Will","traits":["Concentrate","Manipulate","Mental","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a ranged grapple with modest damage.","desc":"Make a creature feel like it’s being crushed underwater.","effect":"You grip one target with the phantasmal pressure of the deep sea, disorienting and crushing its lungs and joints. The target takes 6d6 bludgeoning damage and other effects, depending on its Will saving throw. Critical Success The creature is unaffected. Success The target takes half damage. Failure The target takes full damage, and feels as though it's being crushed. The target becomes grabbed but it can attempt to Escape with an Escape DC equal to your spell DC. Critical Failure As failure, but the target takes double damage.","conditions":["grabbed"],"tags":["concentrate","control","damage","mental"],"heightened":[{"label":"6th","text":"You can target up to 5 creatures."}],"sustained":false},{"id":"1334","name":"Grasping Earth","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1334","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60  feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Earth","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a ranged area grapple.","desc":"Create hands of rock from the ground to grab creatures.","effect":"Handlike protrusions of rock and soil grab and bury creatures. Each creature in the area when you cast the spell, and each creature that ends its turn in the area during the spell's duration, must attempt a Fortitude save. The first time each round you Sustain this spell, each creature still grabbed by the earth takes 1d6 bludgeoning damage, and each creature restrained by the earth takes 2d6 bludgeoning damage. A creature can attempt to Escape, rolling against your spell DC. Success The creature is unaffected. Failure The creature is grabbed by the earth. Critical Failure The creature is restrained by the earth.","conditions":["grabbed","restrained"],"tags":["concentrate","control","damage"],"heightened":[{"label":"+2","text":"The bludgeoning damage dealt when you Sustain this spell increases by 1d6 for grabbed creatures and 2d6 for restrained creatures."}],"sustained":true},{"id":"2157","name":"It Is Written","rank":4,"url":"https://2e.aonprd.com/MythicSpells.aspx?ID=2157","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Mythic","Prediction","Rare"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"WOI this is Rare and Mythic. Get a big bonus on your next d20 check","desc":"You envision a future for yourself, confident in the certainty that this vision is your destiny.","effect":"You envision a future for yourself, confident in the certainty that this vision is your destiny. Before the duration ends, if you would attempt an attack roll, Perception check, saving throw, or skill check that would aid in the fulfillment of this destiny, you can attempt this roll at mythic proficiency You choose which roll to use this benefit on before rolling. If you use this benefit, the spell ends. Either way, you're then temporarily immune to it is written for 1 hour. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1374","name":"Mercurial Stride","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1374","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"Fortitude","traits":["Concentrate","Manipulate","Metal","Poison"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE double move through an enemy and do poison damage. In some ways better than a dimension door.","desc":"Turn to quicksilver and move through creatures.","effect":"Your form ripples as you take on the fluidity and toxicity of quicksilver. You partially shift into a liquid metal form and Stride up to twice your speed. During this movement, you can pass through one creature's space—without needing to attempt a check to Tumble Through—by splitting into droplets of mercury and reforming on the other side, though you can't end your turn in such a space. Passing through a creature's space in this way exposes it to mercury poisoning, with a Fortitude save. Critical Success The target is unaffected. Success The target becomes sickened 1. Failure The target becomes sickened 2 and takes 6d6 poison damage. Critical Failure The target becomes sickened 2 and takes 12d6 poison damage.","conditions":["sickened"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d6 on a failure and 2d6 on a critical failure."}],"sustained":false},{"id":"1610","name":"Mountain Resilience","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1610","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC a solid buff heightens well. It was called Stoneskin.","desc":"Harden a creature to resist physical attacks.","effect":"The target's skin hardens like the stone of a mountain face. It gains resistance 5 to physical damage, except adamantine. Each time the target is hit by a bludgeoning, piercing, or slashing attack, mountain resilience's duration decreases by 1 minute.","conditions":[],"tags":["concentrate","defense"],"heightened":[{"label":"6th","text":"The resistance increases to 10."},{"label":"8th","text":"The resistance increases to 15."},{"label":"10th","text":"The resistance increases to 20."}],"sustained":false},{"id":"219","name":"Phantasmal Killer","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=219","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 living creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Fortitude","traits":["Death","Emotion","Fear","Illusion","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"good mental attack. Does real damage, a chance they will run away or just die. Heightens for extra damage. The spell gets updated in the remaster to Vision of Death.","desc":"Place a fearsome image in a creature's mind to scare and possibly kill it.","effect":"You create a phantasmal image of the most fearsome creature imaginable to the target. Only the spell's target can see the killer, though you can see the vague shape of the illusion as it races forth to attack. The effect of the killer is based on the outcome of the target's Will save. Critical Success The target is unaffected. Success The target takes 4d6 mental damage and is frightened 1. Failure The target takes 8d6 mental damage and is frightened 2. Critical Failure The target is so afraid it might die. It must attempt a Fortitude save; if the target fails, it dies. On a successful Fortitude save, the target takes 12d6 mental damage, is fleeing until the end of its next turn, and is frightened 4. This effect has the incapacitation trait.","conditions":["fleeing","frightened"],"tags":["damage","emotion","fear","illusion","mental"],"heightened":[{"label":"+1","text":"The damage increases by 2d6 on a failure and by 3d6 on a critical failure."}],"sustained":false},{"id":"983","name":"Replicate","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=983","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"1 willing or  unconscious  creature of 8th level or lower","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Shadow"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SOM create an illusionary double of a PC or even a creature you have just knocked out. Useful for infiltration.","desc":"Create an illusory duplicate of a creature.","effect":"You create an illusory magical double that physically looks and behaves very similarly to the target. This double is limited to moving, Interacting, speaking short sentences, and other similar basic tasks. It is unable to cast spells, attack, or use any complex skills. The illusory duplicate is your minion. You can issue new commands to the double as part of Sustaining the Spell. You can command the duplicate telepathically as long as the spell lasts, provided it's within 1 mile of you. You can switch between using your own senses and the duplicate's senses with a single action, which has the concentrate trait. The illusory duplicate has the same statistics as the original creature, except it doesn't have any of the original's item bonuses, and it has one quarter of the original's Hit Points. If the double's Hit Points are reduced to 0, the spell ends.","conditions":["unconscious"],"tags":["buff","illusion"],"heightened":[{"label":"+1","text":"The maximum level of the target increases by 2."}],"sustained":true},{"id":"255","name":"Resilient Sphere","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=255","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 Large or smaller creature","duration":"","school":"Abjuration","traditions":"Arcane, Occult","save":"Reflex","traits":["Abjuration","Force"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"lock one creature away for a short while. Still useful if they make their save. Now called Containment.","desc":"Create a sphere of force that blocks anything that would come through.","effect":"You create an immobile sphere of force to either trap or protect the target, blocking anything that would pass through the sphere. The sphere has AC 5, Hardness 10, and 40 Hit Points. It's immune to critical hits and precision damage. Disintegrate destroys the sphere instantly. If the target is unwilling, the effects of the sphere depend on the target's Reflex save. Critical Success The target disrupts the sphere's integrity, causing it to collapse entirely. Success The sphere functions normally but has only 10 Hit Points instead of 40. Failure The sphere has its normal effect. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"276","name":"Shape Stone","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=276","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"cube of stone 10 feet across or smaller","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a poor mans' passwall spell. Block a corridor really well. Fast enough to do little tricks in combat with it.","desc":"Reshape a cube of stone.","effect":"You shape the stone into a rough shape of your choice. The shaping process is too crude to produce intricate parts, fine details, moving pieces, or the like. Any creatures standing atop the stone when you reshape it must each attempt a Reflex save or Acrobatics check. Success The creature is unaffected. Failure The creature falls prone atop the stone. Critical Failure The creature falls off the stone (if applicable) and lands prone. ---","conditions":["prone"],"tags":["control"],"heightened":[],"sustained":false},{"id":"1341","name":"Sliding Blocks","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1341","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a weird spell. It is like a small wall you can move. You can use this as a wall, or maybe like a flying carpet as you can climb on it and levitate around.","desc":"Make cubes of stone and repeatedly move them around.","effect":"You conjure up to six 5-foot stone cubes you can gently move with a gesture. Each cube appears in any space within range, and they're capable of levitating. If you conjure a cube in an occupied space or in a space that can't accommodate it, it fails to appear. Each 5-foot cube can be Climbed with a successful DC 10 Athletics check and has AC 10, Hardness 10, and 40 Hit Points. If any of the cubes is ever farther away from you than the range of this spell, it immediately crumbles into dust. Each time you Sustain this spell, you can move up to two of the conjured cubes up to 10 feet each in any direction, including vertically. You can choose different cubes to move each time you Sustain.","conditions":[],"tags":["concentrate","summon"],"heightened":[{"label":"+2","text":"The cubes have 10 additional Hit Points, and you can move the chosen cubes an additional 5 feet each time you Sustain this Spell."}],"sustained":true},{"id":"290","name":"Solid Fog","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=290","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"another obscuring mist spell with difficult terrain.","desc":"Conjure heavy fog that obscures sight and is hard to move through.","effect":"You conjure a bank of fog so thick it impedes movement as well as sight. This functions as obscuring mist , except that the area is also difficult terrain. You can Dismiss the spell. ---","conditions":[],"tags":["control","summon"],"heightened":[],"sustained":false},{"id":"296","name":"Spell Immunity","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=296","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult","save":"","traits":["Abjuration"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"flexible but there is a counteract check. Its saving grace is the 24 hour duration.","desc":"Name a spell to negate its effects on you.","effect":"You ward a creature against the effects of a single spell. Choose a spell and name it aloud as part of the verbal component. Spell immunity attempts to counteract that spell whenever spell immunity 's target is the target of the named spell or in that spell's area. Successfully counteracting a spell that targets an area or multiple targets with spell immunity negates the effects only for the target affected by spell immunity . ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1268","name":"Steal Voice","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1268","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Curse","Incapacitation","Necromancy","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"P186 as making someone mute stops normal spell casting; this spell has Incapacitation but it does work for 1 round.","desc":"You steal a creature's voice, rendering them mute.","effect":"You steal a creature's voice, rendering them mute. The effect is determined by the target's Fortitude save. The target then becomes temporarily immune for 1 minute. A creature that has no voice or can't speak is immune to this spell. Critical Success The target is unaffected. Success The target becomes voiceless until the end of its next turn. A voiceless creature can't speak, create vocal sounds, or take auditory actions (including supplying verbal or command components). As long as the target is voiceless, whenever you speak, you can choose to have your voice sound like either your voice or the target's voice. Failure As success, but the duration is 1 minute. Critical Failure As success, but the duration is permanent. ---","conditions":[],"tags":["incapacitation"],"heightened":[],"sustained":false},{"id":"1322","name":"Stifling Stillness","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1322","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Air","Concentrate","Manipulate","Poison"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a damaging poison area and Fatigued unless you hold your breath.","desc":"Make air hard to breathe and traverse.","effect":"You make all air in the target area unnaturally still and unyielding, creating a shimmering haze. The stagnant, heavy air becomes an area of difficult terrain. Creatures in the area that breathe air and aren't holding their breath must spend a single action on their turn straining to breathe the stagnant air; once they do, they still mostly breathe their own exhaled air, taking 3d6 poison damage (basic Fortitude save) and becoming fatigued.","conditions":["fatigued"],"tags":["concentrate","control","damage"],"heightened":[{"label":"+2","text":"The damage increases by 3d6."}],"sustained":false},{"id":"312","name":"Stoneskin","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=312","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration","Earth"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a solid defensive option. Now called Mountain Resilience.","desc":"Harden a creature's skin into durable stone.","effect":"The target's skin hardens like stone. It gains resistance 5 to physical damage, except adamantine. Each time the target is hit by a bludgeoning, piercing, or slashing attack, stoneskin's duration decreases by 1 minute.","conditions":[],"tags":["defense"],"heightened":[{"label":"6th","text":"The resistance increases to 10."},{"label":"8th","text":"The resistance increases to 15."},{"label":"10th","text":"The resistance increases to 20."}],"sustained":false},{"id":"315","name":"Suggestion","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=315","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Incapacitation","Linguistic","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"I'd like this spell at any level. So effective, so flexible, so much fun. But note  Incapacitation. The remaster Suggestion now has the Subtle trait.","desc":"Suggest a course of action a creature must follow.","effect":"Your honeyed words are difficult for creatures to resist. You suggest a course of action to the target, which must be phrased in such a way as to seem like a logical course of action to the target and can't be self-destructive or obviously against the target's self-interest. The target must attempt a Will save. Critical Success The target is unaffected and knows you tried to control it. Success The target is unaffected and thinks you were talking to them normally, not casting a spell on them. Failure The target immediately follows your suggestion. The spell has a duration of 1 minute, or until the target has completed a finite suggestion or the suggestion becomes self-destructive or has other obvious negative effects. Critical Failure As failure, but the base duration is 1 hour.","conditions":[],"tags":["incapacitation","mental"],"heightened":[{"label":"8th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1724","name":"Translocate","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1724","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Teleportation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"short range teleport. Formerly known as Dimension Door.","desc":"Teleport a moderate distance.","effect":"You instantly transport yourself and any items you're wearing and holding from your current space to an unoccupied space within range you can see. If this would bring another creature with you—even if you're carrying it in an extradimensional container—the spell is lost.","conditions":[],"tags":["concentrate","teleportation"],"heightened":[{"label":"5th","text":"The range increases to 1 mile. You don't need to be able to see your destination, as long as you have been there in the past and know its relative location and distance from you. You are then temporarily immune for 1 hour."}],"sustained":false},{"id":"355","name":"Veil","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=355","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"up to 10 creatures","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"party disguise. If your GM just allows it to work, monsters shouldn't normally get a check to notice, then this spell is good.","desc":"Disguise many creatures as other creatures.","effect":"You disguise the targets as other creatures of the same body shape and roughly similar height (within 6 inches) and weight (within 50 pounds). The disguise can hide the targets' identities or let them appear to be of another ancestry, but it's not precise enough to impersonate specific individuals. The spell doesn't change voice, scent, or mannerisms. You choose the disguise for each target; for example, you could make one target appear to be a dwarf and another an elf. Casting veil counts as setting up a disguise for the purpose of the Impersonate action. It allows the target to ignore any circumstance penalties they might take for being disguised as dissimilar creatures, and it gives the targets a +4 status bonus to Deception checks to prevent others from seeing through their disguises, and add their level even if untrained. You can Dismiss any or all of these disguises.","conditions":[],"tags":["buff","illusion","utility"],"heightened":[{"label":"5th","text":"The spell also disguises the targets' voices and scents; it gains the auditory and olfactory traits."},{"label":"7th","text":"The targets can appear as any creature of the same size, even specific individuals. You must have seen an individual to reproduce their appearance. The spell also disguises the targets' voices and scents; it gains the auditory and olfactory traits."}],"sustained":false},{"id":"1742","name":"Vision of Death","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1742","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 living creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Death","Emotion","Fear","Manipulate","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC good mental attack. Does real damage, a chance they will run away or just die. Heightens for extra damage. The spell is based on Phantasmal Killer.","desc":"Show the target a vision of their own death, causing fear and mental damage.","effect":"You force the target to see a vision of its own death. It takes 8d6 mental damage with a Will save. If the target is reduced to 0 HP by this spell, its vision becomes reality and kills it instantly. Critical Success The target is unaffected. Success The target takes half damage and is frightened 1. Failure The target takes full damage and is frightened 2. Critical Failure The target takes double damage, is frightened 4, and is fleeing for as long as it's frightened.","conditions":["fleeing","frightened"],"tags":["concentrate","damage","defense","emotion","fear","mental"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"362","name":"Wall of Fire","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=362","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Evocation","Fire"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"wall spells are good. This one does damage to any creature in it at the start of their turn. No saving throw.","desc":"Create a blazing wall burns creatures that pass through.","effect":"You raise a blazing wall that burns creatures passing through it. You create either a 5-foot-thick wall of flame in a straight line up to 60 feet long and 10 feet high, or a 5-foot-thick, 10-foot-radius ring of flame with the same height. The wall stands vertically in either form; if you wish, the wall can be of a shorter length or height. Everything on each side of the wall is concealed from creatures on the opposite side. Any creature that crosses the wall or is occupying the wall's area at the start of its turn takes 4d6 fire damage.","conditions":["concealed"],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The fire damage increases by 1d6."}],"sustained":false},{"id":"1927","name":"Wall of Mirrors","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1927","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"basic Will","traits":["Conjuration","Rare"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"P197 an effective wall that blocks sight and movement. Damages whoever Strikes it.","desc":"You create a solid wall of shimmering reflective glass","effect":"You create a solid wall of shimmering reflective glass up to 50 feet long and 20 feet high. The wall is an inch thick and stands vertically. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. Each 10-foot-by-10-foot section of the wall has AC 10, Hardness 10, and 40 Hit Points, and it's immune to critical hits and precision damage. Everything on each side of the wall is concealed from creatures on the opposite side. If a creature Strikes the wall, the wall causes the creature to endure the mental anguish of that attack's pain as well; the creature takes 4d4 mental damage and can resist this damage with a basic Will save.","conditions":["concealed"],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The Hit Points of each section of the wall increase by 10."}],"sustained":false},{"id":"1327","name":"Zephyr Slip","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1327","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Manipulate","Move"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a reaction to fly away when a creature gets next to you. It doesn't actually give you flight though. Better if you have your own flight or glide available.","desc":"React to fly away from a creature.","effect":"An arresting breeze sweeps you up in an instant and moves you to safety. You Fly 15 feet directly away from the triggering creature.","conditions":[],"tags":[],"heightened":[{"label":"6th","text":"You and one adjacent ally Fly up to 25 feet directly away from the triggering creature."},{"label":"8th","text":"You and up to 5 allies within 30 feet Fly up to 25 feet directly away from the triggering creature."}],"sustained":false},{"id":"4","name":"Aerial Form","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=4","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"fly via polymorph. Echo location. A combat form?","desc":"Turn into a flying combatant.","effect":"You harness your mastery of primal forces to reshape your body into a Medium flying animal battle form. When you cast this spell, choose bat, bird, pterosaur, or wasp. You can decide the specific type of animal (such as an owl or eagle for bird), but this has no effect on the form's Size or statistics. While in this form, you gain the animal trait. You can Dismiss the spell. You gain the following statistics and abilities regardless of which battle form you choose: AC = 18 + your level. Ignore your armor's check penalty and Speed reduction. 5 temporary Hit Points. Low-light vision. One or more unarmed melee attacks specific to the battle form you choose, which are the only attacks you can Strike with. You're trained with them. Your attack modifier is +16, and your damage bonus is +5. These attacks are Dexterity based (for the purpose of the clumsy condition, for example). If your attack modifier for Dexterity-based unarmed attacks is higher, you can use it instead. Acrobatics modifier of +16, unless your own modifier is higher. You also gain specific abilities based on the form you choose: - Bat Speed 20 feet, fly Speed 30 feet; precise echolocation 40 feet; Melee Single Action fangs, Damage 2d8 piercing; Melee Single Action wing (agile), Damage 2d6 bludgeoning. - Bird Speed 10 feet, fly Speed 50 feet; Melee Single Action beak, Damage 2d8 piercing; Melee Single Action talon (agile), Damage 1d10 slashing. - Pterosaur Speed 10 feet, fly Speed 40 feet; imprecise scent 30 feet; Melee Single Action beak, Damage 3d6 piercing. - Wasp Speed 20 feet, fly Speed 40 feet; Melee Single Action stinger, Damage 1d8 piercing plus 1d6 persistent poison.","conditions":["clumsy","persistent damage"],"tags":["buff","defense","utility"],"heightened":[{"label":"5th","text":"Your battle form is Large and your fly Speed gains a +10-foot status bonus. You must have enough space to expand into or the spell is lost. You instead gain 10 temporary HP, attack modifier +18, damage bonus +8, and Acrobatics +20."},{"label":"6th","text":"Your battle form is Huge, your fly Speed gains a +15-foot status bonus, and your attacks have 10-foot reach. You must have enough space to expand into or the spell is lost. You instead gain AC = 21 + your level, 15 temporary HP, attack modifier +21, damage bonus +4 and double damage dice (including persistent damage), and Acrobatics +23."}],"sustained":false},{"id":"812","name":"Aromatic Lure","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=812","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Enchantment","Incapacitation","Mental","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"LOL Rare. Incapacitation. Stupefied by smells. Odd in that it does not require the target to have a good sense of smell.","desc":"You override a target's olfactory senses, luring them to a specific location through tantalizing false scents.","effect":"You override a target's olfactory senses, luring them to a specific location through tantalizing false scents. Select a single square within range that is not hazardous or occupied by a creature. The target is drawn to the selected location, becoming euphoric upon arrival. The target must attempt a Will save. Critical Success The target is unaffected. Success The target is distracted by the tantalizing scents, becoming stupefied 1 for 1 round. Failure The target is stupefied 2 and moves toward the selected location via the most direct route possible for 1 round, bypassing any obvious hazards and enemies in the way. Critical Failure The target is stupefied 4 and moves to the selected location via the most direct route possible for 1 round, bypassing any obvious hazards and enemies in the way. If the creature reaches the destination, it must remain in that location for 1d4 rounds but can otherwise act normally.","conditions":["stupefied"],"tags":["emotion","incapacitation","mental"],"heightened":[{"label":"+2","text":"You target 1 additional creature, selecting a different square within range as their destination."}],"sustained":false},{"id":"670","name":"Bestial Curse","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=670","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living  humanoid","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Curse","Polymorph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG clumsiness, weakness and a flat check of  5 to do any manipulate actions.","desc":"Make a humanoid take on features of a beast.","effect":"You tap into the target's inner being and curse it to become a bestial version of itself. The effect is based on its Fortitude save. Critical Success The target is unaffected. Success The target's body gains minor bestial features. Its insides churn as they partially transform, causing it to be clumsy 1 for 1 round. When it recovers from the clumsy condition, its features revert to normal and the spell ends. Failure The target transforms into a bestial form for 1 hour. The target becomes clumsy 1 and gains weakness 1 to silver. It gains a claw, hoof, horn, or jaws Strike (your choice) that uses the target's unarmed Strike statistics except that the damage type changes to bludgeoning, piercing, or slashing, as appropriate. Whenever the target attempts to use any manipulate action, it must succeed at a DC 5 flat check or the action is lost. Critical Failure As failure, but the duration is unlimited. ---","conditions":["clumsy"],"tags":[],"heightened":[],"sustained":false},{"id":"845","name":"Call the Blood","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=845","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Occult, Primal","save":"basic Fortitude","traits":["Death","Necromancy","Negative","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P165 it is really only for negative healing casters. It's damage with a minor bonus for yourself.","desc":"With a word and gesture, you cause streams of blood to erupt from the target's mouth, nostrils, ears, or other facial openings and come rushing into your mouth.","effect":"With a word and gesture, you cause streams of blood to erupt from the target's mouth, nostrils, ears, or other facial openings and come rushing into your mouth. You deal 8d4 negative damage to the target. If the target takes damage, its blood flows into your mouth. If you're a living creature and don't have negative healing, you're sickened 2. If you're undead (or living but have negative healing), you can choose to either gain temporary Hit Points equal to half of the negative damage the target takes (after applying resistance and the like) and become quickened for 1 round, or forgo the temporary Hit Points and become quickened for 1 minute. You can use this extra action only to Step, Stride, or Strike. You lose any remaining temporary Hit Points after 1 minute.","conditions":["quickened","sickened"],"tags":["damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 2d4."}],"sustained":false},{"id":"2526","name":"Channel Arrogance","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2526","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action or Three Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Manipulate","Mental","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"DC 1 or 3 actions. 5d10 mental damage on a will save is nice. Thematically nice and the roleplaying will be fun.","desc":"You channel your heightened sense of self-worth into a creature, forcing them to acknowledge your true worth.","effect":"You channel your heightened sense of self-worth into a creature, forcing them to acknowledge your true worth. You can Cast this Spell using 1 action if you know the target isn’t worthy of you spending your time to generate the full force of this spell, or using 3 actions if you can’t possibly hold back the majesty of your presence and must flood the target with your full attention. The target takes 5d10 mental damage and other effects depending on its Will saving throw. If you Cast the Spell using 1 action, the target gets a result one degree of success better than it rolled. Critical Success The creature is unaffected. Success The target takes half damage and is fascinated with you for 1 round. Failure The target takes full damage and is fascinated with you for 1 round. While fascinated with you, the target must succeed at a DC 5 flat check when attempting to Cast a Spell or use an action with the auditory trait. On a failure, the action is disrupted as the target blurts praise for you instead of saying what it intended. Critical Failure As failure, but double damage and the effect lasts for 1 minute.","conditions":["fascinated"],"tags":["concentrate","damage","mental","utility"],"heightened":[{"label":"+1","text":"The damage increases by 1d10."}],"sustained":false},{"id":"40","name":"Clairvoyance","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=40","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"500 feet","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Scrying"],"rating":"🟢🟢🟢","rval":3,"gortle":"a good choice, you do need a spying tool. Could be effective directly with Seeker Arrow depending on how your GM views it.","desc":"See through an invisible magical sensor.","effect":"You create an invisible floating eye at a location within range (even if it's outside your line of sight or line of effect). The eye can't move, but you can see in all directions from that point as if using your normal visual senses. ---","conditions":["invisible"],"tags":["control","utility"],"heightened":[],"sustained":false},{"id":"887","name":"Coral Eruption","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=887","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM burst damage in 2 x 10ft bursts for mild damage. But difficult terrain that damages as you move through it.","desc":"Create damaging areas of razor-sharp coral.","effect":"Razor sharp coral growths erupt from the ground, transforming the landscape into a dangerous coral reef. You can create a third nonoverlapping burst if the centers of all three bursts are underwater. Creatures in the area when the spell is cast take 6d6 piercing damage and must attempt a basic Reflex save. A creature that critically fails its saving throw also takes 1d6 persistent bleed damage. The area becomes difficult terrain and hazardous terrain. A creature that moves through the area takes 3 piercing damage for every square of that area it moves into.","conditions":[],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The initial piercing damage increases by 3d6, and the hazardous terrain damage increases by 1."}],"sustained":false},{"id":"680","name":"Countless Eyes","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=680","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Occult, Primal","save":"","traits":["Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG protection from being flanked","desc":"Cause magical eyes to appear all over a creature's body.","effect":"Eyes fo
