<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arcane Spellbook — Wizard Prep (Rank 1–4)</title>
<style>
:root{
  --bg:#f4f1ea; --panel:#fffdf7; --ink:#2a2622; --muted:#6b6257; --line:#ddd4c4;
  --accent:#6d3bd4; --accent2:#8b5cf6;
  --g:#2f9e44; --b:#1c7ed6; --p:#9c36b5; --dim:#adb5bd;
  --chip:#efe9dd; --chipink:#514a40; --shadow:0 1px 3px rgba(0,0,0,.12);
}
@media (prefers-color-scheme:dark){
  :root{--bg:#17151a;--panel:#211e26;--ink:#ece7f0;--muted:#9a92a6;--line:#39333f;
    --accent:#b18aff;--accent2:#8b5cf6;--chip:#2c2833;--chipink:#c9c2d4;--shadow:0 1px 4px rgba(0,0,0,.4);}
}
:root[data-theme=dark]{--bg:#17151a;--panel:#211e26;--ink:#ece7f0;--muted:#9a92a6;--line:#39333f;
  --accent:#b18aff;--accent2:#8b5cf6;--chip:#2c2833;--chipink:#c9c2d4;--shadow:0 1px 4px rgba(0,0,0,.4);}
:root[data-theme=light]{--bg:#f4f1ea;--panel:#fffdf7;--ink:#2a2622;--muted:#6b6257;--line:#ddd4c4;
  --accent:#6d3bd4;--accent2:#8b5cf6;--chip:#efe9dd;--chipink:#514a40;--shadow:0 1px 3px rgba(0,0,0,.12);}
*{box-sizing:border-box}
body{margin:0;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--ink);-webkit-text-size-adjust:100%}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1180px;margin:0 auto;padding:0 14px 140px}

/* header */
header{position:sticky;top:0;z-index:30;background:var(--bg);border-bottom:1px solid var(--line);
  padding:10px 0 8px;margin-bottom:8px}
.hrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;max-width:1180px;margin:0 auto;padding:0 14px}
h1{font-size:19px;margin:0;font-weight:700;letter-spacing:-.2px}
h1 small{font-weight:400;color:var(--muted);font-size:13px}
.grow{flex:1}
.iconbtn{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;
  padding:7px 11px;cursor:pointer;font-size:13px;font-weight:600}
.iconbtn:hover{border-color:var(--accent)}
#search{flex:1;min-width:160px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;
  background:var(--panel);color:var(--ink);font-size:14px}

/* filter bar */
.filters{max-width:1180px;margin:0 auto;padding:8px 14px 0}
.frow{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.fgroup{display:flex;flex-direction:column;gap:4px}
.flabel{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--chip);color:var(--chipink);border:1px solid transparent;border-radius:20px;
  padding:4px 11px;font-size:12.5px;cursor:pointer;user-select:none;white-space:nowrap;font-weight:600}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);color:#fff}
.chip.cond.on{background:#c2255c}
.chip.role.on{background:#1971c2}
.chip.sm{padding:3px 9px;font-size:11.5px}
details.dd{position:relative}
details.dd>summary{list-style:none;cursor:pointer}
details.dd>summary::-webkit-details-marker{display:none}
.ddpanel{position:absolute;z-index:20;background:var(--panel);border:1px solid var(--line);border-radius:10px;
  box-shadow:var(--shadow);padding:10px;margin-top:4px;max-height:320px;overflow:auto;min-width:210px}
.stat{font-size:12px;color:var(--muted);padding:4px 0 2px}

/* rank sections */
.ranksec{margin-top:22px}
.rankhead{display:flex;align-items:baseline;gap:10px;border-bottom:2px solid var(--accent);
  padding-bottom:5px;margin-bottom:12px;position:sticky;top:52px;background:var(--bg);z-index:10}
.rankhead h2{margin:0;font-size:17px}
.rankhead .cnt{color:var(--muted);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

/* spell card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;
  box-shadow:var(--shadow);position:relative;transition:border-color .12s}
.card.picked{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
.ctop{display:flex;align-items:flex-start;gap:8px}
.pick{flex:none;width:22px;height:22px;border:1.5px solid var(--line);border-radius:6px;cursor:pointer;
  display:grid;place-items:center;font-size:14px;color:transparent;background:var(--bg);margin-top:1px}
.pick:hover{border-color:var(--accent)}
.card.picked .pick{background:var(--accent);border-color:var(--accent);color:#fff}
.cname{font-weight:700;font-size:15px;line-height:1.25}
.rating{font-size:12px;letter-spacing:-1px;white-space:nowrap}
.act{display:inline-grid;place-items:center;min-width:20px;height:20px;border-radius:5px;background:var(--chip);
  color:var(--chipink);font-weight:800;font-size:12px;padding:0 4px;vertical-align:middle}
.meta{color:var(--muted);font-size:12px;margin:5px 0 6px;display:flex;gap:8px;flex-wrap:wrap}
.meta b{color:var(--ink);font-weight:600}
.tagline{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.tg{font-size:10.5px;padding:2px 7px;border-radius:5px;font-weight:700;text-transform:lowercase}
.tg.cond{background:rgba(194,37,92,.14);color:#c2255c}
.tg.role{background:rgba(25,113,194,.14);color:#1971c2}
@media(prefers-color-scheme:dark){.tg.cond{color:#ff8cc0}.tg.role{color:#74c0fc}}
:root[data-theme=dark] .tg.cond{color:#ff8cc0}:root[data-theme=dark] .tg.role{color:#74c0fc}
.desc{font-size:13px;color:var(--ink)}
.gortle{font-size:12px;color:var(--muted);margin-top:5px;padding-left:8px;border-left:2px solid var(--line);font-style:italic}
.more{margin-top:6px;font-size:12px}
.more summary{cursor:pointer;color:var(--accent);font-weight:600;list-style:none}
.more summary::-webkit-details-marker{display:none}
.more[open] summary{margin-bottom:5px}
.effect{font-size:12.5px;color:var(--ink);white-space:pre-wrap}
.heit{margin-top:6px}
.heit .h{font-size:12px;margin:3px 0;padding:4px 7px;background:var(--chip);border-radius:6px}
.heit .h b{color:var(--accent)}
.aon{font-size:11.5px;margin-top:6px;display:inline-block}
.hsrc{font-size:11px;color:var(--muted);margin:6px 0 2px}

/* heightened-into subsection */
.heitsec{margin-top:14px}
.heitsec>summary{cursor:pointer;font-weight:700;color:var(--accent2);font-size:13.5px;
  padding:6px 0;list-style:none;border-top:1px dashed var(--line)}
.heitsec>summary::-webkit-details-marker{display:none}
.heitsec .hint{font-weight:400;color:var(--muted);font-size:12px}

/* prep tray */
#tray{position:fixed;right:0;top:0;height:100%;width:340px;max-width:88vw;background:var(--panel);
  border-left:1px solid var(--line);box-shadow:-4px 0 20px rgba(0,0,0,.15);transform:translateX(100%);
  transition:transform .2s;z-index:50;display:flex;flex-direction:column}
#tray.open{transform:none}
.trayhead{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.trayhead h3{margin:0;font-size:15px;flex:1}
.traybody{flex:1;overflow:auto;padding:8px 12px}
.slotgrp{margin-bottom:12px}
.slotgrp h4{margin:6px 0 4px;font-size:13px;display:flex;align-items:center;gap:8px}
.slotgrp h4 .lim{font-weight:400;color:var(--muted);font-size:12px}
.slotgrp h4 input{width:38px;padding:2px 4px;border:1px solid var(--line);border-radius:5px;background:var(--bg);color:var(--ink)}
.pitem{display:flex;align-items:center;gap:6px;font-size:13px;padding:3px 0}
.pitem .x{cursor:pointer;color:var(--muted);font-weight:700;flex:none}
.pitem .x:hover{color:#c2255c}
.pitem .pn{flex:1}
.pitem .pr{font-size:11px;color:var(--muted)}
.over{color:#c2255c;font-weight:700}
.trayfoot{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:8px;flex-wrap:wrap}
.trayfoot .iconbtn{flex:1;text-align:center}
#fab{position:fixed;right:16px;bottom:16px;z-index:40;background:var(--accent);color:#fff;border:none;
  border-radius:30px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.3)}
#fab b{background:#fff;color:var(--accent);border-radius:12px;padding:1px 7px;margin-left:6px}
.empty{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:45;display:none}
.backdrop.on{display:block}
@media(max-width:640px){
  .grid{grid-template-columns:1fr}
  .rankhead{top:48px}
}
@media print{
  header,.filters,#fab,.backdrop,.more,.heitsec,.pick,.iconbtn{display:none!important}
  #tray{position:static;transform:none;width:100%;border:none;box-shadow:none}
  body{background:#fff}
}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>🪄 Arcane Spellbook <small>· wizard prep · rank 1–4</small></h1>
    <input id="search" placeholder="Search name / text…" autocomplete="off">
    <button class="iconbtn" id="themeBtn" title="Theme">◐</button>
  </div>
  <div class="filters">
    <div class="frow">
      <div class="fgroup">
        <span class="flabel">Rank</span>
        <div class="chips" id="fRank"></div>
      </div>
      <div class="fgroup">
        <span class="flabel">Min rating</span>
        <div class="chips" id="fRating"></div>
      </div>
      <div class="fgroup">
        <span class="flabel">Actions</span>
        <div class="chips" id="fAct"></div>
      </div>
      <div class="fgroup">
        <span class="flabel">Save</span>
        <div class="chips" id="fSave"></div>
      </div>
      <div class="fgroup">
        <span class="flabel">Conditions ▾</span>
        <details class="dd"><summary class="chip">choose… <span id="condCount"></span></summary>
          <div class="ddpanel"><div class="chips" id="fCond"></div></div></details>
      </div>
      <div class="fgroup">
        <span class="flabel">Role / effect ▾</span>
        <details class="dd"><summary class="chip">choose… <span id="tagCount"></span></summary>
          <div class="ddpanel"><div class="chips" id="fTag"></div></div></details>
      </div>
      <div class="fgroup">
        <span class="flabel">&nbsp;</span>
        <div class="chips">
          <span class="chip" id="toggleHeit">↑ heightened rows: on</span>
          <span class="chip" id="resetBtn">✕ reset</span>
        </div>
      </div>
    </div>
    <div class="stat" id="stat"></div>
  </div>
</header>

<div class="wrap" id="list"></div>

<button id="fab">🎒 Prep <b id="fabCount">0</b></button>
<div class="backdrop" id="backdrop"></div>

<aside id="tray">
  <div class="trayhead">
    <h3>Prepared spells</h3>
    <button class="iconbtn" id="closeTray">✕</button>
  </div>
  <div class="traybody" id="trayBody"></div>
  <div class="trayfoot">
    <button class="iconbtn" id="copyBtn">📋 Copy</button>
    <button class="iconbtn" id="printBtn">🖨 Print</button>
    <button class="iconbtn" id="clearBtn">🗑 Clear</button>
  </div>
</aside>

<script>
const SPELLS = [{"id":"97","name":"Electric Arc","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=97","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 or 2 creatures","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Electricity","Evocation"],"rating":"🟣🟣🟣🟣🟣","rval":5,"gortle":"feel the power of the dark side! Best offensive cantrip as it can target two creatures, no attack roll - just a reflex saving throw, which means you can use it and make a ranged weapon attack in the same round with no multiple attack penalty.","desc":"Zap one or two creatures with lightning.","effect":"An arc of lightning leaps from one target to another. You deal electricity damage equal to 1d4 plus your spellcasting ability modifier.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"1461","name":"Caustic Blast","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1461","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Acid","Cantrip","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC a 4 square area of effect acid cantrip that is a replacement for Acid Splash. This is very good. In tight quarters you may be able to get multiple targets. Being an area of effect it will ignore concealment and invisibility, and trigger some weaknesses. Further it is a reflex save and not an attack roll.","desc":"Fling a glob of acid that splashes a small area.","effect":"You fling a large glob of acid that immediately detonates, spraying nearby creatures. Creatures in the area take 1d8 acid damage with a basic Reflex save; on a critical failure, the creature also takes 1 persistent acid damage.","conditions":["persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The initial damage increases by 1d8, and the persistent damage on a critical failure increases by 1."}],"sustained":false},{"id":"1421","name":"Elemental Counter","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1421","rarity":"Uncommon","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal, Elemental","save":"","traits":["Cantrip","Concentrate","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE counter an elemental spell with another spell. It will cost you spell slots but with a bit of planning you should be able to cover many of the elements. Useful in the right campaign.","desc":"Use a countering element to protect against a spell.","effect":"Each element in the elemental cycle counters another, and you can use your elemental spells to protect against elements they counter. You lose your spell slot as if you had cast the triggering spell. You then attempt to counteract the triggering spell, using the rank of the spell you lost for the counteract rank. You can lose a plant or wood spell to counter earth, an earth spell to counter water, a water spell to counter fire, a fire spell to counter metal, or a metal spell to counter plant or wood. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1528","name":"Figment","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1528","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Cantrip","Concentrate","Illusion","Manipulate","Subtle"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC replaces Ghost Sound. The key here is the Subtle trait which means that by default your casting is not flashy and not noticed. So you've got a Charisma score, take some ranks in Deception. This is going to be very useful.","desc":"Create a simple auditory or visual illusion.","effect":"You create a simple illusory sound or vision. A sound adds the auditory trait to the spell and the sound can't include intelligible words or elaborate music. A vision adds the visual trait, can be no larger than a 5-foot cube, and is clearly crude and undetailed if viewed from within 15 feet. When you Cast or Sustain the Spell, you can attempt to Create a Diversion with the illusion, gaining a +2 circumstance bonus to your Deception check. If the attempt fails against a creature, that creature disbelieves the figment. ---","conditions":[],"tags":["buff","concentrate","illusion"],"heightened":[],"sustained":true},{"id":"1539","name":"Frostbite","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1539","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Cantrip","Cold","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC replacement for Ray of Frost. Its range has dropped to 60 ft but now it is a fortitude save which is a useful option.","desc":"Damage a creature with bitter cold.","effect":"An orb of biting cold coalesces around your target, freezing its body. The target takes 2d4 cold damage with a basic Fortitude save. On a critical failure, the target also gains weakness 1 to bludgeoning until the start of your next turn.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4 and the weakness on a critical failure increases by 1."}],"sustained":false},{"id":"2008","name":"Live Wire","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=2008","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Cantrip","Concentrate","Electricity","Manipulate","Metal"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC2 is a good attack cantrip with mixed slashing and electric damage. Errated.","desc":"Slash and shock a creature with an electrified filament.","effect":"You conjure up a length of sharp copper filament humming with electrical current that strikes out at your foe. The wire deals 1d4 slashing damage and 1d4 electricity damage, depending on your spell attack roll against the target's AC. Critical Success The target takes double damage and 1d4 persistent electricity damage. Success The target takes full damage. Failure The target takes the electricity damage, but not the slashing damage. Critical Failure The target is unaffected.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The slashing damage, initial electricity damage, and persistent electricity damage on a critical hit each increase by 1d4."}],"sustained":false},{"id":"1289","name":"Musical Accompaniment","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1289","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Auditory","Cantrip","Illusion"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"FB potential 24hr duration. Useful if you use performance and in some social situations. But only if you have the skills. For Bards and BattleDancer Swashbucklers.","desc":"You're surrounded by orchestral music that shifts and changes to match your behavior.","effect":"You're surrounded by orchestral music that shifts and changes to match your behavior. This music provides a +1 status bonus to Performance checks. At the GM's discretion, it provides this bonus to Deception, Diplomacy, and Intimidation checks as the music changes to support you in social situations, though some creatures are unaffected by such obvious attempts to use music to illicit specific emotions. This music moves with you and has a maximum volume equal to four humans shouting. You take a –4 penalty to Stealth checks while the music is playing. You can't control the exact music this spell creates. The music doesn't create intelligible words or singing. You can Dismiss this spell.","conditions":[],"tags":["buff","illusion"],"heightened":[{"label":"2nd","text":"The duration increases to 10 minutes."}],"sustained":false},{"id":"1375","name":"Needle Darts","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1375","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"AC","traits":["Attack","Cantrip","Concentrate","Manipulate","Metal"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE this is essentially Telekinetic Projectile with different dice and more range. Special material use is clear rather than a rules hellhole. Plus it is on every spell list.","desc":"Turn a piece of metal into needles and shoot them at a foe.","effect":"You shape three needles out of a piece of metal in your possession and send them flying in a tight group toward one target. Make a spell attack roll against your target's AC. The needles deal 3d4 piercing damage and might cause bleeding. The needles impart any special properties of the metal that forms them; for instance, cold iron needles deal additional damage to creatures with weakness to cold iron. All the needles are made of the same metal, and the metal returns to you after the attack. Critical Success The target takes double damage and 1 persistent bleed damage. Success The target takes full damage.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"You send one additional needle, increasing the regular damage by 1d4 and increasing the persistent bleed damage on a critical hit by 1."}],"sustained":false},{"id":"245","name":"Ray of Frost","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=245","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Cantrip","Cold","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"120 ft range cold attack spell, the others are typically 30 ft or less. If you want a long range cantrip this is it. It has a chance of effecting movement as well which is useful at maintaining range. Technically replaced by Frost Bite but that is a very different spell.","desc":"Damage a creature with cold.","effect":"You blast an icy ray. Make a spell attack roll. The ray deals 2d4 cold damage. Critical Success The target takes double damage and takes a –10-foot status penalty to its Speeds for 1 round. Success The target takes normal damage.","conditions":[],"tags":["damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"990","name":"Scatter Scree","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=990","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Earth","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SOM generates 2 squares of loose rock for bludgeoning damage and generates difficult terrain. There are some circumstances where this is better than Electric Arc. If two enemies are adjacent to each other this does the same damage as Electric Arc. Plus it may cost them an extra action next turn if they need to move.","desc":"Evoke rocks to deal bludgeoning damage and make rocky difficult terrain.","effect":"You evoke a jumble of rocks in the area. The scattering rocks deal 2d4 bludgeoning damage to creatures in the area, with a basic Reflex save. The ground in the area becomes difficult terrain for the duration. A creature can Interact to clear a square of this scree. If you cast this spell again, any previous scatter scree you have cast ends.","conditions":[],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"1321","name":"Slashing Gust","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1321","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 or 2 creatures","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Air","Attack","Cantrip","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a two target damaging cantrip. So comparable to Electric Arc. Range 60ft, but it is an attack roll, a little less damage, and you need 2 hands free.","desc":"Cut creatures with ripples of air.","effect":"You slash your hand through the air, channeling miniature ripples of air from each finger to slice your enemy. If you have two hands free, you can target two creatures with this spell; otherwise, you target one. Make a spell attack roll against each target's AC. This deals 2d4 slashing damage. On a critical success, a target also takes 1d4 persistent bleed damage. If you're attacking two creatures, this counts as two attacks for your multiple attack penalty, but the penalty doesn't increase until after both attacks. Critical Success The target takes double damage and 1d4 persistent bleed damage. Success The target takes full damage.","conditions":["persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4, and the persistent damage on a critical hit increases by 1d4."}],"sustained":false},{"id":"334","name":"Telekinetic Projectile","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=334","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Attack","Cantrip","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ranged attack. At one stage was the most damage to a single target at range for a cantrip. Deals bludgeoning, or slashing, or piercing damage. It is easy enough to carry a small pouch of sling bullets or arrow heads as ammunition.","desc":"Fling an object at a creature.","effect":"You hurl a loose, unattended object that is within range and that has 1 Bulk or less at the target. Make a spell attack roll against the target. If you hit, you deal bludgeoning, piercing, or slashing damage—as appropriate for the object you hurled—equal to 1d6 plus your spellcasting ability modifier. No specific traits or magic properties of the hurled item affect the attack or the damage. Critical Success You deal double damage. Success You deal full damage.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":false},{"id":"1412","name":"Timber","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1412","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Concentrate","Manipulate","Wood"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE falling tree does bludgeoning damage in a 15ft line. Area of effect, reflex save. This is effective in combat plus an excellent way to generate compost.","desc":"Drop a tree on someone.","effect":"You create a small dead tree in your space that falls over on anyone in its path, then immediately decomposes. Any creature in the area takes 2d4 bludgeoning damage, with a basic Reflex saving throw. A creature that critically fails its save is knocked for a loop, making it dazzled until the end of its next turn.","conditions":["dazzled"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The initial damage increases by 1d4."}],"sustained":false},{"id":"1193","name":"Time Sense","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1193","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Cantrip","Divination"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"DA you now have a precise clock. Instead take this for the single action +1 to hit every hour.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"3","name":"Acid Splash","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=3","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Acid","Attack","Cantrip","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"acid can be useful if all else fails. It is rarely resisted. Attack roll. Splash damage which is good against swarms, but the damage scales poorly. (Yes this spell does actually splash read Corrosive Body). In the remaster this is replaced by Caustic Blast.","desc":"You splash a glob of acid that splatters your target and nearby creatures.","effect":"You splash a glob of acid that splatters your target and nearby creatures. Make a spell attack. If you hit, you deal 1d6 acid damage plus 1 splash acid damage. On a critical success, the target also takes 1 persistent acid damage.","conditions":["persistent damage"],"tags":["damage"],"heightened":[{"label":"3rd","text":"The initial damage increases to 2d6, and the persistent damage increases to 2."},{"label":"5th","text":"The initial damage increases to 3d6, the persistent damage increases to 3, and the splash damage increases to 2."},{"label":"7th","text":"The initial damage increases to 4d6, the persistent damage increases to 4, and the splash damage increases to 3."},{"label":"9th","text":"The initial damage increases to 5d6, the persistent damage increases to 5, and the splash damage increases to 4."}],"sustained":false},{"id":"2444","name":"Bramble Bush","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=2444","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Concentrate","Manipulate","Plant","Uncommon","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"P203 does d4 damage to a one square area within 30ft. But even more damage when people move through that square later. Really good in confined terrain/corridors.","desc":"In a sudden burst of growth, you cause a thorned bush to sprout from the ground, lash around, and wither.","effect":"In a sudden burst of growth, you cause a thorned bush to sprout from the ground, lash around, and wither. Any creature in the area takes 1d4 piercing damage with a basic Reflex saving throw. Until the start of your next turn, the area is difficult terrain and hazardous terrain. Any creature entering the square takes 1d4 piercing damage with a basic Reflex saving throw.","conditions":[],"tags":["concentrate","control","damage"],"heightened":[{"label":"+2","text":"The initial damage increases by 1d4, and the damage dealt by hazardous terrain increases by 1."}],"sustained":false},{"id":"35","name":"Chill Touch","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=35","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living or undead creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"basic Fortitude","traits":["Cantrip","Necromancy","Negative"],"rating":"🟢🟢🟢","rval":3,"gortle":"melee range which is a problem because you shouldn't be in melee. Fortitude save with a bonus on a critical failure. A separate will save and effect versus undead. In the remaster there is a replacement spell called Void Warp. Which is totally different. Probably best to treat them as different spells.","desc":"Your touch hurts the living or disorients undead.","effect":"Siphoning negative energy into yourself, your hand radiates a pale darkness. Your touch weakens the living and disorients undead, possibly even causing them to flee. The effect depends on whether the target is living or undead. Living Creature The spell deals negative damage equal to 1d4 plus your spellcasting modifier. The target attempts a basic Fortitude save, but is also enfeebled 1 for 1 round on a critical failure. Undead Creature The target is flat-footed for 1 round on a failed Fortitude save. On a critical failure, the target is also fleeing for 1 round unless it succeeds at a Will save.","conditions":["enfeebled","fleeing","off-guard"],"tags":["damage"],"heightened":[{"label":"+1","text":"The negative damage to living creatures increases by 1d4."}],"sustained":false},{"id":"1315","name":"Deep Breath","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1315","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Cantrip","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE hold your breath for a very long time. Useful at higher levels when you don't need damage cantrips much. From rank 2 you can have it up more or less constantly.","desc":"Take an incredibly deep breath.","effect":"You take an incredibly deep breath and can hold it for the spell's duration. You don't lose breath when hit, but you do lose all the air you inhaled if you speak (including to Cast a Spell). This spell doesn't create air; if you don't have air to breathe when you cast it, you get no benefit.","conditions":[],"tags":[],"heightened":[{"label":"2nd","text":"The duration increases to 1 hour, and you lose only 10 minutes of breath if you speak."},{"label":"4th","text":"The duration increases to 8 hours, and you lose only 10 minutes of breath if you speak."}],"sustained":false},{"id":"66","name":"Detect Magic","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=66","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Cantrip","Detection","Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"for finding magic, someone should have it. You can also get it via feats though. Useful against illusions.","desc":"Sense whether magic is nearby.","effect":"You send out a pulse that registers the presence of magic. You receive no information beyond the presence or absence of magic. You can choose to ignore magic you're fully aware of, such as the magic items and ongoing spells of you and your allies. You detect illusion magic only if that magic's effect has a lower level than the level of your detect magic spell. However, items that have an illusion aura but aren't deceptive in appearance (such as an invisibility potion ) typically are detected normally.","conditions":[],"tags":["utility"],"heightened":[{"label":"3rd","text":"You learn the school of magic for the highest-level effect within range that the spell detects. If multiple effects are equally strong, the GM determines which you learn."},{"label":"4th","text":"As 3rd level, but you also pinpoint the source of the highest-level magic. Like for an imprecise sense, you don't learn the exact location, but can narrow down the source to within a 5-foot cube (or the nearest if larger than that)."}],"sustained":false},{"id":"1352","name":"Eat Fire","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1352","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Cantrip","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE this is new, fire resistance as a reaction and a cantrip. With the secondary ability of creating a smoke cloud. Very nice if you want to be concealed.","desc":"React to eat flame then belch the smoke out.","effect":"You consume and ingest fire, making it less harmful to you. You gain resistance 5 to fire damage until the end of the current turn. During the remaining duration of the spell, you can use the Belch Smoke action. The spell ends if you fall unconscious, inhale, or exhale (this includes speaking). Belch Smoke Single Action You exhale what remains of the smoke, ending the spell and creating a smoke cloud in a 5-foot burst within 20 feet. All creatures within the smoke cloud are concealed, and all other creatures are concealed to them. The smoke lasts for 1 minute or until dispersed by a strong wind.","conditions":["concealed","unconscious"],"tags":["defense"],"heightened":[{"label":"+3","text":"The resistance increases by 5."}],"sustained":false},{"id":"1333","name":"Glass Shield","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1333","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Concentrate","Earth"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a different shield cantrip. Not as much hardness but a chance to do some damage back. Useful if you want to block with your Shield twice in one encounter.","desc":"Protect yourself with a glass shield.","effect":"You summon a layer of clear glass to keep you from harm. This counts as using the Raise a Shield action, giving you a +1 circumstance bonus to AC until the start of your next turn, but it doesn't require a hand to use. You can Shield Block with the glass shield. It has Hardness 2. You can use the spell's reaction to reduce damage from any spell or magical effect, even if it doesn't deal physical damage. When you Shield Block, the shield explodes in a shower of glass. If creature that broke it is within 5 feet, the shards deal 1d4 piercing damage to that creature with a basic Reflex save. After you use Shield Block, the spell ends and you can't cast it again for 10 minutes.","conditions":[],"tags":["buff","concentrate","damage","defense","summon"],"heightened":[{"label":"3rd","text":"The shield has Hardness 4, and the damage increases to 3d4."},{"label":"5th","text":"The shield has Hardness 7, and the damage increases to 4d4."},{"label":"7th","text":"The shield has Hardness 10, and the damage increases to 5d4."},{"label":"9th","text":"The shield has Hardness 12, and the damage increases to 6d4."}],"sustained":false},{"id":"920","name":"Gouging Claw","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=920","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Attack","Cantrip","Morph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM a melee spell attack that does the most single target, damage for a cantrip. Clearly this is ideal for a Magus who doesn't care about ranged or melee with their spells.","desc":"Morph your limb into a claw and attack with it.","effect":"You temporarily morph your limb into a clawed appendage. Make a melee spell attack roll against your target's AC. If you hit, you deal your choice of slashing or piercing damage equal to 1d6 plus your spellcasting ability modifier. On a critical success, you deal double damage plus 1d4 persistent bleed damage.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The damage increases by 1d6 and the persistent bleed damage on a critical increases by 1d4."}],"sustained":false},{"id":"1565","name":"Ignition","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1565","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Cantrip","Concentrate","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC replacement for Produce Flame fire ranged attack spell, very good critical damage, good persistent damage. Burn it helps. Because it has a melee option you can benefit from flanking with this if you are at range zero.","desc":"Burn a creature up close or at range.","effect":"You snap your fingers and point at a target, which begins to smolder. Make a spell attack roll against the target's AC, dealing 2d4 fire damage on a hit. If the target is within your melee reach, you can choose to make a melee spell attack with the flame instead of a ranged spell attack, which increases all the spell's damage dice to d6s. Critical Success The target takes double damage and 1d4 persistent fire damage. Success The target takes full damage.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The initial damage increases by 1d4 and the persistent fire damage on a critical hit increases by 1d4."}],"sustained":false},{"id":"1359","name":"Illuminate","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1359","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"Reflex","traits":["Cantrip","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a different light cantrip.","desc":"Kindle all light sources around you.","effect":"You light all non-magical light sources in the area that use fire to provide their light—such as candles, lamps, and sconces. You can choose to make the emanation smaller than its maximum, to any distance of your choice. If a light source is attended by an unwilling creature, that creature can attempt a Reflex save to snuff the light out before it becomes noticeable.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The maximum area increases by 10 feet."}],"sustained":false},{"id":"932","name":"Infectious Enthusiasm","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=932","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Cantrip","Emotion","Enchantment","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM This is a solid way to get a +1 status bonus to attack rolls, Will saves, or Charisma-based skill check. It costs 2 actions for you and 1 for the recipient so there is a significant trade off but it is a poor man's Inspire Courage.","desc":"Encourage yourself and an ally to improve one roll apiece.","effect":"With enchanted gusto, you encourage yourself to get things done and share your motivation with your allies. You gain a +1 status bonus to your choice of attack rolls, Will saves, or Charisma-based skill checks. During the spell's duration, an ally who observed you Casting this Spell and was within 30 feet when you did so can take a single action, which has the concentrate trait, to gain the same bonus you chose until the start of its next turn. Using this spell to influence someone in a social situation is typically considered a faux pas, negating the benefit on Charisma-based skills if the subject of the check observed you casting the spell. ---","conditions":[],"tags":["buff","defense","emotion","mental"],"heightened":[],"sustained":false},{"id":"171","name":"Light","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=171","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 object of 1 Bulk or less, either unattended or possessed by you or a willing ally","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Cantrip","Evocation","Light"],"rating":"🟢🟢🟢","rval":3,"gortle":"there are normally a few people in the party who need light. As cantrips are automatically heightened, it is very useful if you run into enemies who use magical darkness against you.","desc":"Make an object glow.","effect":"The object glows, casting bright light in a 20-foot radius (and dim light for the next 20 feet) like a torch. If you cast this spell again on a second object, the light spell on the first object ends.","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"The object sheds bright light in a 60-foot radius (and dim light for the next 60 feet)."}],"sustained":false},{"id":"177","name":"Mage Hand","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=177","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 unattended object of light Bulk or less","duration":"","school":"Evocation","traditions":"Arcane, Occult, Elemental","save":"","traits":["Cantrip","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"useful when you don't want to touch something or you need a third hand. Now called Telekinetic Hand","desc":"Command a floating hand to move an object.","effect":"You create a single magical hand, either invisible or ghostlike, that grasps the target object and moves it slowly up to 20 feet. Because you're levitating the object, you can move it in any direction. When you Sustain the Spell, you can move the object an additional 20 feet. If the object is in the air when the spell ends, the object falls.","conditions":["invisible"],"tags":["utility"],"heightened":[{"label":"3rd","text":"You can target an unattended object with a Bulk of 1 or less."},{"label":"5th","text":"The range increases to 60 feet, and you can target an unattended object with a Bulk of 1 or less."},{"label":"7th","text":"The range increases to 60 feet, and you can target an unattended object with a Bulk of 2 or less."}],"sustained":true},{"id":"1159","name":"Phase Bolt","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1159","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Attack","Cantrip","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"DA piercing ranged attack spell. Main ability is to negate cover and shields.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"236","name":"Produce Flame","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=236","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Cantrip","Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"replaced by Ignition. Fire ranged attack spell, very good critical damage. Burn it helps. Because it has a melee option you can benefit from flanking with this if you are at range zero.","desc":"Kindle small flames to attack close or at range.","effect":"A small ball of flame appears in the palm of your hand, and you lash out with it either in melee or at range. Make a spell attack roll against your target's AC. This is normally a ranged attack, but you can also make a melee attack against a creature in your unarmed reach. The flame deals 2d4 fire damage. Critical Success The target takes double damage and 1d4 persistent fire damage. Success The target takes full damage.","conditions":["persistent damage"],"tags":["damage"],"heightened":[{"label":"+1","text":"Increase the damage by 1d4 and the persistent damage on a critical hit by 1d4."}],"sustained":false},{"id":"975","name":"Protect Companion","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=975","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"30 feet","target":"your  eidolon , or a creature with the  minion  trait under your control","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Abjuration","Cantrip"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM you can protect your minion (mount/ familiar/ animal companion/ summons /eidolon) so you will have a lot of targets. For Summoners as you are Shielding at range.","desc":"Shield your eidolon or minion from harm.","effect":"You extend your aura, as a magical shield that protects your eidolon or minion. The target gains a +1 circumstance bonus to AC until the start of your next turn. You gain the following reaction; after using the reaction, the spell ends and you can't cast protect companion again for 10 minutes. Life Block Reaction Trigger The spell's target would take damage; Effect Reduce the triggering damage by 10, but you lose 5 Hit Points. Even if this reduces the damage to 0, the target still takes any effects that would come with the damage, such as the poison on a viper's fangs Strike.","conditions":[],"tags":["buff","damage","defense"],"heightened":[{"label":"+2","text":"The reaction reduces the damage by another 10, and you lose 5 more Hit Points. If you want to lose fewer Hit Points, you can choose to lower the damage reduction and HP lost to what any lower-level version of the spell could do without lowering the spell's actual level."}],"sustained":false},{"id":"977","name":"Puff of Poison","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=977","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"5 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Cantrip","Evocation","Inhaled","Poison"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM updated in PC2, a really short range spell that does poison damage. The damage is slow and poison is commonly resisted by monsters (though not players). The range has been improved to 10 ft (from 5) and the damage increased.","desc":"Exhale toxins to poison a foe.","effect":"You exhale a shimmering cloud of toxic breath at an enemy's face. The target takes 1d8 poison damage and 2 persistent poison damage, depending on its Fortitude save. Critical Success The creature is unaffected. Success The target takes half initial and persistent damage. Failure The target takes full initial and persistent damage. Critical Failure The target takes double initial and persistent damage.","conditions":["persistent damage"],"tags":["damage"],"heightened":[{"label":"+2","text":"The initial poison damage increases by 1d8 and the persistent poison damage increases by 1."}],"sustained":false},{"id":"246","name":"Read Aura","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=246","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"30 feet","target":"1 object","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Cantrip","Detection","Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"someone in the party should have access to assist with identification of items. Not entirely necessary and normally gets trimmed from my list.","desc":"Detect if an object is magical, and determine the school of its magic.","effect":"You focus on the target object, opening your mind to perceive magical auras. When the casting is complete, you know whether that item is magical, and if it is, you learn the school of magic. If the object is illusory, you detect this only if the effect's level is lower than the level of your read aura spell.","conditions":[],"tags":["utility"],"heightened":[{"label":"3rd","text":"You can target up to 10 objects."},{"label":"6th","text":"You can target any number of objects."}],"sustained":false},{"id":"1409","name":"Root Reading","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1409","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Cantrip","Concentrate","Manipulate","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE for finding unnoticed creatures.","desc":"Learn about an area using root systems.","effect":"You gain general insights into the immediate vicinity by sending your sense through the root systems of trees and bushes. If there are any unnoticed Medium or larger creatures in the area, you learn of their presence and they're undetected to you. You can immediately attempt to Seek an undetected creature, and you gain a +1 status bonus to this attempt and any of your other attempts to Seek hidden or undetected creatures until the end of your next turn. You also learn if any such creatures passed through this area in the last hour, although you get only the vaguest sense of direction from the spell. If you begin to Track a creature detected in this way, you gain a +1 status bonus to the initial check. ---","conditions":[],"tags":["buff","concentrate","defense","utility"],"heightened":[],"sustained":false},{"id":"280","name":"Shield","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=280","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Elemental","save":"","traits":["Abjuration","Cantrip","Force"],"rating":"🟢🟢🟢","rval":3,"gortle":"single action shield. A point of AC and a bit of one use damage resistance. Just be aware that sometimes you are better off being offensive than defensive. Also note that you can just carry a shield and raise it for +2 circumstance bonus to AC without any proficiency.","desc":"A shield of magical force blocks attacks and magic missiles.","effect":"You raise a magical shield of force. This counts as using the Raise a Shield action, giving you a +1 circumstance bonus to AC until the start of your next turn, but it doesn't require a hand to use. While the spell is in effect, you can use the Shield Block reaction with your magic shield. The shield has Hardness 5. After you use Shield Block, the spell ends and you can't cast it again for 10 minutes. Unlike a normal Shield Block, you can use the spell's reaction against the magic missile spell. Heightening the spell increases the shield's Hardness.","conditions":[],"tags":["buff","defense"],"heightened":[{"label":"3rd","text":"The shield has Hardness 10."},{"label":"5th","text":"The shield has Hardness 15."},{"label":"7th","text":"The shield has Hardness 20."},{"label":"9th","text":"The shield has Hardness 25."}],"sustained":false},{"id":"1002","name":"Spout","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1002","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cantrip","Evocation","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM an area of effect reflex save. Similar damage to Scatter Scree but only one square, unless in the circumstance your target is adjacent to a pond then you may be able to affect a bigger area. Almost strictly inferior to Scatter Scree.","desc":"Batter creatures with a water blast that is larger if cast in a body of water.","effect":"Water blasts upward, coming out of the ground, rising from a pool, or even manifesting from thin air. Any creatures in the area take 2d4 bludgeoning damage, with a basic Reflex saving throw. A creature that critically fails its save is disoriented by the explosion of water, becoming off-guard until the end of your next turn. You can change this spell's area to a 5-foot burst, provided you center the burst in a body of water. This body of water can be as small as a pond or creek, but not as small as a puddle or bathtub.","conditions":["off-guard"],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"1713","name":"Tangle Vine","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1713","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Cantrip","Concentrate","Manipulate","Plant","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"one of the few control cantrips. Take this if you think you can use the 10ft speed penalty to your advantage. If you are using large area difficult terrain as a control mechanism this can really lock an enemy down. At level 1 one round is not great but at higher levels the duration is much better.","desc":"Conjure a vine to entangle a creature.","effect":"A vine appears from thin air, flicking from your hand and lashing itself to the target. Attempt a spell attack roll against the target. Critical Success The target gains the immobilized condition and takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape against your spell DC to remove the penalty and the immobilized condition. Success The target takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape against your spell DC to remove the penalty. Failure The target is unaffected.","conditions":["immobilized"],"tags":["concentrate","control","debuff"],"heightened":[{"label":"2nd","text":"The effects last for 2 rounds."},{"label":"4th","text":"The effects last for 1 minute."}],"sustained":false},{"id":"330","name":"Tanglefoot","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=330","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Attack","Cantrip","Conjuration","Plant"],"rating":"🟢🟢🟢","rval":3,"gortle":"one of the few control cantrips. Take this if you think you can use the 10ft speed penalty to your advantage. If you are using large area difficult terrain as a control mechanism this can really lock an enemy down. At level 1 one round is not great but at higher levels the duration is much better.","desc":"Conjure a vine to entangle a creature.","effect":"A vine covered in sticky sap appears from thin air, flicking from your hand and lashing itself to the target. Attempt a spell attack against the target. Critical Success The target gains the immobilized condition and takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape against your spell DC to remove the penalty and the immobilized condition. Success The target takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape against your spell DC to remove the penalty. Failure The target is unaffected.","conditions":["immobilized"],"tags":["control","debuff"],"heightened":[{"label":"2nd","text":"The effects last for 2 rounds."},{"label":"4th","text":"The effects last for 1 minute."}],"sustained":false},{"id":"1715","name":"Telekinetic Hand","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1715","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 unattended object of Light bulk or less","duration":"","school":"","traditions":"Arcane, Occult, Elemental","save":"","traits":["Cantrip","Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC Originally called Mage Hand useful when you don't want to touch something or you need a third hand.","desc":"Move an object with a floating hand.","effect":"You create a floating, magical hand, either invisible or ghostlike, that grasps the target object and levitates it slowly up to 20 feet in any direction. When you Sustain the spell, you can move the object an additional 20 feet. If the object is in the air when the spell ends, the object falls.","conditions":["invisible"],"tags":["concentrate","utility"],"heightened":[{"label":"3rd","text":"You can target an unattended object with a Bulk of 1 or less."},{"label":"5th","text":"The range increases to 60 feet, and you can target an unattended object with a Bulk of 1 or less."},{"label":"7th","text":"The range increases to 60 feet, and you can target an unattended object with a Bulk of 2 or less."}],"sustained":true},{"id":"1270","name":"Torturous Trauma","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1270","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine","save":"basic Fortitude","traits":["Cantrip","Necromancy","Nonlethal","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P186 This is a fortitude save for a small amount of internal bludgeoning damage. Not as good as some of the reflex save options.","desc":"You batter a creature's internal organs, leaving no external signs of the immense pain you delivered.","effect":"With this spell born of Kemnebi's sadistic love of torture, you batter a creature's internal organs, leaving no external signs of the immense pain you delivered. The target takes bludgeoning damage equal to 1d4 + your spellcasting modifier with a basic Fortitude save. If it critically fails, the target is also fatigued until the start of your next turn. Creatures that lack internal organs are unaffected by this spell.","conditions":["fatigued"],"tags":["damage"],"heightened":[{"label":"+1","text":"The bludgeoning damage increases by 1d4."}],"sustained":false},{"id":"1745","name":"Void Warp","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1745","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"basic Fortitude","traits":["Cantrip","Concentrate","Manipulate","Void"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC a different spell from Chill Touch. Void Warp is range 30ft, and the option to use it against undead is gone.","desc":"Damage and weaken the living with void energy.","effect":"You call upon the Void to harm life force. The target takes 2d4 void damage with a basic Fortitude save. On a critical failure, the target is also enfeebled 1 until the start of your next turn.","conditions":["enfeebled"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"1166","name":"Warp Step","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1166","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Cantrip","Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"DA a 5ft status bonus to your speed this turn as long as you are striding twice. Quite useful fairly often.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1261","name":"Ancient Dust","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1261","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine","save":"Fortitude","traits":["Cantrip","Necromancy","Negative","Uncommon"],"rating":"🟠🟠","rval":2,"gortle":"negative damage in a cone plus some small persistent damage. It is a fortitude save which might be useful to you but the damage is mediocre.","desc":"You cough up a cloud of gray soil.","effect":"You cough up a cloud of gray soil, echoing the dust in the graves of Kemnebi's many victims. Each creature in the area takes negative damage equal to your spellcasting modifier and 1 persistent negative damage depending on its Fortitude save. Critical Success The creature is unaffected. Success The creature takes half damage and no persistent damage. Failure The creature takes full damage and persistent damage. Critical Failure The creature takes double damage and double the persistent damage.","conditions":["persistent damage"],"tags":["damage"],"heightened":[{"label":"+2","text":"The initial negative damage increases by 1d6, and the persistent damage increases by 1."}],"sustained":false},{"id":"877","name":"Bullhorn","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=877","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Divine, Occult","save":"","traits":["Auditory","Cantrip","Illusion"],"rating":"🟠🟠","rval":2,"gortle":"SOM it has some value if you are regularly trying to coordinate large groups. Maybe useful with a deception check if you are pretending to be something else.","desc":"Magnify your voice to be heard at a distance.","effect":"You amplify your voice, loud enough for you to be heard easily at a great distance. For the duration, your voice can be heard loudly and clearly by all listeners within 500 feet, even if other ambient noise would otherwise block the sound. Despite the volume, this doesn't make your voice jarring or distracting. This doesn't increase the range or area of other auditory or linguistic effects, and physical barriers such as walls and doors still block or muffle your voice as normal. Your loud voice makes it easier to Coerce others, and the acoustics assist in Performing at a large venue. You gain a +1 status bonus to checks to Coerce and auditory Performance checks to Perform at a large venue. You can Dismiss the spell.","conditions":[],"tags":["buff","illusion"],"heightened":[{"label":"5th","text":"Your voice can be heard clearly up to 1,200 feet away."},{"label":"7th","text":"Your voice can be heard clearly up to 1 mile away."}],"sustained":false},{"id":"58","name":"Dancing Lights","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=58","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult, Primal","save":"","traits":["Cantrip","Evocation","Light"],"rating":"🟠🟠","rval":2,"gortle":"a distraction. A light source. Can be used for scouting as you can project your light in front of you, not over you.","desc":"Create four floating lights you can move.","effect":"You create up to four floating lights, no two of which are more than 10 feet apart. Each sheds light like a torch. When you Sustain the Spell, you can move any number of lights up to 60 feet. Each light must remain within 120 feet of you and within 10 feet of all others, or it winks out. ---","conditions":[],"tags":[],"heightened":[],"sustained":true},{"id":"61","name":"Daze","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=61","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"basic Will","traits":["Cantrip","Enchantment","Mental","Nonlethal"],"rating":"🟠🟠","rval":2,"gortle":"range 60ft, will save, smaller nonlethal damage but a stun on a critical saving throw fail. It is a good save to target, but the damage is half what it should be.","desc":"Damage a creature's mind and possibly stun it.","effect":"You cloud the target's mind and daze it with a mental jolt. The jolt deals mental damage equal to your spellcasting ability modifier; the target must attempt a basic Will save. If the target critically fails the save, it is also stunned 1.","conditions":["stunned"],"tags":["damage","mental"],"heightened":[{"label":"+2","text":"The damage increases by 1d6."}],"sustained":false},{"id":"1368","name":"Detect Metal","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1368","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Cantrip","Concentrate","Detection","Manipulate","Metal"],"rating":"🟠🟠","rval":2,"gortle":"ROE mostly not useful unless you are a miner, but I can see it being a good detect in certain dungeons for finding doors and hinges.","desc":"Sense whether metal is nearby.","effect":"You attune yourself to magnetic fields, becoming aware of the presence or absence of metallic objects, veins, and deposits within the area. You can choose to ignore metal you're fully aware of, such as the gear you and your allies wear and carry. You detect metal hidden by illusions (such as invisibility ) only if the illusion has a lower rank than your detect metal spell. Against deceptive illusions, detect metal always notices an absence of metal when a non-metallic object is disguised as metallic. However, if the deception involves disguising one metallic object as another, such as pretending a copper coin is made of gold, detect metal registers only the presence of metal, not its type, even if the rank of your detect metal spell exceeds that of the illusion effect.","conditions":[],"tags":["concentrate","utility"],"heightened":[{"label":"3rd","text":"You can discern all types of metal you detected. Your spell can overcome deceptive illusory spells hiding one metal as another if the magic effect's rank is lower than that of your detect metal spell."}],"sustained":false},{"id":"1387","name":"Draw Moisture","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1387","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"10 feet","target":"1 object up to 10 Bulk","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Cantrip","Concentrate","Manipulate","Water"],"rating":"🟠🟠","rval":2,"gortle":"ROE a cantrip to dry things, which will create a few cups of water.","desc":"Dry out an object and collect the water.","effect":"You draw water out of an object, possibly to clean up spills or quickly dry a soaked book or shirt. You draw up to a pint of water from the object; this dries objects of less than 1 Bulk. The water collects in a globule floating in your hand, which you can direct into a nearby container as part of Casting the Spell; otherwise, it splashes to the ground. Repeated applications of draw moisture can be used to dry larger objects, although doing so might take significant time. You can use this spell in especially humid environments to condense drinkable water from the air, though typically, you can't draw more than a few cups before depleting the ambient moisture. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"917","name":"Gale Blast","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=917","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Cantrip","Evocation"],"rating":"🟠🟠","rval":2,"gortle":"some minor damage in an emanation around you, pushes away. Scaling is improved in PC2. Perhaps useful as an escape or versus swarms.","desc":"Damage and push adjacent creatures with air.","effect":"Wind flows from your outstretched hands and whirls around you in a 5-foot emanation. Each creature in the area takes 1d6 bludgeoning, with a Fortitude save. Critical Success The creature is unaffected. Success The creature takes half damage. Failure The creature takes full damage and is pushed 5 feet away from you. Critical Failure The creature takes double damage and is pushed 10 feet away from you.","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"The damage increases by 1d6."}],"sustained":false},{"id":"132","name":"Ghost Sound","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=132","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Auditory","Cantrip","Illusion"],"rating":"🟠🟠","rval":2,"gortle":"perhaps a distraction. Does your spell casting need to be concealed for it to work. Sustainable, so I suppose you could cast it before it was needed. Take Figment instead.","desc":"Make false sounds.","effect":"You create an auditory illusion of simple sounds that has a maximum volume equal to four normal humans shouting. The sounds emanate from a square you designate within range. You can't create intelligible words or other intricate sounds (such as music).","conditions":[],"tags":["illusion"],"heightened":[{"label":"3rd","text":"The range increases to 60 feet."},{"label":"5th","text":"The range increases to 120 feet."}],"sustained":true},{"id":"2353","name":"Glamorize","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=2353","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Cantrip","Concentrate","Manipulate"],"rating":"🟠🟠","rval":2,"gortle":"DM a minor cosmetic effect. Lasts for an hour. Useful if you like performing or impersonating.","desc":"Using simple magical gestures, you alter a minor detail of your appearance.","effect":"Using simple magical gestures, you alter a minor detail of your appearance (add or remove highlights to your hair color, apply or remove cosmetics, add polish or accessories to your nails, etc.) or create a small environmental effect that’s confined to your person (adjust surrounding lighting to favor your good side, cause a brief wind to make your hair blow dramatically, make a small chime occur as you smile, etc.). While the spell is active, you can Sustain it to make further adjustments. The changes persist until the spell’s duration ends. At the GM’s discretion, such alterations might grant a +1 status bonus to certain tasks, such as Impersonate or Perform. ---","conditions":[],"tags":["buff","concentrate"],"heightened":[],"sustained":true},{"id":"190","name":"Message","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=190","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"120 feet","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Divine, Occult, Elemental","save":"","traits":["Auditory","Cantrip","Illusion","Linguistic","Mental"],"rating":"🟠🟠","rval":2,"gortle":"ranged communication. It has its uses but is harder to justify as a Sorcerer.","desc":"Speak a message to a distant creature, who can reply.","effect":"You mouth words quietly, but instead of coming out of your mouth, they're transferred directly to the ears of the target. While others can't hear your words any better than if you normally mouthed them, the target can hear your words as if they were standing next to you. The target can give a brief response as a reaction, or as a free action on their next turn if they wish, but they must be able to see you and be within range to do so. If they respond, their response is delivered directly to your ear, just like the original message.","conditions":[],"tags":["illusion","mental"],"heightened":[{"label":"3rd","text":"The spell's range increases to 500 feet."}],"sustained":false},{"id":"229","name":"Prestidigitation","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=229","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"10 feet","target":"1 object (cook, lift, or tidy only)","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Cantrip","Evocation"],"rating":"🟠🟠","rval":2,"gortle":"good story value. Lots of little utility magic. Important if your character is too lazy to do mundane tasks himself or is trying to preserve an image.","desc":"Perform a minor magical trick.","effect":"The simplest magic does your bidding. You can perform simple magical effects for as long as you Sustain the Spell. Each time you Sustain the Spell, you can choose one of four options. Cook Cool, warm, or flavor 1 pound of nonliving material. Lift Slowly lift an unattended object of light Bulk or less 1 foot off the ground. Make Create a temporary object of negligible Bulk, made of congealed magical substance. The object looks crude and artificial and is extremely fragile—it can't be used as a tool, weapon, or spell component. Tidy Color, clean, or soil an object of light Bulk or less. You can affect an object of 1 Bulk with 10 rounds of concentration, and a larger object a 1 minute per Bulk. Prestidigitation can't deal damage or cause adverse conditions. Any actual change to an object (beyond what is noted above) persists only as long as you Sustain the Spell. ---","conditions":[],"tags":[],"heightened":[],"sustained":true},{"id":"1342","name":"Tremor Signs","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1342","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Cantrip","Earth","Manipulate","Subtle"],"rating":"🟠🟠","rval":2,"gortle":"ROE short range communication Through walls. Single action. Similar role to Message but very different flavour.","desc":"Send a sentence through stone.","effect":"You send a series of tremors, no longer than a short sentence of speech, toward your target. If the target is within range and connected to the same body of earth as you, the vibrations reach the target through the ground. You need neither line of sight nor line of effect, so a target on another floor of a building is a valid target. The target can give a brief, vibrational response as a reaction, or as a free action on their next turn, but they must be within range to do so. If they respond, their response is delivered to you through tremors you feel, as with the original message. The tremors impart a clear meaning only if you and the target know that meaning, such as three tremors for a specific warning, two for another. Neither of you can impart a nuanced or new meaning using this spell. A creature that has tremorsense can feel the vibrations from this spell if the creature is within range of the vibrations at any point during their journey to any target.","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"The spell can target up to 5 creatures."}],"sustained":false},{"id":"864","name":"Approximate","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=864","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"10 feet","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Cantrip","Detection","Divination"],"rating":"🔴","rval":1,"gortle":"SOM counting is so hard and it is important to do it quickly ?!?","desc":"Magically estimate the number of nearby objects.","effect":"Your magic quickly flows over an area to help you count and catalog. Name a particular type of object you are looking for within the area. You gain an instant estimate of the quantity of the chosen objects that are clearly visible within the target area. The number is rounded to the largest digit. For example, you could look at a pile of 180 copper coins, and you would learn that it held about 200 coins, but you couldn't determine there were exactly 180 coins. The type of object you name can be as specific or general as you like—“dented copper coins” is as viable as “coins”—but the distinguishing features must be obvious at a glance, and the spell is automatically fooled by objects disguised as other objects. For instance, the spell would register copper coins plated in gold as gold coins, not copper coins. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":false},{"id":"1065","name":"Invoke True Name","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1065","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"30 feet","target":"1 creature whose true name you know","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Cantrip","Enchantment","Rare","True Name"],"rating":"🔴","rval":1,"gortle":"SOM This is a useful debuff to put on an enemy but the requirement that you know the target's true name restricts this to characters and campaigns that are built around it.","desc":"You speak the true name of a creature to more surely affect it with your magic.","effect":"You speak the true name of a creature to more surely affect it with your magic. Until the end of the current turn, the target is flat-footed against your spells and takes a –2 circumstance penalty to saving throws against your spells. In addition, the first time this turn the target takes damage from one of your spells, it has weakness to that damage equal to double the level of invoke true name . ---","conditions":["off-guard"],"tags":["damage","debuff"],"heightened":[],"sustained":false},{"id":"286","name":"Sigil","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=286","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature or object","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Cantrip","Transmutation"],"rating":"🔴","rval":1,"gortle":"very minor uses. Have you already taken the dozen other better cantrips that you want?","desc":"Leave a magical mark.","effect":"You
