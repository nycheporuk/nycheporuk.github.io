re that touches the image or uses the Seek action to examine it can attempt to disbelieve your illusion. When a creature disbelieves the illusion, it recovers from half the damage it had taken from it (if any) and doesn't take any further damage from it.","conditions":[],"tags":["damage","illusion"],"heightened":[{"label":"+1","text":"The damage of the image's Strikes increases by 1d4, and the maximum size of creature you can create increases by one (to a maximum of Gargantuan)."}],"sustained":true},{"id":"1436","name":"Acid Grip","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1436","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Acid","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC was Acid Arrow. No longer an attack spell but a reflex save. It is reasonable direct damage and not something commonly resisted. But now it interferes with their movement. Definitely some combo potential here if there is interesting terrain. Moves an enemy even if they make a save so might be able to break a grapple or just move them aside. It is mildly annoying that Paizo violates their rules convention by creating a negative bonus rather than calling it a penalty. Mathfinder has a video on how to use this spell.","desc":"Move and harm foes with a hand of acid.","effect":"An ephemeral, taloned hand grips the target, burning it with magical acid. The target takes 2d8 acid damage plus 1d6 persistent acid damage depending on its Reflex save. A creature taking persistent damage from this spell takes a –10-foot status penalty to its Speeds. Critical Success The creature is unaffected. Success The creature takes half damage and no persistent damage, and the claw moves it up to 5 feet in a direction of your choice. Failure The creature takes full damage and persistent damage, and the claw moves it up to 10 feet in a direction of your choice. Critical Failure The creature takes double damage and full persistent damage, and the claw moves it up to 20 feet in a direction of your choice.","conditions":["persistent damage"],"tags":["concentrate","damage","debuff"],"heightened":[{"label":"+2","text":"The initial damage increases by 2d8, and the persistent acid damage increases by 1d6."}],"sustained":false},{"id":"1450","name":"Blazing Bolt","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1450","rarity":"Common","actions":"1","actionsRaw":"Single Action to Three Actions","range":"60 feet","target":"1 or more creatures","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Concentrate","Fire","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"was called Scorching Ray. Reasonably good fire damage against multiple targets. The nice part about this is it is multitarget but not area of effect. So it can be cast after the enemy has closed with the party. You will almost always prefer to use the 3 action variant.","desc":"Fire one to three flaming bolts at different foes.","effect":"You fire a ray of heat and flame. Make a spell attack roll against a single creature. On a hit, the target takes 2d6 fire damage, and on a critical hit, the target takes double damage. For each additional action you use when Casting the Spell, you can fire an additional ray at a different target, to a maximum of three rays targeting three different targets for 3 actions. These attacks each increase your multiple attack penalty, but you don't increase your multiple attack penalty until after you make all the spell attack rolls for blazing bolt. If you spend 2 or more actions Casting the Spell, the damage increases to 4d6 fire damage on a hit, and it still deals double damage on a critical hit.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage to each target increases by 1d6 for the 1-action version, or by 2d6 for the 2- and 3-action versions."}],"sustained":false},{"id":"675","name":"Blood Vendetta","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=675","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"the triggering creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Necromancy"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"APG reaction spell that inflicts beed damage. There are simply not that many good magical reactions, this is one.","desc":"Cause a creature that attacks you to start bleeding.","effect":"You curse the target, punishing it for having the audacity to spill your blood. The target takes 2d6 persistent bleed damage and must attempt a Will save. Critical Success The target is unaffected. Success The target takes half the persistent bleed damage. Failure The target takes the full persistent bleed damage. Until the bleeding stops, the target has weakness 1 to piercing and slashing damage. Critical Failure As failure, but the target takes double the persistent bleed damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"The persistent bleed damage increases by 2d6."}],"sustained":false},{"id":"1909","name":"Carrion Mire","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1909","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult","save":"Reflex","traits":["Conjuration","Negative","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"WTD4 this is a sustainable area that will knock people prone. Great if there is forced movement in your party or just lots of opportunity attacks.","desc":"The ground opens into a seemingly endless mass of corpse limbs.","effect":"The ground opens into a seemingly endless mass of corpse limbs, grasping at all creatures within the area to drag them down. Creatures in the area when the spell is cast or beginning their turn in the area must succeed at a Reflex save or fall prone. When a creature in the spell's areas would be healed by a vitality effect, the carrion mire attempts to counteract that effect, preventing that healing but not otherwise prevent the effect if it's counteracted. ---","conditions":["prone"],"tags":["control","healing"],"heightened":[],"sustained":true},{"id":"1281","name":"Confetti Cloud","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1281","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action to Three Actions","range":"90 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"FB creates concealment in a cloud of confetti.","desc":"You conjure a dense storm of swirling confetti.","effect":"You conjure a dense storm of swirling confetti. All creatures within the area of the confetti become concealed, and all creatures outside the storm become concealed to creatures within it. Additionally, creatures in the area of the confetti continually hear the raucous sounds of a party or festival and take a –2 circumstance penalty on Perception checks to hear. The number of actions you spend when Casting this Spell determines its area. You can Dismiss the spell. Single Action (somatic) The spell's area is a 5-foot burst. Two Actions (somatic, verbal) The spell's area is a 10-foot burst. Three Actions (material, somatic, verbal) The spell's area is a 15-foot burst. ---","conditions":["concealed"],"tags":["debuff","summon"],"heightened":[],"sustained":false},{"id":"1111","name":"Dancing Shield","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1111","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 touched shield and 1 willing creature","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Evocation","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"BC raise a shield for someone else but with your actions and reactions.","desc":"You levitate the touched shield and orbit it around a nearby ally.","effect":"You levitate the touched shield and orbit it around a nearby ally. When you Cast the Spell and Sustain the Spell, the shield uses the Raise a Shield action to protect the target creature.","conditions":[],"tags":["defense"],"heightened":[{"label":"4th","text":"If you have the Shield Block reaction, you can use your reaction to have the target shield use Shield Block when the target creature would take damage from a physical attack, in addition to the usual trigger. In this case, Shield Block protects the target creature, rather than you. Since the shield is using Shield Block and not you, additional effects or…"}],"sustained":true},{"id":"78","name":"Dispel Magic","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=78","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 spell effect or unattended magic item","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Abjuration"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"useful protection against a wide range of things, and Sorcerers value versatility. The counteract check can be hard.","desc":"End a spell or suppress an item's magic.","effect":"You unravel the magic behind a spell or effect. Attempt a counteract check against the target. If you successfully counteract a magic item, the item becomes a mundane item of its type for 10 minutes. This doesn't change the item's non-magical properties. If the target is an artifact or similar item, you automatically fail. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"121","name":"Flaming Sphere","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=121","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Evocation","Fire"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"repeatable fire damage when you sustain. Broken if your GM is foolish enough to let you sustain it multiple times in a round. There is errata to make it clear you can’t do this. Replaced by Floating Flame","desc":"A ball of fire rolls about at your command.","effect":"You create a sphere of flame in a square within range. The sphere must be supported by a solid surface, such as a stone floor. The sphere deals 3d6 fire damage to each creature in the square where it first appears; each creature must attempt a basic Reflex save. On subsequent rounds, the first time you Sustain this Spell each round, you can leave the sphere in its square or roll it to another square within range. It deals 3d6 fire damage (basic Reflex save) to each creature in that square. Creatures that succeed at their save take no damage (instead of half).","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":true},{"id":"1533","name":"Floating Flame","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1533","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Fire","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC The replacement for Flaming Sphere. This is much stronger as you take half damage if you make your save and you affect whoever you move through during the turn, not just where you are at the end.","desc":"Summoned fire moves at your command.","effect":"You create a fire that burns without fuel and moves to your commands. The flame deals 3d6 fire damage to each creature in the square in which it appears, with a basic Reflex save. When you Sustain this spell, you can levitate the flame up to 10 feet. It then deals damage to each creature whose space it shared at any point during its flight. This uses the same damage and save, and you roll the damage once each time you Sustain. A given creature can take damage from floating flame only once per round.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":true},{"id":"1954","name":"Hidebound","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1954","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"HoW a good scaling reaction to resist physical damage for anyone within 30 ft. Take it when these spell slots are cheap.","desc":"The target’s skin erupts in thick hide or dense scales.","effect":"The target's skin erupts in thick hide or dense scales. It gains resistance 5 to physical damage, except adamantine, until the beginning of its next turn.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+2","text":"The resistance increases by 3."}],"sustained":false},{"id":"153","name":"Humanoid Form","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=153","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a useful disguise, to just look like someone else. Especially nice if you are a Sprite or some other unusual creature. Comes with Enlarge in built at level 5. Take deception with this. But also options for Darkvision and Enlarge. The duration is not great at ten minutes for a spell that you want to use out of combat. If your GM makes you roll the deception check constantly then this is a problem.","desc":"Take the shape of a humanoid.","effect":"You transform your appearance to that of a Small or Medium humanoid, such as a dwarf, elf, goblin, halfling, human, orc, or lizardfolk. You gain the humanoid trait in addition to your other traits while in this form, as well as any trait related to the creature's kind (such as goblin or human). If this transformation reduces your size, it reduces your reach accordingly (as the shrink spell). This transformation doesn't change your statistics in any way, and you don't gain any special abilities of the humanoid form you assume. You can still wear and use your gear, which changes size (if necessary) to match your new form. If items leave your person, they return to their usual size. Humanoid form grants you a +4 status bonus to Deception checks to pass as a generic member of the chosen ancestry, and you add your level even if you're untrained, but you can't make yourself look like a specific person. If you want to Impersonate an individual, you still need to create a disguise, though the GM won't factor in the difference in ancestry when determining the DC of your Deception check. You can Dismiss this spell.","conditions":[],"tags":["buff","utility"],"heightened":[{"label":"3rd","text":"You gain darkvision or low-light vision if the form you assume has that ability."},{"label":"5th","text":"You can take on the appearance of a Large humanoid. If this increases your size, you gain the effects of the enlarge spell."}],"sustained":false},{"id":"164","name":"Invisibility","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=164","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"Heightened ★★★★★ always a good spell. Even better in this edition as the defences against this are not as good. Very effective for escaping, scouting, and surprise. Better in combat if you heighten it, so that it stays up after you attack. Even if they attack the square you are in it is a 50% miss chance. True strike and area of effect spells are useful against invisibility if you have nothing else specific. Rules problem: hostile action is subjective.","desc":"A creature can’t be seen until it attacks.","effect":"Cloaked in illusion, the target becomes invisible. This makes it undetected to all creatures, though the creatures can attempt to find the target, making it hidden to them instead. If the target uses a hostile action, the spell ends after that hostile action is completed.","conditions":["invisible"],"tags":["illusion","utility"],"heightened":[{"label":"4th","text":"The spell lasts 1 minute, but it doesn't end if the target uses a hostile action."}],"sustained":false},{"id":"2308","name":"Kgalaserke's Axes","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2308","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action to Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Auditory","Concentrate","Linguistic","Manipulate","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"RA +1 status bonus to attack for 1 creature for a minute as a single action spell. Compare it to Bless. Very action efficient, especially if your party doesn’t have another source of status bonuses. Also a two action version for some extra damage too.","desc":"The folklore and tales surrounding the legendary hero Kgalaserke are so widespread and well known that a hundred lifetimes would not be enough to have accomplished everything she is reputed to have done.","effect":"The folklore and tales surrounding the legendary hero Kgalaserke are so widespread and well known that a hundred lifetimes would not be enough to have accomplished everything she is reputed to have done. Nevertheless, the stories all contain a unifying theme of her martial prowess despite the odds being stacked against her. Single Action You briefly describe Kgalaserke’s signature axes and how she came to receive them. The target gains a +1 status bonus to attack rolls for the spell’s duration. Two Actions You revel in a tale of Kgalaserke striking down a foe after a struggle. For the spell’s duration, when the target is damaged by a creature’s attack, the target gains a +2 circumstance bonus to damage against that target for 1 round. ---","conditions":[],"tags":["buff","concentrate"],"heightened":[],"sustained":false},{"id":"1583","name":"Laughing Fit","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1583","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Emotion","Manipulate","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"this is good action denial. Slowed if they fail. Unlike Slow this is a Will save. If your enemy is using a reaction effectively then this is a reliable way to stop it. Best against brutes with Reactive Strike or other good reactions. Used to be called Hideous Laughter.","desc":"Laughter impedes a creature's actions.","effect":"The target is overtaken with uncontrollable laughter. It must attempt a Will save. Critical Success The target is unaffected. Success The target is plagued with uncontrollable laughter. It can't use reactions. Failure The target is slowed 1 and can't use reactions. Critical Failure The target falls prone and can't use actions or reactions for 1 round. It then takes the effects of a failure. ---","conditions":["prone","slowed"],"tags":["concentrate","control","emotion","mental"],"heightened":[],"sustained":true},{"id":"1606","name":"Mist","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1606","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC the new name for Obscuring Mist","desc":"Conceal creatures with a cloud of mist.","effect":"You call forth a cloud of mist. All creatures within the mist become concealed, and all creatures outside the mist become concealed to creatures within it. You can Dismiss the cloud. ---","conditions":["concealed"],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"210","name":"Obscuring Mist","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=210","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"now called Mist very useful especially if you multiclass into Druid for storm born. Gives a DC 5 flat check or they just can’t target you and lose their action while in the mist. But also it gives the option to hide, and sneak. Check with your GM on how he will play it for creatures on opposite sides of it but aren’t in the mist what happens? He will probably just treat it as concealment - same as if someone was in the mist. If he lets people be targeted normally even when their only line of sight is through the mist, then don’t take this spell and get ready for some odd rulings. Make sure your martials take blindsight so they can avoid the penalty.","desc":"Conceal creatures in a cloud of mist.","effect":"You call forth a cloud of mist. All creatures within the mist become concealed, and all creatures outside the mist become concealed to creatures within it. You can Dismiss the cloud. ---","conditions":["concealed"],"tags":[],"heightened":[],"sustained":false},{"id":"1911","name":"Osseous Cage","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1911","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"Reflex","traits":["Negative","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"WTD4 drop a bone cage on someone to screw up their day and stop movement. Unlike mist wall type effect this offers a reflex save. It works as lesser cover as well.","desc":"You conjure a prison made of bone.","effect":"You conjure a prison made of bone. Creatures in the space where you create the cage can attempt a Reflex save; if they fail or dont attempt the save, they're trapped within it. The spell automatically fails if the space contains a creature larger than the spell's area. A creature inside the cage is immobilized until it Escapes, uses an effect that can pass through solid objects, or destroys the cage. The cage has AC 10, Hardness 5, and 10 Hit Points, and it's immune to critical hits and precisions damage. The osseus cage provides lesser cover from attacks that pass through the cage, either from the outside to the inside, or vice versa","conditions":["immobilized"],"tags":["control","summon"],"heightened":[{"label":"+2","text":"The spell's area grows by 5 feet on aside and it's Hit Points increase by 20."}],"sustained":true},{"id":"992","name":"Scorching Ray","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=992","rarity":"Common","actions":"1","actionsRaw":"Single Action to Three Actions","range":"60 feet","target":"1 or more creatures","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Evocation","Fire"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SOM reasonably good fire damage against multiple targets. Renamed to Blazing Bolt. The nice part about this is it is multitarget but not area of effect. So it can be cast after the enemy has closed with the party. You will almost always prefer to use the 3 action variant.","desc":"Fire one to three rays of heat and flame at different foes.","effect":"You fire a ray of heat and flame. Make a spell attack roll against a single creature. On a hit, the target takes 2d6 fire damage, and on a critical hit, the target takes double damage. For each additional action you use when Casting the Spell, you can fire an additional ray at a different target, to a maximum of three rays targeting three different targets for 3 actions. These attacks each increase your multiple attack penalty, but you don't increase your multiple attack penalty until after you make all the spell attack rolls for scorching ray . If you spend 2 or more actions Casting the Spell, the damage increases to 4d6 fire damage on a hit, and it still deals double damage on a critical hit.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage to each target increases by 1d6 for the 1-action version, or by 2d6 for the 2-action and 3-action versions."}],"sustained":false},{"id":"1410","name":"Splinter Volley","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1410","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 or 2 creatures","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Concentrate","Manipulate","Wood"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE very much like Scorching Ray but with wood.","desc":"Fling sharp splinters at one or more enemies.","effect":"You launch a volley of splinters at your foes. Make a spell attack roll against a single creature. On a hit, the splinters deal 4d6 piercing damage. The splinters deal double damage on a critical hit and 1 persistent bleed damage. You can spend a third action while casting this spell to fire splinters at two different targets instead of one. These attacks each increase your multiple attack penalty, but you don't increase your multiple attack penalty until after you make both spell attack rolls for splinter volley .","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"Increase the damage dealt to each target by 4d6 and the persistent bleed damage by 1."}],"sustained":false},{"id":"639","name":"Sudden Bolt","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=639","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature or object","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Electricity","Evocation","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"P151 single target lightning bolt. 4d12 damage which scales up. Very nice. Very good damage.","desc":"You call down a small bolt of lightning on the target","effect":"You call down a small bolt of lightning on the target, dealing 4d12 electricity damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d12."}],"sustained":false},{"id":"1343","name":"Tremorsense","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1343","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a useful special sense. Imprecise. Lasts 8 hours at 5th level.","desc":"Sense vibrations in the ground.","effect":"You become aware of vibrations in the ground around you. You gain tremorsense as an imprecise sense with a range of 30 feet. As normal for tremorsense, you can detect a creature only if it's on the same surface as you and only if the subject is moving along (or burrowing through) the surface.","conditions":[],"tags":["concentrate","utility"],"heightened":[{"label":"3rd","text":"The spell's duration is 1 hour."},{"label":"5th","text":"The spell's duration is 8 hours."}],"sustained":false},{"id":"2486","name":"Warping Pull","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2486","rarity":"Uncommon","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"1 willing creature that would take damage from the triggering effect","duration":"","school":"","traditions":"Arcane","save":"","traits":["Concentrate","Manipulate","Teleportation","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SK a reaction that triggers when an ally is damaged - so very often. It grants some resistance and teleports them closer to you. This is going to be useful when you can afford to spend slots on this. The real power of this is in wasting enemy actions: the enemy strides, strikes and hits, then you pull his target away - what is your enemy now going to do with his third action? It might be useless …","desc":"You get an ally out of danger with a teleporting pull.","effect":"You get an ally out of danger with a teleporting pull. You teleport the target to an unoccupied square up to 10 feet closer to you. The target gains resistance 5 to all damage against the triggering effect.","conditions":[],"tags":["concentrate","defense","teleportation","utility"],"heightened":[{"label":"+2","text":"The resistance increases by 5."}],"sustained":false},{"id":"1030","name":"Warrior's Regret","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1030","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Emotion","Enchantment","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"A curse designed to hurt an enemy if they keep attacking. It is about damaging not attacking so it works very well against arcane blasters as well. A bit slow to have an effect. But it has its effect even if they make a normal saving throw. If you are playing a character that wants to talk to their enemies then this spell will likely deescalate some conflicts.","desc":"Regrets overcome a foe when they harm others.","effect":"Regret eats away at the target's mind, punishing it for its violence until it ceases its hostility. The target must attempt a Will save. Critical Success The target is unaffected. Success At the end of its next turn, the target takes 1d8 damage per different creature it intentionally damaged on that turn (1d8 if it damaged one creature, 2d8 if it damaged two different creatures, and so on). The maximum is 4d8 if it damaged 4 different creatures. Failure As success, except the curse damages the target at the end of each of its turns and lasts until the target spends a complete round without intentionally damaging another creature. Critical Failure As success, except the curse damages the target at the end of each of its turns and lasts until the target spends 24 hours atoning for its perceived sins.","conditions":[],"tags":["damage","emotion","mental"],"heightened":[{"label":"+2","text":"The amount of mental damage the target takes for each creature it damaged that turn increases by 1d8, and the maximum damage the target can take per turn increases by 4d8."}],"sustained":false},{"id":"2","name":"Acid Arrow","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Acid","Attack","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"now replaced with Acid Grip. This spell has its advocates. It is reasonable direct damage and not something commonly resisted. A bit slow to kill them.","desc":"Magical arrow deals acid damage persistently.","effect":"You conjure an arrow of acid that continues corroding the target after it hits. Make a spell attack against the target. On a hit, you deal 3d8 acid damage plus 1d6 persistent acid damage. On a critical hit, double the initial damage, but not the persistent damage.","conditions":["persistent damage"],"tags":["damage","summon"],"heightened":[{"label":"+2","text":"The initial damage increases by 2d8, and the persistent acid damage increases by 1d6."}],"sustained":false},{"id":"668","name":"Animated Assault","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=668","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"basic Reflex","traits":["Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG sustainable bludgeoning damage in an area. Occult doesn’t have that much area of effect physical damage so this may be important to you.","desc":"Temporarily animate small objects to attack creatures in an area.","effect":"You use your mind to manipulate unattended objects in the area, temporarily animating them to attack. The objects hover in the air, then hurl themselves at nearby creatures in a chaotic flurry of debris. This assault deals 2d10 bludgeoning damage (basic Reflex save) to each creature in the area. On subsequent rounds, the first time each round you Sustain this Spell, it deals 1d10 bludgeoning damage (basic Reflex save) to each creature in the area.","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"The initial damage increases by 2d10 and the subsequent damage increases by 1d10."}],"sustained":true},{"id":"1431","name":"Binding Muzzle","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1431","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"100 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Evocation","Force","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"P195 stops speaking and biting, including a nice flat check to stop spells. Useful against certain monsters.","desc":"A shimmering muzzle of pure magical force clamps the target's mouth shut.","effect":"A shimmering muzzle of pure magical force clamps the target's mouth shut. The target can attempt a Fortitude save to resist the muzzle. For targets with more than one mouth, the caster must target a single mouth. Critical Success The target is unaffected. Success For 1 round, the target can't use jaws Strikes, Breath Weapons, or any other attack that originates from the mouth, nor can they imbibe anything, including potions, mutagens, and elixirs. Failure As success, but the effect lasts 1 minute, and they must succeed at a DC 11 flat check to Cast a Spell with verbal components. Critical Failure As success, but the effect lasts 1 minute and the target can't speak.","conditions":[],"tags":[],"heightened":[{"label":"5th","text":"You can target up to 5 creatures."}],"sustained":false},{"id":"1348","name":"Blazing Armory","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1348","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a flaming weapon, for everyone from level 4. If your GM is stingy with treasure, or likes to disarm or destroy weapons, or just if you know there are fire vulnerable creatures out there. It has got a few uses, but mostly you won’t need it.","desc":"Create a weapon made of fire.","effect":"As long as you have magic, you're never unarmed. You materialize a flaming simulacrum of any common simple or martial weapon into the target's grasp. The target must have a free hand to hold the weapon, or else the weapon falls to the ground in the target's space. The blazing weapon functions as a +1 striking weapon, and its damage type changes to fire. The damage type can't be changed using the versatile trait, modular trait, or similar methods. A thrown weapon rematerializes in the target's hand after the Strike is complete. If you choose a ranged weapon that uses ammunition, the wielder must still reload the weapon using the normal number of actions, though this generates ammunition automatically; this functions as normal ammunition, and the blazing weapon can't use other types of ammunition. Any creature other than you or the target that attempts to touch, make a Strike with, or Disarm the weapon takes 1d6 fire damage each time.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"4th","text":"You can target up to 5 willing creatures and can choose a different weapon for each target. The weapons function as +1 striking flaming weapons."},{"label":"6th","text":"As 4th, but the weapons function as +2 greater striking flaming weapons."},{"label":"8th","text":"As 4th, but the weapons function as +3 greater striking greater flaming weapons."},{"label":"10th","text":"As 4th, but the weapons function as +3 superior striking greater flaming weapons."}],"sustained":false},{"id":"28","name":"Blur","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=28","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"reasonable defence, gives a DC 5 flat check to target - you need some defensive options.","desc":"Cause a target's form to become blurry and hard to hit.","effect":"The target's form appears blurry. It becomes concealed. As the nature of this effect still leaves the target's location obvious, the target can't use this concealment to Hide or Sneak. ---","conditions":["concealed"],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"1097","name":"Bone Spray","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1097","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Primal","save":"basic Reflex","traits":["Necromancy","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P176 a nice necromantic damaging cone","desc":"You fire a torrent of jagged bone shards from your hands.","effect":"You fire a torrent of jagged bone shards from your hands, dealing 2d10 piercing damage and 1 persistent bleed damage to all creatures in the area.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The piercing damage increases by 1d10 and the persistent bleed damage increases by 1."}],"sustained":false},{"id":"1098","name":"Boneshaker","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1098","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions or Three Actions","range":"100 feet","target":"1 creature with a skeleton","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Primal","save":"Fortitude","traits":["Necromancy","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P176 a nice necromantic single target damage, with some forced movement.","desc":"You reach out a hand and seize a creature's skeleton from afar, harming their body and potentially wrenching them by the bones to move them against their will.","effect":"You reach out a hand and seize a creature's skeleton from afar, harming their body and potentially wrenching them by the bones to move them against their will. The number of actions you spend when Casting this Spell determines the spell's effects. Regardless of the number of actions spent to Cast this Spell, the target must attempt a Fortitude save. Two Actions (somatic, verbal) You clench your fist, painfully compressing the target's bones and dealing 3d8 bludgeoning damage. Three Actions (material, somatic, verbal) As the 2-action version, plus you pull the target's body by their bones, moving them around like an awkward marionette. This movement follows the rules for forced movement. Critical Success The target is unaffected. Success The target takes half damage. If you cast the 3-action version, you can move the target up to 5 feet; it can choose to fall prone to avoid moving. Failure The target takes full damage and is enfeebled 1. If you cast the 3-action version, you can move the target up to 15 feet; it can fall prone to avoid moving. Critical Failure The target takes double damage and is enfeebled 2. If you cast the 3-action version, you can move the target up to 25 feet, then knock the target prone; if you attempt to move the target to a hazardous location, such as into a pool of acid or off a cliff, it can fall prone to avoid moving.","conditions":["enfeebled","prone"],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The damage increases by 3d8."}],"sustained":false},{"id":"1382","name":"Brine Dragon Bile","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1382","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"the creature that took damage","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Acid","Concentrate","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a ranged reaction attack that you can trigger off certain allied attacks. It is useful extra damage in a tight fight. But the damage is low and all persistent so it is slow acting.","desc":"React to spit saltwater into a cut.","effect":"You spit a glob of caustic saltwater that stings the wounds of the creature. Make a ranged spell attack against the triggering creature's AC. On a hit, salt scours its open wound, dealing 2d6 persistent acid damage.","conditions":["persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The persistent damage increases by 2d6."}],"sustained":false},{"id":"2315","name":"Buzzing Servants","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2315","rarity":"Rare","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"one unoccupied 5-foot square","duration":"","school":"","traditions":"Arcane, Primal, Divine","save":"","traits":["Concentrate","Manipulate","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA fill a square with a pillar of bee wax. Useful to create defensive terrain. The Pillars last for 24 hours . You can sustain the bees for up to a minute to build up to 10 pillars.","desc":"You summon a swarm of bees from the city of Axis that rapidly constructs geometric shapes from wax.","effect":"You summon a swarm of bees from the city of Axis that rapidly constructs geometric shapes from wax. The bees appear in an unoccupied square, building a structure of hexagons, squares, and decagons that fill the space. The wax shape has a Hardness of 10 and 40 Hit Points but also decays over 24 hours. When you Sustain the spell, you can choose another unoccupied square in range that the bees move to and fill with wax shapes. Any amount of area or splash damage to the square they’re present in kills the bees, ending further construction. ---","conditions":[],"tags":["concentrate","summon"],"heightened":[],"sustained":true},{"id":"677","name":"Charitable Urge","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=677","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Enchantment","Incapacitation","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG save or give away your items. A good way to waste their actions. Incapacitation","desc":"Make a creature give away an object in its possession.","effect":"You speak on the virtue of charity, compelling the target to give away its possessions. The target must attempt a Will save. If the target has no items on its person, the spell fails. Critical Success The target is unaffected. Success The target is stunned 1 as it wrestles with the urge. Failure On its next turn, before it does anything else, the target must present the nearest creature with an item in its possession; the target chooses which item to give, and if the only item it has is one that it's currently using to defend itself, such as a weapon during a combat encounter, it can choose to be stunned for 1 round instead of giving up the item. This might require the target to Interact to retrieve an item or move to reach the nearest creature, and handing the item to the target always requires an Interact action. Critical Failure As failure, except the duration is 4 rounds, and the target must repeat the effects of failure on each of its turns. At the end of each of its turns, the target can attempt a new Will save to reduce the remaining duration by 1 round, ending it entirely on a critical success. ---","conditions":["stunned"],"tags":["incapacitation","mental"],"heightened":[],"sustained":false},{"id":"46","name":"Comprehend Language","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=46","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"hour long. No denying its utility. But it depends on your campaign. Now called Translate.","desc":"A creature understands one language.","effect":"The target can understand the meaning of a single language it is hearing or reading when you cast the spell. This doesn't let it understand codes, language couched in metaphor, and the like (subject to GM discretion). If the target can hear multiple languages and knows that, it can choose which language to understand; otherwise, choose one of the languages randomly.","conditions":[],"tags":["utility"],"heightened":[{"label":"3rd","text":"The target can also speak the language."},{"label":"4th","text":"You can target up to 10 creatures, and targets can also speak the language."}],"sustained":false},{"id":"59","name":"Darkness","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=59","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Darkness","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"very effective against many enemies. Do you have dark vision?","desc":"Suppress all light in an area.","effect":"You create a shroud of darkness that prevents light from penetrating or emanating within the area. Light does not enter the area and any non-magical light sources, such as a torch or lantern, do not emanate any light while inside the area, even if their light radius would extend beyond the darkness. This also suppresses magical light of your darkness spell's level or lower. Light can't pass through, so creatures in the area can't see outside. From outside, it appears as a globe of pure darkness.","conditions":["concealed"],"tags":["utility"],"heightened":[{"label":"4th","text":"Even creatures with darkvision (but not greater darkvision) can barely see through the darkness. They treat targets seen through the darkness as concealed."}],"sustained":false},{"id":"60","name":"Darkvision","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=60","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"yes you do. But is this a good use of your spells.","desc":"See in the dark.","effect":"You grant yourself supernatural sight in areas of darkness. You gain darkvision.","conditions":[],"tags":["utility"],"heightened":[{"label":"3rd","text":"The spell's range is touch and it targets 1 willing creature."},{"label":"5th","text":"The spell's range is touch and it targets 1 willing creature. The duration is until the next time you make your daily preparations."}],"sustained":false},{"id":"102","name":"Enlarge","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=102","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"Heightened ★★★★ +2 to damage, reach, but -1 to AC. Doesn’t stack with other polymorph effects. Heightens for more damage and at level 6 more targets.","desc":"A creature grows in size.","effect":"Bolstered by magical power, the target grows to size Large. Its equipment grows with it but returns to natural size if removed. The creature is clumsy 1. Its reach increases by 5 feet (or by 10 feet if it started out Tiny), and it gains a +2 status bonus to melee damage. This spell has no effect on a Large or larger creature.","conditions":["clumsy"],"tags":["buff"],"heightened":[{"label":"4th","text":"The creature instead grows to size Huge. The status bonus to melee damage is +4 and the creature's reach increases by 10 feet (or 15 feet if the creature started out Tiny). The spell has no effect on a Huge or larger creature."},{"label":"6th","text":"Choose either the 2nd-level or 4th-level version of this spell and apply its effects to 10 willing creatures."}],"sustained":false},{"id":"1515","name":"Entangling Flora","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1515","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC This was called Entangle. Now available in arcane? Nice area of effect but it will likely only cost two actions unless they critically fail. Can be used very successfully on large groups, and the difficult terrain combines well with Tanglefoot.","desc":"Sprout plants to hinder movement in an area.","effect":"Plants and fungi burst out or quickly grow, entangling creatures. All surfaces in the area are difficult terrain. Each round that a creature starts its turn in the area, it must attempt a Reflex save. On a failure, it takes a –10-foot circumstance penalty to its Speeds until it leaves the area, and on a critical failure, it's also immobilized for 1 round. Creatures can attempt to Escape to remove these effects. ---","conditions":["immobilized"],"tags":["concentrate","control","debuff"],"heightened":[],"sustained":false},{"id":"907","name":"Extract Poison","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=907","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 poison on or in an object","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM you can get quite a strong poison onto a weapon. Which will give you a lot of bonus damage for an attack. Might be OK but there is still a counteract check and you have to hit. If you were going to attack anyway, it is a good boost. Or just to neutralise a poisoned object. I see this as working best for a multiclassed martial rather than a pure caster.","desc":"Draw out poison from an object and make your next attack poisonous.","effect":"With the lightest touch, you can siphon the poison from an object and save it for your own later use, making an assassin's blade or politician's wine less deadly while you become all the more so. Attempt a counteract check against one poison you're aware of on or in an object you touch. If you successfully counteract the poison, you negate the object's toxicity and transfer the poison into a weapon you are holding, coating the weapon with a simple but powerful poison. On your next successful attack with that weapon before the end of your next turn, you add 1d6 poison damage per level of the poison you counteracted. On a critically failed attack roll, you lose the extracted poison from your weapon as normal. ---","conditions":[],"tags":["damage"],"heightened":[],"sustained":false},{"id":"108","name":"False Life","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=108","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Occult","save":"","traits":["Necromancy"],"rating":"🟢🟢🟢","rval":3,"gortle":"a few extra hitpoints for 8 hours, not super strong but it is a long term buff. Renamed in the remaster to False Vitality","desc":"Gain temporary HP.","effect":"You create a reservoir of vitality from necromantic energy, gaining 10 temporary Hit Points.","conditions":[],"tags":["defense"],"heightened":[{"label":"+1","text":"The temporary Hit Points increase by 3."}],"sustained":false},{"id":"1523","name":"False Vitality","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1523","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"a few extra hitpoints for 8 hours, not super strong but it is a long term buff. A name change for False Life","desc":"Gain temporary Hit Points.","effect":"You augment your flesh with the energies typically used to manipulate the undead. You gain 10 temporary Hit Points.","conditions":[],"tags":["concentrate","defense"],"heightened":[{"label":"+1","text":"The temporary Hit Points increase by 3."}],"sustained":false},{"id":"1080","name":"Fear the Sun","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1080","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal","save":"Fortitude","traits":["Transmutation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P172 dazzles or blind an opponent. Still affects them for one round if they make the spell.","desc":"You cause the creature's vision to become particularly sensitive.","effect":"You cause the creature's vision to become particularly sensitive. The creature must attempt a Fortitude save. The creature is then temporarily immune for 1 minute. Critical Success The creature is unaffected. Success The creature is dazzled for 1 round. Failure The creature is dazzled for 1 minute. Critical Failure The creature gains light blindness for 1 minute. If the creature is already exposed to bright light, it immediately becomes blinded, as it isn't acclimated to its newly acquired light blindness.","conditions":["blinded","dazzled"],"tags":[],"heightened":[{"label":"6th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"689","name":"Final Sacrifice","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=689","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature with the  minion  trait that you summoned or permanently control","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal","save":"basic Reflex","traits":["Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG detonate your summoned creature in a reasonable sized fireball. It says minion, but doing this to your familiar or animal companion is probably not your plan A. Sadly illusionary creatures aren’t solid enough to work with this. Works on an Unseen Servant. Eidolons are not minions, but um er a Witch’s Familiar gets replaced free every day… With the removal of alignment this is no longer Evil but rather a noble sacrifice for the greater good.","desc":"Channel energy to blow up your minion.","effect":"You channel disruptive energies through the bond between you and your minion, causing it to violently explode. The target is immediately slain, and the explosion deals 6d6 fire damage to creatures within 20 feet of it (basic Reflex save). If the target has the cold or water trait, the spell instead deals cold damage and gains the cold trait in place of the fire trait. If used on a creature that isn't mindless, this spell has the evil trait. Attempting to cast this spell targeting a creature that you temporarily seized control of, such as an undead commanded by command undead, automatically fails and breaks the controlling effect.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"912","name":"Flame Wisp","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=912","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM for the caster who likes to melee. Note that Burn it helps but not Dangerous Sorcery. A nice amount of bonus damage if you get time to prepare. The action economy is nice once you get going but I’m not sure there is enough damage here.","desc":"Fire wisps damage those you strike, and more grow if you cast fire spells.","effect":"Three faintly glowing wisps of fire float around your head. Each time you hit a creature with a Strike, one of the wisps goes hurtling towards that creature, dealing 1d4 fire damage. If you Cast a Spell with the fire trait while you have fewer than three wisps, a new wisp appears.","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"The damage increases by 1d4."}],"sustained":false},{"id":"1541","name":"Gecko Grip","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1541","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"a useful buff early to mid levels. It is really nice to be able to walk on the ceiling. The old name of this spell was Spider Climb","desc":"Give a creature a climb Speed.","effect":"Tiny clinging hairs sprout across the creature's hands and feet, offering purchase on nearly any surface. The target gains a climb Speed equal to its Speed.","conditions":[],"tags":["concentrate","utility"],"heightened":[{"label":"5th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"136","name":"Glitterdust","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=136","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"a counter for invisibility. Side effects aren’t as good as they used to be. It works even on a normal successful save. But the area of effect is small. Replaced by Revealing Light","desc":"Sparkling dust breaks invisibility and impedes vision.","effect":"Creatures in the area are outlined by glittering dust. Each creature must attempt a Reflex save. If a creature has its invisibility negated by this spell, it is concealed instead of invisible. This applies both if the creature was already invisible and if it benefits from new invisibility effects before the end of the invisibility negation effect from this spell. Critical Success The target is unaffected. Success The target's invisibility is negated for 2 rounds. Failure The target is dazzled for 1 minute and its invisibility is negated for 1 minute. Critical Failure The target is blinded for 1 round and dazzled for 10 minutes. Its invisibility is negated for 10 minutes. ---","conditions":["blinded","concealed","dazzled","invisible"],"tags":["utility"],"heightened":[],"sustained":false},{"id":"694","name":"Heat Metal","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=694","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 metal item or metal creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG useful against enemies with metal armour or weapons. Can be hilarious with Lock Item.","desc":"Make metal red hot.","effect":"This spell heats the targeted metal to become red-hot for a moment. This is usually harmless to an unattended metal item, which doesn't get a saving throw, though the GM might rule that flammable materials connected to the object catch fire or melt. If you target an item worn or carried by a creature, or you target a creature made primarily of metal, the heat deals 4d6 fire damage and 2d4 persistent fire damage to the creature, which must attempt a Reflex saving throw. If you target an item held by the creature, the creature can Release the item to improve their degree of success by one step from the result of their saving throw. The persistent damage is associated with the object and damages whichever creature is holding or wearing it. It has no effect if no one is holding the item, but you continue to attempt flat checks to end the persistent damage as normal, since the item remains hot and can sear someone who picks it up. Critical Success The creature is unaffected. Success The creature takes half damage and the object deals no persistent fire damage. Failure The creature takes full damage and the object deals full persistent damage. Critical Failure As failure, but the creature takes double damage and the object deals double persistent damage.","conditions":["persistent damage"],"tags":["damage"],"heightened":[{"label":"+1","text":"The initial damage increases by 2d6 and the persistent damage increases by 1d4."}],"sustained":false},{"id":"150","name":"Hideous Laughter","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=150","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"this is good action denial. Slowed if they fail. Unlike Slow this is a Will save. If your enemy is using a reaction effectively then this is a reliable way to stop it. Best against brutes with Reactive Strike or other good reactions. New name is Laughing Fit.","desc":"Fits of laughter make a creature unable to take all its actions.","effect":"The target is overtaken with uncontrollable laughter. It must attempt a Will save. Critical Success The target is unaffected. Success The target is plagued with uncontrollable laugher. It can't use reactions. Failure The target is slowed 1 and can't use reactions. Critical Failure The target falls prone and can't use actions or reactions for 1 round. It then suffers the failure effects. ---","conditions":["prone","slowed"],"tags":["control","emotion","mental"],"heightened":[],"sustained":true},{"id":"928","name":"Ignite Fireworks","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=928","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Evocation","Fire","Sonic"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM dazzles creatures in a 10 foot burst. Which may get a reasonable group. Light damage, but a good way to dazzle a group of enemies","desc":"Throw exploding fireworks.","effect":"A brilliant and clamorous display of sparks and colorful fireworks explode around your enemies, dealing 1d8 fire damage and 1d8 sonic damage to creatures within a 10-foot burst. All creatures in the area must attempt a Reflex save. Critical Success The creature is unaffected. Success The creature takes half damage and is dazzled for 1 round. Failure The creature takes full damage and is dazzled for 3 rounds. Critical Failure The creature takes double damage, takes 1d4 persistent fire damage, and is dazzled for 1 minute.","conditions":["dazzled"],"tags":["damage"],"heightened":[{"label":"+2","text":"The initial fire damage increases by 1d8, the sonic damage increases by 1d8, and the persistent fire damage a creature takes on a critical failure increases by 1d4."}],"sustained":false},{"id":"1287","name":"Illusory Shroud","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1287","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Uncommon","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB provide concealment to enable a rogue to hide in plain sight.","desc":"You shroud the target in subtle illusions that make it difficult to detect.","effect":"You shroud the target in subtle illusions that make it difficult to detect. The target gains a +1 status bonus to Stealth checks to Hide or Sneak. For the duration, the target can become hidden to a creature even if they don't have cover and aren't otherwise concealed from that creature. Even if the target isn't concealed or doesn't have cover or greater cover at the end of a Sneak action, the target isn't automatically observed. ---","conditions":["concealed"],"tags":["buff","illusion","utility"],"heightened":[],"sustained":false},{"id":"856","name":"Impeccable Flow","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=856","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine","save":"","traits":["Divination","Lawful","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM a scalable status bonus to Perception checks, saving throws, and skill checks for a minute, but just for you. You should have some good skills to use. This can help a fair bit. A good precombat preparation. But don’t lose your flow.","desc":"You attune yourself to an underlying cosmic order to the world.","effect":"You attune yourself to an underlying cosmic order to the world. While you remain in tune with this power, you gain a +1 status bonus to Perception checks, saving throws, and skill checks. If you critically fail any check while under the effects of this spell, the bonus ends and you instead have a –1 status penalty to all checks for the remaining duration.","conditions":[],"tags":["buff","debuff"],"heightened":[{"label":"5th","text":"The status bonus increases to +2."},{"label":"8th","text":"The status bonus increases to +3."}],"sustained":false},{"id":"935","name":"Instant Armor","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=935","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Conjuration","Contingency","Extradimensional","Metal"],"rating":"🟢🟢🟢","rval":3,"gortle":"a nice utility spell if combat breaks out at the grand ball, or just so you can get a good night's sleep and be ready at a moment's notice. Yes, Sorcerers can easily get significant armour. But this is probably for a multiclass Sorcerer.","desc":"Set a contingency to return your armor to you.","effect":"Upon casting this spell, the armor you're wearing is whisked away into an extradimensional space that's linked to you. If the armor is magical and invested by you, it remains invested while in this space, though you don't gain its benefits. You then gain the Armor Up! action; once you use the action, the spell ends. If the action hasn't been used by the time the spell's duration ends, the extradimensional space collapses, ejecting the armor's pieces on the ground under you. Armor Up! Single Action (manipulate) Effect You snap your fingers. The armor returns to your body. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"945","name":"Magnetic Repulsion","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=945","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration","Metal"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM this is a good defensive buff against enemies who use metal weapons and armour - which is a lot. Don't forget almost every arrow or bolt is metal tipped. Worth heightening. Nice spell to precast if you are using a Battle Form. eg Dragon Form","desc":"Push metal away, defending against metal weapons and armored foes.","effect":"You adjust your magnetic polarity, causing metal objects to jump and shudder away from you. Attacks made with metal objects against you take a –1 status penalty, and the squares adjacent to you are difficult terrain for creatures wearing metal armor. For creatures made entirely of metal, the penalty to their attack rolls is –2 and the squares adjacent to you are greater difficult terrain. While this spell is active, you require an additional Interact action before using a metal object (including to Strike with a metal weapon), and if you're wearing metal armor, you're slowed 1.","conditions":["slowed"],"tags":["control","debuff"],"heightened":[{"label":"+3","text":"The status penalty to attack rolls increases by 1."}],"sustained":false},{"id":"859","name":"Mind Games","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=859","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Mental","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"a contest of will single target stunning spell. Sustain for additional effects. Still useful at a high level. Probably only use it if you know their will defences are poor. You can sustain it to retry if the target is unaffected.","desc":"You lock minds with the target, trying to mentally subdue them.","effect":"You lock minds with the target, trying to mentally subdue them. The target must attempt a Will save. Each time you Sustain this Spell, the target attempts another Will save. Critical Success You are stunned 1 and the spell ends. Success The target is unaffected. Failure The target is stunned 1. Critical Failure The target is stunned 2. ---","conditions":["stunned"],"tags":["mental"],"heightened":[],"sustained":true},{"id":"197","name":"Mirror Image","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=197","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"a defensive spell but it doesn’t last very long as duplicates are taken out by a miss.","desc":"Illusory duplicates of you cause attacks to miss.","effect":"Three illusory images of you swirl about your space, potentially causing those who attack you to hit one of the images instead of you. Any attack that would hit you has a random chance of hitting one of your images instead of you. If all three images remain, there is a 1 in 4 chance of hitting you (1 on 1d4). With two images remaining, there is a 1 in 3 chance of hitting you (1–2 on 1d6). With only one image, the chances are 1 in 2 (1–3 on 1d6). Once an image is hit, it is destroyed. If an attack roll fails to hit your AC but doesn't critically fail, it destroys an image but has no additional effect (even if the attack would normally have an effect on a failure). If an attack roll is a critical success and would hit one of the images, one of the images is destroyed and the attack roll becomes a success against you. Once all the images are destroyed, the spell ends. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"1617","name":"Oaken Resilience","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1617","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC useful physical damage resistance with a moderate duration. Be careful about the fire weakness. Originally called Barkskin and only available to primal but it is arcane as well now.","desc":"Confer a tree's resilience and flammability.","effect":"The target's skin becomes tough, with a consistency like bark or wood. The target gains resistance 2 to bludgeoning and piercing damage and weakness 3 to fire. After the target takes fire damage, it can Dismiss the spell as a free action triggered by taking the damage; doing so doesn't reduce the fire damage the target was dealt.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+2","text":"The resistances increase by 2, and the weakness increases by 3."}],"sustained":false},{"id":"1338","name":"Pave Ground","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1338","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE create a path.","desc":"Even out the ground in a line.","effect":"You even out the ground and push aside low obstacles. Non-magical difficult terrain or greater difficult terrain composed of earth, rubble, sand, and the like in the area becomes normal terrain. You can attempt a counteract check against magical difficult terrain and greater difficult terrain composed of earthen materials in the area, too, making it normal terrain for the duration if you succeed. The ground doesn't change quickly enough to cause anyone to lose footing, and it doesn't clear concealing features enough to make them non-concealing. At the GM's discretion, if you use this spell on “ground” that has no underlying surface to flatten and clear, such as ice on the surface of a lake, the spell fails.","conditions":[],"tags":["concentrate","control"],"heightened":[{"label":"4th","text":"The area increases to a 120-foot line along the ground."},{"label":"6th","text":"The area increases to a 500-foot line along the ground."}],"sustained":true},{"id":"968","name":"Phantom Crowd","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=968","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"I’m not really a fan of a spell that can only do one very specific thing. I mean Illusory Creature can do this, just you only get one of them. But if you are in a city then I can see that this is useful for bluffing your opponents, or encouraging them to back off. How a GM will play this is a bit unknown.","desc":"Create an illusory crowd that loudly agrees with you.","effect":"A tightly packed crowd of humanoids appropriate to the area appear, facing you and agreeing loudly with anything you say. A creature that touches a member of the crowd or makes a Seek action to examine the crowd can attempt to disbelieve your illusion. The crowd is difficult terrain for anyone who hasn't disbelieved the illusion. When you spend 1 or more actions to cast a composition spell or to perform an activity that includes a Performance check, you can also Sustain this Spell as part of that action.","conditions":[],"tags":["control","illusion"],"heightened":[{"label":"+1","text":"The crowd occupies an additional 10-foot square in range. The additional square doesn't need to be adjacent to any other square created by the spell. It can overlap, but there's no additional effect in the overlapped squares."}],"sustained":true},{"id":"1319","name":"Propulsive Breeze","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1319","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"the triggering creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Manipulate","Move"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a reaction for +15 move to a stride or a jump. It is useful but slot expensive.","desc":"React to extend a Stride or Leap.","effect":"You create a current of wind at your ally's back, propelling their movement. When your ally's Stride or Leap ends, the current propels them an additional 15 feet in the same direction as the last 5 feet of their Stride or Leap. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2520","name":"Pyrefowl Rebuke","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2520","rarity":"Uncommon","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Fire","Manipulate","Move","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P216 a reaction that does a small amount of damage when you are struck and damaged that allows you to fly away. Useful to avoid a followup attack.","desc":"Fiery wings briefly envelop your arms, and with a swift wingbeat, you flutter away from your attacker in a shower of searing sparks.","effect":"Fiery wings briefly envelop your arms, and with a swift wingbeat, you flutter away from your attacker in a shower of searing sparks. You deal 1d6 fire damage to the triggering creature, with a basic Reflex save, and Fly up to 10 feet in a straight line directly away from it. If the creature critically fails its saving throw, your movement does not provoke reactions from it, and it's dazzled until the end of its next turn.","conditions":["dazzled"],"tags":["damage"],"heightened":[{"label":"+2","text":"The damage increases by 1d6, and the maximum distance you can Fly increases by 5 feet."}],"sustained":false},{"id":"256","name":"Resist Energy","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=256","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"flexible energy protection.","desc":"Protect a creature from one type of energy damage.","effect":"A shield of elemental energy protects a creature against one type of energy damage. Choose acid, cold, electricity, fire, or sonic damage. The target and its gear gain resistance 5 against the damage type you chose.","conditions":[],"tags":["defense"],"heightened":[{"label":"4th","text":"The resistance increases to 10, and you can target up to two creatures."},{"label":"7th","text":"The resistance increases to 15, and you can target up to five creatures."}],"sustained":false},{"id":"1653","name":"Revealing Light","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1653","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"Reflex","traits":["Concentrate","Light","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC A partial counter for invisibility with a reflex save. The original is Faerie Fire for which there was no save. Still affect the targets if they make their save for 2 rounds so it is not so bad. The problem with this is the small area of effect so it's hard to go fishing with this. You need to time it for when you know where they are. It combines well with Obscuring Mist especially if you aren’t storm born.","desc":"Dazzling light counters invisibility and concealment.","effect":"A wave of magical light washes over the area. You choose the appearance of the light, such as colorful, heatless flames or sparkling motes. A creature affected by revealing light is dazzled. If the creature was invisible, it becomes concealed instead. If the creature was already concealed for any other reason, it is no longer concealed. Critical Success The target is unaffected. Success The light affects the creature for 2 rounds. Failure The light affects the creature for 1 minute. Critical Failure The light affects the creature for 10 minutes. ---","conditions":["concealed","dazzled","invisible"],"tags":["concentrate","utility"],"heightened":[],"sustained":false},{"id":"632","name":"Rime Slick","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=632","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cold","Evocation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P151 burst cold damage, creates difficult terrain. Heightens for a lot more damage and a bigger area.","desc":"You call down a chill wind.","effect":"You call down a chill wind. When you Cast this Spell, you deal 2d4 cold damage to each creature in the area (basic Reflex save). If a creature in the area critically fails its Reflex save and was standing, it also falls prone. You also create a layer of ice on all surfaces in the area, which
