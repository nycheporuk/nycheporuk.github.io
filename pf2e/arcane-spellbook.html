eases by 2d6."}],"sustained":false},{"id":"2307","name":"Ibex's Harvest","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2307","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action to Three Actions","range":"varies","target":"1 or more creatures","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Will","traits":["Auditory","Concentrate","Linguistic","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA grants temporary hitpoints. Has a single action option which might make this a useful spell you can squeeze into a busy turn.","desc":"In the tale “Ibex’s Harvest,” Ibex turns from the path of a warrior to the path of a farmer, building up their community by working hard and sharing a bountiful harvest not just with their humanoid neighbors but also with their animal neighbors.","effect":"In the tale “Ibex’s Harvest,” Ibex turns from the path of a warrior to the path of a farmer, building up their community by working hard and sharing a bountiful harvest not just with their humanoid neighbors but also with their animal neighbors. Ibex initially focuses on distributing equally among the animals but learns that true equality requires knowing what each being needs. The number of actions you spend when Casting this Spell and telling the story determine its targets and effects. Single Action You give a brief description of Ibex’s first bounty. One willing target you can touch gains 10 temporary Hit Points that last 1 minute. Two Actions You tell the tale of how Ibex shared their harvest equally between Hippo and Ant. Two willing targets within 20 feet each gain 10 temporary Hit Points that last 1 minute. Three Actions You impart Ibex’s lesson about how to prevent others from taking advantage of generosity. All creatures within a 10-foot emanation are affected by the tale. Choose one creature in the emanation to take 2d8 mental damage (basic Will save), while each other creature in the emanation gains 5 temporary Hit Points that last 1 minute.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+1","text":"The temporary Hit Points increase by 3 and the mental damage for the 3-action version increases by 1d8."}],"sustained":false},{"id":"1575","name":"Insect Form","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1575","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Polymorph"],"rating":"🟢🟢🟢","rval":3,"gortle":"These forms are actually not as good in a simple fight as the animal forms. But what you get here are some forms with darkvision, and even Scorpion with tremorsense 60ft. Which is very good if your GM is plaguing you with invisible foes. More options with poison - if that suits your character. Caps at spell level of 5. In the remaster now available to arcane.","desc":"Turn into a dangerous giant insect.","effect":"You envision a simple bug and transform into a Medium animal battle form. When you Cast this Spell, choose a listed battle form. You can decide the specific type of animal (such as such as a ladybug or scarab for beetle), but this has no effect on the form's Size or statistics. While in this form, you gain the animal trait. You can Dismiss this spell. You gain the following statistics and abilities regardless of which battle form you choose: AC = 18 + your level. Ignore your armor's check penalty and Speed reduction. 10 temporary Hit Points. Low-light vision. One or more attacks specific to the battle form you choose, which are the only attacks you can Strike with. You're trained with them. Your attack modifier is +13, and your damage bonus is +2. These attacks are Strength based (for the purpose of the enfeebled condition). If your unarmed attack modifier is higher, you can use it instead. Athletics modifier of +13, unless your own is higher. You gain specific abilities based on the form you choose: - Beetle Speed 25 feet; Melee Single Action mandibles, Damage 2d10 bludgeoning. - Centipede Speed 25 feet, climb 25 feet; darkvision; Melee Single Action mandibles, Damage 1d8 piercing plus 1d4 persistent poison. - Mantis Speed 40 feet; imprecise scent 30 feet; Melee Single Action foreleg, Damage 2d8 piercing. - Scorpion Speed 40 feet; darkvision, imprecise tremorsense 60 feet; Melee Single Action stinger, Damage 1d8 piercing plus 1d4 persistent poison; Melee Single Action pincer (agile), Damage 1d6 bludgeoning. - Spider Speed 25 feet, climb 25 feet; darkvision; Melee Single Action fangs, Damage 1d6 piercing plus 1d4 persistent poison; Ranged Single Action web (range increment 20 feet), Damage immobilizes the target for 1 round or until it Escapes. - Ant Speed 30 feet, climb 30 feet; Melee Single Action mandibles, Damage 2d6 bludgeoning.","conditions":["enfeebled","persistent damage"],"tags":["concentrate","control","defense","utility"],"heightened":[{"label":"4th","text":"Your battle form is Large, and your attacks have 10-foot reach. You instead gain 15 temporary HP, attack modifier +16, damage bonus +6, and Athletics +16."},{"label":"5th","text":"Your battle form is Huge, and your attacks have 15-foot reach. You instead gain 20 temporary HP, attack modifier +18, damage bonus +2 and double damage dice (including persistent damage), and Athletics +20."}],"sustained":false},{"id":"165","name":"Invisibility Sphere","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=165","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"you and any number of creatures in range","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":"🟢🟢🟢","rval":3,"gortle":"party invisibility before an encounter only. Now called Shared Invisibility.","desc":"You and creatures near you become invisible as you explore.","effect":"You and all targets are invisible except to each other as long as you remain within the spell's area. If a creature made invisible by this spell leaves the spell's area, it becomes visible and remains so even if it returns to the spell's area. If any creature made invisible by this spell uses a hostile action, the spell ends after the hostile action is completed. While exploring, it's easy to move together slowly and remain invisible. This is untenable in a battle, however. Once an encounter begins, creatures remain invisible until at most the end of the first round, at which point the spell ends.","conditions":["invisible"],"tags":["illusion","utility"],"heightened":[{"label":"5th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"170","name":"Levitate","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=170","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 unattended object or willing creature","duration":"","school":"Evocation","traditions":"Arcane, Occult, Elemental","save":"","traits":["Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"can’t be used offensively as you can’t move. Maybe take it till you have a way to fly. Easy way to get out of reach. Could lift a heavy object. Out of combat, it's a safe way to climb.","desc":"Float an object or creature a few feet of the ground.","effect":"You defy gravity and levitate the target 5 feet off the ground. For the duration of the spell, you can move the target up or down 10 feet with a single action, which has the concentrate trait. A creature floating in the air from levitate takes a –2 circumstance penalty to attack rolls. A floating creature can spend an Interact action to stabilize itself and negate this penalty for the remainder of its turn. If the target is adjacent to a fixed object or terrain of suitable stability, it can move across the surface by climbing (if the surface is vertical, like a wall) or crawling (if the surface is horizontal, such as a ceiling). The GM determines which surfaces can be climbed or crawled across. ---","conditions":[],"tags":["debuff"],"heightened":[],"sustained":false},{"id":"173","name":"Locate","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=173","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"500 feet","target":"1 specific object or type of object","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Detection","Divination","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"a useful detection, but of something you have seen first.","desc":"Learn the direction to an object.","effect":"You learn the direction to the target (if you picked a specific object, such as “my mother's sword”) or the nearest target (if you picked a type of object, such as “swords”). If the target is a specific object, you must have observed it directly with your own senses. If it's a type of object, you still need to have an accurate mental image of the type of object. If there's lead or running water between you and the target, this spell can't locate the object. This means you might find a type of object farther away if the nearest one is behind lead or running water.","conditions":[],"tags":[],"heightened":[{"label":"5th","text":"You can target a specific creature or ancestry instead of an object, but you must have met or seen up close the creature or ancestry you want to target."}],"sustained":true},{"id":"821","name":"Magical Fetters","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=821","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"Reflex","traits":["Conjuration","Incapacitation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P158 a nice way to make one target clumsy, slow and vulnerable. Incapacitation","desc":"Ghostly manacles launch from your outstretched hand and clasp around the target's limbs, impeding its movements.","effect":"Ghostly manacles launch from your outstretched hand and clasp around the target's limbs, impeding its movements. The target must attempt a Reflex save. Critical Success The target is unaffected. Success The target is clumsy 1 and takes a –10-foot status penalty to its Speed for 1 round. Failure The target is clumsy 3 and takes a –10-foot status penalty to its Speed for 1 minute. Critical Failure As failure, but the target is also slowed 1 for the duration. ---","conditions":["clumsy","slowed"],"tags":["debuff","incapacitation"],"heightened":[],"sustained":false},{"id":"188","name":"Meld into Stone","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=188","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Earth","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"hide inside a block of stone. Might get you through a simple stone wall. Now called One with Stone","desc":"Meld into a block of stone.","effect":"You merge with an adjacent block of stone with enough volume to fit you and your worn and held possessions. You must touch the stone when you Cast the Spell. You can hear, but not see, what's going on outside the stone, and you can cast spells while in the stone as long as they don't require line of effect beyond the stone. Significant physical damage to the stone while you are inside it expels you and deals 10d6 damage to you. Passwall expels you without dealing damage and ends meld into stone . You can Dismiss this spell. ---","conditions":[],"tags":["damage"],"heightened":[],"sustained":false},{"id":"949","name":"Mind of Menace","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=949","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"","target":"","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult, Primal","save":"Will","traits":["Contingency","Emotion","Enchantment","Fear","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"a nice counterattack reaction against a mental attack. Prepared casters will definitely want this available, for Sorcerers may be worthwhile.","desc":"Set a contingency to punish a foe's mental effect and protect yourself from it.","effect":"This spell wards against those who attempt to subvert your mind and turns mental magic back on them. When the spell is complete, you gain the Fight with Fear reaction; once you use the reaction, the spell ends. Fight with Fear Reaction (concentrate, emotion, enchantment, fear, mental) Trigger A creature that you can see uses a mental effect against you; Effect The triggering creature must attempt a Will save, which has the following effects. Success The creature is unaffected. Failure The creature is frightened 2, and you gain a +2 status bonus to your saving throw or other defense against the triggering mental effect. Critical Failure The creature is frightened 2, and you're unaffected by the triggering mental effect. ---","conditions":["frightened"],"tags":["buff","emotion","fear","mental"],"heightened":[],"sustained":false},{"id":"1376","name":"Noxious Metals","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1376","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane","save":"basic Fortitude","traits":["Concentrate","Manipulate","Metal","Poison"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE poison damage and sickened in an area. Unfortunately the sickened mostly only applies to plants.","desc":"Coat creatures in toxic metal.","effect":"This spell forces toxic metal to coalesce on the skin or surface of all living creatures in the area, dealing 4d6 poison damage with a basic Fortitude save. Any creature that has the plant trait, has the wood trait, or has an anathema toward metal, takes the following effects depending on the result of that Fortitude save. Critical Success The creature suffers no additional effects. Success The creature takes 1 persistent poison damage and is sickened 1 as long as it takes this persistent damage. Failure As success, except 1d4 persistent poison damage and sickened 2. Critical Failure As success, except 1d8 persistent poison damage and sickened 3.","conditions":["persistent damage","sickened"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The initial poison damage increases by 2d6."}],"sustained":false},{"id":"1619","name":"One with Stone","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1619","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate","Polymorph"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC The new Meld into Stone. Great for hiding.","desc":"Meld into or turn into a stone.","effect":"You can either transform into a stone or merge with stone. This spell has the same effects as one with plants , but lets you merge with or turn into stone. A stone you turn into has AC 23. You can Dismiss this spell. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"961","name":"Oneiric Mire","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=961","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult, Primal","save":"Will","traits":["Illusion","Mental","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"illusionary difficult terrain and a speed penalty. The speed penalty persists when they leave. 3 actions to cast. Reasonable range and area. Maybe","desc":"Create illusory quicksand that tricks creatures into thinking they're stuck.","effect":"You shroud an area in illusory dreamstuff, making the ground look and feel like a deep mire or quicksand. Ground in the area is difficult terrain. Each creature in the area when the spell is cast, or that enters the area, must attempt a Will save. On a failure, it believes it's being pulled down by the earth, taking a –10-foot circumstance penalty to its Speeds. On a critical failure, it's also immobilized. In addition to the normal actions to Escape, at the end of an affected creature's turn, it can attempt a Will save, removing the effects on a success. On a critical success at any Will save made against oneiric mire , the creature fully disbelieves the illusion and no longer needs to make Will saves to risk a Speed penalty or being immobilized, though the area is still difficult terrain. ---","conditions":["immobilized"],"tags":["control","debuff","illusion","mental"],"heightened":[],"sustained":false},{"id":"963","name":"Organsight","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=963","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living or  undead  creature that has organs","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination","Revelation"],"rating":"🟢🟢🟢","rval":3,"gortle":"weirdness galore. Bonus to medicine and precision damage on a target for a minute. But you have to succeed at a lore roll or a medicine check and you have to deal slashing or precision damage (spell is OK). So if you have the right skills it is a good buff, especially if you can combo it with a reliable damage. Invisible assassins are going to like this.","desc":"See a foe's organs, and use your knowledge to deal precision damage.","effect":"You see the target as though it's dissected and arrayed before you. For the duration, you gain a +2 circumstance bonus on Medicine checks against the target that depend on its organs, but a –2 circumstance penalty on Medicine checks depending on seeing its skin. When you Cast the Spell, attempt a special Recall Knowledge check using Medicine to spot and discern a vital organ. If you have a Lore skill appropriate to the creature, you can use that skill instead of Medicine. If you succeed, the next time you deal piercing or slashing damage to the target with a Strike or spell, you deal 4d6 additional precision damage. Once on each of your subsequent turns, you can use a single action to attempt the special Recall Knowledge check again. The extra damage isn't cumulative, so making the check more than once before a Strike or spell has no extra benefit.","conditions":[],"tags":["buff","debuff","defense"],"heightened":[{"label":"+1","text":"The precision damage increases by 1d6."}],"sustained":false},{"id":"2296","name":"Overwhelming Memory","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2296","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Emotion","Manipulate","Mental","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA single target stupefy with some other effects. Useful to sustain if they fail their save. Probably good against enemy casters.","desc":"You cause the target to recall a specific type of memory.","effect":"You cause the target to recall a specific type of memory you choose from the list below, bringing it to the forefront of their mind with perfect clarity. Gleeful The memory makes the target laugh uncontrollably. They can't use reactions. Romantic The creature is consumed with their love for another. They are fascinated by the memory. Terrifying The creature is filled with terror and is frightened 1. Tragic The creature is overwhelmed with sorrow. They are dazzled from the tears in their eyes. The target must attempt a Will save. Critical Success The target is unaffected. Success The target is affected by the memory until the beginning of your next turn. Failure The target is affected by the memory until the beginning of your next turn and stupefied 2 for the spell’s duration. Critical Failure As failure, but the target is stupefied 3 for the spell’s duration. ---","conditions":["dazzled","fascinated","frightened","stupefied"],"tags":["concentrate","emotion","mental"],"heightened":[],"sustained":true},{"id":"213","name":"Paralyze","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=213","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Incapacitation","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"single target will save. Most living things can be paralyzed. Only for one round, but your target is still stunned 1 on a successful save? It has Incapacitation which is annoying as the right place to use spells like this is when you outnumber the enemy. Better when it's heightened to multiple targets.","desc":"Freeze a creature in place.","effect":"You block the target's motor impulses before they can leave its mind, threatening to freeze the target in place. The target must attempt a Will save. Critical Success The target is unaffected. Success The target is stunned 1. Failure The target is paralyzed for 1 round. Critical Failure The target is paralyzed for 4 rounds. At the end of each of its turns, it can attempt a new Will save to reduce the remaining duration by 1 round, or end it entirely on a critical success.","conditions":["paralyzed","stunned"],"tags":["incapacitation","mental"],"heightened":[{"label":"7th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1292","name":"Percussive Impact","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1292","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult","save":"","traits":["Evocation","Sonic","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB a lower damage sonic fireball that splashes and deafens.","desc":"You lob a compressed ball of sound at a foe.","effect":"You lob a compressed ball of sound at a foe. The ball explodes on impact, unleashing a powerful blast of sound. Make a spell attack roll. If you hit, you deal 4d8 bludgeoning damage plus 1d4 sonic splash damage. On a critical success, the target is also deafened for 1 round.","conditions":["deafened"],"tags":["damage"],"heightened":[{"label":"+2","text":"The bludgeoning damages increases by 4d8, the sonic splash damage increases by 1d4, and the duration of the deafened condition increases by 2 rounds."}],"sustained":false},{"id":"645","name":"Pyrotechnics","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=645","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 fire","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Fire","Transmutation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P152 a range of effects that requires a fire source to use. Area of effect flash for blind till end of next turn without the dreaded incapacitation trait. Or smoke for area of effect sickened and perception penalties.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2464","name":"Radiant Globe","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2464","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine","save":"Fortitude","traits":["Concentrate","Light","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"SK an area of light that burns away projectiles effectively blocking physical ranged attacks and dazzling attackers. Obviously useful as your team has magic. Sustained. Contrast with Wall of Wind.","desc":"You create a dome of brilliant light that destroys projectiles attempting to pass through it.","effect":"You create a dome of brilliant light that destroys projectiles attempting to pass through it. Ammunition from physical ranged attacks—such as arrows, bolts, sling bullets, and other objects of similar size—is destroyed in a flash of light when it passes into or out of the globe’s area. Attackers targeting creatures or objects through the globe’s surface with physical ranged attacks must succeed at a Fortitude save or become dazzled for 1 round (blinded for 1 round on a critical failure). ---","conditions":["blinded","dazzled"],"tags":["concentrate"],"heightened":[],"sustained":true},{"id":"1340","name":"Sand Form","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1340","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE resistance to piercing and slashing damage and immunity to bleeding.","desc":"Turn a creature’s body and gear into sand.","effect":"You grant the target's body and gear aspects of sand. The target gains resistance 5 to piercing and slashing damage, has no scent, and can't bleed. In sandy terrain, even when out in the open, the target has enough concealment to attempt to Hide. Each time the target takes damage to which sand form grants resistance, reduce the duration of the spell by 1 minute.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"5th","text":"The resistance is 10."},{"label":"7th","text":"The resistance is 15."}],"sustained":false},{"id":"1396","name":"Scrying Ripples","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1396","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 gallon of water or more","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Manipulate","Scrying","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a useful scrying spell.","desc":"Scry from one body of water into another.","effect":"You touch the water's surface, and as the ripples spread out, so do your senses. When you Cast this Spell, you automatically know the location of any unoccupied, flowing water with a surface area of at least 1 square within 500 feet. You can pick any one of these streams to see and hear out of for the duration of the spell, though your field of vision is perpendicular to the flowing surface. For example, you could look normally out of a waterfall but would look straight up from out of a river. Each time you Sustain the spell, you can change to a different water source or move elsewhere along the same one. If the water you're scrying through ceases flowing, such as by a faucet turning off, a river damming, or a waterfall freezing over, this spell ends. Additionally, your face appears as a faint reflection in the water's surface as you peek through. A creature that Seeks and succeeds at their Perception check against your spell DC detects your presence in the water.","conditions":[],"tags":["concentrate","utility"],"heightened":[{"label":"5th","text":"You know the location of and can scry through flowing water within 1 mile."}],"sustained":true},{"id":"1162","name":"Sea of Thought","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1162","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"Fortitude","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"DA an area of difficult terrain","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2025","name":"Shared Invisibility","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2025","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"you and up to 5 willing creatures","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Aura","Illusion","Manipulate","Subtle"],"rating":"🟢🟢🟢","rval":3,"gortle":"party invisibility before an encounter only. Previously called Invisibility Sphere.","desc":"You and nearby creatures become invisible.","effect":"You and all targets are invisible except to each other as long as the targets remain within the emanation. If a creature made invisible by this spell leaves the spell's area, it becomes visible and remains so even if it returns to the spell's area. If any creature made invisible by this spell uses a hostile action, the spell ends after the hostile action is completed.","conditions":["invisible"],"tags":["illusion","utility"],"heightened":[{"label":"5th","text":"The targets increase to you and up to 10 willing creatures. The duration increases to 1 hour."}],"sustained":false},{"id":"997","name":"Shift Blame","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=997","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"the target of the triggering attack or skill check","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"a reaction to change the perceived origin of an attack or Deception, Diplomacy, or Intimidation check. I think it can be used well in a lot of social situations, even combat situations. Might be able to split apart fractious enemies for a round or so.","desc":"Trick someone into thinking someone else is to blame for your attack or blunder.","effect":"You alter the target's memories of the triggering event as they form. You choose another creature (which can be you) with the capacity to make the triggering attack or skill check, and you alter the target's memories to recall the creature you chose as responsible for the triggering attack or skill check. The target must attempt a Will save and is then temporarily immune for 24 hours. Critical Success The target knows you attempted to alter its memories. Success The target doesn't realize you attempted to alter its memories, though it knows you cast a spell. Failure You successfully alter the target's memory. It isn't forced to react to the new memories in a particular way, and it's likely to question them if they contradict other information it knows or are implausible for the situation. ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"285","name":"Shrink Item","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=285","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 non-magical object up to 20 cubic feet in volume and up to 80 Bulk","duration":"","school":"Transmutation","traditions":"Arcane","save":"","traits":["Polymorph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"this one is a big maybe, it has a number of potential uses, talk to your GM. 80 bulk is probably what 6 strong men can carry. I’m thinking a cart or a large rowboat might be about the limit of this spell. How about a huge barrel of wine or oil? The way I read this spell you can hand the coins over to other people, and they can activate them by tossing them down. It is not supposed to be an attack spell. But if you toss the coin onto the edge of the roof of a building, then give the wagon a shove, why would it not fall? The hidden ability here is that shrink item doesn’t end if there is not enough space. So with enough small containers it is permanent until you release the item.","desc":"Reduce an object to the size of a coin.","effect":"You shrink the target to roughly the size of a coin. This reduces it to negligible Bulk. You can Dismiss the spell, and the spell ends if you toss the object onto a solid surface. The object can't be used to attack or cause damage during the process of it returning to normal size. If there isn't room for the object to return to normal size when the spell ends, the spell's duration continues until the object is in a location large enough to accommodate its normal size. ---","conditions":[],"tags":["defense"],"heightened":[],"sustained":false},{"id":"1295","name":"Sparkleskin","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1295","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Transmutation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB a plus 2 status bonus to deception and performance checks. Dazzles close creatures when hit.","desc":"You coat a creature's body in a layer of brilliantly sparkling glitter.","effect":"You coat a creature's body in a layer of brilliantly sparkling glitter. The target gains a +2 status bonus on Deception checks to Make a Diversion and to Feint, and on Performance checks to Perform that have the visual trait. When the target take damage, glitter bursts out of its wound in a 5-foot emanation. Creatures in the area must attempt a Fortitude save. Failure The creature is dazzled for 1 round. Critical Failure The creature is dazzled for 3 rounds. ---","conditions":["dazzled"],"tags":["buff"],"heightened":[],"sustained":false},{"id":"309","name":"Stinking Cloud","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=309","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"Fortitude","traits":["Conjuration","Poison"],"rating":"🟢🟢🟢","rval":3,"gortle":"for when you run out of obscuring mists. The spell is not totally clear, but I play that everyone rolls a save on initial casting, and if they end their turn in the area.","desc":"Form a cloud that sickens creatures.","effect":"You create a cloud of putrid mist in the area. The cloud functions as obscuring mist except it sickens creatures that end their turns within the cloud. (The concealed condition is not a poison effect.) Critical Success The creature is unaffected. Success The creature is sickened 1. Failure The creature is sickened 1 and slowed 1 while in the cloud. Critical Failure The creature is sickened 2 and slowed 1 until it leaves the cloud. ---","conditions":["concealed","sickened","slowed"],"tags":[],"heightened":[],"sustained":false},{"id":"2485","name":"Trade Items","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2485","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 item you’re holding and 1 item in another creature’s possession you can see, each no more than light Bulk","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Reflex","traits":["Concentrate","Manipulate","Teleportation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"SK swap an item with an item on another creature. Given that you can be holding something of low value, this spell is basically stealing an item as a reflex save. What if you are holding something dangerous?","desc":"You magically swap an item you’re holding for another that someone else has.","effect":"You magically swap an item you’re holding for another that someone else has. The second item appears in the hand you were holding the first item (or it falls to the ground in your square if you’re unable to hold it), and the first item appears in the same place on the other creature’s possession where the second item was (held in a hand or attached to a belt, for instance). If the second item is in the possession of a creature unwilling to relinquish it, they can prevent the transposition with a successful Reflex save.","conditions":[],"tags":["buff","concentrate","teleportation"],"heightened":[{"label":"5th","text":"Each object’s maximum Bulk increases to 1. If one of the items is 1 Bulk and the other isn’t, an unwilling creature gains a +2 circumstance bonus to their saving throw."}],"sustained":false},{"id":"640","name":"Unseasonable Squall","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=640","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Evocation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P151 ranged area burst of wind that knocks people prone. Very good against flyers.","desc":"You issue a blast of sudden wind that ripples outward from the center of the burst.","effect":"You issue a blast of sudden wind that ripples outward from the center of the burst. The wind extinguishes small non-magical fires, disperses fog and mist, scatters objects of light Bulk or less, and pushes unsecured objects of 1 Bulk or less 5 feet away from the spell’s origin point. Each Medium or smaller creature in the area when you Cast the Spell or that moves into spell’s area must attempt a Fortitude saving throw. Success The creature is unaffected. Failure The creature is knocked prone. If the creature was Flying, it gets a critical failure instead. Critical Failure The creature is pushed 30 feet away from the center of the burst, is knocked prone, and takes 2d6 bludgeoning damage. ---","conditions":["prone"],"tags":["control","damage"],"heightened":[],"sustained":false},{"id":"1085","name":"Wall of Radiance","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1085","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Evocation","Light","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P172 DM a wall of concealment which is useful defensively if you can make your enemy come to you. Take fire damage when you pass through it. Heightens for more damage.","desc":"You form a wall of brilliant light that obscures creatures.","effect":"You form a wall of brilliant light that obscures creatures. You create a thin wall of light in a straight line up to 60 feet long and 10 feet high. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall stands vertically. If you wish, the wall can be of a shorter length or height. Creatures adjacent to the wall are dazzled. Creatures that move through the wall take 2d6 fire damage (basic Fortitude save) as the concentrated light burns them.","conditions":["concealed","dazzled"],"tags":["control","damage"],"heightened":[{"label":"4th","text":"The bright light makes it difficult to discern creatures on the other side. Creatures are concealed to other creatures on the opposite side of the wall from them. The fire damage increases to 3d6."}],"sustained":false},{"id":"367","name":"Wall of Wind","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=367","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"situational, but good if you have a lot of direct damage spells and they have archers.","desc":"Create a wall of gusting winds that hinders movement and ranged attacks.","effect":"You create a barrier of gusting winds that hinders anything moving through it. The wall of swirling winds is 5 feet thick, 60 feet long, and 30 feet high. The wall stands vertically, but you can shape its path. Though the wall of wind distorts the air, it does not hamper sight. The wall has the following effects. Ammunition from physical ranged attacks—such as arrows, bolts, sling bullets, and other objects of similar size—can't pass through the wall. Attacks with bigger ranged weapons, such as javelins, take a –2 circumstance penalty to their attack rolls if their paths pass through the wall. Massive ranged weapons and spell effects that don't create physical objects pass through the wall with no penalty. The wall is difficult terrain to creatures attempting to move overland through it. Gases, including creatures in gaseous form, can't pass through the wall. A creature that attempts to fly through the wall using a move action must attempt a Fortitude save. Critical Success The creature can move through the wall normally this turn. Success The flying creature can move through the wall this turn, but the wall is difficult terrain. Failure The wall stops the movement of the flying creature, and any remaining movement from its current action is wasted. Critical Failure As failure, and the creature is pushed 10 feet away from the wall. ---","conditions":[],"tags":["control","debuff"],"heightened":[],"sustained":false},{"id":"26","name":"Blindness","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=26","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult, Primal","save":"Fortitude","traits":["Incapacitation","Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"Strike a target blind.","effect":"You blind the target. The effect is determined by the target's Fortitude save. The target then becomes temporarily immune for 1 minute. Critical Success The target is unaffected. Success The target is blinded until its next turn begins. Failure The target is blinded for 1 minute. Critical Failure The target is blinded permanently. ---","conditions":["blinded"],"tags":["incapacitation"],"heightened":[],"sustained":false},{"id":"2123","name":"Bone Flense","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2123","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 weapon that is either wielded by a member of the Red Mantis or is a praying mantis’s leg Strike","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate","Rare"],"rating":null,"rval":0,"gortle":"","desc":"The target weapon becomes imbued with Achaekek’s power","effect":"The target weapon becomes imbued with Achaekek's power and glows softly with crimson light akin to that shed by a candle. When a creature with a skeleton or exoskeleton takes damage from a Strike delivered by this weapon, the creature's bones nearest to the wound instantly sprout jagged, razor-sharp spurs that flense the muscle and flesh from inside out. The creature takes an additional 1d6 persistent bleed damage from the Strike. You can use the Erupting Spurs reaction.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The persistent bleed damage increases by 1d6. The damage from Erupting Spurs increases by 4d6."}],"sustained":false},{"id":"1908","name":"Bonewall Bulwark","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1908","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"5 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Occult","save":"","traits":["Necromancy","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You create a miniature replica of the infamouse Bonewall of Yled.","effect":"You create a miniature replica of the infamous Bonewall of Yled, a jumble of bones with threatening limbs reaching from it. The bulwark is 10 feet high, 10 feet long, and 1 foot thick. The bulwark has an AC of 10 and 30 Hit Points. You must create the bulwark in an unbroken open space so it doesn’t pass through any creatures or objects, or the bulwark's dimensions are reduced to fit the smaller space. It must pass within 5 feet of you. The bonewall bulwark grants cover from creatures on the opposite side. At the beginning of your turn, you may have the limbs attack a single creature you're aware of within 5 feet of the wall using your spell attack modifier and dealing 3d10 bludgeoning damage. This ignores cover and concealment provided by the bonewall bulwark .","conditions":[],"tags":["control","damage","defense"],"heightened":[{"label":"+1","text":"The bludgeoning damage increases by 1d10 and the HP of the wall increases by 10."}],"sustained":false},{"id":"875","name":"Bottomless Stomach","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=875","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"1 willing creature","duration":"","school":"Conjuration","traditions":"Arcane, Occult, Primal","save":"","traits":["Conjuration","Extradimensional"],"rating":null,"rval":0,"gortle":"","desc":"Store things in a creature's stomach.","effect":"You create a shimmering extradimensional space accessible from the target's mouth. The space can hold objects and equipment, up to a total of 10 Bulk. This extradimensional storage doesn't hamper the target's ability to eat, drink, speak (if applicable), or otherwise act, as it only opens and closes when the target chooses. The target can Interact to swallow an object of up to 1 Bulk, which doesn't harm the object or the target. If the extradimensional space is full, the target can't add any more objects until first removing one or more stored objects. Organic matter and living creatures can't be stored in this space. The extradimensional storage is obvious to any creature who looks into the target's mouth, as the entryway shimmers slightly, though this doesn't clearly reveal the contents inside. The target can Interact to spit out a single object of its choice, causing the object to fall to the ground in the target's space. The target can Interact three times in a row to spit out the entire contents of its extradimensional storage; the target doesn't have to take these actions all in the same turn, but if it takes any other actions in between, it has to start over. The items eject into the target's space, possibly spilling out into adjacent spaces if there is too much to fit. When the spell ends or the target falls unconscious, the contents of the extradimensional storage are disgorged in a riotous spew, landing in the nearest unoccupied space, a bit wet but otherwise unharmed.","conditions":["unconscious"],"tags":[],"heightened":[{"label":"5th","text":"The duration increases to 8 hours."}],"sustained":false},{"id":"1150","name":"Bracing Tendrils","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1150","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Evocation","Force"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1215","name":"Caster's Imposition","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1215","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"","target":"1 creature within 60 feet","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal","save":"Will","traits":["Abjuration","Curse","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"A magical interference prevents the target from contributing to any form of cooperative spellcasting.","effect":"A magical interference prevents the target from contributing to any form of cooperative spellcasting. On a failed save, the target can't participate in any ritual unless they can cast the ritual alone, and they can't access any spells provided by a coven or similar cooperative ability.","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"Increase the duration to 1 hour."},{"label":"5th","text":"Increase the duration to 1 day."}],"sustained":false},{"id":"1314","name":"Cloud Dragon's Cloak","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1314","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"the creature targeted by the attack","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"React to hide a creature in mist.","effect":"A cloud of mist enshrouds the target, appearing much like the deflecting clouds created by cloud dragons. The target is treated as hidden for the purposes of resolving the triggering attack (so normally the attacker must succeed at a DC 11 flat check to target it) and all ranged attacks against it for the duration. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2445","name":"Conjured Conveyance","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2445","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Manipulate","Plant","Uncommon","Wood"],"rating":null,"rval":0,"gortle":"","desc":"You conjure an intricate vehicle, carved entirely from wood, to serve as a method of conveyance.","effect":"You conjure an intricate vehicle, carved entirely from wood, to serve as a method of conveyance. The vehicle appears in an unoccupied area of your choice within range. The vehicle can be piloted using Arcana, Driving Lore, or Nature skill checks. The DC to pilot the vehicle and the DC of the vehicle’s collision are equal to your spell DC. The vehicle’s remaining statistics are presented below. When you Cast this Spell, choose whether to create a Large skiff, a Large wagon, or a Medium cycle. With the GM’s permission, you might instead summon a different vehicle of your choice with a maximum level of 1; this vehicle must be made primarily of plant matter, have common rarity, and be Large or smaller. Large Skiff—Space 15 feet long, 5 feet wide, 3 feet high; Crew 1 pilot; Passengers 3; Speed swim 30 feet (magical) Large Wagon—Space 10 feet long, 10 feet wide, 7 feet high; Crew 1 pilot; Passengers 3; Speed 35 feet (magical) Medium Cycle—Space 5 feet long, 3 feet wide, 3 feet high; Crew 1 pilot; Passengers 0; Speed 40 feet (magical) AC 13; Fortitude +8 Hardness 5, HP 40 (BT 20); Immunities critical hits, object immunities, precision damage; Weaknesses fire 5, slashing 5 Collision 2d6","conditions":[],"tags":["concentrate","summon"],"heightened":[{"label":"+1","text":"The vehicle’s AC increases by 2, Fortitude bonus increases by 2, Hardness increases by 1, HP increases by 20, and the collision damage increases by 1d6. In addition, the maximum level of vehicle you can summon with GM permission increases by 2. The duration increases by 1 hour."}],"sustained":false},{"id":"572","name":"Cup of Dust","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=572","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Curse","Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"You curse the target with a thirst no drink can quench.","effect":"You curse the target with a thirst no drink can quench. You can Dismiss the spell. The target must attempt a Fortitude save. Critical Success The creature is unaffected and is temporarily immune for 1 hour. Success The creature is fatigued for 1 round. Failure The creature is immediately afflicted by thirst as if it hadn’t had a drink in days. It becomes fatigued and takes 1d4 damage each hour that can’t be healed until it quenches its thirst. No amount of drinking can quench the creature’s thirst during the spell’s duration. Critical Failure As failure but the creature takes 2d4 damage each hour, twice as much as usual for thirst.","conditions":["fatigued"],"tags":["damage","healing"],"heightened":[{"label":"+3","text":"The thirst becomes more unbearable, increasing the damage each hour by 1d4, or by 2d4 on a critical failure."}],"sustained":false},{"id":"683","name":"Curse of Lost Time","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=683","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 Large or smaller object,  construct , or living creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"basic Fortitude","traits":["Curse","Negative","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Artificially erode or age a target.","effect":"You curse the target with rapid aging or erosion. The effect depends on whether the target is an object, a construct, or a living creature. Artifacts, along with objects and constructs made of precious materials (as determined by the GM), are immune. - Object If the object is attended, its bearer can attempt a Fortitude save. If the bearer fails or the object is unattended, the object immediately takes 4d6 damage (applying Hardness normally) and the item is cursed with an unlimited duration. Until the curse ends, the item becomes shoddy and can't be Repaired, and the curse attempts to counteract any spell that would restore the object's Hit Points. Remove curse can target an item affected by this spell. - Construct The construct takes 4d6 damage (basic Fortitude save). On a failure, for 1 hour the construct is clumsy 1, is enfeebled 1, and can't be Repaired, and the curse attempts to counteract any spell that would restore the construct's Hit Points. On a critical failure, these effects have an unlimited duration. - Living Creature The living creature must attempt a Fortitude save. Ageless creatures are immune. Critical Success The living creature is unaffected. Success The living creature briefly ages, becoming clumsy 1 and enfeebled 1 for 1 round. Failure As success, with a duration of 1 hour. Critical Failure As success, with an unlimited duration.","conditions":["clumsy","enfeebled"],"tags":["damage","healing"],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":false},{"id":"891","name":"Day's Weight","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=891","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 living creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Use time magic to fatigue a creature.","effect":"You fast-forward time for a single creature, burdening it with the aches and pain of an entire day and making it temporarily tired and weak. The creature must attempt a Fortitude save. Critical Success The target is unaffected. Success The target is fatigued and enfeebled 1 for 1 round. Failure The target is fatigued and enfeebled 1 for the duration. Critical Failure The target is fatigued and enfeebled 2 for the duration. The fatigued condition doesn't end when the spell's duration does (but can still be removed with a night's rest or by similar means).","conditions":["enfeebled","fatigued"],"tags":[],"heightened":[{"label":"6th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1114","name":"Dividing Trench","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1114","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Earth","Transmutation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You dig an earthen trench across the surrounding terrain, which must be soil, clay, sand, or other soft earth, but not flooring or stone.","effect":"You dig an earthen trench across the surrounding terrain, which must be soil, clay, sand, or other soft earth, but not flooring or stone. The trench is 5 feet wide, 5 feet deep, and up to 15 feet long. You can shape the trench's path, but it must be one continuous line. You must conjure the trench in an open space so it doesn't pass through any creatures or objects. Creatures inside the trench have cover from creatures outside the trench, and creatures outside the trench have cover from creatures inside the trench. Particularly small creatures in the trench might have more cover against other creatures who aren't close to the trench's edge, and in turn, those creatures might have more cover against small creatures in the trench; the GM determines the amount of additional cover, if any. Entering or leaving the trench requires an additional 5 feet of movement but doesn't require any kind of check and isn't considered difficult terrain. At the end of the spell's duration, the trench disappears and all creatures in the trench remain in their spaces on solid ground.","conditions":[],"tags":["control"],"heightened":[{"label":"+2","text":"The trench's maximum length increases by 15 feet."}],"sustained":false},{"id":"90","name":"Dream Message","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=90","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"planetary","target":"1 creature you know by name and have met in person","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"","traits":["Enchantment","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Send a message that arrives in a dream.","effect":"You send a message to your target's dream. The message is one-way, up to 1 minute of speech (roughly 150 words). If the target is asleep, they receive the message instantly. If not, they receive it the next time they sleep. As soon as they receive it, the spell ends, and you know the message was sent.","conditions":[],"tags":["mental"],"heightened":[{"label":"4th","text":"You can target up to 10 creatures you know by name and have met in person. You must send the same message to all of them; the spell ends for each creature individually."}],"sustained":false},{"id":"94","name":"Earthbind","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=94","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 flying creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Bring a flying creature to the ground.","effect":"Using the weight of earth, you hamper a target's flight, with effects based on its Fortitude save. If the creature reaches the ground safely, it doesn't take falling damage. Critical Success The target is unaffected. Success The target falls safely up to 120 feet. Failure The target falls safely up to 120 feet. If it hits the ground, it can't Fly, levitate , or otherwise leave the ground for 1 round. Critical Failure The target falls safely up to 120 feet. If it hits the ground, it can't Fly, levitate , or otherwise leave the ground for 1 minute. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"902","name":"Elemental Annihilation Wave","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=902","rarity":"Common","actions":"2","actionsRaw":"Two Actions to 2 rounds","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal, Elemental","save":"basic Reflex","traits":["Air","Earth","Evocation","Fire","Water"],"rating":null,"rval":0,"gortle":"","desc":"Draw in elemental energy to unleash a cone of burning destruction.","effect":"You draw elemental power from your surroundings, and combining it with your own magical energy, unleash a wave of utter destruction and swirling colors that deals 1d6 fire damage and 3d6 bludgeoning damage with a basic Reflex save. The number of actions you spend when Casting this Spell determines the area and other parameters. Two Actions (somatic, verbal) The spell is a 30-foot cone. Three Actions (material, somatic, verbal) The spell is a 30-foot cone. On a failed saving throw, creatures are pushed 5 feet away from you, and on a critical failure they are pushed 10 feet away and are knocked prone. Two Rounds If you spend 3 actions Casting the Spell, you can avoid finishing the spell and spend another 3 actions on your next turn to empower the spell even further. If you do, the spell is as 3 actions, but the area is a 60-foot cone, and for 1 round, the elements linger in the cone, racing off into the distance and making approaching you difficult, with the effects of gust of wind . Elemental Spell Changes Source Rage of Elements pg. 55 You can replace the air trait with the metal and wood traits when you cast the spell.","conditions":["prone"],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The damage increases by 1d6 fire and 3d6 bludgeoning, and the distance that enemies are pushed back if you spent 3 actions or 2 rounds increases by 5 feet on a failed save and 10 feet on a critical failure."}],"sustained":false},{"id":"104","name":"Enthrall","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=104","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"all creatures in range","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Auditory","Emotion","Enchantment"],"rating":null,"rval":0,"gortle":"","desc":"Your speech makes creatures fascinated with you.","effect":"Your words fascinate your targets. You speak or sing without interruption throughout the casting and duration. Targets who notice your speech or song might give their undivided attention; each target must attempt a Will save. The GM might grant a circumstance bonus (to a maximum of +4) if the target is of an opposing religion, ancestry, or political leaning, or is otherwise unlikely to agree with what you're saying. Each creature that comes within range has to attempt a save when you Sustain the Spell. If you're speaking, enthrall gains the linguistic trait. Critical Success The target is unaffected and notices that you tried to use magic. Success The target needn't pay attention but doesn't notice you tried to use magic (it might notice others are enthralled). Failure The target is fascinated with you. It can attempt another Will save if it witnesses actions or speech with which it disagrees. If it succeeds, it's no longer fascinated and is temporarily immune for 1 hour. If the target is subject to a hostile act, or if another creature succeeds at a Diplomacy or Intimidation check against it, the fascination ends immediately. Critical Failure As failure, but the target can't attempt a save to end the fascination if it disagrees with you. ---","conditions":["fascinated"],"tags":["buff","emotion"],"heightened":[],"sustained":true},{"id":"1264","name":"Excise Lexicon","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1264","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"Will","traits":["Divination","Linguistic","Mental","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You reach into a creature's mind and extract its knowledge of a word.","effect":"You reach into a creature's mind and extract its knowledge of a word. Choose a word to excise when you Cast the Spell. The word must be a mundane word, not a proper noun, and not a word of power such as those used as verbal components for spells. The target must attempt a Will save. The target forgets any words you remove with this spell. While the spell lasts, the target doesn't register or understand the excised words in any form, signed, spoken, written, or otherwise, and can't comprehend them by any means, even by a tongues spell or similar magic. The spell fails if you don't share at least one language with the target. However, the target forgets the words from each language they know, not just your shared languages. Critical Success The target is unaffected and knows which words you attempted to excise. Success The spell's duration is 1 minute. Failure The spell's duration is 1 day. Critical Failure The spell's duration is unlimited.","conditions":[],"tags":["mental","utility"],"heightened":[{"label":"+2","text":"You excise one additional word."}],"sustained":false},{"id":"1991","name":"Familiar’s Face","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1991","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"1 mile","target":"1 willing creature that’s your animal companion or familiar","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Manipulate","Scrying"],"rating":null,"rval":0,"gortle":"","desc":"Implant your senses and voice in your companion.","effect":"The target becomes a scrying sensor, allowing you to see through its eyes, smell what it smells, and similarly use its other senses. If you Cast a Spell with the revelation trait that affects your senses, such as see the unseen , while this spell is active, you gain the benefit of the spell through the target's senses instead of your own. You can also speak through the target with a voice much like yours, though it takes on some of the timbre and character of the target's growls or squawks. You can use Command an Animal on the target as part of Sustaining this spell. You don't need line of sight or line of effect to your target when you Cast this Spell. ---","conditions":[],"tags":["concentrate","utility"],"heightened":[],"sustained":true},{"id":"113","name":"Feet to Fins","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=113","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Morph","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Turn a creature's feet into fins, enabling it swim but slowing it on land.","effect":"The target's feet transform into fins, improving mobility in the water but reducing it on land. The target gains a swim Speed equal to its normal land Speed, but its land Speed becomes 5 feet.","conditions":[],"tags":[],"heightened":[{"label":"6th","text":"The spell lasts until the next time you make your daily preparations."}],"sustained":false},{"id":"133","name":"Ghostly Weapon","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=133","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 weapon that is either unattended or wielded by you or a willing ally","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Make a weapon affect incorporeal creatures.","effect":"The target weapon becomes translucent and ghostly, and it can affect material and incorporeal creatures and objects. It can be wielded by a corporeal or incorporeal creature and gains the effects of the ghost touch property rune. If the weapon is magical and already has the maximum number of property runes, the wielder can choose one to suppress to gain ghost touch . ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2531","name":"Horde of Underlings","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2531","rarity":"Rare","actions":"3","actionsRaw":"Three Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Manipulate","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You summon six underlings, such as  skeletons  or  kobolds .","effect":"You summon six underlings, such as skeletons or kobolds. When you cast this spell, you decide what kind of creatures they are, if they’re Small or Medium, and whether they deal bludgeoning, piercing, or slashing damage (choose once and applying it to all underlings). Each underling has 1 Hit Point, 5 AC, and automatically fails all saving throws. Each underling appears in an unoccupied square of your choice within the area. The underlings don’t block movement, but they are difficult terrain for creatures other than you. Each underling attacks one enemy adjacent to it (if any), automatically dealing 1d4 damage of the chosen type. The First time you Sustain the spell on each subsequent round, each underling moves 20 feet toward the nearest enemy. If an underling ends its movement adjacent to an enemy, it damages that enemy as described above.","conditions":[],"tags":["concentrate","control","damage","summon"],"heightened":[{"label":"+1","text":"The number of underlings increases by 2."}],"sustained":true},{"id":"157","name":"Hypnotic Pattern","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=157","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Shifting colors dazzle and fascinate creatures.","effect":"You create a pattern of shifting colors that hovers in the air in a geometric cloud. Creatures are dazzled while inside the pattern. In addition, a creature must attempt a Will saving throw if it is inside the pattern when you cast it, when it enters the pattern, when it ends its turn within the pattern, or if it uses a Seek or Interact action on the pattern. A creature currently fascinated by the pattern doesn't attempt new saves. Success The target is unaffected. Failure The target is fascinated by the pattern. Critical Failure The target is fascinated by the pattern. While it remains fascinated, it can't use reactions. ---","conditions":["dazzled","fascinated"],"tags":["illusion"],"heightened":[],"sustained":true},{"id":"1564","name":"Hypnotize","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1564","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Manipulate","Subtle","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Shifting colors dazzle and fascinate creatures.","effect":"You create a cloud of mesmerizing patterns and colors that hovers in the air. Creatures are dazzled while inside the cloud. In addition, a creature must attempt a Will saving throw if it is inside the cloud when you cast it, when it enters the cloud, when it ends its turn within the cloud, or if it uses a Seek or Interact action on the cloud. A creature currently fascinated by hypnotize doesn't attempt new saves. Success The target is unaffected. Failure The target is fascinated by the cloud. Critical Failure The target is fascinated by the cloud. While it remains fascinated, it can't use reactions. ---","conditions":["dazzled","fascinated"],"tags":["illusion"],"heightened":[],"sustained":true},{"id":"929","name":"Impending Doom","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=929","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 living creature","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Divination","Emotion","Fear","Incapacitation","Mental","Prediction"],"rating":null,"rval":0,"gortle":"","desc":"Make a foe witness its potential death and become distressed.","effect":"You sift through myriad potential futures, seize upon one potential moment in which the target meets a particularly gruesome and fatal end, and then show it a vision of its impending demise. The intense mental vision grows more and more terrifying to the target as the doom grows closer, and it takes 3 rounds to reach its conclusion. The target must attempt a Will saving throw to determine the effects. At the end of the spell's duration, if the target was affected, the target witnesses its death and takes 6d6 mental damage. Critical Success The creature is unaffected. Success The creature is unaffected for 1 round. On the second round, it becomes flat-footed. Finally, on the third round, it becomes frightened 1. At the end of the third round, it takes half damage. Failure The creature is immediately flat-footed. On the second round, it becomes frightened 2. Finally, on the third round, it also becomes stunned 1. At the end of the third round, the creature takes full damage. Critical Failure The creature is immediately flat-footed and frightened 3. On the second round, it becomes stunned 1. Finally, on the third round, it also becomes paralyzed. At the end of the third round, the creature takes double damage.","conditions":["frightened","off-guard","paralyzed","stunned"],"tags":["damage","emotion","fear","incapacitation","mental"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1288","name":"Instant Parade","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1288","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Auditory","Aura","Illusion","Uncommon","Visual"],"rating":null,"rval":0,"gortle":"","desc":"An illusory parade with dozens of participants and performers appears around you, following you as you move.","effect":"An illusory parade with dozens of participants and performers appears around you, following you as you move. The parade is lively and noisy, providing enough cover and distraction to hide among the crowd. You and other creatures can Hide and Sneak inside the crowd, though creatures that disbelieve the illusion still see creatures within as normal. You can choose to send the parade off with a 2-action activity, which has the concentrate trait. When you do so, the parade no longer follows you and instead continues traveling in the direction of your choice. The parade travels 100 feet over 1 round and then disappears as the spell is Dismissed. You can otherwise Dismiss the spell normally if you prefer. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"1277","name":"Lashing Rope","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1277","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"50 feet","target":"up to 50 feet of unattended  rope  or an inanimate rope-like object","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"You cause a section of rope or a rope-like object to animate, slither to your square, and encircle you, wreathing you in twisting, lashing fibers.","effect":"You cause a section of rope or a rope-like object to animate, slither to your square, and encircle you, wreathing you in twisting, lashing fibers. When you Cast the Spell and each time you Sustain the Spell, you can make a melee Strike with the rope, which uses and contributes to your multiple attack penalty. These rope Strikes are melee spell attacks; have the magical, reach, and trip weapon traits; and deal 3d6 slashing. If you critically fail a check to Trip using the rope, you can't make any more Strikes with it this turn, nor can you use it to make an Attack of Opportunity until the beginning of your next turn. This replaces the usual results of a critical failure to Trip.","conditions":[],"tags":[],"heightened":[{"label":"+2","text":"The damage from your rope Strikes increases by 2d6."}],"sustained":true},{"id":"1405","name":"Lotus Walk","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1405","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":null,"rval":0,"gortle":"","desc":"Bloom water plants that let you and others walk on water.","effect":"Lotuses, water lilies, and other watery plants bloom at your feet, allowing you to walk on the surface of water and other liquids. You can go underwater if you wish, but in that case, you must Swim normally. As you Stride or Step on water, you leave a trail of oversized lily pads, lotus leaves, or spatterdock that fill the squares' surfaces in your wake. Each square of this trail can withstand the weight of 1 Medium creature and lasts until the end of your next turn. You can Dismiss this spell early.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"4th","text":"The duration of this spell increases to 10 minutes. The trail lasts until the spell ends or you Dismiss the spell on you, whichever comes first."},{"label":"6th","text":"The duration increases to 1 hour. Your trail is permanent even if you Dismiss the spell on you, although if the water can't support such plants, they'll die in a week. The trail can be removed by dispel magic or a similar spell."}],"sustained":false},{"id":"943","name":"Magnetic Acceleration","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=943","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature or object","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Evocation","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Magnetically launch an item to attack a foe.","effect":"You magnetize a small metal object, such as a nail or coin, and launch it away from you at massive speed. Make a ranged spell attack roll; if the target is wearing metal armor or is made of metal, you gain a +1 circumstance bonus to your attack roll with magnetic acceleration . On a hit, the target takes 3d6 bludgeoning damage and 3d6 piercing damage, or double damage on a critical hit.","conditions":[],"tags":["buff","damage","defense"],"heightened":[{"label":"+1","text":"The bludgeoning and piercing damage each increase by 1d6."}],"sustained":false},{"id":"194","name":"Mind Reading","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=194","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"Will","traits":["Detection","Divination","Mental","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Read a creature's surface thoughts.","effect":"With a cursory mental touch, you attempt to read the target's mind. It must attempt a Will save. The target then becomes temporarily immune to your mind reading for 1 hour. Critical Success The target perceives vague surface thoughts from you when you Cast the Spell. Success You find out whether the target's Intelligence modifier is higher than, equal to, or lower than yours. Failure You perceive vague surface thoughts from the target when you Cast the Spell, and you find out whether its Intelligence modifier is higher than, equal to, or lower than yours. Critical Failure As failure, and for the duration of the spell, you can Sustain the Spell to detect the target's surface thoughts again. The target doesn't receive any additional saves. ---","conditions":[],"tags":["mental","utility"],"heightened":[],"sustained":true},{"id":"209","name":"Nondetection","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=209","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 creature or object","duration":"","school":"Abjuration","traditions":"Arcane, Occult, Primal","save":"","traits":["Abjuration","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Protect a creature or object from detection.","effect":"You erect protective wards that make the target difficult to detect via magic. Nondetection attempts to counteract all detection, revelation, and scrying divinations made against the target or the target's gear throughout the duration, counting cantrips as 1st-level spells for this purpose. Successfully counteracting a divination that targets an area or multiple targets negates the effects only for nondetection 's target. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":false},{"id":"1290","name":"Nothing Up My Sleeve","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1290","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Extradimensional","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You create an extradimensional space within each of your sleeves.","effect":"You create an extradimensional space within each of your sleeves. If you're not wearing clothing with sleeves, the spell also produces a simple shirt with long sleeves for you for the duration. Each of the extradimensional spaces can hold objects and equipment, up to a total of 1 Bulk. Organic matter and living creatures can't be stored in these spaces. You are the only person who can ac
