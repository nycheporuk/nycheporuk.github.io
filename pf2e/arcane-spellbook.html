ommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Primal","save":"","traits":["Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"You continually and harmlessly slough off the top layer of your skin while new skin regenerates immediately.","effect":"You continually and harmlessly slough off the top layer of your skin while new skin regenerates immediately, quickly moving damaging substances away from your body. The flat check to remove persistent damage from effects that coat your skin (such as most persistent acid damage) is reduced to 5, and you gain a +2 status bonus to your initial save against contact poison (but not to further saves, since by that point, the toxin has already entered your system). If you’re suffering from an effect other than persistent damage that depends on continuous contact with your skin, if that effect allows a saving throw, you receive a new saving throw against that effect at the end of each turn when you attempt your flat checks against persistent damage, and you also receive a +2 status bonus to those saving throws. While affected by this spell, your continually shedding skin makes you much easier to Track. Anyone Tracking you gains a +2 circumstance bonus to do so, and you cannot Hide Your Tracks. ---","conditions":["persistent damage"],"tags":["buff","defense"],"heightened":[],"sustained":false},{"id":"295","name":"Spectral Hand","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=295","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Occult","save":"","traits":["Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"Create a semicorporeal hand that touches creatures to target them with your spells.","effect":"You create a semicorporeal hand out of your essence that delivers touch spells for you. Whenever you Cast a Spell with a range of touch, you can have the hand crawl to a target within range along the ground, touch it, and then crawl back to you. When making a melee spell attack with the hand, you use your normal bonuses. The hand can move as far as it needs to within range. The hand has your AC and saves, but any damage to the hand destroys it and causes you to take 1d6 damage. ---","conditions":[],"tags":["damage"],"heightened":[],"sustained":false},{"id":"2517","name":"Sticky Fire","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2517","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Concentrate","Fire","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"You send a bubble of viscous liquid that sparks into flame.","effect":"You send a bubble of viscous liquid that sparks into flame. Make a spell attack roll against the target’s AC, dealing 1d8 fire damage and 1d8 persistent fire damage on a hit. The target is enfeebled 1 until they recover from their persistent fire damage.","conditions":["enfeebled"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The initial and persistent fire damage increase by 1d8."}],"sustained":false},{"id":"1011","name":"Summoner's Precaution","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1011","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Contingency","Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"Set a contingency to avoid being knocked out alongside your eidolon.","effect":"You create a buffer in the link between yourself and your eidolon in order to prevent you from falling alongside your bonded ally. You gain the following reaction; after using it, the spell ends. Sever Conduit Reaction (concentrate) Trigger Your eidolon takes damage that would bring you to 0 Hit Points and comes from an effect other than a death effect; Effect You quickly shut the buffer in your link with your eidolon, causing your bonded ally to wink out of existence before you can be laid low. Your eidolon unmanifests, and you can't Manifest your Eidolon for 1 minute. In exchange, you don't take the triggering damage, though your eidolon still suffers any other adverse effects that accompanied the damage. ---","conditions":[],"tags":["damage"],"heightened":[],"sustained":false},{"id":"1012","name":"Summoner's Visage","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1012","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"your  eidolon","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Change your eidolon to cosmetically appear to be your identical twin.","effect":"You transform your eidolon into your identical twin. Assuming you are a humanoid, the eidolon gains the humanoid trait in addition to its other traits while it's in this form, as well as any other trait related to your form (such as elf or gnome). Your eidolon gains a +4 status bonus to Deception checks to Impersonate you and can add its level to such checks even if it's untrained. Although your eidolon looks like you, it doesn't gain any new abilities, and its statistics don't change in any way—the transformation is purely cosmetic. If this transformation reduces your eidolon's size, the eidolon loses any other effects of its larger size, such as any increase to reach. Your eidolon can still use gear only if it has the eidolon trait, which allows eidolons to use it. Any such eidolon items the eidolon was wearing change size and shape, if necessary, and its effects remain active. You can Dismiss the spell.","conditions":[],"tags":["buff"],"heightened":[{"label":"4th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"1209","name":"Swallow Light","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1209","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1  magical    light   effect","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult","save":"","traits":["Cold","Darkness","Evocation","Negative","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"333","name":"Telekinetic Maneuver","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=333","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Attack","Evocation","Force"],"rating":null,"rval":0,"gortle":"","desc":"Disarm, Shove, or Trip a creature telekinetically.","effect":"With a rush of telekinetic power, you move a foe or something they carry. You can attempt to Disarm, Shove, or Trip the target using a spell attack roll instead of an Athletics check. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2332","name":"The Queen's Rainbow","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2332","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Auditory","Concentrate","Manipulate","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1363","name":"Thermal Remedy","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1363","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"up to 1 gallon of non-magical liquid or up to 5 pounds of food","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Fire","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Adjust ingredients in food and drink for health benefits.","effect":"You adjust the delicate levels of bitter ingredients in food and drink to draw out their full restorative and fortifying properties. Choose one of the benefits listed below. Any creature that consumes the targeted drink or food gains that benefit. Up to 10 creatures can partake in the meal, and a creature gets no extra benefit for consuming more than one portion. Gain 5 temporary Hit Points. Gain resistance 2 to fire. Gain a +1 circumstance bonus to saves against disease.","conditions":[],"tags":["buff","concentrate","defense"],"heightened":[{"label":"4th","text":"Your remedy provides two benefits of your choice instead of one. The temporary Hit Points increase to 10, the resistance to fire increases to 3, the bonus against disease increases to +2, and the duration is 2 hours."},{"label":"7th","text":"The remedy provides all three benefits. The temporary Hit Points increase to 15, the resistance to fire increases to 5, the bonus against disease increases to +3, and the duration is 8 hours."}],"sustained":false},{"id":"1020","name":"Timely Tutor","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1020","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"touch","target":"your  eidolon  or  familiar","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Connect your eidolon or familiar to the Akashic Record to briefly grant it knowledge.","effect":"You serve as an astral connection between your eidolon or familiar and the Akashic Record—a demiplane consisting of a comprehensive psychic library—then turn to the creature for advice. If you cast this spell on your familiar, your familiar adds your spellcasting ability modifier on checks to Recall Knowledge with the Lore skill of your choice, much like it does for Acrobatics and Stealth. Your familiar must have the speech familiar ability in order to share any information it learns with you. If you cast this spell on your eidolon, it instead becomes trained in the Lore skill. If you lose physical contact with the target, its connection to the Akashic Record is severed and timely tutor immediately ends. ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":true},{"id":"341","name":"Touch of Idiocy","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=341","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Dull a target's mind with a touch.","effect":"You dull the target's mind; the target must attempt a Will save. Success The target is unaffected. Failure The target is stupefied 2. Critical Failure The target is stupefied 4. ---","conditions":["stupefied"],"tags":["mental"],"heightened":[],"sustained":false},{"id":"1022","name":"Umbral Extraction","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1022","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Mental","Shadow"],"rating":null,"rval":0,"gortle":"","desc":"Attempt to steal a spell slot.","effect":"You prepare to steal spells from your foes, ripping them from the foe's shadow to stow them in an ephemeral pocket in the Shadow Plane. You gain a temporary spell slot, which you can fill only by stealing a spell from an enemy spellcaster. During umbral extraction's duration, you can use the Steal action to attempt to take one of the foe's prepared spells or unused spontaneous spell slots instead of an item. You can also make one attempt to Steal as part of Casting umbral extraction . If you succeed at your check to Steal a spell, you deal 1d4 mental damage to the target per level of the spell stolen due to the psychological toll of the spiritual emptiness created by wrenching the spell away, and you place the stolen spell in your temporary spell slot. It gains the shadow trait if cast from this temporary slot. Determine the stolen spell at random from the target's spells that are 1 level lower than umbral extraction , or from spells of the same level if you got a critical success. If the target has no spell slots of that level, use the highest level below that in which the target does have a spell slot. (If the target has no eligible spells, you get nothing, but you can continue to attempt to Steal spells for the remaining duration.) If the target is a prepared caster, you randomly steal one of their prepared spells. If the target is a spontaneous caster, you instead steal an unexpended spell slot of the appropriate level and determine the spell at random from all the target's known spells at that level. You can't steal a target's innate spells, focus spells, or cantrips. You know what the spell is as soon as you steal it, and your temporary spell slot becomes a spell slot of the same level as the spell you stole. As normal, you can Steal only from a target within your reach. Once you've placed a spell in your temporary spell slot, you can't attempt to Steal more spells. If you succeed at your Thievery check, you must take the spell you stole. Even if you're a spontaneous caster, you can use the temporary spell slot only to cast the stolen spell and you can cast only the stolen spell from your temporary spell slot. When umbral extraction ends, you lose the temporary spell slot and any spell still stored in it. When you cast umbral extraction , any previous casting of umbral extraction currently affecting you ends. ---","conditions":[],"tags":["damage","illusion","mental"],"heightened":[],"sustained":false},{"id":"1211","name":"Umbral Mindtheft","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1211","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Mental","Shadow","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You prepare to steal a broad field of knowledge from another creature, siphoning it from their mind and storing it in a pocket of the  Shadow Plane  connected to your own mind.","effect":"You prepare to steal a broad field of knowledge from another creature, siphoning it from their mind and storing it in a pocket of the Shadow Plane connected to your own mind. During the spell's duration, you can use the Steal action to attempt to take one Lore skill proficiency from a creature instead of Stealing an item. You can also make one attempt to Steal as part of Casting the Spell. If you succeed at your check to Steal a Lore skill, you deal 2d6 mental damage to the target if they were trained in that skill, plus 2d6 additional mental damage per proficiency rank they have in that skill above trained, as the sudden loss of knowledge leaves an aching absence in the target's mind. Determine the Lore skill at random from among those known by the target; on a critical success, you learn what Lore skills the creature is proficient in and can select the skill rather than choosing at random. If the target isn't trained in any Lore skills, you get nothing, but you can continue to attempt to Steal Lore from other creatures for the remaining duration. The target loses the benefits of its training in that Lore skill, and you gain their proficiency rank in that Lore skill. This effect lasts until your next daily preparations or until you are incapacitated, in which case the Lore siphons back into the target creature's mind from the Shadow Plane, wherever you both may be. As normal, you can Steal only from a target within your reach. Once you've stolen one Lore skill, you can't attempt to Steal more Lore. If you succeed at your Thievery check, you must take the Lore you stole. ---","conditions":[],"tags":["damage","illusion","mental"],"heightened":[],"sustained":false},{"id":"1325","name":"Voice on the Breeze","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1325","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"10 miles","target":"10-foot burst","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Air","Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Whisper a message far away.","effect":"You whisper a secret message or sound into the wind, which carries it to a designated spot. The message travels to a specific 10-foot burst within range that's familiar to you, provided there's a path for the wind to follow between you and the area. The gentle breeze goes all but unnoticed until it reaches its destination, where it delivers its whisper-quiet message. The message is delivered regardless of who or what is present to hear it, even if no one receives it at all. Once the message is delivered, the spell ends. Your message can contain no more than 25 words, 1 round's worth of other sounds, or a simple rustling in the air at the target location. It moves at a speed of your choosing between 1 mile per hour and 1 mile per 10 minutes; when it arrives, the wind swirls around the area and whispers the full message. A voice on the breeze can't activate magical effects triggered by voices.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"4th","text":"The range increases to 1,000 miles, and the message can contain up to 100 words."}],"sustained":false},{"id":"371","name":"Water Walk","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=371","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Buoy a creature so it can walk on water.","effect":"The target can walk on the surface of water and other liquids without falling through. It can go underwater if it wishes, but in that case it must Swim normally. This spell doesn't grant the ability to breathe underwater.","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"The spell's range increases to 30 feet, the duration increases to 1 hour, and you can target up to 10 creatures."}],"sustained":false},{"id":"1397","name":"Waterproof","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1397","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 object up to 10 Bulk","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Water"],"rating":null,"rval":0,"gortle":"","desc":"Protect an object against becoming wet.","effect":"You prevent the target item from taking on water or becoming wet for the duration of the spell. The hydrophobic properties of the spell also grant resistance 10 to acid and a +2 bonus to saves and DCs against damaging effects with the water or acid traits.","conditions":[],"tags":["concentrate","defense"],"heightened":[{"label":"4th","text":"The duration is 1 day."},{"label":"8th","text":"The duration is unlimited."}],"sustained":false},{"id":"374","name":"Web","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=374","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"Reflex","traits":["Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"Form a web that keeps creatures from moving.","effect":"You create a sticky web in the area that impedes creatures' movement each time they try to move through it. Squares filled with the web are difficult terrain. Each square can be cleared of the web by a single attack or effect that deals at least 5 slashing damage or 1 fire damage. A square has AC 5, and it automatically fails its saving throws. Each time a creature in the web begins to use a move action or enters the web during a move action, it must attempt an Athletics check or Reflex save against your spell DC to avoid taking a circumstance penalty to its Speeds or becoming immobilized. A creature that gets out of the web ceases to take a circumstance penalty to its Speed from the web. Critical Success The creature is unaffected, and it doesn't need to attempt further Athletics checks or saving throws against the web this turn. If it used an Athletics check, it clears the web from every square it leaves after leaving the square. Success The creature is unaffected during its action. If it used an Athletics check, it clears the web from every square it leaves after leaving the square. Failure The creature takes a –10-foot circumstance penalty to its Speeds until the start of its next turn. Critical Failure The creature is immobilized until the start of its next turn, after which it takes a –10-foot circumstance penalty to its Speeds for 1 round. It can attempt to Escape to remove its immobilized condition.","conditions":["immobilized"],"tags":["control","damage","debuff"],"heightened":[{"label":"4th","text":"The spell's area increases to a 20-foot burst, and its range increases to 60 feet."}],"sustained":false},{"id":"669","name":"Aqueous Orb","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=669","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"Reflex","traits":["Conjuration","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"APG move an orb of water around to put out fires or grab people. It is multiturn sustainable forced movement. Yes people can get out of it with a trivial athletics check on their turn. But next turn you can try again. If you really want to push people around, normally only important if you want to break up a formation or if there is some good terrain around, then this is a good spell. Combine with Laughing Fit for the ultimate cruelty.","desc":"Roll a ball of water to put out fires and engulf creatures.","effect":"A sphere of water 10 feet in diameter forms in an unoccupied space in range, either on the ground or on the surface of a liquid. When you Cast the Spell and each time you Sustain the Spell, you can roll the orb, moving it up to 10 feet along the ground or the surface of a liquid. You can gain this effect multiple times in the same round by Sustaining the Spell multiple times. The orb can move through the spaces of any creatures or obstacles that wouldn't stop the flow of water. It extinguishes non-magical fires it moves through of its size or smaller, and it attempts to counteract any magical fires it moves through. If it fails to counteract a given fire, it can't counteract that fire for the duration of the spell. The orb can also collect creatures it moves through. Any Large or smaller creature whose space the orb tries to move through can attempt a Reflex save against your spell DC to avoid being engulfed. If a creature succeeds at this save, it can either let the orb pass (remaining in its space or moving out of the orb's path into a space of the creature's choice) or allow itself to be pushed in front of the orb to the end of the orb's movement. The orb can try to Engulf the same creature only once per turn, even if you roll it onto a creature's space more than once. A creature that fails its save is pulled into the orb. It becomes grabbed, moves along with the orb, and must hold its breath or begin suffocating (unless it can breathe in water). An engulfed Medium or smaller creature and anyone trying to affect that creature follow the normal rules for aquatic battles. An engulfed Large creature is usually big enough that parts of it stick out from the water, and it can reach out of the water. An engulfed creature can get free either by Swimming with a successful DC 10 Athletics check or by Escaping against your spell DC. A creature that critically failed its Reflex save is further stuck and must attempt to Escape instead of Swim. A freed creature exits the orb's space and can immediately breathe. The orb can contain as many creatures as can fit in its space. When the spell ends, all creatures the orb has engulfed are automatically released. ---","conditions":["grabbed"],"tags":["control"],"heightened":[],"sustained":true},{"id":"1329","name":"Cave Fangs","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1329","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Earth","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE fireball piercing damage plus difficult terrain that lasts for a minute. Useful.","desc":"Make flowstone spikes bite creatures and impede movement.","effect":"Sharp flowstone formations protrude from the ground and ceiling, dealing 6d6 piercing damage to creatures in the area with a basic Reflex save. Densely packed with protrusions, the area becomes difficult terrain for the duration. The protrusions turn to dust when the spell ends. You can Dismiss the spell.","conditions":[],"tags":["concentrate","control","damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1951","name":"Croak Voice","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1951","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Curse","Manipulate","Morph"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"HoW inflict a frog's voice on an enemy caster, even if they save.","desc":"You cause the target creature’s vocal chords to swell like those of a frog.","effect":"You cause the target creature’s vocal chords to swell like those of a frog. The target must attempt a Fortitude save. Critical Success The target is unaffected. Success The target's voice becomes hoarse, and speaking becomes painful. Whenever it uses an action that has the auditory trait or attempts to Cast a Spell that doesn't have the subtle trait, it must succeed at a DC 5 flat check or the action is lost. Once per round, the target can spend an Interact action to massage its throat, attempting a Fortitude save against your spell DC. On a success, the spell ends. Failure As success, but using an action with the auditory trait also deals 2d10 mental damage to the target as the sound of its distorted voice grates on its ears. Critical Failure As failure, but the damage for using an action with the auditory trait is doubled, and the target can't use an Interact action to attempt a Fortitude save to end the effect early.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage for using an action with the auditory trait increases by 1d10."}],"sustained":false},{"id":"1426","name":"Deep Sight","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1426","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination","Rare"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"P194 long term dark vision or greater darkvision.","desc":"Your eyes darken until they become entirely pitch black.","effect":"Your eyes darken until they become entirely pitch black. You grant yourself the ability to see in the darkness. You gain darkvision. If you already have darkvision, you gain greater darkvision.","conditions":[],"tags":["utility"],"heightened":[{"label":"7th","text":"The duration is until the next time you make daily preparations."}],"sustained":false},{"id":"2462","name":"Eagle's Cry","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2462","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Auditory","Concentrate","Manipulate","Sonic","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SK a cone of sonic damage and a fear effect on a fortitude save. Can be better than Fear 3 at this level as it affects mindless creatures; area of effect is better against some creatures though selecting targets is easier to avoid allies. Very good spell.","desc":"You let out the mighty cry of a majestic eagle that pierces eardrums.","effect":"You let out the mighty cry of a majestic eagle that pierces eardrums. This cry deals 4d8 sonic damage. Each creature in the area must attempt a Fortitude saving throw. Critical Success The creature is unaffected. Success The creature takes half damage and is frightened 1. Failure The creature takes full damage and is frightened 2. Critical Failure The creature takes double damage, is frightened 2, and is fleeing for 1 round.","conditions":["fleeing","frightened"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The damage increases by 3d8."}],"sustained":false},{"id":"2481","name":"Echo Jump","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2481","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"basic Reflex","traits":["Concentrate","Force","Manipulate","Teleportation","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SK teleport up to 30ft leaving a force explosion behind.","desc":"You teleport to an unoccupied space within range, leaving behind a faint echo of your form that explodes with magical force.","effect":"You teleport to an unoccupied space within range, leaving behind a faint echo of your form that explodes with magical force. Each creature within a 10-foot emanation from your previous location takes 4d8 force damage.","conditions":[],"tags":["concentrate","damage","teleportation","utility"],"heightened":[{"label":"+2","text":"The range increases by 10 feet, and the damage increases by 3d8."}],"sustained":false},{"id":"119","name":"Fireball","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=119","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"500 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Evocation","Fire"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"not as much damage as you would hope, but great range and area of effect. Good candidate for a signature spell. The main problem with this being avoiding catching your allies.","desc":"An explosion of fire in an area burns creatures.","effect":"A roaring blast of fire appears at a spot you designate, dealing 6d6 fire damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1067","name":"Gasping Marsh","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1067","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Evocation","Poison","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"P177 area of effect poison damage and sickened. You can sustain it and use it on other targets next round.","desc":"With a rattling hiss, you create a quickly evaporating mist of invisible poisonous marsh gas to smother creatures in the area.","effect":"With a rattling hiss, you create a quickly evaporating mist of invisible poisonous marsh gas to smother creatures in the area. When you Sustain the Spell, the mist dissipates completely from the previous area, and you can select a new area within range to fill with the mist. If you don't Sustain the Spell, the mist dissipates and the spell ends. You deal 4d6 poison damage to each breathing creature that starts its turn in the area. Each affected creature must attempt a Fortitude save. The creature is then temporarily immune to gasping marsh for 1 minute. Critical Success The creature is unaffected. Success The creature takes half damage. Failure The creature takes full damage and is sickened 1. Critical Failure The creature takes double damage, is sickened 2, and takes 1d8 persistent poison damage. ---","conditions":["invisible","sickened"],"tags":["damage","utility"],"heightened":[],"sustained":true},{"id":"138","name":"Glyph of Warding","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=138","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 container or a 10-foot-by-10-foot area","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Abjuration"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"make a spell trap, or a bomb if you can make yourself immune. Don't forget you can heighten it and get some very big spells in here. Well the designers have addressed this spell and made some clarifications. Basically you can’t force someone else to activate it, they have to interact with it. So using this spell on an item to use like a grenade is just going to fail. Which is sensible. You also have to use all the triggers - move, touch or open - not just one. But this still effectively allows you to put glyphs on small items, which you can trigger when you want. By having someone else, perhaps your familiar, trigger the item by touching or moving them, or maybe just even deliberately saying the wrong password when you touch them. Or maybe you can convince an opponent to take a trapped item. The question really is what hostile effect can you put in them that is useful when triggered? It is possible to get immunity to effects if you might be caught in an area of effect. Metamagic and Safeguarded Spell work in Staves, so probably in scrolls and glyphs too. Heal and Harm are hostile to some creatures and not others. What will your GM let you do? This has been released in the remaster as a Ritual Rune Trap.","desc":"Store a spell in a symbol to make a trap.","effect":"You craft a trap by binding a hostile spell into a symbol. While Casting this Spell, you also Cast a Spell of a lower spell level to store in the glyph. The stored spell must take 3 actions or fewer to cast, have a hostile effect, and target one creature or have an area. You can set a password, a trigger, or both for the glyph. Any creature that moves, opens, or touches the target container or enters the target area that doesn't speak the password or that matches the trigger activates the glyph, releasing the harmful spell within. Once a spell is stored in the glyph, the glyph gains all the traits of that spell. If the stored spell targets one or more creatures, it targets the creature that set off the glyph. If it has an area, that area is centered on the creature that set off the glyph. Glyph of warding 's duration ends when the glyph is triggered. The glyph counts as a magical trap, using your spell DC for both the Perception check to notice it and the Thievery check to disable it; both checks require the creature attempting them to be trained in order to succeed. You can Dismiss glyph of warding . The maximum number of glyphs of warding you can have active at a time is equal to your spellcasting ability modifier. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"577","name":"Gravity Well","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=577","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"Reflex","traits":["Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"like a mini black hole. Everyone moves towards the centre. Ranged, area of effect forced movement. Highly unusual. I guess the obvious use is to suck people off the edge of a cliff. Great if you have some terrain or damaging areas.","desc":"Pull all creatures towards the center of a sphere of altered gravity.","effect":"You create a sphere of altered gravity. All creatures and unsecured objects in the area move towards the center, depending on their Reflex saving throws. This follows the rules for forced movement. If there’s not enough space near the center of the sphere, creatures and objects nearer to the center move first, and others move as far as they can without being blocked, up to the amount set by their saving throw outcomes. Critical Success The creature is unaffected. Success The creature moves 5 feet toward the center. Failure The creature moves 15 feet toward the center. Critical Failure The creature moves 30 feet toward the center. ---","conditions":[],"tags":["control"],"heightened":[],"sustained":false},{"id":"147","name":"Haste","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=147","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"","traits":["Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"Heightened ★★★★★ you get an extra action but only for a stride or strike. You can take it at any time but you only gain it at the start of your turn so it doesn't help the caster on the first round it is cast. A very strong buff, just not superpowered anymore as it takes a while to pay off. Better when it is heightened to multiple targets.","desc":"Speed up a creature so it can attack or move more often.","effect":"Magic empowers the target to act faster. It gains the quickened condition and can use the extra action each round only for Strike and Stride actions.","conditions":["quickened"],"tags":[],"heightened":[{"label":"7th","text":"You can target up to 6 creatures."}],"sustained":false},{"id":"1358","name":"Heatvision","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1358","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Fire","Manipulate","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a new PRECISE sense. Heatvision duration 1 or all day at 6th rank. Very nice but it is not going to work versus undead or constructs,","desc":"Let a creature see heat.","effect":"The target visually senses the heat energy emitted by the creatures and objects around it, gaining infrared vision at a range of 60 feet as a precise sense. This vision can detect any warm-blooded creature or source of heat not completely covered behind a solid object, such as a wall; this bypasses any concealement granted by smoke or darkness. It can similarly detect especially cold creatures and sources of cold. Almost all creatures with the cold or fire trait can be detected with heatvision . Undead and constructs are typically the same temperature as their environment and can't be detected with heatvision . The GM decides in other cases.","conditions":[],"tags":["concentrate","utility"],"heightened":[{"label":"6th","text":"The duration lasts until you next make your daily preparations, and the range increases to 120 feet."}],"sustained":false},{"id":"172","name":"Lightning Bolt","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=172","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Electricity","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"Better damage than a fireball but harder to get all the targets you want lined up.","desc":"Lightning strikes all creatures in a line.","effect":"A bolt of lightning strikes outward from your hand, dealing 4d12 electricity damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d12."}],"sustained":false},{"id":"962","name":"Ooze Form","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=962","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Polymorph","Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"this is awesome. For sure these forms are all slow which is a major problem, but you get some really amazing abilities. It's a melee option. Immunities to critical hits and precision damage, abysmal AC, motion sense, some swimming and climbing options, acid attacks. Plus it scales so far up levels even level 8. There is reach, a stunning attack option. Rogues and Swashbucklers are going to hate that this is in the game and Druids will be jealous. This spell breaks through the limits normally associated with the Occult list. Here you are getting a polymorph, a battle form, an elemental acid attack. It gives Occult so many options they don’t have another easy way to get.","desc":"Turn into an ooze battle form.","effect":"You invoke all things that seep and ooze, your body dissolving into a thick slurry and then reconstituting itself into a Medium ooze battle form. When you first cast this spell, choose black pudding, gelatinous cube, gray ooze, or ochre jelly. While in this form, you gain the ooze trait. You can Dismiss the spell. You gain the following statistics and abilities regardless of which battle form you choose: AC = 7 + your level. Ignore your armor's check penalty and Speed reduction. 20 temporary Hit Points. You are immune to critical hits, precision damage, and visual effects. Resistance 5 to acid, piercing, and slashing damage. No vision and motion sense 30 feet. You can sense nearby motion through vibration and air movement as a precise sense. One or more unarmed melee attacks specific to the battle form you choose, which are the only attacks you can Strike with. You're trained with them. Your attack modifier is +14, and you use the listed damage. These attacks are Strength based (for the purpose of the enfeebled condition, for example). If your unarmed attack modifier is higher, you can use it instead. Athletics modifier of +14, unless your own is higher. You also gain specific abilities based on the ooze: - Black Pudding Speed 15 feet, climb 15 feet; Melee Single Action pseudopod, Damage 2d6+5 bludgeoning and 1d8 acid. - Gelatinous Cube Speed 15 feet; Melee Single Action cube face, Damage 1d6+5 acid; a creature hit by your cube face Strike must succeed at a Fortitude save against your spell DC or be stunned 1 (or paralyzed for 1 round on a critical failure); this save has the incapacitation trait. - Gray Ooze Speed 15 feet, climb 15 feet, swim 15 feet; Melee Single Action pseudopod, Damage 1d6+5 bludgeoning and 1d6 acid, and you can spend an action after a hit to Grab the target. - Ochre Jelly Speed 15 feet, climb 10 feet; resistance 5 to electricity; Melee Single Action pseudopod, Damage 1d8+5 bludgeoning and 1d8 acid, and you can spend an action after a hit to Grab the target.","conditions":["enfeebled","paralyzed","stunned"],"tags":["defense","utility"],"heightened":[{"label":"4th","text":"Your battle form is Large, and your attacks have 10-foot reach. You must have enough space to expand into or the spell is lost. You instead gain 30 temporary HP; resistance 7 to acid, piercing, and slashing; attack modifier +16; damage bonus +9; and Athletics +16. Your motion sense has a range of 40 feet."},{"label":"5th","text":"Your battle form is Huge, and your attacks have 15-foot reach. You must have enough space to expand into or the spell is lost. You instead gain 40 temporary HP; resistance 10 to acid, piercing, and slashing; attack modifier +18; damage bonus +6 and double damage dice; and Athletics +20. Your motion sense has a range of 60 feet."},{"label":"8th","text":"Your battle form is Gargantuan (20-foot-by-20-foot space), and your attacks have 20-foot reach. You must have enough space to expand into or the spell is lost. You instead gain 60 temporary HP; resistance 12 to acid, piercing, and slashing; attack modifier +28; damage bonus +13 and double damage dice; and Athletics +29. Your motion sense has a range of 60…"}],"sustained":false},{"id":"987","name":"Roaring Applause","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=987","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"it's a single target slow, but they lose their reactions anyway. It does nothing much extra on a critical failure (maybe if you are out of combat). If your allies have Attack of Opportunity it will likely trigger that. Heightens at level 6 to multiple targets. Obviously if it is successful, sustain it and keep triggering those attacks. Deadly in the right party.","desc":"Force the target to cheer and applaud you.","effect":"Your flamboyant flourish invokes such powerful feelings in your audience that you incite cheers and applause. Targets of this spell must be able to see, hear, or otherwise understand you. The targets must attempt a Will save. Critical Success The target is unaffected. Success The target becomes mildly distracted by your display and applauds while it isn't fully occupied. It can't use reactions. Failure The target applauds you so vigorously that it can't use reactions and is slowed 1. The applause is so involved that it has the manipulate trait. This triggers reactions based on the manipulate trait at the start of the target's turn. Critical Failure As failure, plus the target is so distracted by its vigorous applauding of you that it's fascinated with you.","conditions":["fascinated","slowed"],"tags":["emotion","mental"],"heightened":[{"label":"6th","text":"You can target up to 10 creatures."}],"sustained":true},{"id":"988","name":"Rouse Skeletons","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=988","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"basic Reflex","traits":["Necromancy"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"this is the necromancer's response to Flaming Sphere or Spiritual Weapon. A mass of skeletons that attack an area and can be moved every round when you sustain. Less damage, but also difficult terrain.","desc":"Rouse a squadron of skeletons to claw your foes.","effect":"Misshapen skeletal forms erupt from a solid surface, such as a stone floor, and fill the burst. The area they fill is difficult terrain. Their grasping claws deal 2d6 slashing damage to creatures on the ground in the area when the skeletons first appear (basic Reflex save). On subsequent rounds, the first time you Sustain the Spell each round, you can move the area of skeletons up to 20 feet within the range of the spell and deal 2d6 slashing damage (basic Reflex save) to each creature in their new area. Damaging or destroying the skeletons is irrelevant, as new bones pull forth from the ground to repair and replace any that are obliterated.","conditions":[],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The damage increases by 1d6."}],"sustained":true},{"id":"995","name":"Shadow Projectile","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=995","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Shadow","Visual"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a reaction that triggers on an ally's ranged attack. It will very likely give them flat footed on their target. Plus some extra damage. Obviously if you have an archer, especially a rogue archer, in your group this is a big bonus. Is this spell worth it? Maybe not if your 3rd level slot is your top slot, but once you get above that level it's a really nice addition to a tough fight.","desc":"React when an ally makes a ranged attack to create a shadow double of the attack, distracting and damaging the foe.","effect":"You create an illusory duplicate of your ally's ranged attack to confuse your opponents. You launch an illusory double of your ally's projectile or spell at the same target, leaving the enemy unsure which attack to avoid. The target takes 3d8 mental damage, depending on its Will save. Regardless of the result of its save, it's temporarily immune to shadow projectile spells for 1 hour. Critical Success The creature is unaffected. Success The creature is flat-footed against the triggering attack. Failure The creature is flat-footed against the triggering attack and takes full damage from your illusory projectile. Critical Failure As failure, but double damage.","conditions":["off-guard"],"tags":["damage","illusion"],"heightened":[{"label":"+2","text":"The damage increases by 1d8."}],"sustained":false},{"id":"289","name":"Slow","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=289","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"Heightened ★★★★★ costing your enemy actions is very effective. Great when it is heightented to 10 targets. It is still very good against one target as your enemy still loses one action on a normal successful save. Whether one action is significant or not depends on the enemy and how your team plays. If all everybody does is run forward into melee then this won’t make much difference outside of a critical failure. But if the team is striking and moving back, forcing the enemy to spend actions moving as well, then this is much stronger. Useful against a boss even if he saves as you are trading two actions for one of his - that’s a good deal as you outnumber him. When heightened it is one of a small category of multitarget spells that can still be used when the enemy has engaged and is mixed in with your party. There is a significant group of people who argue that Slow is perhaps the strongest spell in the game and deserves to be nerfed by Incapacitation. I’m not quite at that point myself but I do agree it is very effective. As far as defence against Slow - you can improve your Fortitude score, or get yourself Quickened by Haste or a Potion of Quickness. The two conditions don’t counteract each other; they coexist and effectively nullify each other.","desc":"Make a creature slower, reducing its actions.","effect":"You dilate the flow of time around the target, slowing its actions. Critical Success The target is unaffected. Success The target is slowed 1 for 1 round. Failure The target is slowed 1 for 1 minute. Critical Failure The target is slowed 2 for 1 minute.","conditions":["slowed"],"tags":[],"heightened":[{"label":"6th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1191","name":"Temporal Twin","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1191","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"one willing ally","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"DA creates a temporal copy of a single action from an ally on your last turn. They have to have a reaction to use it. Seems like replaying the Barbarians Strike is a pretty good option. But there is a lot of flexibility here.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1019","name":"Time Jump","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1019","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"two moves for the price of one action plus a third level spell slot. Poor value early. Important at higher levels as it is a cheaper escape spell. Note that you seem to teleport, you don’t actually teleport, so the move has to be possible.","desc":"Leap forward in time, moving swiftly.","effect":"You leap forward a few seconds in time, appearing across the battlefield in the blink of an eye. You gain 2 actions, each of which must be used to Leap, Stand, Step, or Stride. If you have an appropriate Speed, you can add Burrow, Climb, Fly, or Swim to this list. While you take these actions, time pauses. All other creatures are completely unaware of your actions, can't speak, and can't use any actions that would be triggered by your movement. While you're taking these actions, you can't take any other actions, including any that would be triggered by the move actions. Once the actions are complete, time starts again, and to onlookers, you seem to have suddenly teleported across the distance you traveled. Leaping forward through time is disorienting, so if you use time jump again within 1 minute of using the spell, you become stupefied 4 for 1 minute. ---","conditions":["stupefied"],"tags":["utility"],"heightened":[],"sustained":false},{"id":"1736","name":"Vampiric Feast","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1736","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"basic Fortitude","traits":["Concentrate","Death","Manipulate","Void"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC range touch drain and temporary healing. Better if you can add range to it. Renamed from Vampiric Touch","desc":"Deal void damage and gain temporary Hit Points with a touch.","effect":"Your touch leeches the lifeblood out of a target to empower yourself. You deal 6d6 void damage to the target. You gain temporary Hit Points equal to half the void damage the target takes (after applying resistances and the like). You lose any remaining temporary Hit Points after 1 minute.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"354","name":"Vampiric Touch","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=354","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"basic Fortitude","traits":["Death","Necromancy","Negative"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"range touch drain and temporary healing. Better if you can add range to it. In the remaster this is called Vampiric Feast","desc":"Deal negative damage and gain temporary HP with a touch.","effect":"Your touch leeches the lifeblood out of a target to empower yourself. You deal 6d6 negative damage to the target. You gain temporary Hit Points equal to half the negative damage the target takes (after applying resistances and the like). You lose any remaining temporary Hit Points after 1 minute.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1752","name":"Wall of Thorns","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1752","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"wall spells are good and this is the lowest level solid one. Separate a group of enemies for a round or two - it’s all you’ll need. Give the party a chance to run away or just take out half of your enemies while the other half can’t get to you. Cover from ranged attacks. In the remaster now available to arcane.","desc":"Grow a wall of brambles.","effect":"You grow a wall of thorny brambles from the ground. You create a 5-foot-thick wall of brambles and thorns in a straight line up to 60 feet long and 10 feet high. You must create the wall in an unbroken open space so its edges don't pass through any creatures or objects, or the spell is lost. The wall stands vertically. If you wish, the wall can be of a shorter length or height. Everything on each side of the wall has cover from creatures on the opposite side, and the wall's spaces are difficult terrain. For every move action a creature uses to enter at least one of the wall's spaces, that creature takes 3d4 piercing damage. Each 10-foot-by-10-foot section of the wall has AC 10, Hardness 10, and 20 Hit Points. It's immune to critical hits and precision damage. A destroyed section can be moved through freely.","conditions":[],"tags":["concentrate","control","damage"],"heightened":[{"label":"+1","text":"The Hit Points of each section of the wall increase by 5, and the piercing damage increases by 1d4."}],"sustained":false},{"id":"1028","name":"Wall of Water","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1028","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"SOM an interesting wall. I think it was good value if you can breathe water, or defend just behind it. Because you have to swim through the wall it will cost actions. They have to stop moving and use another movement action to get through. They also can’t step in water, only stride. If you have long range piercing weapons or polearms, it won’t hurt you much. So you may be able to force them to come to you. But against certain enemies it's just not going to be useful. If they have lots of archers then use Wall of Wind instead.","desc":"Create a wall of water, forcing foes to swim through.","effect":"Raising your hand in the air, you call a massive wave onto the battlefield. The wall stays upright in a straight line that is 60 feet long, 10 feet high, and 5 feet thick. Any non-magical fires within the wall of water's area that are its size or smaller are put out instantly. It also attempts to counteract any magical fires in its area. Both of these effects happen when the spell is cast and whenever a fire enters the wall's area. If the wall fails to counteract a given fire, it can't counteract that fire for the duration of the spell. Bludgeoning or slashing projectiles can't pass through the wall, and piercing projectiles have their range increments halved if they pass through the wall. A creature traversing the wall of water needs to Swim through. The rules of aquatic combat apply to creatures traversing the wall of water , targeting creatures within the wall, or passing through the wall. For instance, a bludgeoning or slashing melee attack targeting a creature in the wall would take a –2 circumstance penalty. ---","conditions":[],"tags":["control","debuff"],"heightened":[],"sustained":false},{"id":"1416","name":"Wooden Double","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1416","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Manipulate","Wood"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"ROE a reaction to negate most of a critical hit.","desc":"React to leave a wooden double of yourself to take a hit for you.","effect":"A wooden double appears out of nowhere and takes the blow in your place. Take a Step action. A wooden block of your size and roughly shaped like you appears in the space you left and absorbs the hit. This block has Hardness 5 and 20 Hit Points. If the wooden block is destroyed, you take any excess damage that the block didn't absorb. After taking the blow, the wooden block collapses into a pile of splinters and dust.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The block's Hit Points increase by 10."}],"sustained":false},{"id":"665","name":"Agonizing Despair","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=665","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Emotion","Enchantment","Fear","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG single target damage and frightened","desc":"Mentally damage and frighten a creature.","effect":"Your target's mind tumbles down a deep well of dread, dwelling so intently on deep-seated fears that it's painful. The target takes 4d6 mental damage with a Will saving throw. Critical Success The target is unaffected. Success The target takes half damage and becomes frightened 1. Failure The target takes full damage and becomes frightened 2. Critical Failure The target takes double damage and becomes frightened 3.","conditions":["frightened"],"tags":["damage","emotion","fear","mental"],"heightened":[{"label":"+1","text":"Increase the damage by 2d6."}],"sustained":false},{"id":"22","name":"Bind Undead","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=22","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 mindless undead creature with a level no greater than  bind undead 's spell level","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"","traits":["Necromancy"],"rating":"🟢🟢🟢","rval":3,"gortle":"steal a minion for the day. Maybe a little narrow, and not if your cleric likes to burst heal.","desc":"Take control of a mindless undead.","effect":"With a word of necromantic power, you seize control of the target. It gains the minion trait. If you or an ally uses any hostile actions against the target, the spell ends. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1312","name":"Blastback","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1312","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Air","Concentrate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE this is like Blazing Dive but done as a feather fall style reaction. Cute. Definitely some manoeuvres and special entry techniques you could do with this. You probably can trigger it OK with jumping. Just check with your GM as it involves a bit of interpretation. Ways to do that is the Jump spell which is actually a reasonable thing all by itself. Or items like Greater Boots of Bounding (still have to roll) or Blast Boots (moderate and up). Or you can just fall with Cat Fall. After some other sort of flying first.","desc":"React to emit a shockwave when you land after a fall.","effect":"You hit the ground with a shuddering boom, propelling the force of your fall out in a wave. You take no damage from the fall as the displaced air allows you to land gently, but all other creatures in the spell's area take 6d4 bludgeoning damage. Creatures that fail their save are also pushed back 5 feet.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The emanation increases by 10 feet, and the damage increases by 1d4."}],"sustained":false},{"id":"869","name":"Blazing Dive","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=869","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Air","Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM 10 out of 10 for style points. Such a great cinematic special effect. If you have a strong offensive party then this is really good, maybe a bit risky to dive into the centre of battle all the time as a Sorcerer. How aggressive is your character? Plus it is a short range utility fly. Fantastic if you want to close with the enemy.","desc":"Fly up, then dive in an explosion of superheated air.","effect":"Superheated air collects under you, buoying you high into the sky before you plummet back down in a fiery comet. You Fly 15 feet straight up into the air, then Fly in a straight line to an empty space of your choice on the ground within 60 feet. When you land, the blistering air blasts out from you, dealing 3d4 bludgeoning damage and 3d6 fire damage (basic Reflex save) to all creatures in a 10-foot emanation.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4 bludgeoning and 1d6 fire."}],"sustained":false},{"id":"2494","name":"Blister Bomb","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2494","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"100 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Disease","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"BC a small area sickened effect with ongoing disease. Themed on biological weapons ?!. It is a useful debuff.","desc":"You launch a small bomb enchanted with a fast-acting skin disease at your foes, causing their skin to break out in horrible bleeding sores.","effect":"You launch a small bomb enchanted with a fast-acting skin disease at your foes, causing their skin to break out in horrible bleeding sores. All creatures in the area of the burst must attempt a Fortitude save. Critical Success The creature is unaffected and immune to blister pox for 1 week. Success The creature is sickened 2. Failure The creature is afflicted with blister pox at stage 1. Critical Failure The creature is afflicted with blister pox at stage 2. Blister Pox (disease) Level 5; A creature can’t reduce its sickened value below 1 while it’s taking persistent bleed damage from blister pox; Stage 1 sickened 2 (1 round); Stage 2 sickened 2 and 1d6 persistent bleed damage (1 round); Stage 3 sickened 2 and 2d6 persistent bleed damage (1 round); Stage 4 sickened 3 and 2d6 persistent bleed damage (1 day) ---","conditions":["sickened"],"tags":["concentrate","defense"],"heightened":[],"sustained":false},{"id":"39","name":"Clairaudience","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=39","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"500 feet","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Scrying"],"rating":"🟢🟢🟢","rval":3,"gortle":"spying tool. This is a good spell. It works and is safe, but other methods of spying are more flexible. Ask yourself how often will you use it? Definitely as a Wizard, a bit less as a Sorcerer.","desc":"Hear through an invisible magical sensor.","effect":"You create an invisible floating ear at a location within range (even if it's outside your line of sight or line of effect). It can't move, but you can hear through the ear as if using your normal auditory senses. ---","conditions":["invisible"],"tags":["control","utility"],"heightened":[],"sustained":false},{"id":"1384","name":"Coral Scourge","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1384","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Concentrate","Incapacitation","Manipulate","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE this is debuff combined with a slow, hence Incapacitation. Clumsy reduces their AC and reflex saves so this is always a useful debuff. Better if they have dex based saves. If they don’t spend actions removing it then it gets worse.","desc":"Fill a creature’s joints with stiffening coral growths.","effect":"Barnacles, coral, and other rough aquatic creatures grow on the target's body, getting in between their joints and stiffening their movement. This impedes the target's movement depending on the result of its saving throw. Critical Success The target is unaffected. Success The target is clumsy 1. The target can Interact to scrape the coral growths from its body, decreasing the clumsy condition to 0 and ending the spell. Failure The target is clumsy 2. Each round at the beginning of its turn, the target becomes clumsy 1 or increases its clumsy condition by 1, to a maximum of 4. The target can Interact to scrape the coral growths from its body, decreasing the clumsy condition to 0 and ending the spell. If the target's clumsy condition caused by coral scourge reaches 4, the growths spread to cover the target's entire body, and the target becomes paralyzed. Critical Failure As failure, but when the target Interacts to scrape the coral growths from its body, it reduces its clumsy condition by 1, instead of decreasing it to 0, and decreasing the clumsy condition to 0 doesn't end the spell. ---","conditions":["clumsy","paralyzed"],"tags":["concentrate","incapacitation"],"heightened":[],"sustained":false},{"id":"681","name":"Cozy Cabin","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=681","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"Will","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG a temporary (12hr) house.","desc":"Conjure a temporary cabin sheltered from the elements.","effect":"You shape a cabin 20 feet on each side and 10 feet high. This cabin has the structure trait and the same restrictions as magic items that create structures. The walls of the hut are simple and wooden, with small, square glass windows, and it has one wooden door. It doesn't include its own lock, but it has a fastener to which a lock can be applied. The interior contains three cots, one chamber pot, and a small fireplace holding a magical fire. The interior is lit with a small magical light that you can light or extinguish at will using a single action, which has the concentrate trait. The climate inside the hut is comfortable and allows creatures inside it to withstand most hostile weather conditions, but incredible heat or cold, powerful storms, and winds of hurricane force or greater destroy the hut. Other creatures can freely enter and exit the hut without damaging it, but if you exit the hut, the spell ends. You can Dismiss the spell. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"682","name":"Crashing Wave","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=682","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Evocation","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG 6d6 cone of bludgeoning damage, that heightens nicely. The water equivalent to Fireball but the area is just not as easy to use.","desc":"Smash a cone of water against foes.","effect":"You summon a crashing wave that sweeps away from you. You deal 6d6 bludgeoning damage to creatures in the area. The water also extinguishes non-magical fires in the area.","conditions":[],"tags":["damage","summon"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"2317","name":"Disruptive Transfer","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=2317","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"your speed","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Manipulate","Rare","Teleportation","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA dazzles adjacent creatures and teleport a move away.","desc":"Using Venorium Blorm’s formulas, you calculate a path through space.","effect":"Using Venorium Blorm’s formulas, you calculate a path through space. Teleport to an empty square you can see within range. Creatures adjacent to your initial location witness an array of overlapping destinations. Each of them must succeed at a Will save or become dazzled for 1 minute. ---","conditions":["dazzled"],"tags":["concentrate","teleportation","utility"],"heightened":[],"sustained":false},{"id":"895","name":"Distracting Chatter","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=895","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Auditory","Illusion"],"rating":"🟢🟢🟢","rval":3,"gortle":"inflicts flat footed at range on a Will save. Better when heightened.","desc":"Distract a creature with auditory illusions.","effect":"You bombard a target with distracting auditory illusions, surrounding them with a tumultuous cacophony of overlapping speech, whispers, screams, and muttering. The target is flat-footed, takes a –2 status penalty to purely auditory Perception checks, and must succeed at a DC 5 flat check to use auditory abilities or verbal spell components. Similarly, a creature who attempts to affect the target with an auditory effect must succeed at a DC 5 flat check or the attempt fails. The duration depends on the target's Will save. Critical Success The creature is unaffected. Success The duration is 1 round. Failure The duration is 3 rounds. Critical Failure The duration is 1 minute.","conditions":["off-guard"],"tags":["debuff","illusion"],"heightened":[{"label":"7th","text":"You can target up to five creatures."}],"sustained":false},{"id":"1386","name":"Dive and Breach","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1386","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Manipulate","Teleportation","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE teleport a short distance through the plane of water leaving some damage behind. An interesting combination spell. Great if you are close in melee.","desc":"Teleport with splashes of water.","effect":"You make the briefest of dives through the Plane of Water. You Leap 10 feet, and where you would land on the ground, you instead disappear in a splash of water, your body entering the surface like a diver entering a pool. You then exit from an unoccupied surface within 40 feet, appearing in another splash of water as you Leap out, landing 10 feet away from where you exited. Each splash deals 3d10 bludgeoning damage to all creatures in a 5-foot emanation; creatures in multiple splash zones take damage only once.","conditions":[],"tags":["concentrate","damage","teleportation"],"heightened":[{"label":"+1","text":"The damage dealt by each splash increases by 1d10."}],"sustained":false},{"id":"901","name":"Elemental Absorption","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=901","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Primal, Elemental","save":"basic Reflex","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"a flexible resistance to an element which can be handy for a Sorcerer. But you have to be taking a lot of damage for the attack to be worthwhile. Normally creatures you encounter with elemental attacks tend to be resistant to that attack So I don’t really consider that the final attack is that useful.","desc":"Resist elemental effects and then release the energy against a foe.","effect":"You absorb elemental energy, which you can release as a powerful counterattack. Choose air, earth, fire, or water. You gain resistance 5 to damage dealt by effects with the chosen elemental trait; if you choose water, you also gain resistance to cold damage. As usual, if a spell has a multiple effects, such as a spell that deals both fire damage and bludgeoning damage with superheated rocks, you gain resistance to only the effects associated with the element you chose. Keep track of how much damage you have prevented with this spell. As a 2-action activity, which has the concentrate trait and the trait matching the element you chose, you can release the stored energy. This deals damage equal to the amount you've stored (maximum 30 damage) to one enemy within 60 feet, with a basic Reflex save. The damage type depends on the element you chose: fire damage for fire; bludgeoning or cold damage for water; bludgeoning or slashing damage for air; or bludgeoning, piercing, or slashing damage for earth. After releasing the energy, the spell ends. If you do not use the stored energy before the spell ends, the energy is lost. Elemental Spell Changes Source Rage of Elements pg. 55 Add metal (electricity or slashing damage) and wood (bludgeoning or vitality damage) to the choices.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+3","text":"The resistance increases by 5 and the maximum damage increases by 30."}],"sustained":false},{"id":"688","name":"Familiar's Face","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=688","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"1 mile","target":"1 willing creature that is your animal companion or familiar","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination","Scrying"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG look and hear through your companion or familiar","desc":"Implant your senses in your animal companion or familiar.","effect":"The target becomes a scrying sensor, allowing you to see through its eyes, smell what it smells, and similarly use its other senses. If you can cast a spell with the revelation trait that affects your senses, such as see invisibility , while this spell is active, you gain the benefit of the spell through the target's senses instead of your own. You can also speak through the target, with a voice much like yours, though it takes on some of the timbre and character of the target's growls or squawks. You can use Command an Animal on the target as part of Sustaining this Spell. You don't need line of sight or line of effect to your target when you Cast this Spell. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":true},{"id":"1284","name":"Firework Blast","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1284","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"500 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane","save":"basic Fortitude","traits":["Evocation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB a lower damage fireball that blinds for a round.","desc":"You create a massive display of loud and colorful explosions.","effect":"You create a massive display of loud and colorful explosions. The explosions deal 4d6 fire damage. Creatures that fail their saves must attempt an additional Fortitude save. Creatures that critically fail their saves take a –2 circumstance penalty to this Fortitude save. Success The creature is unaffected. Failure The creature is blinded and deafened for 1 round. Critical Failure The creature is blinded for 1 round and dazzled and deafened for 1 minute.","conditions":["blinded","dazzled","deafened"],"tags":["damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1300","name":"Glass Sand","rank":3,"url":"https://2e.aonprd.com/Spells.aspx?ID=1300","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Evocation","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB a lower damage fireball with slashing and persistent damage.","desc":"You throw a handful of sand that transforms into jagged shards of glass.","effect":"You throw a handful of sand that transforms into jagged shards of glass. Creatures in the area take 4d6 slashing damage and must attempt a Reflex save. Critical Success The target is unaffected. Success The target takes half damage. Failure The target takes full damage and 1 persistent bleed damage. Critical Failure The target takes double damage and 2 persistent bleed damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage incr
