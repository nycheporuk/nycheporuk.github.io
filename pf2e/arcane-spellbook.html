e any skill in which you are at least trained that has the Recall Knowledge action. During the duration of this spell, you can call forth a tome from the extradimensional library when attempting a Recall Knowledge check using your chosen skill. This is part of the action to Recall Knowledge. You must have a hand free to do so. The tome appears in your hand, open to an appropriate page. This grants you a +1 status bonus on the Recall Knowledge check. If you roll a critical failure on this check, you get a failure instead. If the roll is successful and the subject is a creature, you gain additional information or context about the creature. Once you reference a book from your pocket library , the spell ends.","conditions":[],"tags":["buff"],"heightened":[{"label":"3rd","text":"The status bonus increases to +2 and you can reference your pocket library twice before the spell ends."},{"label":"6th","text":"The status bonus increases to +3 you can reference your pocket library three times before the spell ends."},{"label":"9th","text":"The status bonus increases to +4 and you can reference your pocket library four times before the spell ends."}],"sustained":false},{"id":"708","name":"Pummeling Rubble","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=708","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG cone of rocks for bludgeoning damage plus a push.","desc":"Hurl a cone of rocks to batter creatures.","effect":"A spray of heavy rocks flies through the air in front of you. The rubble deals 2d4 bludgeoning damage to each creature in the area. Each creature must attempt a Reflex save. Critical Success The creature is unaffected. Success The creature takes half damage. Failure The creature takes full damage and is pushed 5 feet away from you. Critical Failure The creature takes double damage and is pushed 10 feet away from you.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"Increase the damage by 2d4."}],"sustained":false},{"id":"1237","name":"Scorching Blast","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1237","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult, Primal","save":"","traits":["Evocation","Fire","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"KM two or three action attack spell, burns on a critical.","desc":"You evoke a mass of fire into the air around your outstretched fist.","effect":"You evoke a mass of fire into the air around your outstretched fist. For the remainder of your turn, you can blast targets within 30 feet with this fire by spending a single action which has the attack and concentrate traits. When you do so, attempt a ranged spell attack roll. If you hit, you inflict 2d8 fire damage. On a critical hit, the target takes 1d6 persistent fire damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The base damage increases by 1d8 and the persistent fire damage on a critical hit increases by 2."}],"sustained":false},{"id":"585","name":"Shattering Gem","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=585","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Abjuration","Earth"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M a nice scalable defence against melee attacks. I guess you can use a cheap bit of quartz as no particular cost is listed. Useful if you can precast it as a buff. But probably not strong enough to cast in combat.","desc":"A large gem floats around the target in an erratic pattern.","effect":"A large gem floats around the target in an erratic pattern. The gem has 5 Hit Points. Each time a creature Strikes the target, the target attempts a DC 11 flat check. On a success, the gem blocks the attack, so the attack first damages the gem and then applies any remaining damage to the target. If the gem is reduced to 0 Hit Points, it shatters, immediately dealing the creature that destroyed it 1d8 slashing damage (basic Reflex save), as long as that creature is within 10 feet of the target.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+1","text":"The gem has 5 additional HP, and the damage dealt by its detonation increases by 1d8."}],"sustained":false},{"id":"318","name":"Summon Construct","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=318","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane","save":"","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"as per Summon Animal but not quite the range of options. Construct immunities might be useful though. ○ Animated Broom has brush dust in their faces with a chance to waste an action recovering.","desc":"Conjure a construct to fight on your behalf.","effect":"You conjure a construct to fight for you. This works like summon animal , except you summon a common creature that has the construct trait and whose level is –1, such as those below.","conditions":[],"tags":["summon"],"heightened":[{"label":"2nd","text":"Level 1."},{"label":"3rd","text":"Level 2."},{"label":"4th","text":"Level 3."},{"label":"5th","text":"Level 5."},{"label":"6th","text":"Level 7."},{"label":"7th","text":"Level 9."},{"label":"8th","text":"Level 11."},{"label":"9th","text":"Level 13."},{"label":"10th","text":"Level 15."}],"sustained":true},{"id":"1126","name":"Synchronize Steps","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1126","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"2 willing creatures","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"","traits":["Enchantment","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"KOL turn your reactions into moves. Good for setting up flanking or a mobile style of combat. Typically you'd prefer your reactions to be attacks though.","desc":"You link the minds of two targets, enabling them to move in tandem.","effect":"You link the minds of two targets, enabling them to move in tandem. When one of the targets Steps, the other target can use a reaction to Step. When one of the targets Strides, the other target can use a reaction to Stride.","conditions":[],"tags":[],"heightened":[{"label":"5th","text":"The range increases to 60 feet, and you can target up to 10 willing creatures."}],"sustained":true},{"id":"590","name":"Temporary Tool","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=590","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane","save":"","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M create any simple tool for a minute. Will your GM let you create a ladder?","desc":"You conjure a temporary simple tool, such as a shovel or rope into your hands.","effect":"You conjure a temporary simple tool, such as a shovel or rope into your hands. It lasts until it is used for a single activity or for 1 minute, whichever comes first, after which it disappears. The tool is obviously temporarily conjured, and thus can’t be sold or passed off as a genuine item. ---","conditions":[],"tags":["summon"],"heightened":[],"sustained":false},{"id":"591","name":"Tether","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=591","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"Reflex","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M slow or maybe immobilise a target. Useful but normally you want to have the option of getting away from them. You can’t with this spell.","desc":"You use magical chains, vines, or other tethers to bind your target to you.","effect":"You use magical chains, vines, or other tethers to bind your target to you. The creature can still try to Escape, and it or others can break the tethers by attacking them (the tethers have AC 15 and 10 Hit Points). You must stay within 30 feet of the target while it is tethered; moving more than 30 feet away from your target ends the spell. The target must attempt a Reflex save. Critical Success The target is unaffected. Success The target takes a –5-foot circumstance penalty to its Speed as long as it is within 30 feet of you. Failure The target takes a –10-foot circumstance penalty to its Speed and cannot move more than 30 feet away from you until it Escapes or the spell ends. Critical Failure The target is immobilized until it Escapes or the spell ends.","conditions":["immobilized"],"tags":["control","debuff"],"heightened":[{"label":"+1","text":"The tethers’ AC increases by 3 and their Hit Points increase by 10."}],"sustained":false},{"id":"2312","name":"Threefold Limb","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2312","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Concentrate","Manipulate","Morph","Uncommon","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA melee spell for some damage and to reposition or conceal. Spell heightens for more damage.","desc":"You temporarily transform one of your limbs into water, taking the form of ice, liquid water, or steam as you desire.","effect":"You temporarily transform one of your limbs into water, taking the form of ice, liquid water, or steam as you desire. Make a melee spell attack roll. On a hit, the target takes 2d6 damage; the type of damage dealt and any additional effect depends on the form you choose. On a critical hit, double the damage. Ice The limb deals cold damage, and the target takes a –10-foot status penalty to its Speeds until the start of your next turn. This spell gains the cold trait. Liquid Water The limb deals bludgeoning damage and you can Reposition the target up to 10 feet. Steam The limb deals fire damage and steam clings to the target, making all creatures concealed to them until the start of your next turn or they perform an Interact action to wave the steam away. This spell gains the fire trait.","conditions":["concealed"],"tags":["concentrate","damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"352","name":"Unseen Servant","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=352","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"a simple invisible summon that can interact for you. Because it can’t be seen there are all sorts of tricks out of combat that you can do with this. Lasts as long as you concentrate, so it’s easy to have it precast. For pranksters, wizards with labs, or any caster that has Effortless Concentration or Final Sacrifice. Renamed to Phantasmal Minion.","desc":"Create an invisible creature to help you.","effect":"You summon an unseen servant, which you can command as part of Sustaining the Spell. It serves you until its Hit Points are reduced to 0, at which point the spell ends, or until you stop Sustaining the Spell. The unseen servant gains the summoned trait. ---","conditions":[],"tags":["summon"],"heightened":[],"sustained":true},{"id":"1414","name":"Wall of Shrubs","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1414","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE instant cover. Very useful if you need to prepare ground. Heightened versions offer better cover and more duration.","desc":"Create a wall of shrubs that provide cover.","effect":"You call forth a line of bushes native to the region to spring from the ground. The wall of shrubs stands in a line 60 feet long, is less than 5 feet tall, and is a foot thick, providing lesser cover.","conditions":[],"tags":["concentrate","control"],"heightened":[{"label":"3rd","text":"The shrubs are 10 feet tall and 5 feet thick, provide standard cover, are difficult terrain, and have a Climb DC of 15. The duration increases to 10 minutes."},{"label":"5th","text":"As 3rd rank, but the shrubs provide greater cover and the duration is 1 hour. You can choose to form a ring of shrubs with a diameter of up to 30 feet instead of a line."}],"sustained":false},{"id":"1417","name":"Wooden Fists","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1417","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Morph","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE self only, creates a magical weapon with reach. This transforms your fists so remember they are still agile and finesse. You can still use your arms normally. Better duration at higher level so it all scales well.","desc":"Turn your hands into tree trunks.","effect":"Your arms and hands swell with new growth, transforming into tree trunks twice as big as their current size. Your fists deal 1d6 bludgeoning damage, lose the nonlethal trait, and have reach.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"3rd","text":"Your fists gain the magical trait and become a striking weapon, increasing the damage your fists deal to 2d6 bludgeoning."},{"label":"7th","text":"Your fists gain the magical trait and become a greater striking weapon, increasing the damage your fists deal to 3d6 bludgeoning. The duration is 10 minutes."},{"label":"9th","text":"Your fists gain the magical trait and become a major striking weapon, increasing the damage your fists deal to 4d6 bludgeoning. The duration is 1 hour."}],"sustained":false},{"id":"2335","name":"500 Toads","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2335","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You conjure hundreds of magical toads to fill the area and hop around.","effect":"You conjure hundreds of magical toads to fill the area and hop around. The vast quantity of hopping toads provides enough weight and height for the creatures to trigger any potential trap in the area that could be triggered by the weight, movement, or position of a Medium creature. The area is difficult terrain, and the magic reconstructs any toads destroyed by traps to keep the area full of toads for the duration of the spell. ---","conditions":[],"tags":["concentrate","control"],"heightened":[],"sustained":false},{"id":"565","name":"Acidic Burst","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=565","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Acid","Evocation"],"rating":null,"rval":0,"gortle":"","desc":"You create a shell of acid around yourself that immediately bursts outward.","effect":"You create a shell of acid around yourself that immediately bursts outward, dealing 2d6 acid damage to each creature in the area.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"566","name":"Agitate","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=566","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Mental","Nonlethal"],"rating":null,"rval":0,"gortle":"","desc":"You send the target’s mind and body into overdrive, forcing it to become restless and hyperactive.","effect":"You send the target's mind and body into overdrive, forcing it to become restless and hyperactive. During the duration, the target must Stride, Fly, or Swim at least once each turn or take 2d8 mental damage that turn; The GM might decide to add additional move actions to the list for creatures who possess only a more unusual form of movement. The duration of this effect depends on the target's Will save. Critical Success The spell has no effect. Success The duration is 1 round. Failure The duration is 2 rounds. Critical Failure The duration is 4 rounds.","conditions":[],"tags":["damage","mental"],"heightened":[{"label":"+1","text":"The damage increases by 2d8."}],"sustained":false},{"id":"5","name":"Air Bubble","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=5","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"the triggering creature","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Primal","save":"","traits":["Air","Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"React to create air for a creature to breathe.","effect":"A bubble of pure air appears around the target's head, allowing it to breathe normally. The effect ends as soon as the target returns to an environment where it can breathe normally. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"857","name":"Airburst","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=857","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action","range":"","target":"all creatures and unattended objects in the area","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Evocation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"A blast of wind wildly pushes everything nearby.","effect":"A blast of wind wildly pushes everything nearby. Unattended objects of 1 Bulk or less are pushed 5 feet away from you. Large or smaller creatures must attempt a Fortitude save. Critical Success The creature is unaffected. Success The creature takes a –2 status penalty to checks made during its reactions until the end of your turn. Failure As success, and the creature is pushed 5 feet away from you. Critical Failure The creature is pushed 5 feet away from you and can't use reactions until the end of your turn.","conditions":[],"tags":["debuff"],"heightened":[{"label":"4th","text":"Increase the area to a 10-foot emanation and increase the distance objects and creatures are pushed to 10 feet."}],"sustained":false},{"id":"13","name":"Ant Haul","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=13","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Target can carry more.","effect":"You reinforce the target's musculoskeletal system to bear more weight. The target can carry 3 more Bulk than normal before becoming encumbered and up to a maximum of 6 more Bulk. ---","conditions":["encumbered"],"tags":[],"heightened":[],"sustained":false},{"id":"876","name":"Breadcrumbs","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=876","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 willing creature","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Make a trail behind a creature.","effect":"You protect your target from going astray in hostile territory by tracking where it's already been, helping it deduce where it still needs to go. The target leaves a glittering trail behind it that lasts for the spell's duration. This trail doesn't denote the direction or the order of its path—it merely indicates where the target has moved during the spell's duration.","conditions":[],"tags":[],"heightened":[{"label":"2nd","text":"The duration increases to 8 hours."},{"label":"3rd","text":"The duration increases to last until your next daily preparations."}],"sustained":false},{"id":"1383","name":"Buoyant Bubbles","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1383","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Water"],"rating":null,"rval":0,"gortle":"","desc":"Create bubbles that make a creature buoyant.","effect":"You create a thin layer of foamy bubbles that adhere to the target, causing it to float in water and similar liquids. The target doesn't sink, even if it hasn't succeeded at a Swim check this round; an already-sinking target resurfaces with the bubbles' help over the course of 1 round. If on a plane where the water or liquid has a surface, the bubbles also prevent the target from diving beneath that surface unless it succeeds at a Fortitude save against your spell DC.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"4th","text":"You can target up to 5 creatures."}],"sustained":false},{"id":"1972","name":"Carryall","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1972","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Force","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"A floating platform follows you, carrying objects.","effect":"A small platform of magical force materializes adjacent to you to carry cargo. It is invisible or has a ghostly appearance, is 2 feet in diameter, and follows 5 feet behind you, floating just above the ground. It holds up to 5 Bulk of objects (if they can fit on it). Any objects atop the platform fall to the ground when the spell ends. You can Sustain the spell to move the platform up to 30 feet along the ground, to make it stay in place, or to have it return to you and resume following you. The spell ends if a creature tries to ride atop the platform, if the platform is overloaded, if anyone tries to lift or force the platform higher above the ground, or if you move more than 60 feet away from the platform.","conditions":["invisible"],"tags":["concentrate","utility"],"heightened":[{"label":"4th","text":"The platform can carry 10 Bulk, creatures can ride atop it, and it can hover in the air, not just on the ground."}],"sustained":true},{"id":"1367","name":"Conductive Weapon","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1367","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 metal weapon that is unattended or attended by a willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Electricity","Manipulate","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Charge a metal weapon with electricity.","effect":"You channel powerful electric current through the metal of a weapon, zapping anyone the item hits. The target becomes a +1 shock weapon. If any target of an attack with the weapon is wearing metal armor or is primarily made of metal, the electricity damage die from the shock rune is 1d12. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"53","name":"Create Water","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=53","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"0 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Primal","save":"","traits":["Conjuration","Water"],"rating":null,"rval":0,"gortle":"","desc":"Conjure 2 gallons of water.","effect":"As you cup your hands, water begins to flow forth from them. You create 2 gallons of water. If no one drinks it, it evaporates after 1 day. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1491","name":"Disguise Magic","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1491","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"30 feet","target":"1 item or spell effect","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Illusion","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Mask the aura of a spell or item.","effect":"You alter how an item's or spell's magical aura appears to effects like detect magic . You can hide the auras entirely, have an item register as a common item of lower level, or make a spell register as a common spell of the same or lower rank. You can Dismiss the spell. A caster using detect magic or read aura of a higher rank than disguise magic can attempt to disbelieve the illusion using the skill matching the tradition of the spell (Arcana for arcane, Religion for divine, Occultism for occult, or Nature for primal). Further attempts by the same caster get the same result as the initial check to disbelieve.","conditions":[],"tags":["concentrate","illusion","utility"],"heightened":[{"label":"2nd","text":"You can Cast this Spell on a creature, disguising all items and spell effects on it."}],"sustained":false},{"id":"684","name":"Déjà Vu","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=684","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"100 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Incapacitation","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Make a creature do the same thing again.","effect":"You loop a thought process in the target's mind, forcing it to repeat the same actions over again. The target must attempt a Will save. If the target fails, whatever actions the target uses on its next turn, it must repeat on its following turn. The actions must be repeated in the same order and as close to the same specifics as possible. For example, if the target makes an attack, it must repeat the attack against the same creature, if possible, and if the target moves, it must move the same distance and direction, if possible, on its next turn. If the target can't repeat an action, such as Casting a Spell that has been exhausted or needing to target a creature that has died, it can act as it chooses for that action but becomes stupefied 1 until the end of its turn. ---","conditions":["stupefied"],"tags":["incapacitation","mental"],"heightened":[],"sustained":false},{"id":"2463","name":"Equal Footing","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2463","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature with a land Speed greater than yours","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"Will","traits":["Concentrate","Curse","Manipulate","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You level the field between yourself and another creature, hampering its movements if it’s quicker than you.","effect":"You level the field between yourself and another creature, hampering its movements if it’s quicker than you. The target attempts a Will save. Critical Success The target is unaffected. Success The target is clumsy 1 and takes a –10-foot status penalty to all its Speeds until the end of your next turn. Failure The target is clumsy 1 and takes a –15-foot status penalty to all its Speeds for 1 minute. During this time, it can’t benefit from bonuses to its Speeds or take other penalties to its Speeds. Critical Failure The target is clumsy 2 and takes a –15-foot status penalty to all its Speeds for 1 minute. During this time, it can’t benefit from bonuses to its Speeds or take other penalties to its Speeds. ---","conditions":["clumsy"],"tags":["concentrate","debuff"],"heightened":[],"sustained":false},{"id":"1283","name":"Fashionista","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1283","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"The target's clothes are transformed into ostentatious attire that epitomizes high-end local fashion.","effect":"The target's clothes are transformed into ostentatious attire that epitomizes high-end local fashion. No details of the target's appearance transform other than their clothes, so their weapons or armor remain unchanged in appearance. The target gains a +1 status bonus on Deception checks to Make a Distraction. You can Dismiss this spell. At the end of the spell's duration, the target's clothes revert to their original appearance.","conditions":[],"tags":["buff"],"heightened":[{"label":"+2","text":"The status bonus increases by 1, to a maximum of +4 at 7th level."}],"sustained":false},{"id":"124","name":"Floating Disk","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=124","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Force"],"rating":null,"rval":0,"gortle":"","desc":"A disk of energy follows you, carrying objects.","effect":"A disk of magical force materializes adjacent to you. This disk is 2 feet in diameter and follows 5 feet behind you, floating just above the ground. It holds up to 5 Bulk of objects (though they must be able to fit and balance on its surface). Any objects atop the disk fall to the ground when the spell ends. The spell ends if a creature tries to ride atop the disk, if the disk is overloaded, if anyone tries to lift or force the disk higher above the ground, or if you move more than 30 feet away from the disk. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1401","name":"Flourishing Flora","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1401","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":null,"rval":0,"gortle":"","desc":"Grow a patch of cacti, flowers, fruits, or roots to hurt your enemies.","effect":"Plants rapidly grow up from the ground. All creatures in the target area take 2d4 damage. The type of damage depends on the type of plant you choose to grow. On a critical failure, targets experience additional effects, also depending on what you choose to grow. The type of plant and its effects are chosen when you Cast the Spell. - Cacti Piercing damage, and 1 persistent bleed damage on a critical failure. - Flowers Poison damage, and dazzled for 2 rounds on a critical failure. - Fruits Bludgeoning damage, and clumsy 1 for 2 rounds on a critical failure. - Roots Bludgeoning damage, and the affected creatures fall prone on a critical failure.","conditions":["clumsy","dazzled","prone"],"tags":["concentrate","control","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d4, and the persistent bleed damage from cacti increases by 1."}],"sustained":false},{"id":"1371","name":"Fold Metal","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1371","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 unattended metallic object up to 5 Bulk","duration":"","school":"","traditions":"Arcane","save":"","traits":["Concentrate","Manipulate","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Bend a metal object into a ball.","effect":"You bend the target object into a smooth metallic ball no larger than an egg. The target reverts to its original shape only when you Dismiss the spell, the duration expires, or Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"You call forth a ladder or staircase to help you reach greater heights.","effect":"You call forth a ladder or staircase to help you reach greater heights. The ladder or staircase appears in a space you designate and either stands freely or connects to a nearby wall if possible. You decide the height of the ladder or staircase when casting the spell, up to a maximum height of 40 feet. The ladder or staircase is locked in place and magically supported, allowing you to ascend even if it's in an open area. The conjured ladder is simple in design and made of wood. The staircase is a spiral staircase made of wood. While both are supported and have no risk of falling, they can be damaged and destroyed as normal. The staircase is typically easier to ascend, though it's less discreet than a ladder and could possibly draw more attention. You can Dismiss the spell.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The maximum height increases by 40 feet."}],"sustained":false},{"id":"1955","name":"Hippocampus Retreat","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1955","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"10 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Attack","Concentrate","Manipulate","Morph"],"rating":null,"rval":0,"gortle":"","desc":"You temporarily shape your lower limbs into the tail of a hippocampus in order to swim away from a nearby foe after dealing a parting blow.","effect":"You temporarily shape your lower limbs into the tail of a hippocampus in order to swim away from a nearby foe after dealing a parting blow. Attempt a melee spell attack roll against the target’s AC, dealing 2d6 bludgeoning damage on a hit (or double damage on a critical hit). Then, Swim up to 30 feet; if you already have a swim Speed, you can Swim up to your Speed with a +10-foot circumstance bonus. You gain a +2 circumstance bonus to your AC against reactions triggered by this movement. At the end of the movement, your lower limbs return to normal.","conditions":[],"tags":["buff","concentrate","damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":false},{"id":"1336","name":"Instant Pottery","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1336","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"10 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Create earthenware objects.","effect":"You pull earthen material out of the environment, then shape it into one or more earthenware objects that, in combination, can be up to light Bulk. Alternatively, you can cast this spell on objects previously created with this spell, extending their duration. No object can have intricate artistry or complex moving parts, can fulfill a cost or the like, or is made of anything more than clay or earth. Each object is obviously the product of temporary magic and thus can't be sold or passed off as a valuable item.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"2nd","text":"You can create objects of up to 1 Bulk. They last 8 hours."},{"label":"3rd","text":"You can create objects of up to 2 Bulk. They last 24 hours."}],"sustained":false},{"id":"166","name":"Item Facade","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=166","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 object no more than 10 feet by 10 feet by 10 feet","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Disguise an item to look perfect or shoddy.","effect":"You make the target object look and feel as though it were in much better or worse physical condition. When you cast this spell, decide whether you want to make the object look decrepit or perfect. An item made to look decrepit appears broken and shoddy. An intact item made to look better appears as though it's brand new and highly polished or well maintained. A broken item appears to be intact and functional. Destroyed items can't be affected by this spell. A creature that Interacts with the item can attempt to disbelieve the illusion.","conditions":[],"tags":["illusion"],"heightened":[{"label":"2nd","text":"The duration is 24 hours."},{"label":"3rd","text":"The duration is unlimited."}],"sustained":false},{"id":"176","name":"Mage Armor","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=176","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Occult, Elemental","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Ward yourself with magical armor.","effect":"You ward yourself with shimmering magical energy, gaining a +1 item bonus to AC and a maximum Dexterity modifier of +5. While wearing mage armor , you use your unarmored proficiency to calculate your AC.","conditions":[],"tags":["buff","defense"],"heightened":[{"label":"4th","text":"You gain a +1 item bonus to saving throws."},{"label":"6th","text":"The item bonus to AC increases to +2, and you gain a +1 item bonus to saving throws."},{"label":"8th","text":"The item bonus to AC increases to +2, and you gain a +2 item bonus to saving throws."},{"label":"10th","text":"The item bonus to AC increases to +3, and you gain a +3 item bonus to saving throws."}],"sustained":false},{"id":"178","name":"Magic Aura","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=178","rarity":"Uncommon","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 object of 3 bulk or less","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Change how an item's magic appears to detecting spells.","effect":"You alter the appearance of an item's magic aura. You can choose to have the target's aura appear as that of a common magic item of twice magic aura 's level or lower, or to have it register as being under the effects of a spell of your choice of magic aura 's level or lower. If the target is magical, you can instead choose to have it appear as entirely non-magical. A caster using detect magic or read aura of an equal or higher spell level can attempt to disbelieve the illusion from magic aura . Magic aura doesn't mask the aura of spells that are 9th level or higher or of items that are 19th level or higher.","conditions":[],"tags":["illusion","utility"],"heightened":[{"label":"3rd","text":"You can target a creature instead of an object. When you do, you can either conceal the auras of all magic items it has or have that creature's aura appear as if it were under the effect of a spell you know."}],"sustained":false},{"id":"189","name":"Mending","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=189","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"non-magical object of light Bulk or less","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Repair one non-magical item.","effect":"You repair the target item. You restore 5 Hit Points per spell level to the target, potentially removing the broken condition if this repairs it past the item's Broken Threshold. You can't replace lost pieces or repair an object that's been completely destroyed.","conditions":[],"tags":["healing"],"heightened":[{"label":"2nd","text":"You can target a non-magical object of 1 Bulk or less."},{"label":"3rd","text":"You can target a non-magical object of 2 Bulk or less, or a magical object of 1 Bulk or less."}],"sustained":false},{"id":"581","name":"Message Rune","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=581","rarity":"Common","actions":"T","actionsRaw":"5 minutes","range":"touch","target":"1 flat unattended surface","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Linguistic","Mental"],"rating":null,"rval":0,"gortle":"","desc":"You record a message up to 5 minutes long and inscribe a special rune on any flat unattended surface within reach.","effect":"You record a message up to 5 minutes long and inscribe a special rune on any flat unattended surface within reach. The nature of the rune’s appearance is up to you, but it is visible to everyone and it must be no smaller than 2 inches in diameter. You also specify a trigger that creatures must meet to activate the rune. For the duration of the spell, creatures who meet the criteria of the trigger can touch the rune to hear the recorded message in their head as though you were speaking to them telepathically. You know when someone is listening to the message, but you do not know who is listening to it. You can Dismiss the spell. ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"1603","name":"Mindlink","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1603","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Mentally impart 10 minutes worth of information in an instant.","effect":"You link your mind to the target's mind and mentally impart to that target an amount of information in an instant that could otherwise be communicated in 10 minutes. ---","conditions":[],"tags":["concentrate","mental"],"heightened":[],"sustained":false},{"id":"1611","name":"Mystic Armor","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1611","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Ward yourself with magical armor.","effect":"You ward yourself with shimmering magical energy, gaining a +1 item bonus to AC and a maximum Dexterity modifier of +5. While wearing mystic armor , you use your unarmored proficiency to calculate your AC.","conditions":[],"tags":["buff","concentrate","defense"],"heightened":[{"label":"4th","text":"You gain a +1 item bonus to saving throws."},{"label":"6th","text":"The item bonus to AC increases to +2, and you gain a +1 item bonus to saving throws."},{"label":"8th","text":"The item bonus to AC increases to +2, and you gain a +2 item bonus to saving throws."},{"label":"10th","text":"The item bonus to AC increases to +3, and you gain a +3 item bonus to saving throws."}],"sustained":false},{"id":"955","name":"Necromancer's Generosity","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=955","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1  undead   minion  you control","duration":"","school":"Necromancy","traditions":"Arcane, Divine","save":"","traits":["Necromancy","Negative"],"rating":null,"rval":0,"gortle":"","desc":"Heal your undead minion and protect it from positive energy.","effect":"You channel negative energy through your magical connection to your undead minion to strengthen the creature. The target regains 1d8+4 Hit Points when you Cast the Spell, and it gains a +2 status bonus to saves against positive effects for the duration.","conditions":[],"tags":["buff","healing"],"heightened":[{"label":"+1","text":"The amount of healing increases by 1d8+4."}],"sustained":false},{"id":"206","name":"Negate Aroma","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=206","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Suppress a creature’s scent.","effect":"The target loses its odor, preventing creatures from passively noticing its presence via smell alone, even if the creatures have precise or imprecise scent. A creature attempting a Perception check to Seek with scent and other senses might notice the lack of natural scent. If the target has any abilities that result from its smell, such as an overpowering scent, those abilities are also negated.","conditions":[],"tags":[],"heightened":[{"label":"5th","text":"The range increases to 30 feet, and you can target up to 10 creatures."}],"sustained":false},{"id":"704","name":"Noxious Vapors","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=704","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Evocation","Poison"],"rating":null,"rval":0,"gortle":"","desc":"Form a toxic cloud that poisons and sickens.","effect":"You emit a cloud of toxic smoke that temporarily obscures you from sight. Each creature except you in the area when you Cast the Spell takes 1d6 poison damage (basic Fortitude save). A creature that critically fails the saving throw also becomes sickened 1. All creatures in the area become concealed, and all creatures outside the smoke become concealed to creatures within it. This smoke can be dispersed by a strong wind.","conditions":["concealed","sickened"],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d6."}],"sustained":false},{"id":"957","name":"Nudge the Odds","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=957","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Divination","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"Cheat at gambling.","effect":"You bestow yourself supernaturally good luck at cards, dice, and other games of chance. You gain a +1 status bonus to Games Lore checks to gamble, and if you roll a critical failure on such a check, you get a failure instead; however, the spell is too short-lived to use for Earn Income checks from gambling. When you're under the effect of nudge the odds, one facial feature, such as a lock of hair or the iris of an eye, transforms to a distinctive golden color; the GM chooses which feature when you cast the spell. This change resists all magical efforts to conceal it, though it can be hidden or covered by mundane means. A creature noticing the feature can identify the spell using Recall Knowledge. Because it prevents losing big, gamblers consider nudge the odds a repugnant form of cheating. If you're caught using the spell, you are likely to suffer serious consequences, depending on the nature of the gamblers you cheated.","conditions":[],"tags":["buff","defense"],"heightened":[{"label":"5th","text":"The status bonus increases to +2, and the duration increases to last until the next time you make your daily preparations. If you continue spending your spell slot to keep the duration active, this allows you to apply the effect to a downtime check to Earn Income."}],"sustained":false},{"id":"1291","name":"Overselling Flourish","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1291","rarity":"Uncommon","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"the triggering creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You make a grand spectacle out of getting hit.","effect":"You make a grand spectacle out of getting hit. Enhanced by magic, this spectacle features sprays of blood, anguished screams, or other theatrics that appear to result from your foe's attack. The triggering creature must attempt a Will saving throw. Critical Success The creature is unaffected. Success The creature is thrown off by your display. The creature becomes dazzled until the start of your turn. Failure The creature fully believes your performance, leaving itself open. The creature becomes dazzled and flat-footed until the start of your turn. Critical Failure The creature is enraptured by the display. The creature uses its remaining actions to watch you in awe. It then remains dazzled and flat-footed until the start of your turn. ---","conditions":["dazzled","off-guard"],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"582","name":"Penumbral Shroud","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=582","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"Reflex","traits":["Darkness","Evocation"],"rating":null,"rval":0,"gortle":"","desc":"You envelop the target in a shroud of shadow.","effect":"You envelop the target in a shroud of shadow. The target perceives light as one step lower than it actually is (bright light becomes dim light, for example), affecting their ability to sense creatures and objects accordingly. The shroud also provides the target a +1 status bonus to saving throws against light effects. While this effect is helpful to creatures sensitive to light, if the creature is unwilling, it can attempt a Reflex save to avoid the shroud and reduce the effect. Critical Success The target is unaffected. Success The effect lasts for 1 round Failure The effect lasts its normal duration. ---","conditions":[],"tags":["buff","utility"],"heightened":[],"sustained":false},{"id":"631","name":"Personal Rain Cloud","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=631","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Evocation","Uncommon","Water"],"rating":null,"rval":0,"gortle":"","desc":"You conjure a 5-foot-wide rain cloud that follows the target wherever it goes.","effect":"You conjure a 5-foot-wide rain cloud that follows the target wherever it goes. It stays roughly an arm’s length overhead, unless it must drift lower to fit under a ceiling. The cloud rains constantly on the target, keeping it wet and dampening the ground in the wake of any movement. The rain extinguishes non-magical flames. The target gains fire resistance 2. Creatures with weakness to water take damage equal to their weakness at the end of each of their turns. Creatures can attempt a Reflex save to avoid the cloud.","conditions":[],"tags":["defense","summon"],"heightened":[{"label":"+1","text":"The amount of fire resistance increases by 2."}],"sustained":false},{"id":"978","name":"Quick Sort","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=978","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"10 feet","target":"up to 200 unattended objects in range, each of light Bulk or less","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Automatically sort many objects.","effect":"You magically sort a group of objects into neat stacks or piles. You can sort the objects in two different ways. The first option is to separate them into different piles depending on an easily observed factor, such as color or shape. Alternatively, you can sort the objects into ordered stacks depending on a clearly indicated notation, such as a page number, title, or date. The objects sort themselves throughout the duration, though it takes less time per object to sort a smaller number of objects, down to a single round for 30 or fewer objects.","conditions":[],"tags":[],"heightened":[{"label":"3rd","text":"The spell can sort up to 400 objects in a minute, or 60 objects in a round."},{"label":"5th","text":"The spell can sort up to 800 objects in a minute, or 120 objects in a round."}],"sustained":false},{"id":"2160","name":"Rainbow's End","rank":1,"url":"https://2e.aonprd.com/MythicSpells.aspx?ID=2160","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"basic Fortitude","traits":["Concentrate","Light","Manipulate","Mythic","Rare","Spirit"],"rating":null,"rval":0,"gortle":"","desc":"You reach upward to wrest down a rainbow and harness its power to connect this world to the heavens.","effect":"You reach upward to wrest down a rainbow and harness its power to connect this world to the heavens. Each creature in the area takes 1d4 spirit damage with a basic Fortitude save. Any creature that fails this save is additionally dazzled for 1 round. For the spell's duration, an ally who's adjacent to you can Interact and be instantly teleported to an unoccupied space in the spell's area, as long as they don't travel more than 60 feet. This effect has the teleportation trait.","conditions":["dazzled"],"tags":["concentrate","damage","utility"],"heightened":[{"label":"+2","text":"The damage increases by 2d4, the duration of the dazzled condition on a failed save increases by 1 round, and the maximum distance an ally can use the rainbow to teleport increases by 10 feet"}],"sustained":true},{"id":"244","name":"Ray of Enfeeblement","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=244","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Attack","Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"Sap a creature's strength.","effect":"A ray with the power to sap a foe's strength flashes from your hand. Attempt a ranged spell attack against the target. If you succeed, that creature attempts a Fortitude save in order to determine the spell's effect. If you critically succeed on your attack roll, use the outcome for one degree of success worse than the result of its save. Critical Success The target is unaffected. Success The target becomes enfeebled 1. Failure The target becomes enfeebled 2. Critical Failure The target becomes enfeebled 3. ---","conditions":["enfeebled"],"tags":[],"heightened":[],"sustained":false},{"id":"2447","name":"Reed Whistle","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2447","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Uncommon","Wood"],"rating":null,"rval":0,"gortle":"","desc":"You enchant a blade of grass that you can easily hold in your mouth without inhibiting your speech or other actions.","effect":"You enchant a blade of grass that you can easily hold in your mouth without inhibiting your speech or other actions. As a reaction, you can reduce the spell’s remaining duration by 1 hour to Point Out a creature you detect as you sharply whistle through the reed. You and your allies also gain a +2 circumstance bonus to Perception checks to Seek the creature for 1d4 rounds.","conditions":[],"tags":["buff","concentrate","utility"],"heightened":[{"label":"3rd","text":"The spell’s duration becomes 4 hours."}],"sustained":false},{"id":"984","name":"Restyle","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=984","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 piece of clothing currently worn by you or an ally","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Make permanent style changes to clothing.","effect":"You permanently change the appearance of one piece of clothing currently worn by you or an ally to better fit your aesthetic sensibilities. You can change its color, texture, pattern, and other minor parts of its design, but the changes can't alter the clothing's overall shape, size, or purpose. The changes can't increase the quality of the craftsmanship or artistry of the piece of clothing, but particularly gauche choices for the new color and pattern might decrease its aesthetic appeal. This spell transforms existing materials into the desired appearance and never alters the material or creates more material than what's originally part of the object. The object's statistics also remain unchanged. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"991","name":"Schadenfreude","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=991","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"the triggering foe","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":null,"rval":0,"gortle":"","desc":"React to your critical failure to distract foes with their exultation.","effect":"You distract your enemy with their feeling of smug pleasure when you fail catastrophically. They must attempt a Will save. Critical Success The creature is unaffected. Success The creature is distracted by its amusement and takes a –1 status penalty on Perception checks and Will saves for 1 round. Failure The creature is overcome by its amusement and is stupefied 1 for 1 round. Critical Failure The creature is lost in its amusement and is stupefied 2 for 1 round and stunned 1. ---","conditions":["stunned","stupefied"],"tags":["debuff","emotion","mental"],"heightened":[],"sustained":false},{"id":"633","name":"Scouring Sand","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=633","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Evocation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You blast the area with grit that scours away soil and gets into creatures’ eyes.","effect":"You blast the area with grit that scours away soil and gets into creatures’ eyes. For the duration of the spell, any plant-based difficult terrain smaller than a tree becomes loose, allowing each 5-foot square of it to be cleared with a single Interact action. In addition, scouring sand attempts to counteract entangle and other effects that create or manipulate plant-based terrain in its area. Successfully counteracting an effect removes only the portion of its area that overlaps with scouring sand’s area. After one such attempt, the effect is temporarily immune to scouring sand’s counteract for 24 hours. Each creature in the area when you Cast this Spell or that ends its turn in the area must attempt a Reflex save. Success The creature is unaffected. Failure The creature is dazzled for 1 minute or until it uses an Interact action to get the sand out of its eyes. Critical Failure As failure, but the creature is also blinded for its next action.","conditions":["blinded","dazzled"],"tags":["control"],"heightened":[{"label":"3rd","text":"Once per round when you Sustain the Spell, you can move the center of the burst to a spot within range."},{"label":"6th","text":"As the 3rd-level version, except the range is 120 feet and the area is a 20-foot burst."}],"sustained":true},{"id":"993","name":"Seashell of Stolen Sound","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=993","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult, Primal","save":"Will","traits":["Divination","Sonic"],"rating":null,"rval":0,"gortle":"","desc":"Copy a sound in a magical seashell.","effect":"You store a sound in a seashell to use as you will: the last words of a loved one, a dragon's mighty roar, the compromising conversation between two powerful diplomats, or even more strange and secret. As part of Casting this Spell, you must present an unbroken seashell. When you Cast the Spell, magic swirls around the triggering creature, copying the sounds they make, as well as any background noise, for the next minute and storing them in the seashell. You or another creature can then play the sound back from the seashell during the spell's duration by Interacting with the seashell, but once the sounds have been played back, the seashell shatters and the spell ends. As normal for spells with a duration until your next daily preparations, you can choose to continue expending the spell slot to prolong the duration of an existing seashell of stolen sound for another day. While the spell faithfully copies the sounds around the target, it doesn't reproduce any special auditory or sonic effects of the sound. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"584","name":"Share Lore","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=584","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"up to 3 creatures","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Mental"],"rating":null,"rval":0,"gortle":"","desc":"You share your knowledge with the touched creatures.","effect":"You share your knowledge with the touched creatures. Choose one Lore skill in which you are trained. The targets become trained in that Lore skill for the duration of the spell.","conditions":[],"tags":["mental"],"heightened":[{"label":"3rd","text":"The duration of the spell is 1 hour and you can target up to five creatures."},{"label":"5th","text":"The duration of the spell is 8 hours, you can target up to five creatures, and you can share up to two Lore skills in which you are trained."}],"sustained":false},{"id":"1378","name":"Shielded Arm","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1378","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Reinforce a creature’s arm with metal that lets it use its arm as a shield.","effect":"Reinforcing veins of ore run through the target's arm, letting it ward off blows with its bare skin. It can use the Raise a Shield action to instead raise its arm, gaining a +2 circumstance bonus to AC. It can Shield Block with its Raised arm as well; when it does, the target reduces the damage as if it had a shield with Hardness 4 and 15 Hit Points. This shield doesn't have a Broken Threshold, and the spell ends if the shield's Hit Points are expended. This spell doesn't modify the target's unarmed attacks and can't be used to make a shield bash Strike. Casting or coming under the effects of this spell also counts as using a metallic item with regards to anathema.","conditions":[],"tags":["buff","concentrate","defense"],"heightened":[{"label":"+2","text":"The Hardness increases by 4, and the Hit Points increase by 15."}],"sustained":false},{"id":"1362","name":"Signal Skyrocket","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1362","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"1,000 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"Reflex","traits":["Concentrate","Fire","Manipulate","Sonic"],"rating":null,"rval":0,"gortle":"","desc":"Send an exploding firework straight up into the sky.","effect":"With a pinch of metallic powder and gunpowder, you call forth blistering red energy that shoots straight upward into the air and explodes, unleashing a crackling boom. Over time, you might even customize your own pattern and color for the skyrocket as you refine the spell. You can't change the direction or distance of the rocket—it must go straight up, continuing up to the maximum range if possible. If the rocket explodes at its maximum height, the bright light can be seen up to 10 miles away, and the sound of the explosion can be heard up to 1 mile away under clear weather conditions. If the rocket explodes in an enclosed space smaller than the full size of the burst, each creature in the area takes 1d10 sonic damage depending on the result of its Reflex save. Critical Success The creature is unaffected. Success The creature takes half damage. Failure The creature takes full damage and is dazzled for 1 round. Critical Failure The creature takes double damage and is blinded for 1 round.","conditions":["blinded","dazzled"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The sonic damage increases by 1d10."}],"sustained":false},{"id":"288","name":"Sleep","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=288","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Incapacitation","Mental","Sleep"],"rating":null,"rval":0,"gortle":"","desc":"Cause creatures in a small area to fall asleep.","effect":"Each creature in the area becomes drowsy and might fall asleep. A creature that falls unconscious from this spell doesn't fall prone or release what it's holding. This spell doesn't prevent creatures from waking up due to a successful Perception check, limiting its utility in combat. Critical Success The creature is unaffected. Success The creature takes a –1 status penalty to Perception checks for 1 round. Failure The creature falls unconscious. If it's still unconscious after 1 minute, it wakes up automatically. Critical Failure The creature falls unconscious. If it's still unconscious after 1 hour, it wakes up automatically.","conditions":["prone","unconscious"],"tags":["control","debuff","incapacitation","mental"],"heightened":[{"label":"4th","text":"The creatures fall unconscious for 1 round on a failure or 1 minute on a critical failure. They fall prone and release what they're holding, and they can't attempt Perception checks to wake up. When the duration ends, the creature is sleeping normally instead of automatically waking up."}],"sustained":false},{"id":"540","name":"Snowball","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=540","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Cold","Evocation","Water"],"rating":null,"rval":0,"gortle":"","desc":"You throw a magically propelled and chilled ball of dense snow.","effect":"You throw a magically propelled and chilled ball of dense snow. The target takes 2d4 cold damage and potentially other effects, depending on the result of your spell attack roll. Critical Success The target takes double damage and a –10-foot status penalty to its Speeds for 1 round. Success The target takes full damage and a –5-foot status penalty to its Speeds for 1 round. Failure No effect.","conditions":[],"tags":["damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 2d4."}],"sustained":false},{"id":"300","name":"Spider Sting","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=300","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Primal","save":"Fortitude","traits":["Necromancy","Poison"],"rating":null,"rval":0,"gortle":"","desc":"Damage a creature and afflict it with spider venom.","effect":"You magically duplicate a spider's venomous sting. You deal 1d4 piercing damage to the touched creature and afflict it with spider venom. The target must attempt a Fortitude save. Critical Success The target is unaffected. Success The target takes 1d4 poison damage. Failure The target is afflicted with spider venom at stage 1. Critical Failure The target is afflicted with spider venom at stage 2. Spider Venom (poison); Level 1; Maximum Duration 4 rounds. Stage 1 1d4 poison damage and enfeebled 1 (1 round); Stage 2 1d4 poison damage and enfeebled 2 (1 round). ---","conditions":["enfeebled"],"tags":["damage"],"heightened":[],"sustained":false},{"id":"1013","name":"Synchronize","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1013","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"up to 5 willing creatures","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination"],"rating":null,"rval":0,"gortle":"","desc":"Place sigils on your targets that flash at a prespecified time.","effect":"You harmlessly place your unique magic sigil, which is about 1 square inch in size, on your targets. When you Cast the Spell, you set the duration by choosing a time at which point the sigil flashes dimly three times. After that point, the spell ends. Even though spell durations aren't normally exact, the effects of synchronize are precise to the second. The timer is based on the place where the spell was cast, so entering a plane or area where time flows differently changes how the time elapses.","conditions":[],"tags":[],"heightened":[{"label":"2nd","text":"The spell can target up to 20 willing creatures."}],"sustained":false},{"id":"1017","name":"Thicket of Knives","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1017","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Illusory copies of your weapon arm improve your ability to feint.","effect":"You create numerous phantom copies of your weapon arm, hiding your true movements and rendering your attacks unpredictable. You gain a +2 status bonus to Deception checks. If you're untrained in Deception, you can use the Feint action anyway, and add your level as your proficiency bonus despite being untrained. ---","conditions":[],"tags":["buff","defense","illusion"],"heightened":[],"sustained":false},{"id":"722","name":"Thoughtful Gift","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=722","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"120 feet","target":"1 willing creature","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult","save":"","traits":["Conjuration","Teleportation"],"rating":null,"rval":0,"gortle":"","desc":"Teleport an item to an ally's grasp.","effect":"You teleport one object of light or negligible Bulk held in your hand to the target. The object appears instantly in the target's hand, if they have a free hand, or at their feet if they don't. The target knows what object you are attempting to send them. If the target is unconscious or refuses to accept your gift, or if the spell would teleport a creature (even if the creature is inside an extradimensional container), the spell fails.","conditions":["unconscious"],"tags":["teleportation","utility"],"heightened":[{"label":"3rd","text":"The spell's range increases to 500 feet."},{"label":"5th","text":"As 3rd level, and the object's maximum Bulk increases to 1. You can Cast the Spell with 3 actions instead of 1; doing so increases the range to 1 mile and you don't need line of sight to the target, but you must be extremely familiar with the target."}],"sustained":false},{"id":"2313","name":"Unbroken Panoply","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2313","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 broken weapon that is unattended or held by a willing creature","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Nonlethal","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"As tools of violence undone by violence, broken weapons contain potent symbolic magic that faydhaans often call upon when forming alliances.","effect":"As tools of violence undone by violence, broken weapons contain potent symbolic magic that faydhaans often call upon when forming alliances. Images of similar legendary weapons overlay the target, and the weapon’s broken condition is suppressed for the duration. The weapon gains the nonlethal trait during this time. The weapon’s wielder can apply the weapon’s item bonus to attack rolls, if any, to their Diplomacy checks. If the weapon would be damaged or broken again, this spell ends. ---","conditions":[],"tags":["buff","concentrate"],"heightened":[],"sustained":false},{"id":"356","name":"Ventriloquism","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=356","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Auditory","Illusion"],"rating":null,"rval":0,"gortle":"","desc":"Throw your voice.","effect":"Whenever you speak or make any other sound vocally, you can make your vocalization seem to originate from somewhere else within 60 feet, and you can change that apparent location freely as you vocalize. Any creature that hears the sound can attempt to disbelieve your illusion.","conditions":[],"tags":["illusion"],"heightened":[{"label":"2nd","text":"The spell's duration increases to 1 hour, and you can also change the tone, quality, and other aspects of your voice. Before a creature can attempt to disbelieve your illusion, it must actively attempt a Perception check or otherwise use actions to interact with the sound."}],"sustained":false},{"id":"1345","name":"Weaken Earth","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1345","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature, unattended object, or hazard or structure made of stone or earth","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Earth","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Reduce the durability of something made of earth.","effect":"You weaken the bonds that hold earth and stone together. If your target has Hardness, you can affect one contiguous object, up to a 5-foot cube, or one creature, decreasing the Hardness by 5, to a minimum of 0. If the target lacks Hardness, it gains weakness 3 to physical damage. A target with a Fortitude modifier can attempt a Fortitude saving throw, negating the effect on a success.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"+2","text":"Hardness decreases by 5, the size of a contiguous object increases by one 5-foot cube, and the weakness increases by 3."}],"sustained":false},{"id":"1415","name":"Weave Wood","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1415","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 piece of unprocessed wood, reeds, or plant fiber of 1 Bulk or less","duration":"","school":"","traditions":"Primal, Arcane","save":"","traits":["Concentrate","Manipulate","Wood"],"rating":null,"rval":0,"gortle":"","desc":"Break plant fiber into strands and magically weave them.","effect":"With a touch, you cause the target to break into fibrous strands that then weave themselves into a woven mundane object of the same Bulk or less, such as a basket, hat, shield, or mat. You can create up to 4 objects with one casting of this spell, providing their total Bulk doesn't exceed the Bulk of your target. The objects have Hardness 2 and 8 Hit Points.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"+1","text":"Increase the maximum Bulk that you can target by 1 and the maximum number of objects you can create by 2."}],"sustained":false},{"id":"158","name":"Illusory Creature","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=158","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"500 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Auditory","Illusion","Olfactory","Visual"],"rating":"🟣🟣🟣🟣🟣","rval":5,"gortle":"an illusionary pseudo minion that does real damage. Dies as soon as it is hit, which is only a bit shorter than many summon spells. But your opponent doesn’t know that yet. Lasts as long as you can sustain it. Like a summon spell, more flexible but fragile and less damage. All types of distractions are possible, you are limited by your imagination not any level of reality. What you really want to do with an illusionary creature is not to fight but to bluff. Useful in combat and out of combat. A dragon flying in will cause some people to run away. The guard might open the gate and rush out to help when he sees an injured man in uniform returning. Natural Selection means that almost everyone runs and hides before they confirm what they think is dangerous, actually is. Read up on illusions - the bottom line is illusions start being believed, they can’t be ignored until the opponent takes a seek action or interacts with it. So normally it will consume at least one action. Do expect that the GM will give out free action perception checks to disbelieve if you do something too unbelievable. But by the same token if it is an expected and believable illusion then your GM should probably not even take a seek action against it. Probably worthwhile considering starting the illusion at range, as there is no reason it can’t use a ranged strike. The illusion has its own multiple attack penalty, and doesn't use the casters. Choose the right weapon so it shouldn’t get a penalty for range, but it does get two actions and can critically hit. At range your opponents may choose to split their forces or move and waste several actions trying to deal with it before they realise what it is. If you want the illusion to do something on its first turn then sustain it.","desc":"Form a convincing illusion of a creature.","effect":"You create an illusory image of a Large or smaller creature. It generates the appropriate sounds, smells, and feels believable to the touch. If you and the image are ever farther than 500 feet apart, the spell ends. The image can't speak, but you can use your actions to speak through the creature, with the spell disguising your voice as appropriate. You might need to attempt a Deception or Performance check to mimic the creature, as determined by the GM. This is especially likely if you're trying to imitate a specific person and engage with someone that person knows. In combat, the illusion can use 2 actions per turn, which it uses when you Sustain the Spell. It uses your spell attack roll for attack rolls and your spell DC for its AC. Its saving throw modifiers are equal to your spell DC – 10. It is substantial enough that it can flank other creatures. If the image is hit by an attack or fails a save, the spell ends. The illusion can cause damage by making the target believe the illusion's attacks are real, but it cannot otherwise directly affect the physical world. If the illusory creature hits with a Strike, the target takes mental damage equal to 1d4 plus your spellcasting ability modifier. This is a mental effect. The illusion's Strikes are nonlethal. If the damage doesn't correspond to the image of the monster—for example, if an illusory Large dragon deals only 5 damage—the GM might allow the target to attempt an immediate Perception check to disbelieve the spell. Any relevant resistances and weaknesses apply if the target thinks they do, as judged by the GM. For example, if the illusion wields a warhammer and attacks a creature resistant to bludgeoning damage, the creature would take less mental damage. However, illusory damage does not deactivate regeneration or trigger other effects that require a certain damage type. The GM should track illusory damage dealt by the illusion. Any creatu
