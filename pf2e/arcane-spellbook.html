ns through natural stone (not masonry, adobe, or any other manufactured edifice). ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":true},{"id":"337","name":"Telepathy","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=337","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Linguistic","Mental"],"rating":"🟠🟠","rval":2,"gortle":"useful but a bit short range.","desc":"Communicate telepathically with any creatures near you.","effect":"You can communicate telepathically with creatures within 30 feet. Once you establish a connection by communicating with a creature, the communication is two-way. You can communicate only with creatures that share a language with you.","conditions":[],"tags":["mental"],"heightened":[{"label":"6th","text":"Telepathy loses the linguistic trait. You can communicate telepathically with creatures using shared mental imagery even if you don't share a language."}],"sustained":false},{"id":"642","name":"Clownish Curse","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=642","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Attack","Curse","Enchantment","Mental","Misfortune","Uncommon"],"rating":"🔴","rval":1,"gortle":"P152 inflicts penalties to stealth and thievery for an hour or so. Ok but a bit narrow.","desc":"","effect":"","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"1064","name":"Compel True Name","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1064","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature whose true name you know","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult, Primal","save":"Will","traits":["Auditory","Enchantment","Incapacitation","Linguistic","Mental","Rare","True Name"],"rating":"🔴","rval":1,"gortle":"SOM Rare Incapacitation requires the target's true name. Just so rare to be useful and probably not much more effective than a normal charm or suggestion in most cases.","desc":"You instruct the target to do something, compelling obedience by calling it by its true name.","effect":"You instruct the target to do something, compelling obedience by calling it by its true name. Your instructions can't be self-destructive. Though this spell has the linguistic trait, this applies only to the instructions; the creature doesn't need to know its own true name to be affected. The target must attempt a Will saving throw. Critical Success The target is unaffected, is temporarily immune to further castings of this spell by you for 1 week, and learns your true name. Success The target is unaffected, is temporarily immune to further castings of this spell by you for 1 day, and learns a fragment of your true name (see the Fragmentary Names sidebar). Failure The target does as you command. The spell has a duration of 10 minutes, or until the target has completed a finite instruction or the instructions become self-destructive. The creature is temporarily immune to further castings of this spell by you for 1 hour. Critical Failure As failure, but the spell's duration is 8 hours, and the creature is not temporarily immune. ---","conditions":[],"tags":["incapacitation","mental"],"heightened":[],"sustained":false},{"id":"54","name":"Creation","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=54","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"0 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration"],"rating":"🔴","rval":1,"gortle":"what is a good way to use this?","desc":"Make a temporary object.","effect":"You conjure a temporary object from eldritch energy. It must be of vegetable matter (such as wood or paper) and 5 cubic feet or smaller. It can't rely on intricate artistry or complex moving parts, never fulfills a cost or the like, and can't be made of precious materials or materials with a rarity of uncommon or higher. It is obviously temporarily conjured, and thus can't be sold or passed off as a genuine item.","conditions":[],"tags":["summon"],"heightened":[{"label":"5th","text":"The item is metal and can include common minerals, like feldspar or quartz."}],"sustained":false},{"id":"840","name":"Daydreamer's Curse","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=840","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Attack","Curse","Enchantment","Mental","Misfortune","Uncommon"],"rating":"🔴","rval":1,"gortle":"P164 a curse. A quite effective debuff. But not effective in combat unless you are playing a hiding game.","desc":"You impose a curse upon the target that renders it easily distracted and unable to focus its thoughts on tasks that demand insight or discernment.","effect":"You impose a curse upon the target that renders it easily distracted and unable to focus its thoughts on tasks that demand insight or discernment. The target must attempt a Will save. Critical Success The target is unaffected. Success For 10 minutes, the target must roll twice and use the worse result whenever attempting a Medicine, Nature, Perception, or Survival check. If the target critically succeeds at a Perception check or skill check to perform an action with the concentrate trait, the target gets a success instead. Failure As success, but the effect is permanent. Critical Failure As failure, except the target treats the outcomes of all checks with the concentrate trait as one degree of success worse than the result it rolled (a critical success becomes a success, a success becomes a failure, and a failure becomes a critical failure). ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"1113","name":"Detect Creator","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1113","rarity":"Rare","actions":"T","actionsRaw":"10 minutes","range":"1 mile","target":"1 destroyed  undead","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Detection","Divination","Rare"],"rating":"🔴","rval":1,"gortle":"KOL find who created an Undead. Useful but too narrow for a sorcerer.","desc":"You examine the remains or spiritual residue of a destroyed undead creature to locate that undead's creator, perhaps a necromancer or vampire.","effect":"You examine the remains or spiritual residue of a destroyed undead creature to locate that undead's creator, perhaps a necromancer or vampire. If the creator is within range, you can sense the direction to them. If the creator is within 100 feet, you sense their presence within 100 feet, and the spell ends; you can't further home in on their location. If there's lead or running water between you and the undead's creator, this spell can't locate them. This spell fails automatically if the undead doesn't have a specific creator or the specific creator isn't on the same plane. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":true},{"id":"68","name":"Detect Scrying","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=68","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Detection","Divination","Uncommon"],"rating":"🔴","rval":1,"gortle":"the sort of spell you want only rarely.","desc":"Find out if scrying effects are in the area.","effect":"By tapping into trace divinatory auras, you detect the presence of scrying effects in the area. If detect scrying is higher level than a scrying effect, you gain a glimpse of the scrying creature and learn its approximate distance and direction.","conditions":[],"tags":["utility"],"heightened":[{"label":"6th","text":"The duration is until the next time you make your daily preparations."}],"sustained":false},{"id":"1148","name":"False Nature","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1148","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"one unattended item or one item you're holding","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Uncommon"],"rating":"🔴","rval":1,"gortle":"DA a forget style illusion for an object. Cute but narrow.","desc":"","effect":"","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"644","name":"Favorable Review","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=644","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Enchantment","Incapacitation","Mental","Uncommon"],"rating":"🔴","rval":1,"gortle":"P152 make a target think the performance was good. Pretty narrow, given that this is probably being done by a bard with an actually good performance skill.","desc":"","effect":"","conditions":[],"tags":["incapacitation","mental"],"heightened":[],"sustained":false},{"id":"550","name":"Forgotten Lines","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=550","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 text or remnants thereof","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Divination","Rare"],"rating":"🔴","rval":1,"gortle":"never going to get used except by a professional librarian.","desc":"Restore destroyed or censored text.","effect":"Members of the Lacunafex and other allies use this spell to restore material that Thrune agents have redacted from historical or otherwise valuable texts. You learn one piece of information that was removed from the target text after its creation. You can instead learn one piece of information from a text that had been destroyed, but you must have a fragment of the text, such as a piece of the cover, a page, or even a clasp or metal fittings.","conditions":[],"tags":[],"heightened":[{"label":"6th","text":"The spell reconstructs all missing information regarding a specific topic of your choice."},{"label":"9th","text":"The spell also reveals information the writer self-censored and didn’t commit to paper."}],"sustained":false},{"id":"129","name":"Gaseous Form","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=129","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":"🔴","rval":1,"gortle":"It has its uses but resistance 8 is not immunity to damage. It is more like a death trap. Remastered name is Vapor Form.","desc":"Turn a willing creature into a flying cloud.","effect":"The target transforms into a vaporous state. In this state, the target is amorphous. It loses any item bonus to AC and all other effects and bonuses from armor, and it uses its proficiency modifier for unarmored defense. It gains resistance 8 to physical damage and is immune to precision damage. It can't cast spells, activate items, or use actions that have the attack or manipulate trait. It gains a fly Speed of 10 feet and can slip through tiny cracks. The target can Dismiss the spell. ---","conditions":[],"tags":["buff","defense","utility"],"heightened":[],"sustained":false},{"id":"942","name":"Magic Mailbox","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=942","rarity":"Uncommon","actions":"T","actionsRaw":"1 hour","range":"touch","target":"2 containers, each no larger than 5 feet in any dimension","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult","save":"","traits":["Conjuration","Teleportation","Uncommon"],"rating":"🔴","rval":1,"gortle":"SOM teleport between two containers. Nice for smuggling or setting long range comms, but not a normal adventuring pick.","desc":"Interdimensionally link two containers.","effect":"You create an interdimensional link between two containers, both of which must be capable of being closed in such a way that their contents aren't visible. If both containers are left closed for 10 consecutive minutes, the contents of each one, totaling no more than 3 Bulk of nonliving, non-magical material per container, transport to the other's location. If a container's contents total more than 3 Bulk, the transport fails. If either container is opened before the full 10 minutes have elapsed, the contents appear as they did when the containers were closed, and the process starts anew as soon as both containers have been closed. After the contents of the containers successfully swap, they can't swap again until after both containers have been opened at least once. Both containers must be located on the same plane for the process to function; if this ceases to be the case or if something else disrupts the effect during an active transposition, the process halts as if one of the containers had been opened. ---","conditions":[],"tags":["teleportation"],"heightened":[],"sustained":false},{"id":"208","name":"Nightmare","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=208","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"planetary","target":"1 creature you know by name","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Mental"],"rating":"🔴","rval":1,"gortle":"so ineffective.","desc":"Plague a creature's dreams with disturbing nightmares.","effect":"You send disturbing nightmares to your target. The next time the target falls asleep, it must attempt a Will save. If you know the target only by name and have never met them, the target gets a +4 circumstance bonus to the Will save. Critical Success The target suffers no adverse effects and is temporarily immune for 1 week. Success The target experiences the nightmares but suffers no adverse effects other than unpleasant memories. Failure The target experiences the nightmares and awakens fatigued. Critical Failure The target experiences the nightmares, awakens fatigued, and is drained 2 until it is no longer fatigued. ---","conditions":["drained","fatigued"],"tags":["buff","illusion","mental"],"heightened":[],"sustained":false},{"id":"1408","name":"Rigid Form","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1408","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Wood"],"rating":"🔴","rval":1,"gortle":"ROE protection from polymorph. Only against very specific opponents. Put it in your spell book.","desc":"Protect against polymorph effects.","effect":"You utilize wood's rigidity to prevent harmful shapechanging effects. For the duration of this spell, whenever you're targeted by a harmful polymorph effect, you can use your reaction to attempt to counteract the effect.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"6th","text":"The duration increases to 10 minutes."}],"sustained":false},{"id":"841","name":"Sage's Curse","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=841","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Attack","Curse","Enchantment","Mental","Misfortune","Uncommon"],"rating":"🔴","rval":1,"gortle":"P164 a fairly useless curse","desc":"You afflict the target with a curse that fills its mind with distracting and hyperspecialized minutiae, causing it to second-guess even simple facts.","effect":"You afflict the target with a curse that fills its mind with distracting and hyperspecialized minutiae, causing it to second-guess even simple facts. The target must attempt a Will saving throw. Critical Success The target is unaffected. Success For 10 minutes, the target must roll twice and use the worse result whenever attempting an Arcana, Lore, Occultism, or Society check. If the target succeeds at a check to Recall Knowledge, it gains one piece of true knowledge and one piece of erroneous knowledge, but it has no way of knowing which is which (this has no effect if the target critically succeeds at a check to Recall Knowledge). Failure As success, but the effect is permanent. Critical Failure As failure, and the target treats the outcomes of all checks to Recall Knowledge as one degree of success worse than the result the target rolled (a critical success becomes a success, a success becomes a failure, and a failure becomes a critical failure). ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"715","name":"Seal Fate","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=715","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Curse","Death","Necromancy"],"rating":"🔴","rval":1,"gortle":"APG inflicts weakness for a minute or so. It is far too weak to be relevant at this level.","desc":"Curse a creature to be harmed by a certain type of damage.","effect":"You utter a curse that a creature will meet a certain end—a death by freezing, stabbing, or another means you devise. Choose one type of damage from the following list: acid, bludgeoning, cold, electricity, fire, negative, piercing, slashing, or sonic. The effect is based on the target's Fortitude save. Critical Success The target is unaffected. Success The target gains weakness 2 to the chosen damage type until the end of your next turn. Failure As success, but the duration is 1 minute. If the creature is reduced to 0 HP by the chosen damage and its level is 7 or less, it dies. Critical Failure As failure, but the duration is unlimited.","conditions":[],"tags":["defense"],"heightened":[{"label":"+2","text":"The weakness increases by 1, and the maximum level of creature that can be automatically killed increases by 4."}],"sustained":false},{"id":"1738","name":"Vapor Form","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1738","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Air","Concentrate","Manipulate","Polymorph"],"rating":"🔴","rval":1,"gortle":"PC Originally called Gaseous Form It has its uses but resistance 8 is not immunity to damage. It is more like a death trap.","desc":"Transform your body into vapor.","effect":"The target transforms into a vaporous state. In this state, the target is amorphous. It loses any item bonus to AC and all other effects and bonuses from armor, and it uses its proficiency modifier for unarmored defense. It gains resistance 8 to physical damage and is immune to precision damage. It can't cast spells, activate items, or use actions that have the attack or manipulate trait. It gains a fly Speed of 10 feet and can slip through tiny cracks. The target can Dismiss the spell. ---","conditions":[],"tags":["buff","concentrate","defense","utility"],"heightened":[],"sustained":false},{"id":"1026","name":"Variable Gravity","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1026","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":"🔴","rval":1,"gortle":"SOM make yourself heavy or light for very minor benefits.","desc":"Adjust gravity's grip between high, low, and normal gravity.","effect":"You can adjust how strongly gravity grips you, changing between low gravity, normal gravity, and high gravity with ease. Choose one type of gravity when you cast the spell. While the spell lasts, you can change the type of gravity with a single action, which has the concentrate trait. The spell doesn't alter your physical appearance, so it's impossible to what type of gravity you're subjected to by casual observation. - Low Gravity You can jump double the normal distance when you Long Jump or Leap, though still to a maximum of your Speed. When you High Jump, you can use the calculation for a Long Jump but don't double the distance. Rather than the normal calculation for falling damage, when you fall, you take no damage for the first 10 feet and then take bludgeoning damage equal to a quarter of the remaining distance you fell. Abilities that adjust how much falling damage you take still apply. - High Gravity You become encumbered. You gain a +2 status bonus to your saving throws and DCs to resist forced movement and attempts to knock you prone. You reduce the distance forced movement moves you by half or 10 feet, whichever is more. You can only jump half as high and far. Rather than the normal calculation for falling damage, you take bludgeoning damage equal to the distance you fall. Abilities that adjust how much falling damage you take still apply.","conditions":["encumbered","prone"],"tags":["buff","control","defense"],"heightened":[{"label":"6th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"1238","name":"Vision of Beauty","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1238","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Illusion","Incapacitation","Mental","Rare"],"rating":"🔴","rval":1,"gortle":"KM this spell has Incapacitation and I can't work out why. It is very weak.","desc":"You create a phantasmal image of the most beautiful creature imaginable to the target at a location somewhere within the spell's range.","effect":"You create a phantasmal image of the most beautiful creature imaginable to the target at a location somewhere within the spell's range. Only the spell's target can see the beauty, though you can see the vague shape of the illusion as it manifests. The effect of the vision is based on the outcome of the target's Will save. Critical Success The target is unaffected. Success The target is intrigued by the vision, becoming stupefied 1 for 1 round. Failure The target is entranced by the vision, becoming stupefied 1 for 1 round and moving toward the image's location via the most direct route possible for 1 round, bypassing any obvious hazards and enemies in the way. The target is then fascinated by the illusion for 1 round. Critical Failure As failure, except the target is stupefied 2 and becomes fascinated by the illusion for 1 minute instead of 1 round.","conditions":["fascinated","stupefied"],"tags":["emotion","illusion","incapacitation","mental"],"heightened":[{"label":"+2","text":"You can target an additional creature in range."}],"sustained":false},{"id":"2125","name":"Mantis's Grasp","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2125","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine","save":"Reflex","traits":["Concentrate","Force","Manipulate","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You cause red, ghostly mantis arms to sprout from a nearby surface.","effect":"You cause red, ghostly mantis arms to sprout from a nearby surface and crush a creature, dealing 8d6 force damage and attempting to pin the target in place. The effects are determined by the creature's Reflex save. Critical Success The target is unaffected. Success The target takes half damage. Failure The target takes full damage and is immobilized for 1 round. Critical Failure The target takes double damage and is immobilized for 1 minute. At the end of each of its turns, the target can attempt to Escape. The Escape DC is equal to your spell DC.","conditions":["immobilized"],"tags":["concentrate","control","damage"],"heightened":[{"label":"7th","text":"You can target up to 5 creatures."}],"sustained":false}];

const byId=Object.fromEntries(SPELLS.map(s=>[s.id,s]));
const allConds=[...new Set(SPELLS.flatMap(s=>s.conditions))].sort();
const ROLES=["damage","control","debuff","buff","defense","healing","summon","utility",
  "incapacitation","illusion","emotion","fear","mental"];
const allTags=ROLES.filter(t=>SPELLS.some(s=>s.tags.includes(t)));
const SAVES=["Fortitude","Reflex","Will","AC","—"];
const ACTS=["1","2","3","R","F","V"];

// ---- helpers ----
function rdots(s){return s.rating?`<span class="rating" title="${s.rating}">${s.rating}</span>`:"";}
function esc(t){return (t||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function saveKind(s){if(!s.save)return "—";const m=s.save.match(/Fortitude|Reflex|Will|AC/);return m?m[0]:"—";}
function heightenedAt(sp,N){
  const hs=sp.heightened||[];
  const plus=hs.find(h=>h.label.trim()==="+1");
  const nums=hs.map(h=>({r:parseInt(h.label),t:h.text})).filter(x=>!isNaN(x.r));
  const bp=nums.filter(x=>x.r<=N).sort((a,b)=>b.r-a.r)[0];
  let out=[];
  if(bp) out.push(`<b>@rank ${bp.r}:</b> ${esc(bp.t)}`);
  if(plus) out.push(`<b>+1/rank:</b> ${esc(plus.text)}`);
  return out.join("<br>");
}
function canHeightenTo(sp,N){ if(sp.rank===0)return false; return sp.rank<N && (sp.heightened||[]).length>0 && heightenedAt(sp,N)!==""; }

function matches(s){
  if(S.minR && s.rval<S.minR) return false;
  if(S.acts.size && !S.acts.has(s.actions)) return false;
  if(S.saves.size && !S.saves.has(saveKind(s))) return false;
  if(S.conds.size && ![...S.conds].every(c=>s.conditions.includes(c))) return false;
  if(S.tags.size && ![...S.tags].every(t=>s.tags.includes(t))) return false;
  if(S.q){const q=S.q.toLowerCase();
    if(!(s.name.toLowerCase().includes(q)||(s.desc||"").toLowerCase().includes(q)
       ||(s.effect||"").toLowerCase().includes(q)||(s.gortle||"").toLowerCase().includes(q))) return false;}
  return true;
}
function sortSpells(a,b){ return (b.rval-a.rval)||a.name.localeCompare(b.name); }

// ---- render card ----
function card(s,slot){
  const key=s.id+"@"+slot;
  const picked=prep.has(key);
  const conds=s.conditions.map(c=>`<span class="tg cond">${c}</span>`).join("");
  const roles=s.tags.filter(t=>ROLES.includes(t)).map(t=>`<span class="tg role">${t}</span>`).join("");
  const heit=(s.heightened||[]).length?`<div class="heit">${s.heightened.map(h=>
      `<div class="h"><b>${esc(h.label)}</b> ${esc(h.text)}</div>`).join("")}</div>`:"";
  const slotNote = slot>s.rank ? `<span class="tg role" title="cast in a rank ${slot} slot">↑R${slot}</span>` : "";
  return `<div class="card ${picked?'picked':''}" data-key="${key}">
    <div class="ctop">
      <div class="pick" data-pick="${key}">✓</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;gap:6px;align-items:baseline">
          <span class="cname">${esc(s.name)} <span class="act" title="${ACTNAME[s.actions]}">${ACTLABEL[s.actions]}</span> ${slotNote}</span>
          ${rdots(s)}
        </div>
        <div class="meta">
          <span>R${s.rank}</span>
          ${s.save?`<span>🛡 <b>${esc(s.save)}</b></span>`:""}
          ${s.range?`<span>◎ ${esc(s.range)}</span>`:""}
          ${s.target?`<span>◉ ${esc(s.target)}</span>`:""}
          ${s.sustained?`<span>⟲ sustain</span>`:""}
          ${s.rarity&&s.rarity!=="Common"?`<span>${esc(s.rarity)}</span>`:""}
        </div>
        <div class="tagline">${conds}${roles}</div>
        <div class="desc">${esc(s.desc)}</div>
        ${s.gortle?`<div class="gortle">${esc(s.gortle)}</div>`:""}
        ${slot>s.rank?`<div class="hsrc">Heightened to rank ${slot}: <span class="effect">${heightenedAt(s,slot)}</span></div>`:""}
        <details class="more"><summary>details</summary>
          ${s.effect&&s.effect!==s.desc?`<div class="effect">${esc(s.effect)}</div>`:""}
          ${heit}
          <a class="aon" href="${s.url}" target="_blank" rel="noopener">Archives of Nethys ↗</a>
        </details>
      </div>
    </div>
  </div>`;
}

// ---- render list ----
function render(){
  const showRanks = S.ranks.size? RANKS.filter(r=>S.ranks.has(r)) : RANKS;
  const pool=SPELLS.filter(matches);
  let html=""; let shown=0;
  for(const N of showRanks){
    const native=pool.filter(s=>s.rank===N).sort(sortSpells);
    const heit = S.showHeit ? pool.filter(s=>canHeightenTo(s,N)).sort(sortSpells) : [];
    if(!native.length && !heit.length) continue;
    shown+=native.length;
    html+=`<section class="ranksec"><div class="rankhead"><h2>${rankLabel(N)}</h2>
      <span class="cnt">${native.length}${heit.length?` · ${heit.length} heightenable`:""}</span></div>`;
    html+=`<div class="grid">${native.map(s=>card(s,N)).join("")}</div>`;
    if(heit.length){
      html+=`<details class="heitsec"><summary>↑ ${heit.length} spells heightenable into rank ${N}
        <span class="hint">— lower-rank spells cast in a rank ${N} slot</span></summary>
        <div class="grid" style="margin-top:10px">${heit.map(s=>card(s,N)).join("")}</div></details>`;
    }
    html+=`</section>`;
  }
  document.getElementById("list").innerHTML = html || `<div class="empty">No spells match these filters.</div>`;
  document.getElementById("stat").textContent =
    `${pool.length} spells match · showing ${shown} native across ${showRanks.length} rank(s)`;
}

// ---- chips builders ----
function chipRow(el,items,set,cls=""){
  el.innerHTML=items.map(it=>`<span class="chip ${cls}" data-v="${it.v}">${it.l}</span>`).join("");
  el.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
    const v=c.dataset.v; const val=isNaN(v)||cls?v:+v;
    if(set.has(val))set.delete(val); else set.add(val);
    c.classList.toggle("on"); afterFilter();
  });
}
function afterFilter(){
  document.getElementById("condCount").textContent=S.conds.size?`(${S.conds.size})`:"";
  document.getElementById("tagCount").textContent=S.tags.size?`(${S.tags.size})`:"";
  render();
}

// rank chips
chipRow(document.getElementById("fRank"),RANKS.map(r=>({v:r,l:rankChip(r)})),S.ranks);
// rating chips (single-ish min)
const fr=document.getElementById("fRating");
fr.innerHTML=[{v:0,l:"all"},{v:3,l:"🟢+"},{v:4,l:"🔵+"},{v:5,l:"🟣"}].map(o=>
  `<span class="chip" data-v="${o.v}">${o.l}</span>`).join("");
fr.querySelectorAll(".chip").forEach((c,i)=>{if(i===0)c.classList.add("on");
  c.onclick=()=>{fr.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on");S.minR=+c.dataset.v;render();};});
// action chips
chipRow(document.getElementById("fAct"),ACTS.map(a=>({v:a,l:ACTLABEL[a]})),S.acts,"sm");
// save chips
chipRow(document.getElementById("fSave"),SAVES.map(s=>({v:s,l:s==="—"?"none":s})),S.saves,"sm");
// condition chips
chipRow(document.getElementById("fCond"),allConds.map(c=>({v:c,l:c})),S.conds,"cond");
// tag chips
chipRow(document.getElementById("fTag"),allTags.map(t=>({v:t,l:t})),S.tags,"role");

// search
document.getElementById("search").oninput=e=>{S.q=e.target.value.trim();render();};
// heightened toggle
document.getElementById("toggleHeit").onclick=e=>{S.showHeit=!S.showHeit;
  e.target.textContent="↑ heightened rows: "+(S.showHeit?"on":"off");
  e.target.classList.toggle("on",!S.showHeit);render();};
// reset
document.getElementById("resetBtn").onclick=()=>{
  S={ranks:new Set(),conds:new Set(),acts:new Set(),saves:new Set(),tags:new Set(),minR:0,q:"",showHeit:true};
  document.getElementById("search").value="";
  document.querySelectorAll(".filters .chip.on").forEach(c=>c.classList.remove("on"));
  fr.querySelector(".chip").classList.add("on");
  document.getElementById("toggleHeit").textContent="↑ heightened rows: on";
  afterFilter();
};
// theme
document.getElementById("themeBtn").onclick=()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const nx=cur==="dark"?"light":cur==="light"?"":"dark";
  if(nx)document.documentElement.setAttribute("data-theme",nx);
  else document.documentElement.removeAttribute("data-theme");
  save();
};

// ---- prep pick ----
document.getElementById("list").onclick=e=>{
  const p=e.target.closest("[data-pick]"); if(!p)return;
  const key=p.dataset.pick;
  if(prep.has(key))prep.delete(key); else prep.add(key);
  save(); render(); renderTray();
};
function renderTray(){
  const groups={0:[],1:[],2:[],3:[],4:[]};
  [...prep].forEach(k=>{const[id,slot]=k.split("@");const s=byId[id];if(s)groups[+slot].push({s,key:k});});
  let html="";let total=0;
  for(const N of RANKS){
    const g=groups[N]; if(!g.length)continue; total+=g.length;
    g.sort((a,b)=>a.s.name.localeCompare(b.s.name));
    const lim=limits[N]; const over=lim&&g.length>+lim;
    html+=`<div class="slotgrp"><h4>${rankLabel(N)}
      <span class="lim"><span class="${over?'over':''}">${g.length}</span>/<input type="number" min="0" data-lim="${N}" value="${lim}" placeholder="∞"></span></h4>`;
    html+=g.map(({s,key})=>`<div class="pitem"><span class="x" data-rm="${key}">✕</span>
      <span class="pn">${esc(s.name)} <span class="act">${ACTLABEL[s.actions]}</span></span>
      <span class="pr">${s.rating||""} ${N>s.rank?`↑R${s.rank}`:""}</span></div>`).join("");
    html+=`</div>`;
  }
  document.getElementById("trayBody").innerHTML = total? html :
    `<div class="empty">Tap the ✓ on a spell to add it here. Heightened rows add the spell to that higher slot.</div>`;
  document.getElementById("fabCount").textContent=prep.size;
  document.getElementById("trayBody").querySelectorAll("[data-rm]").forEach(x=>x.onclick=()=>{
    prep.delete(x.dataset.rm);save();render();renderTray();});
  document.getElementById("trayBody").querySelectorAll("[data-lim]").forEach(inp=>inp.onchange=()=>{
    limits[inp.dataset.lim]=inp.value;save();renderTray();});
}
// tray open/close
const tray=document.getElementById("tray"),bd=document.getElementById("backdrop");
function openTray(o){tray.classList.toggle("open",o);bd.classList.toggle("on",o);}
document.getElementById("fab").onclick=()=>openTray(true);
document.getElementById("closeTray").onclick=()=>openTray(false);
bd.onclick=()=>openTray(false);
// copy / print / clear
document.getElementById("copyBtn").onclick=()=>{
  const groups={0:[],1:[],2:[],3:[],4:[]};
  [...prep].forEach(k=>{const[id,slot]=k.split("@");const s=byId[id];if(s)groups[+slot].push(s.name+(+slot>s.rank?` (heightened from R${s.rank})`:""));});
  let txt="Arcane prepared spells\n";
  for(const N of RANKS){if(groups[N].length){txt+=`\n${rankLabel(N)}${limits[N]?` (${groups[N].length}/${limits[N]})`:""}:\n`+
    groups[N].sort().map(n=>"  • "+n).join("\n")+"\n";}}
  navigator.clipboard.writeText(txt).then(()=>{const b=document.getElementById("copyBtn");
    const o=b.textContent;b.textContent="✓ copied";setTimeout(()=>b.textContent=o,1200);});
};
document.getElementById("printBtn").onclick=()=>{openTray(true);setTimeout(()=>window.print(),200);};
document.getElementById("clearBtn").onclick=()=>{if(confirm("Clear all prepared spells?")){prep.clear();save();render();renderTray();}};

render(); renderTray();
</script>
</body>
</html>
