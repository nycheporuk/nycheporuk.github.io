 become difficult terrain. Unattended objects in the area become slick with ice, and picking them up requires a successful Reflex save or Acrobatics check against your spell DC. The ice melts on any object that takes fire damage as well as in any square included in the area of a higher-level spell or effect with the fire trait.","conditions":["prone"],"tags":["control","damage"],"heightened":[{"label":"5th","text":"The damage increases to 8d4 cold damage and the area is a 30-foot burst."},{"label":"8th","text":"The damage increases to 14d4 cold damage and the area is a 60-foot burst."}],"sustained":false},{"id":"1339","name":"Rubble Step","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1339","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE if you are in a dungeon this is a party run away spell as it should effectively have the speed of your pursuers. If you jump or have a fly speed you could create some interesting shaped effects with this.","desc":"Have an ally leave rubble as it moves.","effect":"The target leaves behind a trail of shifting rubble that typically consists of stones, but you could choose another earthen material, such as loose sand or soil. For 2 rounds, when the target willingly moves out of a space, and if the target is in contact with the ground, the ground in that space becomes difficult terrain. The difficult terrain remains for the spell's duration.","conditions":[],"tags":["concentrate","control"],"heightened":[{"label":"4th","text":"The target leaves difficult terrain behind for 1 minute instead of two rounds, and the spell's duration is 10 minutes."}],"sustained":false},{"id":"638","name":"Sea Surge","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=638","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Evocation","Uncommon","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"P151 a wave that knocks creatures over. Doesn’t require you to be near water though.","desc":"You slap or stomp on a nearby solid or liquid surface, sending a surge of water rushing away from you.","effect":"You slap or stomp on a nearby solid or liquid surface, sending a surge of water rushing away from you. The water forms a flat, 5-foot-thick, 10-foot-high wall of water between 5 and 15 feet wide (you decide). It moves 60 feet in a direction of your choice along the struck surface, extinguishing all non-magical fires, carrying along unattended objects of 1 Bulk or less, and pushing larger objects. The wave moves another 60 feet in the same direction at the start of your next turn, then vanishes. Large or smaller creatures in the area or that enter the area the wave moves through must attempt a Fortitude save. Success The creature is unaffected. Failure The creature is knocked prone. If the creature was Swimming, it gets a critical failure instead. Critical Failure The creature is pushed 20 feet in the wave’s direction, is knocked prone, and takes 3d6 bludgeoning damage. ---","conditions":["prone"],"tags":["control","damage"],"heightened":[],"sustained":false},{"id":"271","name":"See Invisibility","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=271","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Divination","Revelation"],"rating":"🟢🟢🟢","rval":3,"gortle":"invisibility is common in some campaigns. But this spell doesn’t negate invisibility as well as it used to. Heighten to use all day. Now upgraded to See the Unseen.","desc":"See invisible creatures and objects.","effect":"You can see invisible creatures and objects. They appear to you as translucent shapes, and they are concealed to you.","conditions":["concealed","invisible"],"tags":["utility"],"heightened":[{"label":"5th","text":"The spell has a duration of 8 hours."}],"sustained":false},{"id":"1663","name":"See the Unseen","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1663","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Manipulate","Revelation"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC Renamed See Invisibility. But you can now see incorporeal things hidden in walls and get a bonus against illusions.","desc":"Reveal invisible creatures to your sight.","effect":"Your gaze pierces through illusions and finds invisible creatures and spirits. You can see invisible creatures as though they weren't invisible, although their features are blurred, making them concealed and difficult to identify. You can also see incorporeal creatures, like ghosts, phased through an object from within 10 feet of an object's surface as blurry shapes seen through those objects. Subtler clues also grant you a +2 status bonus to checks you make to disbelieve illusions.","conditions":["concealed","invisible"],"tags":["buff","concentrate","utility"],"heightened":[{"label":"5th","text":"This spell has a duration of 8 hours."}],"sustained":false},{"id":"299","name":"Spider Climb","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=299","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"a useful buff early to mid levels. It is really nice to be able to walk on the ceiling. The new safe name is Gecko Grip","desc":"Give a creature a climb Speed.","effect":"Tiny clinging hairs sprout across the creature's hands and feet, offering purchase on nearly any surface. The target gains a climb Speed equal to its Speed.","conditions":[],"tags":["utility"],"heightened":[{"label":"5th","text":"The duration increases to 1 hour."}],"sustained":false},{"id":"1296","name":"Spy's Mark","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1296","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"a wall or other solid, immobile surface","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Scrying"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB creates a security camera on the wall.","desc":"By pressing your hand to a wall or other solid immobile surface, you cause the crossed-swords symbol of the Firebrands—or a different symbol of your choosing—to appear on the targeted surface.","effect":"By pressing your hand to a wall or other solid immobile surface, you cause the crossed-swords symbol of the Firebrands—or a different symbol of your choosing—to appear on the targeted surface. This symbol is immobile. You can use an action, which has the concentrate trait, to shut your eyes and focus on the symbol, projecting your senses into the symbol. While projecting your senses, you can see, hear, and smell through the symbol using whatever senses you have (including natural senses like scent and darkvision and magical senses like see invisibility ). You must be within 100 feet to sense through the symbol in this way. You can Dismiss the projection effect but can otherwise freely project your senses into the symbol at any time during the spell's duration. A creature can erase the symbol (and end the spell) by spending 3 Interact actions to scrub the symbol away. These actions do not need to be consecutive.","conditions":[],"tags":["utility"],"heightened":[{"label":"4th","text":"The duration increases to 8 hours. You can sense through the symbol at a distance up to 500 feet away. Scrubbing the symbol requires 6 Interact actions."},{"label":"9th","text":"The symbol remains until the next time you make your daily preparations. You can sense through the symbol at a distance up to 1 mile away. Scrubbing the symbol requires 1 total minute of work."}],"sustained":false},{"id":"2516","name":"Steel Fortifications","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2516","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Concentrate","Manipulate","Metal"],"rating":"🟢🟢🟢","rval":3,"gortle":"BC to create some terrain you can take cover behind. Poorly worded but I assume you can use these structures for regular cover without getting into the details mentioned in the spell. Useful for archers and casters in general but especially for small ones who can climb inside.","desc":"You conjure several metal structures that consist of angled beams attached to one another at a central point, which can help block attacks.","effect":"You conjure several metal structures that consist of angled beams attached to one another at a central point, which can help block attacks. You create up to three Large structures within range in unoccupied squares; each fortification is 8 feet long, 8 feet wide, and 8 feet tall. There must be enough room for a fortification in order to conjure it. A single fortification has an AC of 10 and is immune to critical hits and precision damage. It has Hardness 9, 60 Hit Points, and a BT of 30. Once a fortification is broken, it crumbles into sharp metal bits. Any creature adjacent to or sharing a space with a fortification when it is broken must attempt a Reflex save or take 2d6 persistent bleed damage. Creatures can pass through the spaces of a fortification, though Medium and larger creatures treat these spaces as difficult terrain. A Small or smaller creature can occupy the same spaces as a fortification; doing so grants them standard cover. Similarly, a prone Medium creature can occupy the same spaces as a fortification, gaining standard cover in the process. A Medium or smaller creature can climb a fortification with a successful DC 15 Athletics check. ---","conditions":["prone"],"tags":["concentrate","control"],"heightened":[],"sustained":false},{"id":"1691","name":"Stupefy","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1691","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Manipulate","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC replacement for Touch of Idiocy. Fortunately this is now ranged. A good debuff to put on casters.","desc":"Dull a target's mind and make spell casting unreliable.","effect":"You dull the target's mind, depending on its Will save. Critical Success The target is unaffected. Success The target is stupefied 1 until the start of your next turn. Failure The target is stupefied 2 for 1 minute. Critical Failure The target is stupefied 3 for 1 minute. ---","conditions":["stupefied"],"tags":["concentrate","mental"],"heightened":[],"sustained":false},{"id":"320","name":"Summon Elemental","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=320","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal, Elemental","save":"","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"worthwhile having at least one summon in your list. Sacrificing minions is there any problem it can’t solve? There are some useful elemental abilities and immunities.","desc":"Conjure an elemental to fight on your behalf.","effect":"You conjure an elemental to fight for you. This works like summon animal , except you summon a common creature that has the elemental trait and whose level is 1 or lower, such as those below.","conditions":[],"tags":["summon"],"heightened":[{"label":"3rd","text":"Level 2."},{"label":"4th","text":"Level 3."},{"label":"5th","text":"Level 5."},{"label":"6th","text":"Level 7."},{"label":"7th","text":"Level 9."},{"label":"8th","text":"Level 11."},{"label":"9th","text":"Level 13."},{"label":"10th","text":"Level 15."}],"sustained":true},{"id":"1723","name":"Translate","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1723","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC hour long. No denying its utility. But it depends on your campaign. Was called Comprehend Language.","desc":"Grant understanding of a language to one creature.","effect":"The target can understand the meaning of a single language it is hearing or reading when you Cast the Spell. This doesn't let it understand codes, language couched in metaphor, and the like (subject to GM discretion). If the target can hear multiple languages and knows that, it can choose which language to understand; otherwise, choose one of the languages randomly.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"3rd","text":"The target can also speak the language."},{"label":"4th","text":"You can target up to 10 creatures, and targets can also speak the language."}],"sustained":false},{"id":"2474","name":"Veil Of Spirits","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2474","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Reflex","traits":["Concentrate","Manipulate","Spirit","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"SK dazzles and hands out weakness to spirit damage. Very useful if there is a lot of spirit damage potential in your group.","desc":"You draw on the essence of spiritual energy surrounding you to manifest a misty veil.","effect":"You draw on the essence of spiritual energy surrounding you to manifest a misty veil. When a creature that isn’t immune to spirit damage begins its turn within the area, it must attempt a Reflex save. You can Dismiss the veil. Critical Success The creature is unaffected. Success The creature is dazzled until the beginning of its next turn. Failure The creature is dazzled and gains a weakness to spirit damage equal to half your level until the beginning of its next turn as spiritual energy clings to it. A creature with spiritsense can’t use that imprecise sense while it’s dazzled in this way. Critical Failure As failure, but the weakness is equal to your level. ---","conditions":["dazzled"],"tags":["concentrate","utility"],"heightened":[],"sustained":false},{"id":"1212","name":"Vicious Jealousy","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1212","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Enchantment","Mental","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P181 stop your enemies from coordinating. Probably mean they won’t flank effectively.","desc":"The target is overcome by deep jealousy and resentment that twists its mind against other creatures.","effect":"The target is overcome by deep jealousy and resentment that twists its mind against other creatures. It must attempt a Will save. Critical Success The target is unaffected. Success For 1 round, the target no longer treats anyone as its allies. The spell then ends. Failure The target no longer treats anyone as its allies. The target can't take the Aid reaction or any action that would directly benefit another creature, such as casting a beneficial spell on them, though it can still take actions that indirectly benefit other creatures, such as fighting the same foes. Critical Failure As failure, and whenever the target starts its turn within reach of a creature it previously considered an ally, it must spend its first action on its turn to berate the creature or otherwise wave it away.","conditions":[],"tags":["mental"],"heightened":[{"label":"4th","text":"You can target up to 10 creatures."}],"sustained":true},{"id":"726","name":"Vomit Swarm","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=726","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult, Primal","save":"basic Reflex","traits":["Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG 2d8 piercing damage in a cone plus sickened. Great imagery","desc":"Vermin erupt in a cone from your mouth, biting and stinging creatures.","effect":"You belch forth a swarm of magical vermin. You evoke and shape the creatures from your own imagination, allowing you to change the appearance of the creatures (typically a mix of centipedes, roaches, wasps, and worms), but this doesn't change the effect of the spell. The vermin swarm over anyone in the area, their bites and stings dealing 2d8 piercing damage (basic Reflex save). A creature that fails its saving throw also becomes sickened 1. Once the spell ends, the swarm disappears.","conditions":["sickened"],"tags":["damage"],"heightened":[{"label":"+1","text":"Increase the damage by 1d8."}],"sustained":false},{"id":"370","name":"Water Breathing","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=370","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"30 feet","target":"up to 5 creatures","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Primal","save":"","traits":["Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"works for the whole party.","desc":"Allow creatures to breathe underwater.","effect":"The targets can breathe underwater.","conditions":[],"tags":[],"heightened":[{"label":"3rd","text":"The duration increases to 8 hours."},{"label":"4th","text":"The duration increases to until your next daily preparations."}],"sustained":false},{"id":"1425","name":"Allfood","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1425","rarity":"Uncommon","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 unattended non-magical object of 1 Bulk or less","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Primal","save":"","traits":["Transmutation","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You transform one object into an edible substance that any living creature can chew, swallow, and safely digest.","effect":"You transform one object into an edible substance that any living creature can chew, swallow, and safely digest. This allfood always has a bland taste and slightly gooey consistency, regardless of its original nature. One bulk of allfood provides enough sustenance to feed one Medium creature for a day. After 1 day, if no one has eaten the allfood , it reverts to its original form. Most Small creatures eat one-quarter as much as a Medium creature and most Tiny creatures eat one-sixteenth as much, while most Large creatures eat 10 times as much, Huge creatures need 100 times as much, and so on.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"Double the maximum bulk (to a maximum of 256 bulk at 10th level)."}],"sustained":false},{"id":"865","name":"Ash Cloud","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=865","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Conjuration","Fire"],"rating":null,"rval":0,"gortle":"","desc":"Summon a cloud of hot ash and smoke.","effect":"You summon a tumultuous cloud of ash and smoke. The cloud is difficult terrain for flying creatures, and creatures in the cloud can't detect anything using their sense of smell. Creatures that start their turn within the cloud take 2d4 fire damage as their lungs fill with the hot, acrid smoke, with a Fortitude save. Critical Success The target is unaffected. Success The target takes half damage. Failure The target takes full damage and is dazzled for 1 round. Critical Failure The target takes double damage and is blinded for 1 round.","conditions":["blinded","dazzled"],"tags":["control","damage","summon","utility"],"heightened":[{"label":"+1","text":"The damage increases by 1d4."}],"sustained":false},{"id":"2439","name":"Bee-Man's Summons","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2439","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"500-foot-radius <%RULES%2387%%>emanation<%END> centered on you","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"","traits":["Auditory","Concentrate","Linguistic","Mental","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You recreate the  Bee-Man’s  infamous ability to sense when someone utters their name.","effect":"You recreate the Bee-Man’s infamous ability to sense when someone utters their name. During the spell’s duration, you mentally sense whenever someone (referred to as a speaker) speaks your full name while within the spell’s area. You gain a vague sense of the speaker’s identity, such as “a local farmer” or “a halfling in distress,” unless the speaker is someone you have met and interacted with before, in which case you recognize the speaker specifically. As a reaction within 1 minute of the speaker’s utterance, you can send the speaker a telepathic prompt, asking if they intend to summon you. If they respond affirmatively, the spell’s remaining duration decreases to sustained (up to 10 minutes), during which time you know the direction to where the speaker named you and how far away they are.","conditions":[],"tags":["concentrate","mental","summon","utility"],"heightened":[{"label":"4th","text":"The emanation’s radius increases to 1,000 feet."},{"label":"7th","text":"The emanation’s radius increases to 1 mile, and instead of locating the speaker, you can instead converse with the speaker for 5 minutes. This otherwise works as sending ."},{"label":"9th","text":"As 7th, except the emanation’s radius increases to 5 miles, and the duration of the conversation is 10 minutes."}],"sustained":true},{"id":"867","name":"Befitting Attire","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=867","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"5 willing creatures","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Make clothes fit the occasion.","effect":"You cloak the targets in an illusion, shaping their clothing and worn items into ones suitable for a particular occasion. You visualize the occasion, and the spell creates illusory attire customized to each target. For instance, if you visualized a noble ball, armor would appear to be fine clothing. This doesn't change identifying details of the targets' appearances other than their clothes. Any creature that touches the attire, uses the Seek action to examine it, or otherwise interacts with it can attempt to disbelieve your illusion.","conditions":[],"tags":["illusion"],"heightened":[{"label":"4th","text":"You can target up to 20 creatures."},{"label":"5th","text":"You can target up to 100 creatures."}],"sustained":false},{"id":"1433","name":"Blast of the Bellows","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1433","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"100 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Divine, Primal","save":"","traits":["Air","Evocation","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You create a churning eddy of warm air that makes it difficult to fly within the area.","effect":"You create a churning eddy of warm air that makes it difficult to fly within the area. This area is difficult terrain for flying creatures. Each time a flying creature enters the area or ends its turn there, it must attempt an Acrobatics check to Maneuver in Flight. Success The creature is unaffected. Failure The creature descends 30 feet. Critical Failure The creature descends 60 feet.","conditions":[],"tags":["control"],"heightened":[{"label":"4th","text":"The duration increases to 10 minutes"}],"sustained":false},{"id":"1214","name":"Blood Duplicate","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1214","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 non- magical  object of 1 Bulk or less","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"This spell deals you 1 piercing damage as you shape a magical duplicate of the target from your blood; you can't cast this spell if you don't have blood.","effect":"This spell deals you 1 piercing damage as you shape a magical duplicate of the target from your blood; you can't cast this spell if you don't have blood. This spell can't duplicate an item made of precious materials, or materials with a rarity of uncommon or higher. If you're ever more than 5 feet from the duplicate, the spell's duration immediately ends. The Perception DC to recognize the duplicate as false using any sense except touch is equal to 10 + your spellcasting ability modifier + your Crafting proficiency bonus. The item feels wet and obviously fake to the touch. When the spell ends, the item collapses into a puddle of blood that quickly evaporates. ---","conditions":[],"tags":["damage","utility"],"heightened":[],"sustained":false},{"id":"1328","name":"Burrow Ward","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1328","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Earth","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Prevent burrowing in earth near you.","effect":"You solidify the earth around you, hindering burrowing creatures. Creatures that can't burrow through stone can't burrow through the area. Such creatures already underground within the area must succeed at a Fortitude save or be ejected from the area toward the surface. Those who succeed are forced out of the area but can remain underground. Creatures that can burrow through stone treat the area as difficult terrain.","conditions":[],"tags":["concentrate","control"],"heightened":[{"label":"5th","text":"You create a 30-foot emanation."}],"sustained":true},{"id":"1349","name":"Cauterize Wounds","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1349","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"up to 5 willing  creatures","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Fire","Healing","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Seal bleeding wounds with flame.","effect":"You seal bleeding wounds with fire. Any target that has persistent bleed damage can choose to take 1 fire damage. If it does, it can attempt to recover from its persistent bleed damage, with the lower DC for particularly effective assistance. During the spell's duration, you can use a single action, which has the concentrate trait, to repeat this effect for one target of the spell. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1366","name":"Clad in Metal","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1366","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 metal object of 5 Bulk or less that's unattended or attended by a willing creature","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Coat an item in a metal of your choice.","effect":"You briefly swap the outer surface of the metal in an object with a suitable amount of a common precious metal from the Plane of Metal. You can instead choose an uncommon or rare metal if you have access to it or the GM has given you access to it. The object functions as an item of that metal, provided the item would be 2nd level or lower. For example, you could make a dagger into a cold iron or silver dagger (2nd-level items) but couldn't make full plate into cold iron armor or silver armor (5th-level items). This imparts any special properties of the precious metal—a weapon clad in cold iron activates weaknesses to cold iron, for example—and suppresses any special properties of the original metal of which the item was made. The spell neither changes the structural integrity of the item nor damages it. The object can pass a cursory inspection, but the magical effect is obvious to anyone who studies the item closely, so it doesn't alter the Price of the item if you attempt to sell it.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"+1","text":"The maximum level of the precious metal increases by 2."}],"sustained":false},{"id":"1313","name":"Cleanse Air","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1313","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Air","Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Make air safe.","effect":"You purify the air in the area, making it clean and breathable. The spell immediately removes inhaled poisons, pollution, and similar contaminants from the air. For the remaining duration, the spell prevents any further contamination from altering air in the area, including keeping toxic air bordering the area from coming inside. (This doesn't prevent contaminants from coming in after the spell ends.) This spell doesn't create air, so casting it underwater wouldn't create breathable air, nor would it affect any toxins within air suspended in the water.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"3rd","text":"The area increases to 60 feet."},{"label":"4th","text":"The area increases to 120 feet."},{"label":"6th","text":"The area increases to 500 feet."},{"label":"9th","text":"The area increases to 1 mile."}],"sustained":false},{"id":"50","name":"Continual Flame","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=50","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"1 object","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Evocation","Light"],"rating":null,"rval":0,"gortle":"","desc":"A magical flame burns indefinitely.","effect":"A magical flame springs up from the object, as bright as a torch. It doesn't need oxygen, react to water, or generate heat.","conditions":[],"tags":[],"heightened":[{"label":"+1","text":"The cost increases as follows: 16 gp for 3rd level; 30 gp for 4th, 60 gp for 5th, 120 gp for 6th; 270 gp for 7th, 540 gp for 8th, 1,350 gp for 9th, and 3,350 gp for 10th."}],"sustained":false},{"id":"52","name":"Create Food","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=52","rarity":"Common","actions":"T","actionsRaw":"1 hour","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Primal","save":"","traits":["Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"Conjure food that can feed multiple creatures.","effect":"You create enough food to feed six Medium creatures for a day. This food is bland and unappealing, but it is nourishing. After 1 day, if no one has eaten the food, it decays and becomes inedible. Most Small creatures eat one-quarter as much as a Medium creature (one-sixteenth as much for most Tiny creatures), and most Large creatures eat 10 times as much (100 times as much for Huge creatures and so on).","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"You can feed 12 Medium creatures."},{"label":"6th","text":"You can feed 50 Medium creatures."},{"label":"8th","text":"You can feed 200 Medium creatures."}],"sustained":false},{"id":"62","name":"Deafness","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=62","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult, Primal","save":"Fortitude","traits":["Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"Make a creature deaf.","effect":"The target loses hearing; it must attempt a Fortitude save. The target is then temporarily immune for 1 minute. Critical Success The target is unaffected. Success The target is deafened for 1 round. Failure The target is deafened for 10 minutes. Critical Failure The target is deafened permanently. ---","conditions":["deafened"],"tags":[],"heightened":[],"sustained":false},{"id":"685","name":"Dismantle","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=685","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 non-magical object in your possession of 1 Bulk or less","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Temporarily disassemble an object into its components.","effect":"You touch an object, and it immediately disassembles itself into its component pieces. The spell fails if the target lacks component pieces (such as a statue carved from one block of stone), and using it on a dangerous object like a snare or trap typically triggers it. The object gains the broken condition, and the component pieces become small enough to be hidden under normal clothing and armor. You can Dismiss the spell. When the spell ends, the object reassembles itself into its original form, appearing in your hand or hands if you have them free, or on the ground in front of you otherwise. Once reassembled, the object loses the broken condition and its Hit Points return to the value the object had when you Cast the Spell.","conditions":[],"tags":[],"heightened":[{"label":"4th","text":"The spell lasts for 10 minutes."},{"label":"6th","text":"The spell lasts until your next daily preparations."}],"sustained":false},{"id":"905","name":"Elemental Zone","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=905","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal, Elemental","save":"","traits":["Evocation"],"rating":null,"rval":0,"gortle":"","desc":"Make one element more damaging within a zone.","effect":"Select an elemental trait: air, earth, fire, or water. Elemental zone gains the trait you chose. You imbue the area with the raw energy of that element, creating a zone that emits and amplifies magic of that type. The temperature might suddenly rise or fall, a storm cloud might form, and so on. Spells with the chosen elemental trait cast against creatures in the zone get a +2 status bonus to one damage type the spell deals based on the chosen trait: bludgeoning or electricity for air, bludgeoning for earth, fire for fire, and bludgeoning or cold for water. The caster chooses one type to add the bonus to if the spell deals more than one eligible type. This bonus is halved if the spell didn't use a spell slot (such as a cantrip, focus spell, or innate spell). The zone has no effect on the spell if the spell doesn't deal any damage of an eligible type. Elemental Spell Changes Source Rage of Elements pg. 55 Add metal (electricity or slashing damage) and wood (bludgeoning or vitality damage) to the choices.","conditions":[],"tags":["buff","damage"],"heightened":[{"label":"+2","text":"The status bonus increases by 1."}],"sustained":false},{"id":"1511","name":"Embed Message","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1511","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 object or willing creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Illusion","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Leave an illusory message to be triggered at a later date.","effect":"You specify a trigger and a message up to 25 words long. When the specified trigger occurs within 30 feet of the target, illusory text of your message circles the target accompanied by a disembodied voice. You can choose a language you know for the text and speech, and can choose what the voice sounds like. Once the message is completed, the spell ends.","conditions":[],"tags":["concentrate","illusion"],"heightened":[{"label":"4th","text":"You can add a simple sensory component to emphasize the message, such as an odor, visual effect, or physical sensation. This addition is obviously illusory and part of the message, lasting only while the message is being read."},{"label":"6th","text":"As 4th rank, but you can choose how many times the spell repeats the message before it ends; there is no limit to the number of repetitions."}],"sustained":false},{"id":"1115","name":"Empathic Link","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1115","rarity":"Uncommon","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 willing creature","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Emotion","Mental","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You forge a bond between yourself and the target, enabling you to feel each other's emotions.","effect":"You forge a bond between yourself and the target, enabling you to feel each other's emotions. You and the target can communicate empathetically, sharing emotions, at a distance of up to 1 mile.","conditions":[],"tags":["emotion","mental"],"heightened":[{"label":"4th","text":"You can target up to 4 willing creatures, and the duration increases to 8 hours."}],"sustained":false},{"id":"1151","name":"Empty Pack","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1151","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 container of 2 Bulk or less","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"99","name":"Endure Elements","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=99","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 willing creature","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Primal, Elemental","save":"","traits":["Abjuration"],"rating":null,"rval":0,"gortle":"","desc":"Protect a creature from severe cold or heat.","effect":"You shield the target against dangerous temperatures. Choose severe cold or heat. The target is protected from the temperature you chose (but not extreme cold or heat).","conditions":[],"tags":[],"heightened":[{"label":"3rd","text":"The target is protected from severe cold and heat."},{"label":"5th","text":"The target is protected from severe cold, severe heat, extreme cold, and extreme heat."}],"sustained":false},{"id":"1517","name":"Environmental Endurance","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1517","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Divine, Primal, Elemental","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Protect a creature from severe cold or heat.","effect":"You shield the target against dangerous temperatures. Choose severe cold or heat. The target is protected from the temperature you chose (but not extreme cold or heat).","conditions":[],"tags":["concentrate"],"heightened":[{"label":"3rd","text":"The target is protected from severe cold and severe heat."},{"label":"5th","text":"The target is protected from severe cold, severe heat, extreme cold, and extreme heat."}],"sustained":false},{"id":"1518","name":"Everlight","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1518","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"touch","target":"a gemstone worth 6 gp or more","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Light","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Cause a gem to glow eternally.","effect":"The gemstone you touch glows, spreading bright light with a color of your choice in a 20-foot radius (and dim light for the next 20 feet). The spell ends immediately if the gemstone is broken. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"574","name":"Expeditious Excavation","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=574","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"You remove loose dirt, dust, gravel, sand, and the like from the area.","effect":"You remove loose dirt, dust, gravel, sand, and the like (though not solid stone) up to the size of a 5-foot cube. Any Medium or smaller creature standing atop the earth when the spell is cast must attempt a Reflex save or Acrobatics check. Success The creature is unaffected and can choose to either descend the pit without damage or move to the nearest available space of its choice. Failure The creature falls prone in the nearest available space of its choice, or falls into the pit if it prefers. Critical Failure The creature falls into the pit excavated by the spell and lands prone, taking falling damage as normal.","conditions":["prone"],"tags":["control"],"heightened":[{"label":"+2","text":"The spell can excavate an additional 5-foot cube of earth. If you excavate all four 5-foot cubes beneath a Large creature, it must attempt a Reflex save or Acrobatics check, as above."}],"sustained":false},{"id":"1331","name":"Exploding Earth","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1331","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Earth","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Throw an exploding ball of earth.","effect":"You throw a hard-packed ball of earth and stone at a creature, and the projectile explodes upon impact. Attempt a spell attack against the target's AC. If you hit, you deal 4d6 bludgeoning damage plus 1d6 bludgeoning splash damage. On a critical hit, double the initial damage, but not the splash damage, and the target you hit must succeed at a Fortitude saving throw or fall prone.","conditions":["prone"],"tags":["concentrate","control","damage"],"heightened":[{"label":"+2","text":"The damage increases by 2d6, and the splash damage increases by 1d6."}],"sustained":false},{"id":"1353","name":"Falsify Heat","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1353","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 willing creature or object","duration":"","school":"Illusion","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Fire","Illusion","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Make a creature’s body heat seem different.","effect":"You veil the signs of the fires of vitality, altering the target's apparent body temperature. This illusion applies to all senses, and a creature that touches the target can attempt to disbelieve the illusion. You can Dismiss the spell. Choose an illusory body temperature when you cast the spell. - Moderate The target's body temperature appears the same as the surrounding environment, giving the target a +2 circumstance bonus to Deception checks to Impersonate an undead, a cold-blooded creature, or an inanimate object (such as a corpse). The target is also invisible to heatvision and other abilities that sense heat similarly. - Warm The target appears to emit substantial body heat, gaining a +2 circumstance bonus to Deception checks to Impersonate a warm-blooded creature.","conditions":["invisible"],"tags":["buff","concentrate","illusion","utility"],"heightened":[{"label":"4th","text":"You can target up to 10 creatures, and you can choose a different body temperature for each of them."}],"sustained":false},{"id":"2337","name":"Far-Flung Fetch","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2337","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"60 feet","target":"1 unattended object of light Bulk or less","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Manipulate","Rare","Subtle","Teleportation"],"rating":null,"rval":0,"gortle":"","desc":"You can pilfer an object even if it's outside the reach of your fingers.","effect":"You can pilfer an object even if it's outside the reach of your fingers. You teleport the target into one of your open hand. If you don't have a hand free, it falls to the ground at your feet.","conditions":[],"tags":["teleportation","utility"],"heightened":[{"label":"3rd","text":"The range increases to 120 feet."},{"label":"5th","text":"The range increases to 120 feet, and you can target an unattended object with a Bulk of 1 or less."},{"label":"7th","text":"As 5th rank, and when you Cast the Spell you can spend 3 actions instead of 1 to increase the range to planetary. If you do, you don't need line of sight to the target, but you must be extremely familiar with the target."}],"sustained":false},{"id":"575","name":"Feast of Ashes","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=575","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"1 living creature","duration":"","school":"Necromancy","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Curse","Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"You curse the target with a hunger no food can sate.","effect":"You curse the target with a hunger no food can sate. You can Dismiss the spell. The target must attempt a Fortitude save. Critical Success The creature is unaffected and is temporarily immune for 1 hour. Success The creature is fatigued for 1 round. Failure The creature is immediately afflicted by hunger as if it hadn’t eaten food in days. It becomes fatigued and takes 1d4 damage each day that can’t be healed until it sates its hunger. No amount of eating can sate the creature’s hunger during the spell’s duration. After the spell’s duration, the creature takes damage from starvation. Critical Failure As failure but the creature takes 2d4 damage each day, twice as much as usual for hunger.","conditions":["fatigued"],"tags":["damage","healing"],"heightened":[{"label":"+1","text":"The hunger becomes more unbearable, increasing the damage each day by 1d4, or by 2d4 on a critical failure."}],"sustained":false},{"id":"1355","name":"Fireproof","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1355","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"touch","target":"1 object up to 10 Bulk","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Fire","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Protect an object against catching fire.","effect":"You prevent the target item from conducting heat or catching fire for the spell's duration. The item gains fire resistance 10. In addition, effects with the fire trait that target the item must first succeed at a counteract check against your spell DC.","conditions":[],"tags":["concentrate","defense"],"heightened":[{"label":"4th","text":"The duration is 24 hours."},{"label":"6th","text":"The duration is unlimited."}],"sustained":false},{"id":"131","name":"Gentle Repose","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=131","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 corpse","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Necromancy"],"rating":null,"rval":0,"gortle":"","desc":"A corpse doesn't decay and can't become undead.","effect":"The targeted corpse doesn't decay, nor can it be transformed into an undead. If the corpse is subject to a spell that requires the corpse to have died within a certain amount of time (for example, raise dead ), do not count the duration of gentle repose against that time. This spell also prevents ordinary bugs and pests (such as maggots) from consuming the body.","conditions":[],"tags":[],"heightened":[{"label":"5th","text":"The spell's duration is unlimited, but the spell takes one more action to cast and requires a material component and a cost (embalming fluid worth 6 gp)."}],"sustained":false},{"id":"1543","name":"Ghostly Carrier","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1543","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Create a semicorporeal figure that carries your touch spells to targets.","effect":"You create a Tiny, semi-corporeal figure with a form you choose. It hovers near you for the duration. When you Cast a Spell that has a range of touch, you can have the carrier move within range, deliver the spell to a creature there, and return to you. If the carrier must attempt a spell attack roll, it uses your normal bonuses. The carrier has your AC and saves, but it is destroyed by any damage. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"2507","name":"Helpful Reload","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2507","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"30 feet","target":"the triggering creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"With a quick gesture, you reload your ally’s weapon, allowing them to focus on fighting the enemy.","effect":"With a quick gesture, you reload your ally’s weapon, allowing them to focus on fighting the enemy. You reload their weapon with a piece of mundane ammunition from the triggering creature’s inventory.","conditions":[],"tags":["buff","concentrate","summon"],"heightened":[{"label":"4th","text":"You reload your ally’s weapon and grant them a +1 status bonus to their next Strike with this weapon."},{"label":"6th","text":"You reload your ally’s weapon with the ammunition of their choice from their inventory. Your ally gains a +1 status bonus to their next Strike with this weapon."},{"label":"8th","text":"The spell no longer requires your ally to have appropriate ammunition available. You summon a single piece of common magical ammunition of 10th level or lower to reload your ally’s weapon with. Your ally gains a +1 status bonus to their next Strike with this weapon."}],"sustained":false},{"id":"1402","name":"Helpful Wood Spirits","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1402","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Concentrate","Manipulate","Wood"],"rating":null,"rval":0,"gortle":"","desc":"Make a gaggle of wood spirits carry out a small task.","effect":"Upon casting this spell, a cluster of little wood spirits tumbles into the area. They perform a simple task each round. These spirits are a magical echo of the true spirits that live on the Plane of Wood and can't be attacked, damaged, or otherwise interfered with. These spirits often look like kodama but can appear in any of the countless varieties of wood spirits that inhabit the Plane of Wood. Choose the kind of aid your wood spirits supply from the list below when you Cast the Spell. The first time each round you Sustain the spell, you can move the area occupied by the apparitions up to 10 feet and you can choose the kind of aid they provide this round. - Chores The wood spirits perform a minor manual task of your choice, such as cleaning, opening a door, picking up an unattended object, or carrying an object from one location to another. The spirits can't pick up or carry an object of greater than 2 Bulk. - Distract The wood spirits distract your foes, clambering all over their feet and bodies and being a nuisance. Creatures in the area are off-guard unless they succeed at a Reflex save. - Obstacle The wood spirits fill the area as a chaotic, bouncing mass. The area they occupy is difficult terrain. - Search The wood spirits Seek in the area they occupy, using your Perception check as their own. You learn anything they do from Seeking in this way. ---","conditions":["off-guard"],"tags":["concentrate","control"],"heightened":[],"sustained":true},{"id":"1207","name":"Horrifying Blood Loss","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1207","rarity":"Uncommon","actions":"1","actionsRaw":"Single Action","range":"30 feet","target":"1 creature taking  bleed damage","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Emotion","Enchantment","Fear","Mental","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You curse the target, filling it with terror at the loss of its blood.","effect":"You curse the target, filling it with terror at the loss of its blood. The target must attempt a Will save. Critical Success The target is unaffected. Success The target is frightened 1. Failure The target is frightened 2. Until it stops bleeding, its frightened value can't decrease below frightened 1. Critical Failure As failure, but the target is frightened 3.","conditions":["frightened"],"tags":["emotion","fear","mental"],"heightened":[{"label":"4th","text":"You even terrify witnesses with the copious quantities of blood. You can target up to four creatures as secondary targets. These secondary targets don't need to be bleeding but must be able to see the primary target. Secondary targets must also attempt Will saves, with the same results, except their restriction on decreasing their frightened value depends…"}],"sustained":false},{"id":"579","name":"Iron Gut","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=579","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Your mouth, esophagus, and stomach become incredibly elastic and tougher than metal.","effect":"Your mouth, esophagus, and stomach become incredibly elastic and tougher than metal. For the duration of the spell, you can reach down your throat to store or retrieve a single object of light or negligible Bulk in your stomach, as though your stomach were a backpack or other container. Storing and retrieving an item in this way requires an Interact action. The object must be small enough to reasonably fit within your stomach. It is very difficult for other creatures to notice that you are hiding an object in this way; passive observers can’t possibly notice and you gain a +4 circumstance bonus to your Stealth checks to Conceal the Object unless the searcher specifically searches your mouth and stomach. If at the end of the spell’s duration you still have an object stored in your stomach, it is violently expelled, dealing 1d6 damage to you.","conditions":[],"tags":["buff","damage","defense"],"heightened":[{"label":"3rd","text":"The duration increases to 8 hours."}],"sustained":false},{"id":"168","name":"Knock","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=168","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 door, lock, or container","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Make a door, lock, or container easier to open, and possibly open it immediately.","effect":"You make the target easier to open. Knock grants a +4 status bonus to any creature that tries to open the target door, lock, or container with an Athletics or a Thievery check. You can attempt a Thievery check to open the target as part of casting knock , and you add your level even if you're untrained. Knock counteracts lock . ---","conditions":[],"tags":["buff"],"heightened":[],"sustained":false},{"id":"1120","name":"Lock Item","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1120","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 object held by 1 creature and the creature holding it","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"Reflex","traits":["Abjuration","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"One object held by a creature becomes fused to that creature's hand and can't be put down.","effect":"One object held by a creature becomes fused to that creature's hand and can't be put down. To Disarm or Steal the item, the result of the skill check must exceed the spell's DC or the normal DC, whichever is higher. To voluntarily drop the weapon, the target must spend an Interact action rather than a free action, and then succeed at a Reflex save. On a failed save, the action is wasted, but on a success, they drop the item and the spell ends. An unwilling creature must attempt an initial Reflex save against lock item. A willing creature can choose to critically fail the saving throw. Critical Success The creature is unaffected. Success The creature is affected for 1 round. Failure The creature is affected for 4 rounds. Critical Failure The creature is affected for 1 minute.","conditions":[],"tags":[],"heightened":[{"label":"+2","text":"You can target either 1 additional object held by the same creature or 1 additional object held by 1 additional creature."}],"sustained":false},{"id":"1185","name":"Loose Time's Arrow","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1185","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"up to 6 creatures","duration":"","school":"Transmutation","traditions":"Arcane, Occult, Primal","save":"","traits":["Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"941","name":"Lucky Number","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=941","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Contingency","Divination"],"rating":null,"rval":0,"gortle":"","desc":"Set a contingency to reroll a specific, randomly chosen d20 result.","effect":"When you Cast this Spell, roll 1d20 and make a note of the result. You gain the following reaction; once you use the reaction, the spell ends, and you become temporarily immune to lucky number until the next time you make your daily preparations. That's My Number! Reaction (divination, fortune) Trigger You roll your lucky number as your d20 result on a non-secret attack roll, saving throw, or skill check; Effect You call upon the fortune stored within your lucky number and reroll the triggering check. However, pushing your luck has a price: if your result on the reroll is the same number again, you critically fail, regardless of what degree of success you ordinarily would have received. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"181","name":"Magic Mouth","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=181","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature or object","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Auditory","Illusion","Visual"],"rating":null,"rval":0,"gortle":"","desc":"Make an illusory mouth appear to speak a message.","effect":"You specify a trigger and a message up to 25 words long. When the specified trigger occurs within 30 feet of the target, an illusory mouth appears on the target and speaks the message, and the magic mouth spell ends. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"944","name":"Magnetic Attraction","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=944","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"up to 10 metal objects with a total Bulk or 1 or less","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Will","traits":["Evocation","Metal"],"rating":null,"rval":0,"gortle":"","desc":"Pull items with magnetism, even disarming metal weapons.","effect":"You adjust your magnetic polarity, plucking daggers from hands and coins from belts. The targeted objects fly to your location, letting you catch them easily in your hands, or dropping to the ground at your position, at your discretion. Unattended objects fly to you automatically. If you target secured objects or those in another creature's possession (such as sheathed weapons), you must attempt to Disarm the creature of the metal objects, making a spell attack roll instead of an Athletics check to do so. Instead of drawing the objects to yourself, you can polarize a single metal object within range, designating it as a lodestone and causing the metal objects to fly to it instead. The lodestone must be at least three times the total Bulk of the targeted metal objects. Objects will stick to the lodestone for 1 minute, though they can be wrenched away with an Interact action. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2126","name":"Mark of Blood","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2126","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 piercing or slashing weapon you’re wielding","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Manipulate","Rare"],"rating":null,"rval":0,"gortle":"","desc":"You place a drop of your blood on a weapon and charge it with magic","effect":"You place a drop of your blood on a weapon and charge it with magic so that you transfer a small amount of your life essence with your attack. The next creature you successfully Strike with the weapon during the spell's duration takes damage as normal from the attack and must then attempt a Will save; regardless of the outcome of this saving throw, the duration of mark of blood ends. You can have up to one creature cursed by mark of blood at any one time. If you use this spell to mark a different creature, the curse afflicting the previous creature ends. Critical Success The creature is unaffected. Success The creature gains a softly glowing mark that resembles Achaekek's symbol somewhere on their body (such as the forehead or back of the hand). This mark can be concealed by clothing, but is otherwise permanent until the curse is removed. Failure As success, but you can Seek to attempt to know the direction and general distance (within a mile) to the marked creature if the creature is alive and both you and the creature are on the same plane of existence. When you Seek in this way, you attempt a Perception check against the marked creature's Will DC. On a success, you gain the information, which is accurate at the moment that you Seek. On a critical failure, the curse ends, and the creature's mark vanishes. Critical Failure As failure, but your Perception checks to Seek the marked creature are automatically successful. ---","conditions":["concealed"],"tags":["damage"],"heightened":[],"sustained":false},{"id":"1594","name":"Marvelous Mount","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1594","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"Conjure a fantastical mount.","effect":"You conjure a Large fantastical creature to serve as a mount for the target. The mount is the target's minion, has a Speed of 40 feet, and can bear the target with any carried possessions. It can't carry any other creature. The mount uses the target's AC and saves, but it's destroyed if it takes more than 10 damage at one time, ending the spell.","conditions":[],"tags":["concentrate","damage","summon","utility"],"heightened":[{"label":"3rd","text":"The mount can walk on water, but it must end its turn on solid ground or sink."},{"label":"4th","text":"The mount has a Speed of 60 feet and can walk on water."},{"label":"5th","text":"The mount has a Speed of 60 feet and can walk on water. It also has a fly Speed of 60 feet, but it must end its turn on a surface or fall."},{"label":"6th","text":"The mount has a Speed and fly Speed of 80 feet."}],"sustained":false},{"id":"2295","name":"Mental Map","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=2295","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Mental","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You glean detailed information about a specific place visited by a creature directly from its mind.","effect":"You glean detailed information about a specific place visited by a creature directly from its mind, unless it fends you off with a Will save. The target can choose to fail the save. Success The target is unaffected. Failure You gain critical information about the place in question, granting you a +2 circumstance bonus to Survival checks while in the location and any skill checks to Recall Knowledge about the location for the next 24 hours. Critical Failure As failure, but you can erase all knowledge of the location from the target for 24 hours if desired. ---","conditions":[],"tags":["buff","concentrate","mental"],"heightened":[],"sustained":false},{"id":"198","name":"Misdirection","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=198","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"30 feet","target":"2 creatures or objects","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":null,"rval":0,"gortle":"","desc":"Cause one creature’s auras to appear to be another’s.","effect":"You reshape the magic aura of one creature or object to resemble that of another. You designate one target as the primary target and the other as the secondary target. Effects that would detect auras on the primary target instead detect the same types of auras from the secondary target. A creature reading the aura can attempt to disbelieve the illusion. You can Dismiss the spell from up to a mile away. ---","conditions":[],"tags":["illusion","utility"],"heightened":[],"sustained":false},{"id":"1616","name":"Noise Blast","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1616","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Concentrate","Manipulate","Sonic"],"rating":null,"rval":0,"gortle":"","desc":"Damage and deafen creatures with a powerful din.","effect":"A cacophonous noise blasts out, dealing 2d10 sonic damage. Each creature must attempt a Fortitude save. Critical Success The creature is unaffected. Success The creature takes half damage. Failure The creature takes full damage and is deafened for 1 round. Critical Failure The creature takes double damage and is deafened for 1 minute, and stunned 1.","conditions":["deafened","stunned"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d10."}],"sustained":false},{"id":"1625","name":"Peaceful Rest","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1625","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 corpse","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Concentrate","Manipulate"],"rating":null,"rval":0,"gortle":"","desc":"A corpse doesn't decay and can't become undead.","effect":"The targeted corpse doesn't decay, nor can it be transformed into an undead. If the corpse is subject to a spell that requires the corpse to have died within a certain amount of time (for example, raise dead ), do not count the duration of peaceful rest against that time. This spell also prevents ordinary bugs and pests (such as maggots) from consuming the body.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"5th","text":"The spell's duration is unlimited, but the spell takes one more action to cast and requires a cost (embalming fluid worth 6 gp)."}],"sustained":false},{"id":"1083","name":"Penumbral Disguise","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1083","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Shadow","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You wrap the target in shadows, granting them a +1 status bonus to  Stealth  checks to  Hide  while in dim light or darkness.","effect":"You wrap the target in shadows, granting them a +1 status bonus to Stealth checks to Hide while in dim light or darkness. In addition, the shadows mask the creature's features. While the creature is in dim light or darkness, other creatures must succeed at a Seek action against the spell's DC to discern details about the target's appearance. For example, without using Seek, other creatures can determine the target's general shape (such as humanoid), but they would need to Seek to determine the target's precise appearance or any other identifying information. Creatures with darkvision can still see the target and their features normally. The target's normal appearance is revealed in bright light.","conditions":[],"tags":["buff","illusion","utility"],"heightened":[{"label":"4th","text":"The status bonus is +2. Creatures with darkvision can no longer discern details about the target while the target is in dim light or darkness without Seeking, though creatures with greater darkvision can still determine these details."},{"label":"6th","text":"As 4th level, except the status bonus is +3 and creatures without darkvision can't determine even general details about the target while the target is in dim light or darkness unless they successfully Seek the target; these creatures see a vague shadow instead. Even on a successful Seek, they only determine general features, though they can see details on…"},{"label":"8th","text":"As 6th level, except the status bonus is +4 and even creatures with greater darkvision must Seek to discern details about the target while the target is in dim light or darkness."}],"sustained":false},{"id":"966","name":"Persistent Servant","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=966","rarity":"Common","actions":"T","actionsRaw":"1 minute","range":"120 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"Summon a long-term unseen servant for a single task.","effect":"You call forth an unseen servant and task it to perform a specific chore repeatedly. Choose a basic instruction, such as sweeping the floor, or picking up all objects from the floor and putting them in a designated bin. The servant performs the task over and over again throughout the duration, though it can't ever leave the spell's area. The servant isn't a minion, and you don't need to Sustain the Spell in order for it to continue to act. However, it acts on its own time, and thus can't accomplish anything useful during an encounter, even if an encounter happens within the spell's range. Tasks that rely on timing, discretion, or significant manual dexterity are doomed to failure. For instance, a servant tasked to pick objects off the floor won't discriminate between trash, misplaced treasure, or objects that are supposed to be on the floor, like a mousetrap. ---","conditions":["doomed"],"tags":[],"heightened":[],"sustained":true},{"id":"707","name":"Phantasmal Treasure","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=707","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 living creature","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Illusion","Mental"],"rating":null,"rval":0,"gortle":"","desc":"Tempt a creature with an illusory reward.","effect":"A phantasmal image of the most precious thing imaginable to the target appears in a location of your choice within the spell's range. Only the spell's target can see the treasure, though you can see the vague shape of the treasure—be it a pile of items, a deific avatar, or a cherished loved one or hero. The target's response to the treasure is based on the outcome of the target's Will save. Critical Success The target is unaffected. Success The target becomes fascinated with the treasure, and the duration is until the end of its turn. The target can also try to disbelieve the illusion if it touches the treasure, Seeks to examine it, or speaks to it if the illusion appears to be a person or the like. If the target disbelieves the illusion, the spell ends. Failure As success, but the duration is 1 minute. Critical Failure As success, but the duration is 1 minute. The target finds the treasure so appealing that until the spell ends, it must spend each action focused on it. This can include moving toward the treasure if the target isn't next to it, and Interacting with the treasure if the target is next to it. (If the illusion appears to be a person or the like, the target can also Interact to converse with it.) ---","conditions":["fascinated"],"tags":["emotion","illusion","mental"],"heightened":[],"sustained":false},{"id":"221","name":"Phantom Steed","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=221","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Occult, Primal","save":"","traits":["Conjuration"],"rating":null,"rval":0,"gortle":"","desc":"Conjure a magical horse.","effect":"You conjure a Large, magical, equine creature that only you (or another Medium or Small creature you choose) can ride. The horse is clearly phantasmal in nature, has 20 AC and 10 Hit Points, and automatically fails all saves. If it's reduced to 0 Hit Points, it disappears and the spell ends. The steed has a Speed of 40 feet and can hold its rider's body weight, plus 20 Bulk.","conditions":[],"tags":["control","summon"],"heightened":[{"label":"4th","text":"The steed has a Speed of 60 feet, can walk on water, and ignores areas of natural difficult terrain."},{"label":"5th","text":"The steed has a Speed of 60 feet, can walk on water, and ignores areas of natural difficult terrain. It can also air walk but must end its turn on solid ground or fall."},{"label":"6th","text":"The steed can walk or fly at a Speed of 80 feet, can walk on water, and ignores natural difficult terrain."}],"sustained":false},{"id":"1084","name":"Radiant Field","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1084","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult, Primal","save":"Fortitude","traits":["Evocation","Light","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You create an area of bright light.","effect":"You create an area of bright light. Creatures with light blindness that are blinded by radiant field and remain in the area must attempt a Fortitude save at the start of their turns. On a failure, a creature remains blinded for 1 round; this is an incapacitation effect. This spell also suppresses magical darkness of your radiant field spell's level or lower.","conditions":["blinded","concealed"],"tags":[],"heightened":[{"label":"4th","text":"Creatures seen through the area are concealed to creatures with light blindness, even those that are outside the area."}],"sustained":false},{"id":"1208","name":"Shadow Zombie","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1208","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1  zombie  of level 1 or lower","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Necromancy","Shadow","Uncommon"],"rating":null,"rval":0,"gortle":"","desc":"You cast a shadow over the target zombie, briefly turning it into shadowy vapor and controlling its movement.","effect":"You cast a shadow over the target zombie, briefly turning it into shadowy vapor and controlling its movement. While in this vaporous state, the zombie is a minion under your control, gains resistance 8 to physical damage, and is immune to precision damage. It can't cast spells, activate items, or use actions that have the attack or manipulate traits. It gains a fly Speed of 10 feet and can slip through tiny cracks. If the target is already your minion when you cast the spell, it doesn't get a saving throw and becomes vaporous for 10 minutes. If the target is not your minion, it can attempt a Will save to resist the spell. If it's already under someone else's command, the controlling creature also rolls a Will save, and the zombie uses the better result. Critical Success The target is unaffected and is temporarily immune for 24 hours. Success The target is unaffected. Failure The target becomes your shadowy minion for 1 minute. Critical Failure As failure, but for 10 minutes.","conditions":[],"tags":["defense","utility"],"heightened":[{"label":"4th","text":"You can target a zombie of level 5 or lower."}],"sustained":false},{"id":"1668","name":"Shape Wood","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=1668","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"an unworked piece of wood up to 20 cubic feet in volume","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":null,"rval":0,"gortle":"","desc":"Transform unworked wood into a shape of your choice.","effect":"You shape the wood into a rough shape of your choice. The shaping power is too crude to produce with intricate parts, fine details, moving pieces, or the like. You can't use this spell to enhance the value of the wooden object you are shaping. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"284","name":"Shrink","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=284","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":null,"rval":0,"gortle":"","desc":"Reduce a willing creature to Tiny size.","effect":"You warp space to make a creature smaller. The target shrinks to become Tiny in size. Its equipment shrinks with it but returns to its original size if removed. The creature's reach changes to 0 feet. This spell has no effect on a Tiny creature.","conditions":[],"tags":[],"heightened":[{"label":"6th","text":"The spell can target up to 10 creatures."}],"sustained":false},{"id":"589","name":"Slough Skin","rank":2,"url":"https://2e.aonprd.com/Spells.aspx?ID=589","rarity":"C
