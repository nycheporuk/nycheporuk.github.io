rm across the touched creature's body, allowing it to see in all directions at once. The subject can't be flanked for the spell's duration. In addition, when the subject Seeks, it can Seek in a 30-foot burst centered on itself or up to four 15-foot bursts within line of sight. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"1494","name":"Dispelling Globe","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1494","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"protects against all spells. But it is immobile, and there is one level lower counteract. Old name was Globe of Invulnerability.","desc":"Counteract magic that enters this sphere.","effect":"You create an immobile globe around yourself. It attempts to counteract any spell from outside the globe whose area or targets enter into it, as if the globe were a dispel magic spell 1 rank lower than its actual spell rank. If the counteract attempt succeeds, it prevents only the portion of the spell that would have entered the globe (so if the spell also has targets outside the globe, or part of its area is beyond the globe, those targets or that area are affected normally). You must form the sphere in an unbroken open space, so its edges don't pass through any creatures or objects, or the spell is lost (though creatures can enter the globe after the spell is cast). ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1422","name":"Elemental Sense","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1422","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal, Elemental","save":"","traits":["Concentrate","Manipulate","Revelation"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE gain one of a range of special senses for 10 minutes. Most are imprecise except in special circumstances. Heightened to 6th level it is 8 hours. Very useful.","desc":"Gain a sense related to an element you choose.","effect":"The elements grant you sensory enhancements. Choose one of the options below. The spell gains the listed trait or traits. - Aquatic Echolocation (water) You use your hearing as a precise sense when underwater. - Heatsense (fire) You can sense creatures with a temperature of 90º Fahrenheit or higher within 30 feet as an imprecise sense. - Magnetoreception (metal) You can sense creatures carrying metal items with a total of 1 Bulk or greater; this is an imprecise sense with a range of 30 feet. If a creature is made of metal or has the metal trait, you can detect it as though magnetoreception were a precise sense. In addition, you continuously know which direction is north. - Mechanoreception (air) You can see invisible creatures and objects. They appear to you as translucent shapes, and they are concealed to you. - Tremorsense (earth) You gain tremorsense (imprecise) with a range of 30 feet. - Woodsense (plant, wood) You can sense creatures carrying wood items with a total of 1 Bulk or greater; this is an imprecise sense with a range of 30 feet. If a creature is made of wood or has the plant or wood trait, you can detect it as though woodsense were a precise sense.","conditions":["concealed","invisible"],"tags":["concentrate","utility"],"heightened":[{"label":"6th","text":"The duration increases to 8 hours, and you can take 1 minute to recalibrate the sense, switching from your current elemental sense to a different one."}],"sustained":false},{"id":"1116","name":"Enhance Senses","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1116","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 willing creature","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Divination","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"KOL double the range of your imprecise senses.","desc":"You enhance the target's senses.","effect":"You enhance the target's senses. The target gains low-light vision, and all of the target's imprecise senses have their distances doubled. If the target already has low-light vision, they gain darkvision.","conditions":[],"tags":["utility"],"heightened":[{"label":"+2","text":"The number of targets increases by 1."}],"sustained":false},{"id":"1922","name":"Entangle Fate","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1922","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"2 to 4 creatures in range","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"Will","traits":["Divination","Mental","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"P197 targets 2 to 4 creatures within range. Makes them off-guard and probably stupefied. Party safe. Useful debuff.","desc":"You cause a swirl of energy to entangle the fates of all caught within the blast","effect":"You cause a swirl of energy to entangle the fates of all caught within the blast. Each creature in the area must attempt a Will save. Critical Success The creature is unaffected. Success The creature's fate becomes distorted, and momentary conflicting glimpses of the immediate future cause the creature to become flat-footed until the start of its next turn. Failure As success, but the creature is flat-footed for the duration of the spell. If more than one of the targets failed to resist this spell, the creature also becomes stupefied 1 for the duration of the spell as its fate and those of the other creatures continue to clash and strain against each other. Critical Failure As failure, but any creature that becomes stupefied 1 for the duration of the spell also becomes enfeebled 1 and clumsy 1 for the spell's duration. ---","conditions":["clumsy","enfeebled","off-guard","stupefied"],"tags":["mental"],"heightened":[],"sustained":false},{"id":"2504","name":"Filter Air","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2504","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Air","Concentrate","Manipulate","Subtle"],"rating":"🟢🟢🟢","rval":3,"gortle":"BC Reaction. A defensive buff to give you better saves against inhaled poisons and diseases.","desc":"You suck in a rough breath of air, and your body automatically filters out the harmful molecules that would infest your lungs.","effect":"You suck in a rough breath of air, and your body automatically filters out the harmful molecules that would infest your lungs. As you breathe for the duration of the spell, you get the outcome one degree of success higher on your saving throws against inhaled poisons and diseases. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"118","name":"Fire Shield","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=118","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"reactive defence. Better if your enemies don't have ranged options or if you are planning on getting into melee.","desc":"Flames protect you from cold and harm those that touch you.","effect":"You wreathe yourself in ghostly flames, gaining cold resistance 5. Additionally, adjacent creatures that hit you with a melee attack, as well as creatures that touch you or hit you with an unarmed attack, take 2d6 fire damage each time they do.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+2","text":"The cold resistance increases by 5, and the fire damage increases by 1d6."}],"sustained":false},{"id":"128","name":"Freedom of Movement","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=128","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature touched","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Primal","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"helps with a wide range of conditions. Not full immunity as it used to be in older d20 games, but still very useful. In the remaster the name becomes Unfettered Movement.","desc":"A creature overcomes hindrances to its movement.","effect":"You repel effects that would hinder a creature or slow its movement. While under this spell's effect, the target ignores effects that would give them a circumstance penalty to Speed. When they attempt to Escape an effect that has them immobilized, grabbed, or restrained, they automatically succeed unless the effect is magical and of a higher level than the freedom of movement spell. ---","conditions":["grabbed","immobilized","restrained"],"tags":["control","debuff"],"heightened":[],"sustained":false},{"id":"1332","name":"Glass Form","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1332","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Concentrate","Earth","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a weird set of benefits and penalties. Useful if you want to be permanently concealed so you can hide even in plain sight, or if you are being tracked by scent.","desc":"Turn a creature’s body into living glass.","effect":"You grant the target properties of dull, transparent glass. The target becomes concealed, has no scent, and can't bleed. They gain resistance 5 to acid, cold, electricity, and piercing damage and weakness 5 to sonic and bludgeoning damage. A creature in this form is affected by the shatter spell as though the creature were an unattended object. Each time the target takes damage to which the spell grants resistance or weakness, reduce the duration by 1 minute.","conditions":["concealed"],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+2","text":"The resistances and weaknesses increase by 5."}],"sustained":false},{"id":"137","name":"Globe of Invulnerability","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=137","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult","save":"","traits":["Abjuration","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"protects against all spells. But it is immobile, and there is one level lower counteract. New name is Dispelling Globe.","desc":"Magical sphere counteracts spells that would enter it.","effect":"You create an immobile globe around yourself that attempts to counteract any spell from outside the globe whose area or targets enter into the globe, as if the globe were a dispel magic spell 1 level lower than its actual spell level. If the counteract attempt succeeds, it prevents only the portion of the spell that would have entered the globe (so if the spell also has targets outside the globe, or part of its area is beyond the globe, those targets or that area is affected normally). You must form the sphere in an unbroken open space, so its edges don't pass through any creatures or objects, or the spell is lost (though creatures can enter the globe after the spell is cast). ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"145","name":"Hallucinatory Terrain","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=145","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"500 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult, Primal","save":"","traits":["Illusion","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"an illusion with a good duration. But you'll have to think about how to use it. Now called Mirage.","desc":"A natural environment appears to be another kind of terrain.","effect":"You create an illusion that causes natural terrain to look, sound, feel, and smell like a different kind of terrain. This doesn't disguise any structures or creatures in the area. Any creature that touches the illusion or uses the Seek action to examine it can attempt to disbelieve your illusion.","conditions":[],"tags":["illusion","utility"],"heightened":[{"label":"5th","text":"Your image can also disguise structures or create illusory structures (but still doesn't disguise creatures)."}],"sustained":false},{"id":"695","name":"Ice Storm","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=695","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Cold","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG difficult terrain, cold and bludgeoning damage in a small large area (errated to 20ft burst). Minor damage persists without being sustained.","desc":"Call a storm cloud that pelts creatures with hail.","effect":"You create a gray storm cloud that pelts creatures with an icy deluge. When you Cast the Spell, a burst of magical hail deals 2d8 bludgeoning damage and 2d8 cold damage to each creature in the area below the cloud (basic Reflex save). Snow and sleet continue to rain down in the area for the remainder of the spell's duration, making the area difficult terrain. Any creature that ends its turn in the storm takes 2 cold damage. If you Cast this Spell outdoors, you can create two non-overlapping clouds instead of one. As normal, if a Large or larger creature is in both clouds, it still only takes the initial damage once and the continuing damage once per turn.","conditions":[],"tags":["control","damage"],"heightened":[{"label":"+2","text":"The initial bludgeoning damage and cold damage increase by 1d8 each, and the cold damage creatures take at the end of their turns increases by 1."}],"sustained":true},{"id":"2338","name":"Infiltrator's Tunnel","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2338","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"60 feet (see text)","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Manipulate","Rare","Teleportation"],"rating":"🟢🟢🟢","rval":3,"gortle":"NPC creates a teleport tunnel only you can use.","desc":"It's best to know the ingress and egress points for any location you plan to rob.","effect":"It's best to know the ingress and egress points for any location you plan to rob. But it's even better to make your own! You create two portals. One appears on a flat surface you can touch, and the other appears on a different flat surface in range that you can see. You can move through the portals as though they were adjacent to each other. Any other creature attempting to move through the portals must succeed at a Will saving throw or be teleported up to 30 feet away from their starting point to a random safe space determined by the GM.","conditions":[],"tags":["concentrate","teleportation","utility"],"heightened":[{"label":"6th","text":"When you Cast the Spell, you can designate up to 5 other creatures to freely move between the portals."}],"sustained":false},{"id":"936","name":"Invisibility Curtain","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=936","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"120 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM a new concept. A wall of invisibility to hide behind. Nice if you can fight behind it and keep your enemies out.","desc":"Wall makes creatures on one side invisible to the other side.","effect":"You create a transparent invisible wall that makes any creatures on one side of the wall invisible to those on the other side. You choose which side of the wall provides invisibility to the creatures on that side when you cast the spell. You create either a 1-inch-thick wall in a straight line up to 60 feet long and 10 feet high or a 1-inch-thick, 10-foot-radius ring with the same height. The wall is intangible and stands vertically in either of the two forms. If you wish to do so, you can create the wall with a shorter length or height, or with a smaller radius. Any creature that crosses the wall becomes visible or invisible as appropriate, and it's visible if any portion of it is on the visible side of the wall. If a creature rendered invisible by the wall takes a hostile action, the spell ends after the hostile action is completed.","conditions":["invisible"],"tags":["illusion","utility"],"heightened":[{"label":"7th","text":"The spell doesn't end if an invisible creature takes a hostile action."}],"sustained":true},{"id":"1403","name":"Life-Draining Roots","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1403","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Manipulate","Plant","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a bit of damage in a straight line. With a tiny amount of hit points for you.","desc":"Roots hurt creatures in a line and transfer their vitality to you.","effect":"Thorny roots erupt from your hands in a tangled cascade, puncturing creatures in the way of their growth and revitalizing you. You deal 8d6 piercing damage to creatures in the line (basic Reflex save). You gain 1d4 temporary Hit Points for every living creature in the line, as the roots transfer nutrients from those damaged into you. The temporary Hit Points last for 1 minute.","conditions":[],"tags":["concentrate","damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1587","name":"Liminal Doorway","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1587","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Extradimensional","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"a good place to hide for the night. Not reliably safe, but with some thought it is probably still good. Based of the Rope Trick spell.","desc":"A chalk door opens to an extradimensional hiding place.","effect":"You draw a chalk doorway on an unbroken surface, which opens into an extradimensional space. Any creature treating the drawing as an actual door can Interact to touch the doorknob and pass through. The warped, chalk-drawn room beyond the door is 20 feet in width, depth, and height. The space is unadorned and empty, with chalk lines indicating the corners of the walls. If the drawing is scrubbed away, the underlying surface is broken, or a creature attempts to enter the space that would put it over capacity, the space begins to collapse. The space ejects one creature at random each round, depositing it on the nearest open ground, until all creatures are returned outside. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1604","name":"Mirage","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1604","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"500 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult, Primal","save":"","traits":["Concentrate","Illusion","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC an illusion with a good duration. But you'll have to think about how to use it. Was called Hallucinatory Terrain","desc":"Disguise one natural environment as another.","effect":"You create an illusion that causes natural terrain to look, sound, feel, and smell like a different kind of terrain. This doesn't disguise any structures or creatures in the area. Any creature that touches the illusion or uses the Seek action to examine it can attempt to disbelieve your illusion.","conditions":[],"tags":["concentrate","illusion","utility"],"heightened":[{"label":"5th","text":"Your image can also disguise structures or create illusory structures (but still doesn't disguise creatures)."}],"sustained":false},{"id":"650","name":"Necrotic Radiation","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=650","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"one object or one 10-foot-square area","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Reflex","traits":["Necromancy","Negative","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"up to 24 hour area or object denial with ongoing necrotic damage.","desc":"You imbue the touched object or space with slow-acting necrotic radiation.","effect":"You imbue the touched object or space with slow-acting necrotic radiation. If you cast the spell on an object, any creature ending its turn holding or carrying the object takes 2d6 negative damage. If you cast the spell on an area, any creature ending its turn in the area takes 2d6 negative damage. You can attempt to use this spell on an attended object by touching the object. If you do, the creature attempts a Reflex save to reduce the effect. Critical Success The object is unaffected. Success The creature pulls the object away quickly. The spell only lasts 1 minute. Failure The creature manages to slightly protect the object. The spell lasts 10 minutes. Critical Failure The spell lasts the full 24 hours.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+2","text":"Increase the radiation's negative damage by 1d6"}],"sustained":false},{"id":"959","name":"Ocular Overload","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=959","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult, Primal","save":"Fortitude","traits":["Contingency","Illusion","Incapacitation","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM a defensive reaction to give an attacker a miss chance against you. Good but only when you have spare spell slots of this level.","desc":"Set a contingency to interfere with the vision of a creature attacking you.","effect":"Just as a creature is about to attack you, you assault them with jarring illusions, completely surrounding their eyes with blinding flashes of motion and color. When the spell is complete, you gain the Overload Vision reaction; once you use the reaction, the spell ends. Overload Vision Reaction (concentrate) Trigger A creature within 60 feet would make an attack roll against you; Effects The triggering creature must attempt a Fortitude save. Critical Success The target is unaffected. Success The target is dazzled until the end of the current turn. Failure The target is blinded until the end of the current turn. Critical Failure The target is blinded until the end of the current turn and dazzled for 1 minute. ---","conditions":["blinded","dazzled"],"tags":["illusion","incapacitation"],"heightened":[],"sustained":false},{"id":"1624","name":"Peaceful Bubble","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1624","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC replaces Private Sanctum.  Creates a sound/sight/scrying proof area. A better non detection as it actually works.","desc":"Opaque bubble prevents detection, dreams, perception, and scrying.","effect":"An opaque shell of drifting, iridescent runes covers the area, creating a bubble. You can choose to make the burst smaller, in 10-foot increments. The runes don't block travel, but those inside the bubble can't perceive those outside it and vice versa. Detection and scrying effects are likewise blocked. Creatures sleeping within the bubble are immune to dreams sent by spells. Those sleeping 8 hours reduce their doomed condition by 2 instead of 1. ---","conditions":["doomed"],"tags":["concentrate","utility"],"heightened":[],"sustained":false},{"id":"2512","name":"Pest Swarm","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2512","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"basic Fortitude","traits":["Concentrate","Incarnate","Manipulate","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"BC incarnate swarm of various pests. Lots of low damage options. Very flexible but not especially strong.","desc":"Sometimes the most common irritations can band together and become threats to your enemies.","effect":"Sometimes the most common irritations can band together and become threats to your enemies. You reach out to the pests and nuisances around you, forming a small squadron of them to harass and occupy your opponents. They swarm from the forests, the air, and even the dirt beneath your feet. The pest squadron occupies the space of a Large creature, and like a swarm, they can occupy the same space as other creatures. When you Cast this Spell, choose one of the pest squadrons below to summon. Cockroaches Speed 30 feet, climb 30 feet; Arrive Scurrying Swarm The swarm of cockroaches scuttles toward the enemy, swarming them and climbing up the bodies of any enemy touching the ground. They deal 4d6 piercing damage (basic Reflex save) to all enemies within their space and in a 5-foot emanation. On a critical failure, a creature can't use concentrate actions for 1 round as they try and brush away the insects; Depart Farewell Dirt The cockroaches disperse, climbing down from the creatures and leaving behind their debris and dirt. All enemies in their space must attempt a Fortitude save. On a failure, a creature is sickened 2 (sickened 3 on a critical failure). Mosquitoes Speed 30 feet, fly 50 feet; Arrive Biting Flight The mosquitoes arrive in a hazy cloud, landing on the exposed skin of your opponents and dealing 4d6 piercing damage to enemies in their space (basic Reflex save); Depart Parting Gift The swarm attempts to drain their opponents before flying off. All enemies in their space and in a 5-foot emanation must succeed at a Fortitude save or become drained 1 (drained 2 on a critical failure). Pigeons Speed 20 feet, fly 40 feet; Arrive Dive Bomb The swarm of pigeons dives into the crowd of enemies and attacks with beaks and talons. Each enemy within their space takes 2d8 piercing and 2d4 slashing damage (basic Reflex save). On a critical failure, a creature is dazzled for 1 round; Depart (sonic) Wing Snap The pigeon swarm snaps their wingtips together to startle their opponents before leaving. Each enemy within their space takes 4d6 sonic damage (basic Fortitude save). Rats Speed 30 feet, burrow 20 feet; Arrive Chittering Race Rats swarm the legs of your enemies, biting at them and digging their sharp nails into whatever exposed flesh reveals itself. Each enemy in their space takes 4d6 piercing damage (basic Reflex save); Depart Underfoot The rats scurry underfoot, tripping up enemies and burrowing underground to make a swift getaway. Each enemy in their space must succeed a Reflex save or be knocked prone and take 2d6 bludgeoning damage. The area the rat swarm was in becomes difficult terrain for 1 round. Skunks Speed 30 feet, climb 20 feet; Arrive Mustelid Charge Skunks race to the scene, and each enemy within their space and within a 5-foot emanation take 4d6 piercing damage (basic Reflex save) as the skunks snarl and bite; Depart (acid) Stink Bomb Before leaving, the skunks launch a final offensive maneuver and release their stink glands in a 15-foot cone. All creatures in the area take 2d6 acid damage (basic Fortitude save). On a failure, a creature is also sickened 1 (sickened 2 on a critical failure). Spiders Speed 30 feet, climb 30 feet; Arrive (poison) Venomous Swarm horde of violin spiders crawls up from the ground, climbing onto enemies within their space and in a 5-foot emanation and biting them. Each enemy takes 3d6 piercing damage (basic Fortitude save). Enemies who fail are exposed to violin spider venom; Depart Spinning Webs As the violin spiders depart, they spray sticky webs at their enemies in a 30-foot cone. All creatures in this cone must attempt a Reflex save. On a failure, a creature takes a –10-foot circumstance penalty to their Speeds (–20-foot circumstance penalty on a critical failure) for 1 minute; a creature can remove this penalty with a successful Escape against your spell DC. The area of the cone is also difficult terrain for 1 round. Violin Spider Venom (poison) Saving Throw DC 24 Fortitude; Maximum Duration 6 rounds; Stage 1 1d6 poison (1 round); Stage 2 2d6 poison and clumsy 1 (1 round); Stage 3 2d6 poison, 1d6 persistent bleed, and clumsy 1 (1 round); Stage 4 2d6 poison, 2d6 persistent bleed, and clumsy 1 (1 round) ---","conditions":["clumsy","dazzled","drained","prone","sickened"],"tags":["concentrate","control","damage","debuff","summon"],"heightened":[],"sustained":false},{"id":"235","name":"Private Sanctum","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=235","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Occult","save":"","traits":["Abjuration","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"creates a sound/sight/scrying proof area. A better non detection as it actually works. Replaced by Peaceful Bubble","desc":"Black fog prevents sensing, scrying, and mind-reading on anyone within.","effect":"From outside, the area looks like a bank of impenetrable black fog. Sensory stimuli (such as sounds, smells, and light) don't pass from inside the area to outside the area. Scrying spells can't perceive any stimuli from the area, and mind-reading effects don't work in the area. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":false},{"id":"1924","name":"Prophet's Luck","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1924","rarity":"Rare","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Divine","save":"","traits":["Divination","Fortune","Misfortune","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"P197 bet on the dice. Cast as a reaction to give a status bonus or penalty. If you get it right you get further status bonus to saving throws.","desc":"You prophesize the result of the triggering saving throw","effect":"You prophesize the result of the triggering saving throw as either a success (including a critical success) or a failure (including a critical failure). The target gains a +1 status bonus to the save if you predict success or a –1 status penalty if you predict failure. If you predict the result correctly, fortune favors you, and you gain a +1 status bonus to saving throws. If you predict incorrectly, fortune spurns the target, imparting a –1 status penalty to its saving throws.","conditions":[],"tags":["buff","debuff"],"heightened":[{"label":"6th","text":"The save bonus or penalty increases to +2 or –2."},{"label":"9th","text":"The save bonus or penalty increases to +3 or –3."}],"sustained":false},{"id":"2310","name":"Ranage's Circle","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2310","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Auditory","Concentrate","Earth","Linguistic","Manipulate","Plant","Uncommon","Wood"],"rating":"🟢🟢🟢","rval":3,"gortle":"RA  immobilize a target at range.","desc":"Many stories tell of a clearing deep in the Mwangi jungle, surrounded by ancient cypress trees","effect":"Many stories tell of a clearing deep in the Mwangi jungle, surrounded by ancient cypress trees. At the center stands an ancient baobab tree growing around a large sphere of black basalt. Legends say that two spirit brothers, Ranage and Golokango, dwelled there long ago until Golokango’s evil ways forced the virtuous Ranage to encase his brother in stone. Ranage then transformed himself into a tree to surround and protect the rock for all time. By telling this tale, you condemn an enemy to a stony fate similar to Golokango’s and summon plants to surround them. When you Cast this Spell, every square adjacent to the target becomes difficult terrain from the sudden eruption of plant life for 1 minute. The target also attempts a Fortitude save. Critical Success The target is unaffected. Success The target is clumsy 1 as their feet are bound within stone. This condition lasts until they move from their current position. Failure The target is clumsy 2 and immobilized as their legs are encased in rock. The clumsy condition lasts until they move from their current position, and they can Escape from being immobilized with a check against your spell DC. Critical Failure The target is clumsy 2 and restrained as nearly their entire body is covered in basalt. The clumsy condition lasts until they move from their current position, and they can Escape from being restrained with a successful check against your spell DC. ---","conditions":["clumsy","immobilized","restrained"],"tags":["concentrate","control","summon"],"heightened":[],"sustained":false},{"id":"264","name":"Rope Trick","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=264","rarity":"Uncommon","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"1 touched piece of rope from 5 to 30 feet long","duration":"","school":"Conjuration","traditions":"Arcane, Occult","save":"","traits":["Conjuration","Extradimensional","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"a good place to hide for the night. Not as reliably safe as it used to be, but with some thought it is probably still good. The spell is remastered as Liminal Doorway.","desc":"Animate a rope that rises to an extradimensional hiding place.","effect":"You cause the target rope to rise vertically into the air. Where it ends, an extradimensional space opens, connected to the top of the rope. This space can be reached only by climbing the rope. The entrance to the space can't be seen, and it can be pinpointed only by the presence of the rope. The rope can't be removed or hidden, though it can be detached from the extradimensional space by pulling it with 16,000 pounds of weight, critically succeeding at an Athletics check against the spell's DC, or destroying the rope. The space holds up to eight Medium creatures and their gear. A Large creature counts as two Medium creatures, a Huge creature counts as four Medium creatures, and a Gargantuan creature fills the space on its own. If the rope is detached or destroyed, or if a creature attempts to enter the space that would put it over its capacity, the space begins to unravel. It disappears in 1d4 rounds, depositing the creatures within safely on the ground below. ---","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"829","name":"Swarming Wasp Stings","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=829","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Primal","save":"Fortitude","traits":["Necromancy","Poison","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P160 area effect clumsy and slow poison damage. I guess it's OK but I find such spells a bit slow.","desc":"You manifest a swarm of disembodied wasp stingers that stab creatures in the area, possibly poisoning them.","effect":"You manifest a swarm of disembodied wasp stingers that stab creatures in the area, possibly poisoning them. Creatures in the affected area take 1d6 piercing damage. Each creature that takes piercing damage must attempt a Fortitude save. Critical Success The target is unaffected. Success The target takes 2d6 poison damage. Failure The target is afflicted with swarming wasp venom at stage 1. Critical Failure The target is afflicted with swarming wasp venom at stage 2. Swarming Wasp Venom (poison) Level 7; Maximum Duration 6 rounds; Stage 1 2d6 poison damage and clumsy 1 (1 round); Stage 2 3d6 poison damage and clumsy 2 (1 round) ---","conditions":["clumsy"],"tags":["damage"],"heightened":[],"sustained":false},{"id":"2165","name":"Trickster's Feathers","rank":4,"url":"https://2e.aonprd.com/MythicSpells.aspx?ID=2165","rarity":"Rare","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Illusion","Illusion","Manipulate","Mythic","Rare"],"rating":"🟢🟢🟢","rval":3,"gortle":"WOI this is Rare and Mythic.  An improved version of Illusory Disguise","desc":"You conjure four magic feathers, each with the potential to hold a single illusory guise.","effect":"You conjure four magic feathers, each with the potential to hold a single illusory guise. These feathers have negligible Bulk and remain potent for the duration. As an Interact action, you can place one of these feathers into your hair or cap, or remove an already donned feather. When worn in this way, the feather causes you to appear as another creature of the same body shape, and with roughly similar height (within 6 inches) and weight (within 50 pounds), as yourself. The disguise is typically good enough to hide your identity but not to impersonate a specific individual. This disguise also changes your voice and scent, but it doesn't disguise your mannerisms or behavior. You can change the appearance of your clothing and worn items, such as making your armor look like a dress. Held items are unaffected, and any worn item you remove returns to its true appearance. When you don a feather for the first time, you determine the illusory appearance that feather grants you, selecting the ancestry, age, gender, attire, and other visual features. For the duration, this feather is linked to that disguise. Wearing it in your hair or hat always imparts the linked appearance. Selecting a feather's appearance for the first time counts as setting up a disguise for the Impersonate use of Deception; attempt this Deception check at mythic proficiency. You can only wear one feather at a time. When you remove a feather, you revert to your true appearance. If you give a feather to another creature, it can no longer impart a disguise. ---","conditions":[],"tags":["concentrate","illusion","utility"],"heightened":[],"sustained":false},{"id":"1023","name":"Umbral Graft","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1023","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Shadow"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM steal or counter a spell using a Thievery check.","desc":"Attempt to steal an active spell.","effect":"You reflect a spell into a shadowy version of itself, in the process depleting the power of the initial spell. During umbral graft's duration, you can use the Steal action to attempt to abscond with spells affecting a foe instead of stealing an item. You can also make one attempt to Steal as part of Casting umbral graft . If you succeed at your check to Steal a spell, randomly determine a spell affecting the foe that has a target entry. That spell ceases to affect the target, and you can either cause the spell to affect you or store it in your shadow. If your attempt to Steal was a critical success, you automatically steal the spell if its level is equal to or lower than umbral graft . If it was a success, you automatically steal it if its level is lower than umbral graft . If you succeeded, but the spell's level was too high to steal automatically, you must attempt a counteract check to see if you steal the spell. You know what the spell is as soon as you steal it. If you store it, you can transfer it to a willing creature as a single action that has the manipulate trait. The spell lasts for its remaining duration, to a maximum of 1 minute, and any time you keep it stored subtracts from its duration normally. The spell gains the shadow trait. You can't steal constant innate spells that are always active on a creature, such as a choral angel's constant tongues , or innate spells that have special restrictions that remove their ability to target other creatures, such as an imp's invisibility . At the GM's discretion, you might not be able to steal innate spells with other unusual modifications to the base spell. As normal, you can Steal only from a target within your reach. Once you've stolen a spell, you can't attempt to Steal more spells, nor can you choose not to take a spell if you succeed at your Thievery check. When you cast umbral graft , any spells you stole with a previous umbral graft end even if their duration hasn't elapsed. If you're affected by both umbral graft and umbral extraction , you make the choice whether to steal a spell slot, an active spell, or an item each time you Steal. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"1732","name":"Unfettered Movement","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1732","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature touched","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC was called Freedom of Movement This helps with a wide range of conditions.","desc":"Repel effects that would hold a creature in place.","effect":"You repel hindrances that would affect a creature. While under this spell's effect, the target ignores effects that would give them a circumstance penalty to Speed. When they attempt to Escape an effect that has them immobilized, grabbed, or restrained, they automatically succeed unless the effect is magical and of a higher rank than the unfettered movement spell. ---","conditions":["grabbed","immobilized","restrained"],"tags":["concentrate","control","debuff"],"heightened":[],"sustained":false},{"id":"725","name":"Vampiric Maiden","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=725","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Necromancy","Negative"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG piercing and negative damage. Temporary hitpoints for the caster. Immobilised till their turn.","desc":"A ghostly iron maiden harms a creature and transfers its vitality to you.","effect":"A ghostly iron maiden snaps shut on the target and drains its vitality for your gain. This deals 4d4 piercing damage and 4d4 negative damage, and the target must attempt a Fortitude save. You gain temporary HP equal to the negative damage the target takes (after applying resistances, weaknesses, and the like). You lose any remaining temporary HP after 1 minute. Critical Success The target is unaffected. Success The target takes half damage. Failure The target is briefly trapped within the vampiric maiden. The target takes full damage and is immobilized by the iron maiden for 1 round or until it uses an Interact action to extricate itself, whichever comes first. Critical Failure The target takes double damage and is immobilized by the vampiric maiden for 1 round or until it Escapes (the DC is your spell DC), whichever comes first.","conditions":["immobilized"],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The piercing and negative damage increase by 1d4 each."}],"sustained":false},{"id":"373","name":"Weapon Storm","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=373","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"reasonable damage area of effect spell with no range. Just make sure you have a d12 weapon on hand.","desc":"Multiply a weapon you hold and attack many creatures with it.","effect":"You swing a weapon you're holding, and the weapon magically multiplies into duplicates that swipe at all creatures in either a cone or an emanation. This flurry deals four dice of damage to creatures in the area. This damage has the same type as the weapon and uses the same die size. Determine the die size as if you were attacking with the weapon; for instance, if you were wielding a two-hand weapon in both hands, you'd use its two-hand damage die. Critical Success The creature is unaffected. Success The target takes half damage. Failure The target takes full damage. Critical Failure The target takes double damage and is subject to the weapon's critical specialization effect.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"Add another damage die."}],"sustained":false},{"id":"1034","name":"Winning Streak","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1034","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"20 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM one action spell to quicken an ally. It infectiously spreads amongst allies with everyone keeping the effect providing some gets a critical attack roll.","desc":"Quicken a target and make its critical hits spread the quickness.","effect":"The target is energized by its good fortune as it spreads to others—as long as they keep winning. It gains the quickened condition for 1 round. If the target or one of their allies within 20 feet gets a critical success on an attack roll against a significant foe, whoever got the critical success becomes quickened if they weren't already, and the duration of the winning streak is extended by another round. Creatures quickened by the spell can use the extra action to Strike, Step, or Stride. If a full round passes without the target or one their allies critically succeeding on an attack roll against a significant foe, the winning streak breaks and the spell ends. ---","conditions":["quickened"],"tags":[],"heightened":[],"sustained":false},{"id":"1364","name":"Ymeri's Mark","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1364","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"basic Fortitude","traits":["Concentrate","Curse","Detection","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE this is a tracer spell that you put on a target that you release, so you can follow it to its lair.","desc":"Curse a creature with the Queen of the Inferno’s mark to track it or make it explode.","effect":"You place the fiery mark of the Queen of the Inferno on the target, burning into the creature's very essence. The mark gives off a heat that only you can sense; as long as you're on the same plane as the target, you can sense the direction it's in. The target is fatigued and can't reduce the value of this condition normally. You can detonate the mark at any point during its duration by Dismissing the spell. The rune explodes in a 10-foot emanation centered on the target that deals 5d6 fire damage with a basic Reflex save. You choose whether the mark's target is included in the explosion. When you cast the spell, the target attempts a Fortitude save to determine how long the mark lasts. If the spell's duration elapses, the rune doesn't detonate. Critical Success The target is unaffected. Success The duration is 1 minute. Failure The duration is 1 week. Critical Failure The duration is unlimited.","conditions":["fatigued"],"tags":["concentrate","damage","defense","utility"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"2294","name":"Bridge of Vines","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2294","rarity":"Uncommon","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Concentrate","Manipulate","Plant","Uncommon","Wood"],"rating":"🟠🟠","rval":2,"gortle":"RA  a spell to create some favourable terrain or a bridge. Better if you have a spell book.","desc":"Vines sprout beneath your feet and extend away from you in a straight line.","effect":"Vines sprout beneath your feet and extend away from you in a straight line up to 60 feet, forming a 10-foot-wide bridge that can cross over difficult terrain and low obstacles, as well as reach higher ground. The bridge has an AC equal to your spell DC, Hardness 10, and 20 Hit Points. It is immune to critical hits and precision damage. The bridge lasts either for the duration of the spell, until it is destroyed, or until you Dismiss the spell. While the spell is active, you and your allies can use the bridge normally. If any other creatures attempt to use the bridge, the vines attempt to trip and entangle them. They must attempt a Reflex save against your spell DC. Critical Success The target is unaffected. Success The target treats the length of the bridge as difficult terrain. Failure As success, and the target is knocked prone. Critical Failure As success, and the target is knocked prone and grabbed until it Escapes (with a DC equal to your spell DC) or the spell ends.","conditions":["grabbed","prone"],"tags":["concentrate","control"],"heightened":[{"label":"+1","text":"The bridge’s Hit Points increase by 10."}],"sustained":false},{"id":"881","name":"Chromatic Armor","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=881","rarity":"Common","actions":"2","actionsRaw":"Two Actions or Three Actions","range":"touch","target":"1 willing creature","duration":"","school":"Abjuration","traditions":"Arcane, Occult","save":"Will","traits":["Abjuration","Light"],"rating":"🟠🟠","rval":2,"gortle":"SOM  dazzle attackers that melee at close range. Plus 3 mostly random types of resistance.","desc":"Glowing armor sheds light, dazzling foes and granting random resistances.","effect":"You wrap the target in armor made of sheets of colored light. The armor sheds bright light for 20 feet (and dim light for the next 20 feet). Whenever a creature attacks the target and is adjacent to it, the attacker must attempt a Will save at the end of its action. On a failure, it becomes dazzled until the end of its next turn. Regardless of the result of the save, the attacker is temporarily immune until the end of its next turn. The dazzling effect has the light and visual traits. When you cast the spell, roll 1d8 twice on the table below to see the armor's colors (rerolling any duplicates). Each color grants resistance 5 to the indicated damage type. If you spend three actions to Cast the Spell, roll three times instead. Red fire Orange acid Yellow electricity Green poison Blue sonic Indigo mental Violet force Matching Color The armor becomes the color matching the type of damage the target took most recently in the past minute. If it didn't take any of those seven types of damage or the armor is already that color, roll again, rerolling any results of 8.","conditions":["dazzled"],"tags":["defense"],"heightened":[{"label":"+3","text":"The resistance is increased by 5."}],"sustained":false},{"id":"883","name":"Chromatic Ray","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=883","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Attack","Evocation","Light"],"rating":"🟠🟠","rval":2,"gortle":"SOM a single target attack spell with a random effect. The damage can be good, but I'd always rather choose.","desc":"Ray of light causes effects based on its color.","effect":"You send out a ray of colored light streaming toward your enemy, with a magical effect depending on the ray's color. Make a spell attack roll. If you hit, roll 1d4 to see which beam you cast. If the ray deals damage, that damage is doubled on a critical hit. Any additional traits that apply to a ray are listed in parentheses just after the name of the color. Red (fire) The ray deals 30 fire damage to the target. Orange (acid) The ray deals 40 acid damage to the target. Yellow (electricity) The ray deals 50 electricity damage to the target. Green (poison) The ray deals 25 poison damage to the target, and the target must succeed at a Fortitude save or be enfeebled 1 for 1 minute (enfeebled 2 on a critical failure).","conditions":["blinded","clumsy","dazzled","enfeebled","slowed"],"tags":["damage","utility"],"heightened":[{"label":"6th","text":"The damage for red, orange, yellow, and green each increase by 10. Roll 1d8 to determine the ray's color, using the results for 1–4 above and the results for 5–8 below. Blue The ray has the effect of the flesh to stone spell. On a critical hit, the target is clumsy 1 as long as it's slowed by the flesh to stone effect. Indigo (emotion, incapacitation, men…"}],"sustained":false},{"id":"2527","name":"Cloud Current","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2527","rarity":"Uncommon","actions":"T","actionsRaw":"1 minute","range":"500 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Concentrate","Manipulate","Uncommon","Water"],"rating":"🟠🟠","rval":2,"gortle":"DC a nice visual distraction of dragons in the distance, primarily this seems to be about improving flying speed, and probably sailing speed.","desc":"Air and water vapor combine into a great cloud that funnels a powerful current within it.","effect":"Air and water vapor combine into a great cloud that funnels a powerful current within it. The eddies make the cloud appear from a distance to be a group of cloud dragons tumbling through the sky. The cloud is up to 30 feet wide, 30 feet tall, and 10 miles long. It runs parallel to the ground, and the nearest end of it must be within range and at least 100 feet above the ground. The current travels in a direction you choose when you Cast the Spell, and the travel Speed of creatures flying through the cloud in that direction is doubled. You can Dismiss the cloud.","conditions":[],"tags":["concentrate"],"heightened":[{"label":"5th","text":"The duration is 8 hours, and the cloud can be up to 50 feet wide and 100 miles long."},{"label":"8th","text":"As 6th, and travel speed is quadrupled."}],"sustained":false},{"id":"70","name":"Dimensional Anchor","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=70","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Abjuration"],"rating":"🟠🟠","rval":2,"gortle":"stopping an enemy teleporting away is too narrow for a Sorcerer to want every day. But put it in your spell book. Remastered name change to Planar Tether","desc":"Keep a creature from teleporting or traveling to other planes.","effect":"You interfere with the target's ability to teleport and travel between dimensions. Dimensional anchor attempts to counteract any teleportation effect, or any effect that would move the target to a different plane. The duration is determined by the target's Will save. Critical Success The target is unaffected. Success The effect's duration is 1 minute. Failure The effect's duration is 10 minutes. Critical Failure The effect's duration is 1 hour. ---","conditions":[],"tags":["utility"],"heightened":[],"sustained":false},{"id":"74","name":"Discern Lies","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=74","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Divine, Occult","save":"","traits":["Divination","Mental","Revelation","Uncommon"],"rating":"🟠🟠","rval":2,"gortle":"you could use it a fair bit, but you could also use skills instead.","desc":"Expertly detect lies and falsehoods.","effect":"Falsehoods ring in your ears like discordant notes. You gain a +4 status bonus to Perception checks when someone Lies. ---","conditions":[],"tags":["buff","mental"],"heightened":[],"sustained":false},{"id":"686","name":"Dull Ambition","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=686","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Enchantment","Mental","Misfortune"],"rating":"🟠🟠","rval":2,"gortle":"APG gives the target the worst of two initiative rolls for a day.","desc":"Curse a creature with an unfortunate lack of ambition.","effect":"You curse the target to fail in all avenues of its life that require drive and ambition, as it inadvertently undermines its own goals at every turn. The effect is based on the target's Will save. Critical Success The target is unaffected. Success For 1 hour, the target rolls twice and uses the lower result on initiative rolls. Failure For 1 day, the target rolls twice and uses the lower result on initiative rolls and any check to determine the success of a downtime activity. Critical Failure As failure, but the duration is unlimited. ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"951","name":"Mirror's Misfortune","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=951","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion"],"rating":"🟠🟠","rval":2,"gortle":"SOM a spell designed to inflict misfortune on an opponent. Meaning that they will likely miss their next couple of attacks.","desc":"Split into two copies. Destroying the fake curses the attacker.","effect":"You split into your real self and a mirrored version of yourself that curses would-be attackers with misfortune on their next attacks. When you cast this spell, you seem to split in two. As you do, you can Step to any adjacent square. In either your initial square, or another square adjacent to your initial square, an exact illusory duplicate of you appears. You decide a simple course of action for the duplicate to follow, such as to walk to a specific point or wave its hands in the air, but more complex routines are beyond its abilities. A creature can distinguish between you and the duplicate only if it spends an action to Seek and succeeds at a Perception check against the spell's DC. If a creature takes a hostile action against the duplicate, the illusion shatters into mirrorlike shards, inflicting bad luck on the attacker's next few attacks as misfortune's toll for shattering the mirror. The attacker must attempt a Will save with the following effects; this is a curse and misfortune effect. When the duplicate shatters, the spell ends. Success The creature is unaffected. Failure Within the next hour, the creature must roll its next two attack rolls twice and take the lower result. Critical Failure Within the next hour, the creature must roll its next four attack rolls twice and take the lower result. ---","conditions":[],"tags":["illusion"],"heightened":[],"sustained":false},{"id":"1392","name":"Misty Memory","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1392","rarity":"Uncommon","actions":"T","actionsRaw":"1 minute","range":"","target":"1 body of water of at least 5 square feet","duration":"","school":"","traditions":"Arcane, Divine, Primal","save":"","traits":["Concentrate","Manipulate","Uncommon","Water"],"rating":"🟠🟠","rval":2,"gortle":"ROE review something that happened near a body of water in the last day. It is a bit narrow.","desc":"Replay a scene from the past through the medium of water.","effect":"Some say water holds memories or impressions of the past, and you can raise those memories to the surface to glimpse recent events. When you Cast the Spell, you fix your mind on an amount of time in the past, up to 24 hours ago. A mist rises from the target body of water, filling a 30-foot burst and coalescing into a misty scene of the events that took place at that time within 60 feet of the water. Any creature who can see the area can observe the images produced, which are a translucent white color and detailed enough to show a silhouette, outline, or contour of creatures and objects that passed through the area and the motions they took. Fine details, such as facial features or written letters, are too precise for the mist to form, and the scene is silent. You can Sustain the spell to cause the mist to play events backward or forward, with each minute spent Sustaining corresponding to a minute of playback. Strong winds from a magical source can disrupt this spell if the effect succeeds at a counteract check against your spell DC. ---","conditions":[],"tags":["concentrate"],"heightened":[],"sustained":true},{"id":"1186","name":"Morass of Ages","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1186","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Aura","Transmutation"],"rating":"🟠🟠","rval":2,"gortle":"DA generates difficult terrain and slows people down close to you. Probably too slow to be much use.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2454","name":"Mutilate","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=2454","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions or Three Actions","range":"40 feet","target":"1 creature in  line of sight","duration":"","school":"","traditions":"Arcane, Occult, Primal","save":"basic Fortitude","traits":["Manipulate","Uncommon"],"rating":"🟠🟠","rval":2,"gortle":"P209 mutilate yourself in order to do slashing damage to an enemy. Not enough damage. For 3 action you get a burst effect.","desc":"You cut your own body in a ritualistic manner, causing similar damage to a creature in your line of sight.","effect":"You cut your own body in a ritualistic manner, causing similar damage to a creature in your line of sight. These cuts are superficial and cause 1d4 slashing damage to you; however, the wounds that open up on our target’s body are far deeper. The targeted creature takes 5d8 slashing damage; a creature that critically fails this saving throw also takes 1d8 persistent bleed damage. If you cast this as a three-action spell, the spell instead affects a 5-foot burst.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"Increase the damage dealt to the target by 1d8, and increase the persistent bleed damage by 1."}],"sustained":false},{"id":"211","name":"Outcast's Curse","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=211","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Curse","Enchantment","Mental","Misfortune"],"rating":"🟠🟠","rval":2,"gortle":"a good social curse. But that is not something I'd need day to day.","desc":"Curse a creature to be off-putting and grating.","effect":"You afflict the target with a curse that makes its presence abrasive and off -putting. The target must attempt a Will save. Critical Success The target is unaffected. Success For 10 minutes, the target must roll twice and use the worse result whenever attempting a Deception, Diplomacy, Intimidation, or Performance check, and creatures they encounter have an initial attitude toward them of one step worse (for instance, unfriendly instead of indifferent). Failure As success, but the effect is permanent. Critical Failure As failure, and creatures that the target encounters have an initial attitude toward them of two steps worse. ---","conditions":[],"tags":["mental"],"heightened":[],"sustained":false},{"id":"1636","name":"Planar Tether","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=1636","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Concentrate","Manipulate"],"rating":"🟠🟠","rval":2,"gortle":"stopping an enemy teleporting away is too narrow for a Sorcerer to want every day. But put it in your spell book. Was named Dimensional Anchor","desc":"Keep a creature on its current plane.","effect":"You stitch the target to its current plane. While the target is affected by planar tether , the spell attempts to counteract any teleportation effect that would move the target, or any effect that would transport it to a different plane. Planar tether's duration is determined by the target's Will save. Critical Success The target is unaffected. Success The duration is 1 minute. Failure The duration is 10 minutes. Critical Failure The duration is 1 hour. ---","conditions":[],"tags":["concentrate","utility"],"heightened":[],"sustained":false},{"id":"980","name":"Ravenous Portal","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=980","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"1 door no more than 10 feet tall and 5 feet wide","duration":"","school":"Abjuration","traditions":"Arcane, Occult","save":"","traits":["Abjuration"],"rating":"🟠🟠","rval":2,"gortle":"SOM might be useful in a dungeon crawl. Potentially turns a door into an ally if the enemy tries to go through it.","desc":"Door turns into a mimic when others try to open it.","effect":"You place a ward upon the door that triggers when a creature attempts to open, unlock, or destroy the door. When that happens, the door transforms into a mimic that can't move and is hostile to all creatures. When Casting the Spell, you designate yourself and up to 10 other creatures of your choice; these creatures don't trigger the ward, and the mimic is helpful to them instead of hostile. No effect can move the mimic unless it's also capable of moving the entire door. Once the door transforms into a mimic, it attacks creatures in its reach for up to 1 minute, and then the spell ends. If the mimic is killed before that time, the spell ends and the door returns to its normal form. While turned into a mimic, the door can't be opened, unlocked, or bypassed—not even by the designated creatures. It's a creature, not a door, during that time. When the spell ends, the door returns to the state it was in before the ward was triggered. ---","conditions":[],"tags":["control"],"heightened":[],"sustained":false},{"id":"813","name":"Rebounding Barrier","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=813","rarity":"Rare","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Occult","save":"","traits":["Abjuration","Rare"],"rating":"🟠🟠","rval":2,"gortle":"SOM burns a level 4 spell slot into a shield block, with some minor damage to the attacker.","desc":"You swiftly raise a reflective barrier, reducing physical damage and rebounding it onto your attacker.","effect":"You swiftly raise a reflective barrier, reducing physical damage and rebounding it onto your attacker. You gain resistance 10 against one physical damage type the triggering attack deals. Your attacker takes 5 damage of the same type.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+1","text":"The resistance increases by 2. Damage dealt to your attacker increases by 1."}],"sustained":false},{"id":"583","name":"Reflective Scales","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=583","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration"],"rating":"🟠🟠","rval":2,"gortle":"G&M scalable resistance to energy or poison damage. But with a burst explosion option when you are done with them.","desc":"You grow a set of colored glowing scales or scaled armor that stores energy before releasing it in a final burst.","effect":"You grow a set of colored glowing scales or scaled armor that stores energy before releasing it in a final burst. When you cast this spell, choose acid, cold, fire, electricity, or poison damage. You gain resistance 5 against that type of damage. The scales’ color depends on the damage type you chose and is usually the color of a type of dragon or other creature associated with that damage type, such as red or gold for fire damage. The scales store up energy as they protect you. Keep track of how much damage the scales have prevented. As a 2-action activity that has the concentrate and manipulate traits, you can explode your scales outward in a 20-foot radius around you, dealing 1d6 damage of the chosen type to all creatures in the area for every 10 damage the scales have prevented, to a maximum of 10d6 damage (after preventing 100 damage). Once you do so, the spell ends.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+2","text":"The resistance increases by 5 and the maximum damage from the scale explosion increases by 5d6."}],"sustained":false},{"id":"989","name":"Sanguine Mist","rank":4,"url":"https://2e.aonprd.com/Spells.aspx?ID=989","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"basic Fortitude","traits":["Death","Necromancy","Negative"],"rating":"🟠🟠","rval":2,"gortle":"an area effect drain that does small damage and doesn't seem to work very well.","desc":"Create a cloud of life-draining fog that siphons vitality into you.","effect":"You
