 harmlessly place your unique magical sigil, which is about 1 square inch in size, on the targeted creature or object. The mark can be visible or invisible, and you can change it from one state to another by using an Interact action to touch the target. The mark can be scrubbed or scraped off with 5 minutes of work. If it's on a creature, it fades naturally over the course of a week. The time before the mark fades increases depending on your heightened level.","conditions":["invisible"],"tags":["utility"],"heightened":[{"label":"3rd","text":"The sigil instead fades after 1 month."},{"label":"5th","text":"The sigil instead fades after 1 year."},{"label":"7th","text":"The sigil never fades."}],"sustained":false},{"id":"1703","name":"Summon Instrument","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1703","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Cantrip","Concentrate","Manipulate"],"rating":"🔴","rval":1,"gortle":"APG only bards might want to use this, and even they don't have to have an instrument.","desc":"Call an instrument that only you can play.","effect":"You materialize a handheld musical instrument in your grasp. The instrument is typical for its type, but it plays for only you. It vanishes when the spell ends. If you cast summon instrument again, any instrument you previously summoned disappears.","conditions":[],"tags":["concentrate","summon"],"heightened":[{"label":"5th","text":"The instrument is instead a virtuoso handheld instrument."}],"sustained":false},{"id":"1411","name":"Take Root","rank":0,"url":"https://2e.aonprd.com/Spells.aspx?ID=1411","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"30 feet","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Cantrip","Manipulate","Plant","Wood"],"rating":"🔴","rval":1,"gortle":"ROE plus 1 against being tripped, disarmed, or shoved. Very narrow.","desc":"Reinforce a creature’s stance or grip with roots.","effect":"Roots sprout from the flesh of the target and coil across the floor or around objects, reinforcing their stance or grip. The targeted creature gains a +1 circumstance bonus to their Fortitude DC against attempts to Shove them and a +1 circumstance bonus to their Reflex DC against attempts to Disarm or Trip them. This bonus also applies to saving throws against spells or effects that would attempt to remove a held item from their grasp. ---","conditions":[],"tags":["buff"],"heightened":[],"sustained":false},{"id":"666","name":"Animate Dead","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=666","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Divine, Occult","save":"","traits":["Necromancy"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"APG this version of undead is the same as all the summon spells. Now called Summon Undead - which brings it into line as all the other Summon X spells. Options at every spell rank. Here are some nice suggestions for level 1. Look at a summoning guide for other levels. ○ Crawling Hand has a good claw hand grab great against casters.. ○ Skeleton Guard has some resistances that will make it very tough against opponents that can’t do bludgeoning damage.","desc":"Animate an undead creature to fight on your behalf.","effect":"Your magic dredges up a corpse or skeleton and fills it with necromantic life, and you force the dead to fight at your command. You summon a common creature that has the undead trait and whose level is –1; this creature gains the summoned trait. Heightening the spell increases the maximum level of creature you can summon.","conditions":[],"tags":["summon"],"heightened":[{"label":"2nd","text":"Level 1"},{"label":"3rd","text":"Level 2"},{"label":"4th","text":"Level 3"},{"label":"5th","text":"Level 5"},{"label":"6th","text":"Level 7"},{"label":"7th","text":"Level 9"},{"label":"8th","text":"Level 11"},{"label":"9th","text":"Level 13"},{"label":"10th","text":"Level 15"}],"sustained":true},{"id":"1236","name":"Aqueous Blast","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1236","rarity":"Rare","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Occult, Primal","save":"","traits":["Evocation","Rare","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"KM single action attack spell, prones on a critical. Nice way to spend a third action.","desc":"You evoke a mass of water into the air around your outstretched fist.","effect":"You evoke a mass of water into the air around your outstretched fist. For the remainder of your turn, you can blast targets within 30 feet with this water by spending a single action which has the attack and concentrate traits. When you do so, attempt a ranged spell attack roll. If you hit, you inflict 2d8 bludgeoning damage. On a critical hit, the blast knocks the target prone.","conditions":["prone"],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d8."}],"sustained":false},{"id":"569","name":"Befuddle","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=569","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"G&M a good single target debuff. Still has a partial effect if they save. Good against enemy bosses or any target your team is focussing on. Only lasts one round, so it is not great if you have many enemies or only a couple of spell slots.","desc":"You sow seeds of confusion in your target’s mind, causing their actions and thoughts to become clumsy.","effect":"You sow seeds of confusion in your target’s mind, causing their actions and thoughts to become clumsy. Critical Success The target is unaffected. Success The target is clumsy 1 and stupefied 1. Failure The target is clumsy 2 and stupefied 2. Critical Failure The target is clumsy 3, stupefied 3, and confused. ---","conditions":["clumsy","confused","stupefied"],"tags":["emotion","mental"],"heightened":[],"sustained":false},{"id":"1276","name":"Briny Bolt","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1276","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Evocation","Water"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"solid damage. Good water attack spell. Chance of a Blind.","desc":"You hurl a bolt of saltwater from your extended hand.","effect":"You hurl a bolt of saltwater from your extended hand. Make a ranged spell attack against a target within range. Critical Success The creature takes 4d6 bludgeoning damage and is blinded for 1 round and dazzled for 1 minute as saltwater sprays into its eyes. The creature can spend an Interact action to rub its eyes and end the blinded condition, but not the dazzled condition. Success The creature takes 2d6 bludgeoning damage and is blinded for 1 round. The creature can spend an Interact action wiping the salt water from its eyes to end the blinded condition.","conditions":["blinded","dazzled"],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"110","name":"Fear","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=110","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult, Primal","save":"Will","traits":["Emotion","Enchantment","Fear","Mental"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":", Heightened ★★★★★, one round of fleeing is often enough to be decisive, better if using intimidation. Gets multiple targets when heightened to level 3 and is one of a small number of multi target spells that is effective when your enemy has gotten mixed in with your party. Then it's a great option. The frightened condition affects saving throws, checks and DC, so it's useful to inflict. On the plus side, Fear is always useful out of a level 1 slot when you get to a higher level. The down side is it doesn’t last long.","desc":"Frighten a creature, possibly making it flee.","effect":"You plant fear in the target; it must attempt a Will save. Critical Success The target is unaffected. Success The target is frightened 1. Failure The target is frightened 2. Critical Failure The target is frightened 3 and fleeing for 1 round.","conditions":["fleeing","frightened"],"tags":["emotion","fear","mental"],"heightened":[{"label":"3rd","text":"You can target up to five creatures."}],"sustained":false},{"id":"1536","name":"Force Barrage","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1536","rarity":"Common","actions":"1","actionsRaw":"Single Action to Three Actions","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Force","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC a name change for Magic Missile","desc":"Pelt creatures with unerring shards of magical force.","effect":"You fire a shard of solidified magic toward a creature that you can see. It automatically hits and deals 1d4+1 force damage. For each additional action you use when Casting the Spell, increase the number of shards you shoot by one, to a maximum of three shards for 3 actions. You choose the target for each shard individually. If you shoot more than one shard at the same target, combine the damage before applying bonuses or penalties to damage, resistances, weaknesses, and so forth.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"You fire one additional shard with each action you spend."}],"sustained":false},{"id":"1302","name":"Forge","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1302","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature or unattended metal object","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Evocation","Fire","Uncommon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"HH short range fire damage. Penetrates metal objects better. Why does it get 4 stars? Because this is a Fortitude save. Most direct damage is Reflex.I had this situation last night where a successful recall knowledge had identified the lowest save as Fortitude, but the players kept going for Reflex spells. The monster's reflex save was 6 higher BTW.","desc":"Developed before the introduction of the Iron Lagoon, this cantrip for superheating metal has also found valuable combat use.","effect":"Developed before the introduction of the Iron Lagoon, this cantrip for superheating metal has also found valuable combat use. You superheat the target, dealing 3d6 fire damage. If the target is a metal object, reduce its Hardness by an amount equal to the damage dealt until the end of your next turn. Critical Success The target is unaffected. Success The target takes half damage. Failure The target takes full damage. Critical Failure The target takes double damage, and if it's a metal creature, it gains weakness 2 to physical damage until the end of your next turn.","conditions":[],"tags":["damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 2d6, and the weakness on a critical failure increases by 2."}],"sustained":false},{"id":"143","name":"Gust of Wind","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=143","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Fortitude","traits":["Air","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"line of effect save or be knocked prone. TIme it so your fighters can take advantage of it. But even if they don’t it costs the enemy an action to stand up.","desc":"Wind blows out fires and knocks back objects and creatures.","effect":"A violent wind issues forth from your palm, blowing from the point where you are when you cast the spell to the line's opposite end. The wind extinguishes small non-magical fires, disperses fog and mist, blows objects of light Bulk or less around, and pushes larger objects. Large or smaller creatures in the area must attempt a Fortitude save. Large or smaller creatures that later move into the gust must attempt the save on entering. Critical Success The creature is unaffected. Success The creature can't move against the wind. Failure The creature is knocked prone. If it was flying, it suffers the effects of critical failure instead. Critical Failure The creature is pushed 30 feet in the wind's direction, knocked prone, and takes 2d6 bludgeoning damage. ---","conditions":["prone"],"tags":["control","damage"],"heightened":[],"sustained":false},{"id":"160","name":"Illusory Object","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=160","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"500 feet","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a simple illusion, fairly reliable at level 2, eventually permanent. You can create walls with this. It is an effective barrier, and can provide cover. Can easily cost your enemies a few actions and maybe a few rounds. Very strong if played well. It blocks sight until they do a Seek action and succeed in a Perception check against your spell DC. Even if they succeed, creaturess on the other side are concealed. Lexchyn has a good video on this.","desc":"Form a convincing illusion of an object.","effect":"You create an illusory visual image of a stationary object. The entire image must fit within the spell's area. The object appears to animate naturally, but it doesn't make sounds or generate smells. For example, water would appear to pour down an illusory waterfall, but it would be silent. Any creature that touches the image or uses the Seek action to examine it can attempt to disbelieve your illusion.","conditions":[],"tags":["illusion"],"heightened":[{"label":"2nd","text":"Your image makes appropriate sounds, generates normal smells, and feels right to the touch. The spell gains the auditory and olfactory traits. The duration increases to 1 hour."},{"label":"5th","text":"As the 2nd-level version, but the duration is unlimited."}],"sustained":false},{"id":"175","name":"Longstrider","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=175","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"a useful long term buff - one of very few. Now called Tailwind","desc":"Increase your Speed for an hour.","effect":"You lengthen your stride beyond what should be possible. You gain a +10-foot status bonus to your Speed.","conditions":[],"tags":["buff"],"heightened":[{"label":"2nd","text":"The duration increases to 8 hours."}],"sustained":false},{"id":"180","name":"Magic Missile","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=180","rarity":"Common","actions":"1","actionsRaw":"Single Action to Three Actions","range":"120 feet","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Evocation","Force"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"now called Force Barrage. Lots of missiles that don’t miss. A good fallback if you run into something with a high AC, saving throws and broad immunities. One of very few direct damage spells that doesn’t require you to have a high spell casting DC. It is still useful even if you are outclassed by an enemy. Sometimes useful as a one action spell if you are prepared to burn slots to get that little bit extra damage out. A note on the interaction of this and Dangerous Sorcery Sorcerous Potency. Balance wise","desc":"Pelt creatures with unerring bolts of magical force.","effect":"You send a dart of force streaking toward a creature that you can see. It automatically hits and deals 1d4+1 force damage. For each additional action you use when Casting the Spell, increase the number of missiles you shoot by one, to a maximum of three missiles for 3 actions. You choose the target for each missile individually. If you shoot more than one missile at the same target, combine the damage before applying bonuses or penalties to damage, resistances, weaknesses, and so forth.","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"You shoot one additional missile with each action you spend."}],"sustained":false},{"id":"1657","name":"Runic Body","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1657","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 willing creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC an improved version of Magic Fang. It now scales as it heightens. How useful it is depends on your group. Strong early before you get the right gear, and strong again at particular level breaks. Note that technically this provides item bonuses so animal companions don’t get full benefits from it.","desc":"Temporarily apply magical runes to a creature's unarmed attacks.","effect":"Glowing runes appear on the target's body. All its unarmed attacks become +1 striking unarmed attacks, gaining a +1 item bonus to attack rolls and increasing the number of damage dice to two.","conditions":[],"tags":["buff","concentrate"],"heightened":[{"label":"6th","text":"The unarmed attacks are +2 greater striking ."},{"label":"9th","text":"The unarmed attacks are +3 major striking ."}],"sustained":false},{"id":"1658","name":"Runic Weapon","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1658","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 weapon that is unattended or wielded by a willing creature","duration":"","school":"","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC an improved version of Magic Weapon. It now scales as it heightens. Strong early before you get the right gear, and strong again at particular level breaks.","desc":"Temporarily apply magical runes to a weapon.","effect":"The weapon glimmers with magic as temporary runes carve down its length. The target becomes a +1 striking weapon, gaining a +1 item bonus to attack rolls and increasing the number of weapon damage dice to two.","conditions":[],"tags":["buff","concentrate"],"heightened":[{"label":"6th","text":"The weapon is +2 greater striking ."},{"label":"9th","text":"The weapon is +3 major striking ."}],"sustained":false},{"id":"283","name":"Shocking Grasp","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=283","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Electricity","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"excellent damage but range touch. Scales well. A good argument for the Reach Spell metamagic feat or the Aberrant bloodline but sadly that is occult. Technically replaced by Thunderstrike but that is a different spell.","desc":"Zap a creature with electricity.","effect":"You shroud your hands in a crackling field of lightning. Make a melee spell attack roll. On a hit, the target takes 2d12 electricity damage. If the target is wearing metal armor or is made of metal, you gain a +1 circumstance bonus to your attack roll with shocking grasp , and the target also takes 1d4 persistent electricity damage on a hit. On a critical hit, double the initial damage, but not the persistent damage.","conditions":["persistent damage"],"tags":["buff","damage","defense"],"heightened":[{"label":"+1","text":"The damage increases by 1d12, and the persistent electricity damage increases by 1."}],"sustained":false},{"id":"587","name":"Shockwave","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=587","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Evocation"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"G&M a 15 cone of save or be prone. They are still flatfooted if they save. Very useful in a party where several PCs have attacks of oppourtunity or with a rogue. Heightened for a bigger area.","desc":"You create a wave of energy that ripples through the earth.","effect":"You create a wave of energy that ripples through the earth. Terrestrial creatures in the affected area must attempt a Reflex save to avoid stumbling as the shockwave shakes the ground. Critical Success The creature is unaffected. Success The creature is flat-footed until the start of its next turn. Failure The creature falls prone. Critical Failure As failure, plus the creature takes 1d6 damage.","conditions":["off-guard","prone"],"tags":["control","damage"],"heightened":[{"label":"+1","text":"The area increases by 5 feet (to a 20-foot cone at 2nd level, and so on)."}],"sustained":false},{"id":"316","name":"Summon Animal","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=316","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"for missions too dangerous for your other minions. Not very efficient at doing damage but they make excellent alternative targets for your enemies to attack. Great for trap detection, helping with flanking, or blocking by simply being in the way. Needs its own guide, have a look at this one by Exocist. Have a look at the monster filter for options. Costs you an action to control. Some staples at level 1: ○ Skunk has Spray Musk for sickened in an area DC 16 ○ Common Eurypterid (a scorpion) to grab enemies ○ Flash Beetle to dazzle them","desc":"Conjure an animal to fight on your behalf.","effect":"You conjure an animal to fight for you. You summon a common creature that has the animal trait and whose level is –1, such as those below. Heightening the spell increases the maximum level of creature you can summon.","conditions":[],"tags":["summon"],"heightened":[{"label":"2nd","text":"Level 1."},{"label":"3rd","text":"Level 2."},{"label":"4th","text":"Level 3."},{"label":"5th","text":"Level 5."},{"label":"6th","text":"Level 7."},{"label":"7th","text":"Level 9."},{"label":"8th","text":"Level 11."},{"label":"9th","text":"Level 13."},{"label":"10th","text":"Level 15."}],"sustained":true},{"id":"1706","name":"Summon Undead","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1706","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"","traits":["Concentrate","Manipulate","Summon"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC this version of undead is the same as all the summon spells. Was called Animate Dead - this brings it into line as all the other Summon X spells. Options at every spell rank. Here are some nice suggestions for level 1. Look at a summoning guide for other levels. ○ Crawling Hand has a good claw hand grab. ○ Skeleton Guard has some resistances that will make it very tough against opponents that can’t do bludgeoning damage.","desc":"Conjure an undead to fight on your behalf.","effect":"You summon a creature that has the undead trait and whose level is –1 to fight for you.","conditions":[],"tags":["concentrate","summon"],"heightened":[{"label":"2nd","text":"Level 1."},{"label":"3rd","text":"Level 2."},{"label":"4th","text":"Level 3."},{"label":"5th","text":"Level 5."},{"label":"6th","text":"Level 7."},{"label":"7th","text":"Level 9."},{"label":"8th","text":"Level 11."},{"label":"9th","text":"Level 13."},{"label":"10th","text":"Level 15."}],"sustained":true},{"id":"1709","name":"Sure Strike","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1709","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Fortune"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC Was called True Strike. But now with errata that says once once per 10 minutes. Unless you were taking a Staff of Divination so you could use it most rounds most people won’t mind. Still a great spell but maybe 3 or 4 are enough.","desc":"Your next attack is especially accurate.","effect":"The next time you make an attack roll before the end of your turn, roll it twice and use the better result. The attack ignores circumstance penalties to the attack roll and any flat check required due to the target being concealed or hidden. You are then temporarily immune to sure strike for 10 minutes. ---","conditions":["concealed"],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"1711","name":"Tailwind","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1711","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Concentrate","Manipulate"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"PC a useful long term buff - one of very few. Was called Longstrider. This invalidates a few too many class features and probably is too good.","desc":"Increase your speed for an hour.","effect":"The wind at your back pushes you to find new horizons. You gain a +10-foot status bonus to your Speed.","conditions":[],"tags":["buff","concentrate"],"heightened":[{"label":"2nd","text":"The duration increases to 8 hours."}],"sustained":false},{"id":"1721","name":"Thunderstrike","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1721","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Electricity","Manipulate","Sonic"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"excellent damage and range 120ft. Scales well at d12+d4. Technically a replacement for Shocking Grasp but that is a different spell. Please treat it as such.","desc":"Call down a thunderbolt.","effect":"You call down a tendril of lightning that cracks with thunder, dealing 1d12 electricity damage and 1d4 sonic damage to the target with a basic Reflex save. A target wearing metal armor or made of metal takes a –1 circumstance bonus to its save, and if damaged by the spell is clumsy 1 for 1 round.","conditions":["clumsy"],"tags":["buff","concentrate","damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 1d12 electricity and 1d4 sonic."}],"sustained":false},{"id":"345","name":"True Strike","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=345","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Fortune"],"rating":"🔵🔵🔵🔵","rval":4,"gortle":"Now called Sure Strike. If for some reason you are meleeing and staying there. A good option if you are a part time caster or if you are trying to land a big attack spell. Negates miss chances, so it's valuable against blur or invisibility. There are a few more spells apart from cantrips with attack rolls. That list was heavily affected by errata. If you like some of them, this is very good.","desc":"Make your next attack especially accurate.","effect":"A glimpse into the future ensures your next blow strikes true. The next time you make an attack roll before the end of your turn, roll the attack twice and use the better result. The attack ignores circumstance penalties to the attack roll and any flat check required due to the target being concealed or hidden. ---","conditions":["concealed"],"tags":[],"heightened":[],"sustained":false},{"id":"820","name":"Admonishing Ray","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=820","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Divine","save":"","traits":["Attack","Necromancy","Nonlethal"],"rating":"🟢🟢🟢","rval":3,"gortle":"single target direct damage.It just is not really anymore than a cantrip at this level. Maybe at level 2 it makes sense damage wise.","desc":"A ray of energy bludgeons your target into submission without causing lasting harm.","effect":"A ray of energy bludgeons your target into submission without causing lasting harm. When you cast this spell, you choose whether the ray feels like a strong punch or slap. Make a spell attack roll. The ray deals 2d6 bludgeoning damage. Critical Success The target takes double damage. Success The target takes full damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"7","name":"Alarm","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=7","rarity":"Common","actions":"T","actionsRaw":"10 minutes","range":"touch","target":"","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult, Primal","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"required if you can’t set a watch. Some people will take one every day.","desc":"Be alerted if a creature enters a warded area.","effect":"You ward an area to alert you when creatures enter without your permission. When you cast alarm , select a password. Whenever a Small or larger corporeal creature enters the spell's area without speaking the password, alarm sends your choice of a mental alert (in which case the spell gains the mental trait) or an audible alarm with the sound and volume of a hand bell (in which case the spell gains the auditory trait). Either option automatically awakens you, and the bell allows each creature in the area to attempt a DC 15 Perception check to wake up. A creature aware of the alarm must succeed at a Stealth check against the spell's DC or trigger the spell when moving into the area.","conditions":[],"tags":[],"heightened":[{"label":"3rd","text":"You can specify criteria for which creatures sound the alarm spell—for instance, orcs or masked people."}],"sustained":false},{"id":"667","name":"Animate Rope","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=667","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"100 feet","target":"up to 50 feet of rope or a nonliving rope-like object","duration":"","school":"Transmutation","traditions":"Arcane, Occult","save":"Reflex","traits":["Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG useful if you need to get a rope somewhere. This is your first level Fly ½ spell. You can attack with this to slow people down.","desc":"Command a rope to move and tie as you wish.","effect":"You cause a length or section of rope or a rope-like object to animate and follow simple commands. You can give it two commands when you Cast the Spell, and one command each time you Sustain the Spell. - Bind (attack) The rope attempts to partially bind a creature. Attempt a spell attack roll against the target's Reflex DC. If you succeed, the target takes a –10-foot circumstance penalty to its Speed (–20-foot on a critical success). This ends if the target Escapes against your spell DC or breaks the rope. (A standard adventuring rope has Hardness 2, HP 8, and a Broken Threshold of 4.) - Coil The rope forms a tidy, coiled stack. - Crawl The rope inches along the ground like a snake, moving one of its ends 10 feet. The rope must move along a surface, but that surface doesn't need to be horizontal. - Knot The rope ties a sturdy knot in itself. - Loop The rope forms a simple loop at one or both ends, or straightens itself back out. - Tie The rope ties itself around a willing creature or an object that's unattended or attended by a willing creature. - Undo The rope undoes one of its knots, ties, or bindings.","conditions":[],"tags":["debuff"],"heightened":[{"label":"+2","text":"The range increases by 50 feet, and you can animate 50 more feet of rope."}],"sustained":true},{"id":"568","name":"Anticipate Peril","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=568","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M a status bonus to initiative. Duration: 10 minutes. Quite useful offensively. Heighten for a larger bonus.","desc":"You grant the target brief foresight.","effect":"You grant the target brief foresight. The target gains a +1 status bonus to its next initiative roll, after which the spell ends.","conditions":[],"tags":["buff"],"heightened":[{"label":"+2","text":"The status bonus increases by 1, to a maximum of +4 at 7th level."}],"sustained":false},{"id":"1457","name":"Breathe Fire","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1457","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Concentrate","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC was called Burning Hands . Early area effect damage. Scales OK, but starts low.","desc":"Release a small cone of flame from your mouth.","effect":"A gout of flame sprays from your mouth. You deal 2d6 fire damage to creatures in the area with a basic Reflex save.","conditions":[],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"30","name":"Burning Hands","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=30","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Evocation","Fire"],"rating":"🟢🟢🟢","rval":3,"gortle":"now called Breathe Fire. Early area effect damage. Scales OK, but starts low.","desc":"A small cone of flame rushes from your hands.","effect":"Gouts of flame rush from your hands. You deal 2d6 fire damage to creatures in the area.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"1948","name":"Camel Spit","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1948","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"AC","traits":["Acid","Attack","Concentrate","Manipulate","Morph"],"rating":"🟢🟢🟢","rval":3,"gortle":"HoW an acid spit attack that dazzles. Can repeat twice as a single action.","desc":"You alter your stomach, esophagus, and tongue to be able to spit partially digested food with force.","effect":"You alter your stomach, esophagus, and tongue to be able to spit partially digested food with force. You can spit at a foe once you finish Casting the Spell and can repeat the attack once on each of your subsequent turns by taking a single action, which has the acid, attack, and concentrate traits. After your third spit attack, the spell ends. When you attack with camel spit, make a ranged spell attack roll against a creature within 15 feet, dealing 1d6 acid damage and causing the target to be dazzled for 1 round if you hit. On a critical hit, you deal double damage and the target takes 1 persistent acid damage.","conditions":["dazzled","persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+1","text":"The damage increases by 1d6, and the persistent damage on a critical hit is increased by 1."}],"sustained":false},{"id":"34","name":"Charm","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=34","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult, Primal","save":"Will","traits":["Emotion","Enchantment","Incapacitation","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"I’d give it 4 stars but for Incapacitation. The target won’t always know what you have done, so it is a bit safer than it used to be. You have the Charisma and the skills to work them over.","desc":"A creature becomes more friendly to you.","effect":"To the target, your words are honey and your visage seems bathed in a dreamy haze. It must attempt a Will save, with a +4 circumstance bonus if you or your allies recently threatened it or used hostile actions against it. You can Dismiss the spell. If you use hostile actions against the target, the spell ends. When the spell ends, the target doesn't necessarily realize it was charmed unless its friendship with you or the actions you convinced it to take clash with its expectations, meaning you could potentially convince the target to continue being your friend via mundane means. Critical Success The target is unaffected and aware you tried to charm it. Success The target is unaffected but thinks your spell was something harmless instead of charm , unless it identifies the spell (see Identifying Spells). Failure The target's attitude becomes friendly toward you. If it was friendly, it becomes helpful. It can't use hostile actions against you. Critical Failure The target's attitude becomes helpful toward you, and it can't use hostile actions against you.","conditions":[],"tags":["buff","emotion","incapacitation","mental"],"heightened":[{"label":"4th","text":"The duration lasts until the next time you make your daily preparations."},{"label":"8th","text":"The duration lasts until the next time you make your daily preparations, and you can target up to 10 creatures."}],"sustained":false},{"id":"571","name":"Chilling Spray","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=571","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"Reflex","traits":["Cold","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M cold damage in a cone, that gives a minor speed penalty.","desc":"A cone of icy shards bursts from your spread hands and coats the target in a layer of frost.","effect":"A cone of icy shards bursts from your spread hands and coats the target in a layer of frost. You deal 2d4 cold damage to creatures in the area; they must each attempt a Reflex save. Critical Success The creature takes no damage. Success The creature takes half damage. Failure The creature takes full damage and takes a –5-foot status penalty to its Speeds for 2 rounds. Critical Failure The creature takes double damage and takes a –10-foot status penalty to its Speeds for 2 rounds.","conditions":[],"tags":["damage","debuff"],"heightened":[{"label":"+1","text":"The damage increases by 2d4."}],"sustained":false},{"id":"44","name":"Color Spray","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=44","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Incapacitation","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"now called Dizzying Colors. Useful at level 1 if you can get a couple of targets together. Nowhere near as strong as it used to be because of Incapacitation. If you want to keep using it you will have to heighten it.","desc":"Swirling colors dazzle or stun creatures.","effect":"Swirling colors affect viewers based on their Will saves. Critical Success The creature is unaffected. Success The creature is dazzled for 1 round. Failure The creature is stunned 1, blinded for 1 round, and dazzled for 1 minute. Critical Failure The creature is stunned for 1 round and blinded for 1 minute. ---","conditions":["blinded","dazzled","stunned"],"tags":["illusion","incapacitation"],"heightened":[],"sustained":false},{"id":"45","name":"Command","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=45","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Occult","save":"Will","traits":["Auditory","Enchantment","Linguistic","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"very flexible. Only for one action but that is often enough. Very useful against single opponents. Stays useful even at higher levels. Note that it will stop them from using reaction till their turn.","desc":"Bid a creature to approach, run, release something, lie prone, or stand up.","effect":"You shout a command that's hard to ignore. You can command the target to approach you, run away (as if it had the fleeing condition), release what it's holding, drop prone, or stand in place. It can't Delay or take any reactions until it has obeyed your command. The effects depend on the target's Will save. Success The creature is unaffected. Failure For the first action on its next turn, the creature must use a single action to do as you command. Critical Failure The target must use all its actions on its next turn to obey your command.","conditions":["fleeing","prone"],"tags":["control","mental"],"heightened":[{"label":"5th","text":"You can target up to 10 creatures."}],"sustained":false},{"id":"1351","name":"Dehydrate","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1351","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"basic Fortitude","traits":["Concentrate","Fire","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a nice debug against plants and water trait creatures. OK against everyone else. Enfeebled plus persistent fire damage. As it scales the area of effect becomes significant and the spell is more useful. Potentially very high persistent damage.","desc":"Make creatures parched, damaging and enfeebling them.","effect":"You stir the inner fire of all things within the area, driving out moisture. All creatures in the area take 1d6 persistent fire damage with a basic Fortitude save; creatures with the water or plant traits get a result one degree of success worse than they rolled. The spell ends for a creature when its persistent damage ends. A creature affected by dehydrate attempts an additional Fortitude save at the end of each of its turns, before rolling to recover from the persistent damage. It can forgo this additional save if it consumed water or a similar hydrating liquid within the last round (drinking typically requires a single action). Success The creature takes no additional effect. Failure The creature is enfeebled 1 until the end of its next turn. Critical Failure The creature is enfeebled 2 until the end of its next turn.","conditions":["enfeebled","persistent damage"],"tags":["concentrate","damage"],"heightened":[{"label":"+2","text":"The range increases by 10 feet, the burst increases by 5 feet, and the persistent fire damage increases by 3d6."}],"sustained":false},{"id":"1500","name":"Dizzying Colors","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1500","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Concentrate","Illusion","Incapacitation","Manipulate","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC a name change for Color Spray","desc":"Swirling colors blind, dazzle, or stun creatures.","effect":"You unleash a swirling multitude of colors that overwhelms creatures based on their Will saves. Critical Success The creature is unaffected. Success The creature is dazzled for 1 round. Failure The creature is stunned 1, blinded for 1 round, and dazzled for 1 minute. Critical Failure The creature is stunned for 1 round and blinded for 1 minute. ---","conditions":["blinded","dazzled","stunned"],"tags":["concentrate","illusion","incapacitation"],"heightened":[],"sustained":false},{"id":"897","name":"Draw Ire","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=897","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"120 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"Will","traits":["Emotion","Enchantment","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM moderate damage plus a status penalty to attack people who aren’t you. Only good if you know you are going to be near impossible to attack.","desc":"Mentally sting a creature's mind to make it less capable of attacking creatures other than you.","effect":"You cause mental distress to a creature, goading it to strike back at you. You deal 1d10 mental damage to the creature and cause it to take a –1 status penalty to attack rolls against creatures other than you. The creature must attempt a Will saving throw. Critical Success The target is unaffected. Success The target takes half damage and the penalty. The spell ends at the end of the target's next turn. Failure The target takes full damage and the penalty. Critical Failure The target takes double damage, and the status penalty is –2.","conditions":[],"tags":["damage","debuff","emotion","mental"],"heightened":[{"label":"+1","text":"The damage increases by 1d10."}],"sustained":false},{"id":"899","name":"Echoing Weapon","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=899","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 weapon","duration":"","school":"Evocation","traditions":"Arcane, Divine, Occult","save":"","traits":["Evocation","Sonic"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM a small amount of bonus sonic damage to a weapon. Probably only good if your enemy is weak to it.","desc":"Your attacks build up to release a sonic pulse.","effect":"You channel magical energy into the target weapon, and the air around it faintly hums each time you strike a blow, as the impact is absorbed into the weapon. If a creature is wielding the weapon at the end of its turn, the weapon discharges a burst of sound targeting one creature adjacent to the wielder (if any). The sonic damage this deals is equal to the number of successful Strikes with the target weapon that the wielder made that turn (to a maximum of 4 sonic damage if the wielder hits with four Strikes).","conditions":[],"tags":["damage"],"heightened":[{"label":"+2","text":"The sonic damage increases by 1 per Strike (and the maximum damage increases by 4)."}],"sustained":false},{"id":"1221","name":"Elysian Whimsy","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1221","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Divine, Primal","save":"Will","traits":["Enchantment","Incapacitation","Mental","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P183 save or perform a random social action.","desc":"You overwhelm the target with an unexpected and unpredictable desire if it fails a Will save.","effect":"You overwhelm the target with an unexpected and unpredictable desire if it fails a Will save. Roll 1d4 to determine the spell's effect. ## Elysian Whimsy 1d4 Effect 1 The target feels a powerful urge to dance. For 1 round, it takes a –5-foot status penalty to its Speeds (–10-foot status penalty on a critical failure), capering and prancing as it moves. 2 The target is compelled to loudly sing a song. Its first action on its next turn must be to Perform a song it knows, or to babble pleasingly if it knows no songs. On a critical failure, the target must use all its actions on its next turn to Perform a song. 3 The target is filled with an irresistible urge to support a nearby creature's entertainment career. Its first action on its next turn must be to prepare to Aid a Perform check for the nearest creature it can see and the target can use the next reaction it gains only to Aid the creature it helped. On a critical failure, it must spend all its actions on its next turn preparing to Aid a Perform check. 4 The target is overcome with a desire to give away its wealth. Its first action on its next turn must be to Interact to pull out a non-magical item of value it is carrying (such as a coin, piece of jewelry, or an item made of precious metal), if it doesn't already have one in hand. It then Releases the valuable item. If the target neither holds nor carries an appropriate item, it instead spends its first action loudly apologizing for having nothing to give. On a critical failure, the target must spend any actions remaining on its turn apologizing for not giving more. ---","conditions":[],"tags":["debuff","incapacitation","mental"],"heightened":[],"sustained":false},{"id":"573","name":"Endure","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=573","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"touch","target":"1 creature","duration":"","school":"Enchantment","traditions":"Arcane, Occult","save":"","traits":["Enchantment","Mental"],"rating":"🟢🟢🟢","rval":3,"gortle":"G&M DM 5 temporary hitpoints for 1 minute. Single Action. It scales up.","desc":"You invigorate the touched creature’s mind and urge it to press on.","effect":"You invigorate the touched creature’s mind and urge it to press on. You grant the touched creature 5 temporary Hit Points.","conditions":[],"tags":["defense","mental"],"heightened":[{"label":"+1","text":"Increase the temporary Hit Points by 5."}],"sustained":false},{"id":"1513","name":"Enfeeble","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1513","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Divine, Occult","save":"Fortitude","traits":["Concentrate","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC a better version of Ray of Enfeeblement no attack roll. Partial effect even if they succeed. Great against the right monster. Remaining Attack Trait is an error.","desc":"Sap a creature's strength.","effect":"You sap the target's strength, depending on its Fortitude save. Critical Success The target is unaffected. Success The target is enfeebled 1 until the start of your next turn. Failure The target is enfeebled 2 for 1 minute. Critical Failure The target is enfeebled 3 for 1 minute. ---","conditions":["enfeebled"],"tags":["concentrate"],"heightened":[],"sustained":false},{"id":"549","name":"Exchange Image","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=549","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"you and 1 other humanoid","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"Will","traits":["Illusion","Uncommon","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"P147 can last all day. Fun. It could be very effective even against an enemy in combat.","desc":"Trade appearances with the target.","effect":"To mislead pursuers, the Lacunafex developed the means to swap visages. You trade appearances with the target, with the effects depending on the result of the target’s Will saving throw. Willing and unconscious targets automatically critically fail this saving throw. Critical Success No effect. Success You take on the target’s appearance, and they take yours. This has the same effects as a 1st-level illusory disguise spell, except that the target can’t Dismiss the disguise. The duration is 1 minute or until Dismissed. Failure As success, but the duration is 1 hour or until Dismissed. Critical Failure As success, but the duration is 24 hours. ---","conditions":["unconscious"],"tags":["illusion","utility"],"heightened":[],"sustained":false},{"id":"111","name":"Feather Fall","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=111","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"1 falling creature","duration":"","school":"Abjuration","traditions":"Arcane, Primal","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"a bit situational, but if you need it you really need it. A pity you can’t use it on objects. Now called Gentle Landing.","desc":"React to slow a creature’s fall.","effect":"You cause the air itself to arrest a fall. The target's fall slows to 60 feet per round, and the portion of the fall during the spell's duration doesn't count when calculating falling damage. If the target reaches the ground while the spell is in effect, it takes no damage from the fall. The spell ends as soon as the target lands. ---","conditions":[],"tags":["damage"],"heightened":[],"sustained":false},{"id":"1285","name":"Flashy Disappearance","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1285","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"FB a single action (errated) invisible move to get away in a puff of smoke.","desc":"You create a puff of colorful smoke that quickly disperses while you become temporarily  invisible .","effect":"You create a puff of colorful smoke that quickly disperses while you become temporarily invisible. You become undetected to all creatures that rely on visual senses unless they can see invisible creatures. You Stride. At the end of your movement, if you have cover, greater cover, or concealment, attempt a Stealth check to Hide. You gain a +2 status bonus to this Stealth check. The invisibility then ends, and you either become observed or hidden to creatures as determined by your check to Hide, if you made one. ---","conditions":["invisible"],"tags":["buff","illusion","utility"],"heightened":[],"sustained":false},{"id":"122","name":"Fleet Step","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=122","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"escape spell.","desc":"Make your Speed much faster.","effect":"You gain a +30-foot status bonus to your Speed. ---","conditions":[],"tags":["buff"],"heightened":[],"sustained":false},{"id":"1265","name":"Flense","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1265","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature or corpse","duration":"","school":"Necromancy","traditions":"Arcane, Divine","save":"","traits":["Necromancy","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P186 single target melee slashing damage.","desc":"With a touch, you strip off the flesh, muscle, and internal organs off your target, leaving only bare bones.","effect":"With a touch, you strip off the flesh, muscle, and internal organs off your target, leaving only bare bones. The effect depends on whether the target is a living creature, undead creature, or inanimate corpse. A creature or corpse that lacks flesh, muscle, and internal organs is immune to this spell. Inanimate Corpse The flesh, muscle, viscera, and organs are stripped from the corpse and vanish, leaving only bare bones behind. Living Creature Make a spell attack roll. On a hit, the target takes 2d6 slashing damage. On a critical hit, double the damage, and the target also takes 1d4 persistent bleed damage. If this spell's damage kills the target, the corpse is only bones. Undead Creature Make a spell attack roll. On a hit, the target takes 2d6 slashing damage. On a critical hit, double the damage, and the target also becomes enfeebled 1 for 1 minute. If this spell's damage destroys the target, only its bare bones remain behind.","conditions":["enfeebled"],"tags":["damage"],"heightened":[{"label":"+1","text":"The slashing damage to living and undead creatures increases by 2d6, and the persistent bleed damage to living creatures increases by 1d4."}],"sustained":false},{"id":"860","name":"Friendfetch","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=860","rarity":"Uncommon","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 or 2 willing creatures","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"","traits":["Evocation","Force","Uncommon"],"rating":"🟢🟢🟢","rval":3,"gortle":"P169 moves allies close to you. Pull people out of a trap, a bad spell effect, a grab, or get them away from an enemy when they are prone. Better value when you have spare low level slots.","desc":"You shoot out ephemeral, telekinetic strands that drag each target directly toward you, stopping in the closest unoccupied space to you in this path.","effect":"You shoot out ephemeral, telekinetic strands that drag each target directly toward you, stopping in the closest unoccupied space to you in this path. This is forced movement. ---","conditions":[],"tags":["control"],"heightened":[],"sustained":false},{"id":"1542","name":"Gentle Landing","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1542","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"60 feet","target":"1 falling creature","duration":"","school":"","traditions":"Arcane, Primal","save":"","traits":["Air","Concentrate"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC a name change for Feather Fall","desc":"React to save a falling creature.","effect":"You raise a magical updraft to arrest a fall. The target's fall slows to 60 feet per round, and the portion of the fall during the spell's duration doesn't count when calculating falling damage. If the target reaches the ground while the spell is in effect, it takes no damage from the fall. The spell ends as soon as the target lands. ---","conditions":[],"tags":["concentrate","damage"],"heightened":[],"sustained":false},{"id":"139","name":"Goblin Pox","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=139","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 creature","duration":"","school":"Necromancy","traditions":"Arcane, Primal","save":"Fortitude","traits":["Disease","Necromancy"],"rating":"🟢🟢🟢","rval":3,"gortle":"range touch debuf, fort save but has an effect even if they save","desc":"Infect a creature with goblin pox.","effect":"Your touch afflicts the target with goblin pox, an irritating allergenic rash. The target must attempt a Fortitude save. Critical Success The target is unaffected. Success The target is sickened 1. Failure The target is afflicted with goblin pox at stage 1. Critical Failure The target is afflicted with goblin pox at stage 2. Goblin Pox (disease); Level 1. Goblins and goblin dogs are immune. Stage 1 sickened 1 (1 round); Stage 2 sickened 1 and slowed 1 (1 round); Stage 3 sickened 1 and the creature can't reduce its sickened value below 1 (1 day) ---","conditions":["sickened","slowed"],"tags":[],"heightened":[],"sustained":false},{"id":"140","name":"Grease","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=140","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 object of Bulk 1 or less","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"Fortitude","traits":["Conjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"too much fun. Very useful tactically. Valuable even in higher level play. Too small an area to be of more general use. Still ok in corridors. If you combine it with difficult terrain say from Scatter Scree, then the enemy can’t Step to avoid the Grease","desc":"Coat a surface or object in slippery grease.","effect":"You conjure grease, with effects based on choosing area or target. Area All solid ground in the area is covered with grease. Each creature standing on the greasy surface must succeed at a Reflex save or an Acrobatics check against your spell DC or fall prone. Creatures using an action to move onto the greasy surface during the spell's duration must attempt either a Reflex save or an Acrobatics check to Balance. A creature that Steps or Crawls doesn't have to attempt a check or save. Target If you cast the spell on an unattended object, anyone trying to pick up the object must succeed at an Acrobatics check or Reflex save against your spell DC to do so. If you target an attended object, the creature that has the object must attempt an Acrobatics check or Reflex save. On a failure, the holder or wielder takes a –2 circumstance penalty to all checks that involve using the object; on a critical failure, the holder or wielder releases the item. The object lands in an adjacent square of the GM's choice. If you cast this spell on a worn object, the wearer gains a +2 circumstance bonus to Fortitude saves against attempts to grapple them. ---","conditions":["prone"],"tags":["buff","control","debuff"],"heightened":[],"sustained":false},{"id":"141","name":"Grim Tendrils","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=141","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Necromancy","traditions":"Arcane, Occult","save":"Fortitude","traits":["Necromancy","Negative"],"rating":"🟢🟢🟢","rval":3,"gortle":"a line of necromantic damage. Scales up.","desc":"Creatures in a line take negative damage and bleed.","effect":"Tendrils of darkness curl out from your fingertips and race through the air. You deal 2d4 negative damage and 1 persistent bleed damage to living creatures in the line. Each living creature in the line must attempt a Fortitude save. Critical Success The creature is unaffected. Success The creature takes half the negative damage and no persistent bleed damage. Failure The creature takes full damage. Critical Failure The creature takes double negative damage and double persistent bleed damage.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The negative damage increases by 2d4, and the persistent bleed damage increases by 1."}],"sustained":false},{"id":"927","name":"Horizon Thunder Sphere","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=927","rarity":"Common","actions":"2","actionsRaw":"Two Actions to 2 rounds","range":"varies","target":"1 creature","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"basic Reflex","traits":["Attack","Electricity","Evocation"],"rating":"🟢🟢🟢","rval":3,"gortle":"this is very unique. A spell you can power up for two rounds for extra damage. Plus a minor fire shield style effect.","desc":"Gather energy and throw a ball of lightning.","effect":"You gather magical energy into your palm, forming a concentrated ball of electricity that crackles and rumbles like impossibly distant thunder. Make a ranged spell attack roll against your target's AC. On a success, you deal 3d6 electricity damage. On a critical success, the target takes double damage and is dazzled for 1 round. The number of actions you spend when Casting this Spell determines the range and other parameters. Two Actions (somatic, verbal) This spell has a range of 30 feet. Three Actions (material, somatic, verbal) This spell has a range of 60 feet and deals half damage on a failure (but not a critical failure) as the electricity lashes out and jolts the target. Two Rounds If you spend 3 actions Casting the Spell, you can avoid finishing the spell and spend another 3 actions on your next turn to empower the spell even further. If you do, after attacking the target, whether you hit or miss, the ball of lightning explodes, dealing 2d6 electricity damage to all other creatures in a 10-foot emanation around the target (basic Reflex save). Additionally, you spark with electricity for 1 minute, dealing 1 electricity damage to creatures that Grab you or that hit you with an unarmed Strike or a non-reach melee weapon.","conditions":["dazzled"],"tags":["damage"],"heightened":[{"label":"+1","text":"The initial damage on a hit, as well as the burst damage for two-round casting time, each increase by 2d6, and the damage creatures take if they Grapple or hit you while you're in your sparking state increases by 1."}],"sustained":false},{"id":"154","name":"Hydraulic Push","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=154","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"60 feet","target":"1 creature or unattended object","duration":"","school":"Evocation","traditions":"Arcane, Primal","save":"","traits":["Attack","Evocation","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"sometimes pushing can be useful, but gust of wind is more flexible. I guess it is good if you want single target direct damage, and are prepared to heighten it.","desc":"Damage and push a creature with a blast of water.","effect":"You call forth a powerful blast of pressurized water that bludgeons the target and knocks it back. Make a ranged spell attack roll. Critical Success The target takes 6d6 bludgeoning damage and is knocked back 10 feet. Success The target takes 3d6 bludgeoning damage and is knocked back 5 feet.","conditions":[],"tags":["damage"],"heightened":[{"label":"+1","text":"The damage increases by 2d6."}],"sustained":false},{"id":"159","name":"Illusory Disguise","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=159","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion","Visual"],"rating":"🟢🟢🟢","rval":3,"gortle":"1 hour.","desc":"Make yourself look like a different creature.","effect":"You create an illusion that causes you to appear as another creature of the same body shape, and with roughly similar height (within 6 inches) and weight (within 50 pounds), as yourself. The disguise is typically good enough to hide your identity, but not to impersonate a specific individual. The spell doesn't change your voice, scent, or mannerisms. You can change the appearance of your clothing and worn items, such as making your armor look like a dress. Held items are unaffected, and any worn item you remove returns to its true appearance. Casting illusory disguise counts as setting up a disguise for the Impersonate use of Deception; it ignores any circumstance penalties you might take for disguising yourself as a dissimilar creature, it gives you a +4 status bonus to Deception checks to prevent others from seeing through your disguise, and you add your level even if you're untrained. You can Dismiss this spell.","conditions":[],"tags":["buff","illusion","utility"],"heightened":[{"label":"2nd","text":"The spell also disguises your voice and scent, and it gains the auditory and olfactory traits."},{"label":"3rd","text":"You can appear as any creature of the same size, even a specific individual. You must have seen an individual to take on their appearance. The spell also disguises your voice and scent, and it gains the auditory trait."}],"sustained":false},{"id":"1337","name":"Interposing Earth","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1337","rarity":"Common","actions":"R","actionsRaw":"Reaction","range":"","target":"","duration":"","school":"","traditions":"Arcane, Primal","save":"Reflex","traits":["Earth","Manipulate"],"rating":"🟢🟢🟢","rval":3,"gortle":"ROE a reaction to create a shield bonus. I mean a regular shield would work too, but maybe you have your hands full.","desc":"React to make a barrier of earth.","effect":"You raise a flimsy barrier of earth to shield you from harm. This barrier is 1 inch thick, 5 feet long, 5 feet high, and must be placed on the border between two squares. This barrier appears between you and the source of the triggering effect and grants you standard cover against the triggering effect. If you would be damaged by the triggering effect despite this barrier, the barrier is destroyed, and the damage dealt to you is reduced by 2. The barrier remains in place for 3 rounds (or until destroyed). It has AC 5, 2 Hardness, and 5 Hit Points.","conditions":[],"tags":["defense"],"heightened":[{"label":"4th","text":"The damage reduced increases to 8, the barrier's hardness increases to 8, and the barrier's Hit Points increases to 20."}],"sustained":false},{"id":"700","name":"Invisible Item","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=700","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 object","duration":"","school":"Illusion","traditions":"Arcane, Occult","save":"","traits":["Illusion"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG a nice way to set up an ambush, with an invisible log across the road.","desc":"Make an item disappear from view.","effect":"You make the object invisible. This makes it undetected to all creatures, though the creatures can attempt to find the target, making it hidden to them instead if they succeed. If the item is used as part of a hostile action, the spell ends after that hostile action is completed. Making a weapon invisible typically doesn't give any advantage to the attack, except that an invisible thrown weapon or piece of ammunition can be used for an attack without necessarily giving information about the attacker's hiding place unless the weapon returns to the attacker.","conditions":["invisible"],"tags":["illusion","utility"],"heightened":[{"label":"3rd","text":"The duration is until the next time you make your daily preparations."},{"label":"7th","text":"The duration is unlimited."}],"sustained":false},{"id":"167","name":"Jump","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=167","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Move","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"does what it says, single action spell. Better at level 3 when you can repeat it every round. Nice if you can't get a flight power or you don’t want to pay for it.","desc":"Make an impressive leap.","effect":"Your legs surge with strength, ready to leap high and far. You jump 30 feet in any direction without touching the ground. You must land on a space of solid ground within 30 feet of you, or else you fall after using your next action.","conditions":[],"tags":[],"heightened":[{"label":"3rd","text":"The range becomes touch, the target changes to one touched creature, and the duration becomes 1 minute, allowing the target to jump as described whenever it takes the Leap action."}],"sustained":false},{"id":"1156","name":"Kinetic Ram","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1156","rarity":"Common","actions":"1","actionsRaw":"Single Action to Three Actions","range":"varies","target":"1 or more creatures","duration":"","school":"Evocation","traditions":"Arcane, Occult","save":"Fortitude","traits":["Evocation","Force"],"rating":"🟢🟢🟢","rval":3,"gortle":"DA a Force effect save or be pushed. The gem is the one action version.That can be a really useful single action especially when you are higher level and can afford the first level spell slot.","desc":"","effect":"","conditions":[],"tags":[],"heightened":[],"sustained":false},{"id":"2005","name":"Leaden Steps","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=2005","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"30 feet","target":"1 creature","duration":"","school":"","traditions":"Arcane, Primal","save":"Fortitude","traits":["Concentrate","Manipulate","Metal","Morph"],"rating":"🟢🟢🟢","rval":3,"gortle":"PC2 makes a target clumsy, slower and weak to electricity. Useful debuff. Very nice at low level with electrical damage.","desc":"Make creatures heavy and weak to electricity.","effect":"You partially transform a foe's feet into unwieldy slabs of metal, slowing their steps. The target attempts a Fortitude saving throw. Critical Success The target is unaffected. Success The target is encumbered and has weakness 2 to electricity until the end of your next turn. The spell can't be sustained. Failure The target is encumbered and has weakness 2 to electricity. Critical Failure The target is encumbered and has weakness 3 to electricity.","conditions":["encumbered"],"tags":["concentrate"],"heightened":[{"label":"+1","text":"The weakness increases by 1."}],"sustained":true},{"id":"174","name":"Lock","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=174","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 lock, or a door or container with a latch","duration":"","school":"Abjuration","traditions":"Arcane, Divine, Occult","save":"","traits":["Abjuration"],"rating":"🟢🟢🟢","rval":3,"gortle":"nice utility especially in a dungeon crawl. Can be permanent. It can be very nice to lock a door after you have gone through it. Protect yourself from attacks from the rear while preserving your option to withdraw.","desc":"Make a lock hard to open.","effect":"The target's latch mechanism clinks shut, held fast by unseen magical restraints. When you magically lock a target, you set an Athletics and Thievery DC to open it equal to your spell DC or the base lock DC with a +4 status bonus, whichever is higher. Any key or combination that once opened a lock affected by this spell does not do so for the duration of the spell, though the key or combination does grant a +4 circumstance bonus to checks to open the door. If the target is opened, the spell ends. Assuming the target is not barred or locked in some additional way, you can unlock and open it with an Interact action during which you touch the target. This does not end the spell. You can Dismiss this spell at any time and from any distance.","conditions":[],"tags":["buff"],"heightened":[{"label":"2nd","text":"The duration increases to unlimited, but you must expend 6 gp worth of gold dust as an additional cost."}],"sustained":false},{"id":"182","name":"Magic Weapon","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=182","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"touch","target":"1 weapon that is unattended or wielded by you or a willing ally","duration":"","school":"Transmutation","traditions":"Arcane, Divine, Occult, Elemental","save":"","traits":["Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"useful for a while an extra dice of damage to a weapon. Eventually you have enough magic weapons. Strong at low levels. Largely replaced by Runic Weapon.","desc":"Make a weapon temporarily magical.","effect":"The weapon glimmers with magic and energy. The target becomes a +1 striking weapon , gaining a +1 item bonus to attack rolls and increasing the number of weapon damage dice to two. ---","conditions":[],"tags":["buff"],"heightened":[],"sustained":false},{"id":"952","name":"Mud Pit","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=952","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"Conjuration","traditions":"Arcane, Primal","save":"","traits":["Conjuration","Earth","Water"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM create difficult terrain in a burst at range. No save, it just happens.","desc":"Conjure mud to slow movement.","effect":"Thick, clinging mud covers the ground, 1 foot deep. The mud is difficult terrain. ---","conditions":[],"tags":["control"],"heightened":[],"sustained":false},{"id":"217","name":"Pest Form","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=217","rarity":"Common","actions":"2","actionsRaw":"Two Actions","range":"","target":"","duration":"","school":"Transmutation","traditions":"Arcane, Primal","save":"","traits":["Polymorph","Transmutation"],"rating":"🟢🟢🟢","rval":3,"gortle":"some utility value, sneaking around, escape in the right terrain. Heightened will give you 10 minutes of flight.","desc":"Turn into a nonthreatening animal.","effect":"You transform into the battle form of a Tiny animal, such as a cat, insect, lizard, or rat. You can decide the specific type of animal (such as a rat or praying mantis), but this has no effect on the form's Size or statistics. While in this form, you gain the animal trait, and you can't make Strikes. You can Dismiss the spell. You gain the following statistics and abilities: AC = 15 + your level. Ignore your armor's check penalty and Speed reduction. Speed 20 feet. Weakness 5 to physical damage. (If you take physical damage in this form, you take 5 additional damage.) Low-light vision and imprecise scent 30 feet. Acrobatics and Stealth modifiers of +10, unless your own modifier is higher; Athletics modifier –4.","conditions":[],"tags":["utility"],"heightened":[{"label":"4th","text":"You can turn into a flying creature, such as a bird, which grants you a fly Speed of 20 feet."}],"sustained":false},{"id":"706","name":"Pet Cache","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=706","rarity":"Common","actions":"1","actionsRaw":"Single Action","range":"touch","target":"1 willing creature that is your animal companion or familiar","duration":"","school":"Conjuration","traditions":"Arcane, Divine, Occult, Primal, Elemental","save":"","traits":["Conjuration","Extradimensional"],"rating":"🟢🟢🟢","rval":3,"gortle":"APG hide your pet in an extradimensional space for 8 hours. Good for smuggling them somewhere. Even getting your warhorse into a dungeon.","desc":"Hide a familiar or animal companion in a pocket dimension.","effect":"You open your cloak or create a gap with your hands, drawing the target into a pocket dimension just large enough for its basic comfort. No other creature can enter this extradimensional space, and the target can bring along objects only if they were designed to be worn by a creature of its kind. The space has enough air, food, and water to sustain the target for the duration. You can Dismiss the spell. The spell also ends if you die or enter an extradimensional space. When the spell ends, the target reappears in the nearest unoccupied space (outside of any extradimensional space you may have entered). ---","conditions":[],"tags":[],"heightened":[],"sustained":true},{"id":"1631","name":"Phantasmal Minion","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=1631","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"60 feet","target":"","duration":"","school":"","traditions":"Arcane, Occult","save":"","traits":["Concentrate","Manipulate","Summon"],"rating":"🟢🟢🟢","rval":3,"gortle":"a simple invisible summon that can interact for you. Because it can’t be seen there are all sorts of tricks out of combat that you can do with this. Lasts as long as you concentrate, so it’s easy to have it precast. For pranksters, wizards with labs, or any caster that has Effortless Concentration or Final Sacrifice. Was called Unseen Servant.","desc":"Create a creature of force to perform minor tasks.","effect":"You summon a phantasmal minion. The minion is roughly the shape of a humanoid. You can choose to have it be invisible or have an ephemeral appearance, but it's obviously a magical effect, not a real creature. ---","conditions":["invisible"],"tags":["concentrate","summon","utility"],"heightened":[],"sustained":true},{"id":"970","name":"Pocket Library","rank":1,"url":"https://2e.aonprd.com/Spells.aspx?ID=970","rarity":"Common","actions":"3","actionsRaw":"Three Actions","range":"","target":"","duration":"","school":"Divination","traditions":"Arcane, Occult","save":"","traits":["Divination","Extradimensional"],"rating":"🟢🟢🟢","rval":3,"gortle":"SOM helps with recall knowledge. Probably not your thing as a Sorcerer but there are going to be some people who like this. Only for when you can afford to spend the spell slots on this.","desc":"Withdraw books from a pocket library for study.","effect":"You collect information from the world's libraries about a particular subject and store it in an extradimensional library. When you Cast this Spell, choos
